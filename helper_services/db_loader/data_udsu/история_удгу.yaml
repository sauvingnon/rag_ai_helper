- type: История и развитие УдГУ
  name: Когда и как был основан Удмуртский государственный педагогический институт?
  keywords: УГПИ, история, 1931, основание, педагогический институт, УдГУ
  text: |
    Становление Удмуртского государственного педагогического института (далее – УГПИ) начиналось в тяжелое и героическое время 30-х гг. XX века. 
    УГПИ был открыт в апреле 1931 г. Изначально пединститут состоял из 4 факультетов: исторического, языка и литературы, естественнонаучного, физико-математического. 
    Значимая роль в развитии УГПИ принадлежит директорам этого периода – Г.П. Макарову (1933–1937) и М.А. Родину (1938–1944). 
    Строится первое учебное здание, выпускаются первые специалисты, появляются первые кандидаты наук и профессора.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Как УГПИ работал в годы Великой Отечественной войны?
  keywords: ВОВ, война, УГПИ, Курский пединститут, Ижевский институт иностранных языков, помощь фронту
  text: |
    В годы Великой Отечественной войны педагогический институт перестраивается на военные рельсы. В это время в состав УГПИ влились 
    Курский педагогический институт и Ижевский учительский институт иностранных языков. 
    Студенты и преподаватели вели активную работу в тылу и оказывали помощь фронту.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Как развивался УГПИ после Великой Отечественной войны?
  keywords: послевоенное развитие, М.П. Бабин, новые факультеты, доктора наук, строительство
  text: |
    После окончания войны УГПИ начал постоянный рост числа студентов и преподавателей. 
    Появились первые доктора наук, построено второе здание. Ключевой фигурой стал директор М.П. Бабин (1948–1972). 
    Были открыты спортивный и художественно-графический факультеты.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Когда и как УГПИ стал Удмуртским государственным университетом?
  keywords: УдГУ, преобразование, 1971, Б.Н. Шульга, ректор, новые корпуса, лаборатории
  text: |
    В 1971 г. УГПИ был преобразован в Удмуртский государственный университет. Первым ректором стал Б.Н. Шульга. 
    Был построен 4-й корпус, открыт экономико-правовой факультет, созданы вычислительный центр и десятки лабораторий. 
    За первое десятилетие открыто 10 новых кафедр и 20 лабораторий, построены 3 общежития.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Как развивался УдГУ под руководством В.А. Журавлева?
  keywords: В.А. Журавлев, ректор, 1986–2001, факультеты, Ботанический сад, Интернет, корпуса
  text: |
    С 1986 по 2001 г. УдГУ возглавлял В.А. Журавлев. Число факультетов выросло с 9 (1988) до 19 (2001). 
    В 1987 г. создан комбинат студенческого питания, в 1988 г. — Ботанический сад. В 1992 и 1997 гг. 
    открыты учебные корпуса №5 и №6. В 1996 г. УдГУ вышел в Интернет.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Какие ключевые события произошли в УдГУ в 2000–2010-е годы?
  keywords: С.Д. Бунтов, Г.В. Мерзлякова, Институт нефти и газа, бессрочная лицензия, Дом научной коллаборации
  text: |
    С 2007 по 2012 гг. ректором был С.Д. Бунтов: открыты новые направления, укреплена материально-техническая база. 
    В 2011 г. УдГУ получил бессрочную лицензию и открыл «Институт нефти и газа им. М.С. Гуцериева». 
    С 2012 г. ректор — Г.В. Мерзлякова. В 2020 г. открыт Дом научной коллаборации им. В.И. Вернадского.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Какие научные и инфраструктурные проекты реализует УдГУ сегодня?
  keywords: научные лаборатории, ЦАТОД, цифровой двойник, космические исследования, издания, Scopus, Web of Science
  text: |
    УдГУ активно участвует в высокотехнологичных проектах: созданы лаборатории по управлению и биологии 
    (финансирование ~70 млн руб/год), разработан цифровой двойник 3D-принтера, ведутся исследования для АО «ЦНИИмаш». 
    Открыт первый в России Центр аддитивных технологий общего доступа (ЦАТОД). Университет издаёт 10 научных журналов, 
    3 из них индексируются в Scopus и Web of Science.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Какова современная инфраструктура и образовательная деятельность УдГУ?
  keywords: инфраструктура, институты, кафедры, преподаватели, программы, бакалавриат, магистратура, аспирантура
  text: |
    Сегодня УдГУ включает 13 институтов, Многопрофильный колледж, Институт ДПО и 72 кафедры. 
    Образовательные программы — более 200 по 29 направлениям. Штат — около 700 педагогов и учёных (67% — кандидаты и доктора наук). 
    Обучение ориентировано на цифровые и предпринимательские компетенции, практико-ориентированные программы и международное сотрудничество.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Какие показатели деятельности УдГУ?
  keywords: студенты, выпускники, трудоустройство, целевое обучение, международные студенты, договоры
  text: |
    Контингент — более 14 тыс. студентов (51% — на бюджете). Обучается 256 целевиков. 
    Заключено более 700 договоров на подготовку специалистов. Выпущено более 155 тыс. профессионалов с 1931 г. 
    Трудоустраиваются 67% в республике, общее трудоустройство — более 80%. 20,4% студентов — из других регионов и 27 стран мира.
  meta:
    notes: ''

- type: История и развитие УдГУ
  name: Участвует ли УдГУ в программе «Приоритет-2030»?
  keywords: Приоритет-2030, стратегический лидер, технологическое лидерство, гранты, федеральная программа
  text: |
    Да. УдГУ стал участником программы «Приоритет-2030» в 2021 г. и успешно подтверждает статус в 2022–2024 гг. 
    С 2025 г. программа переориентирована на технологическое лидерство. 
    Университет реализует проекты по подготовке кадров для создания и эксплуатации наукоёмких технологий.
  meta:
    notes: ''