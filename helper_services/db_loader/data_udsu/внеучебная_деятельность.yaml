- type: Внеучебная деятельность
  name: Что такое «Фестиваль клубов и студенческих объединений»?
  keywords: фестиваль клубов, студенческие объединения, презентация клубов, внеучебная деятельность, УдГУ, кружки
  text: |
    «Фестиваль клубов и студенческих объединений» — это презентация самых разных кружков и секций, которые есть в УдГУ. Руководители клубов расскажут, чем занимается их студенческое объединение/клуб. Это мероприятие поможет определиться, в какое студенческое объединение/клуб вы хотите вступить, позже связаться с его представителями и стать полноправным членом команды. Посетить презентацию может любой студент УдГУ, но выступить с презентацией своего объединения/клуба можно только по предварительной записи.
  meta:
    notes: ''

