- type: Библиотека УдГУ
  name: Какой порядок сдачи/продления учебников в библиотеке?
  keywords: сдача книг, продление, учебники, научная литература, художественная литература, библиотека, УдГУ
  text: |
    Учебная литература выдаётся на семестр, по истечению которого книги необходимо сдать. Научная литература выдаётся на две недели, после чего её нужно продлять (при продлении книги надо взять с собой). Художественная литература также выдаётся на две недели, но при продлении книгу брать не нужно. При потере/порче книг необходимо обратиться в отдел комплектования (каб. 018, тел. 916-362).
  meta:
    notes: |
      отдел комплектования: каб. 018, тел. 916-362

