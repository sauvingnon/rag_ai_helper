- type: Библиотека УдГУ
  name: Можно ли в библиотеке распечатать или отсканировать документы?
  keywords: печать, сканирование, копирование, сервисный центр, библиотека, УдГУ
  text: |
    Да. Для этого необходимо обратиться в сервисный центр (к. 05, тел. 916-367).
  meta:
    notes: |
      сервисный центр: каб. 05, тел. 916-367

- type: Библиотека УдГУ
  name: Можно ли в библиотеке использовать компьютеры?
  keywords: компьютеры в библиотеке, интернет-зал, УдГУ, доступ к ПК
  text: |
    Да, можно. Все студенты УдГУ вправе пользоваться компьютерами, находящимися в библиотеке, как для учёбы, так и в личных целях.
  meta:
    notes: ''

- type: Библиотека УдГУ
  name: Какой режим работы библиотеки УдГУ?
  keywords: график работы, библиотека, часы работы, читальный зал, абонемент, УдГУ
  text: |
    Пн–Пт: 8:15–18:00 (в т.ч. Интернет-зал);  
    Читальный зал: пн–пт: 8:15–21:00;  
    В субботу работает общий абонемент: с 8:15 до 17:15.
  meta:
    notes: ''

- type: Библиотека УдГУ
  name: У меня есть книги, которые я хочу пожертвовать в фонд библиотеки. Как это сделать?
  keywords: дарение книг, пожертвование, фонд библиотеки, УдГУ
  text: |
    Для этого необходимо принести книги в кабинет 017. Тел. 916-361.
  meta:
    notes: |
      кабинет: 017, тел. 916-361

