  name: Сколько стоит платное обучение в УдГУ?
  keywords: стоимость обучения, платное отделение, цена за год, УдГУ
  text: |
    Стоимость обучения на 2024 год приёма будет размещена на сайте 1 июня 2024 года (для ориентира — стоимость 2023 года (бакалавриат, специалитет) можно посмотреть по ссылке udsu.ru/admissions/2023/vysshee-obrazovanie-bakalavriat-i-spetsialitet/stoimost-obucheniya-na-2023-god)
  meta:
