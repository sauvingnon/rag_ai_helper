- type: Абитуриентам
  name: Какие документы необходимы при поступлении в УдГУ?
  keywords: документы для поступления, список документов, абитуриент, УдГУ
  text: |
    1. Заявление установленной формы.  
    2. Паспорт и ксерокопию паспорта (ксерокопия остаётся в личном деле абитуриента).  
    3. Оригинал или копию документа об образовании (с приложением).  
    4. Страховое свидетельство обязательного пенсионного страхования (при наличии).
  meta:
    notes: ''

- type: Абитуриентам
  name: Можно ли поступить в УдГУ после 9 класса?
  keywords: поступление после 9 класса, колледж, СПО, среднее профессиональное образование, УдГУ
  text: |
    Да, после 9 класса можно поступить в Многопрофильный колледж профессионального образования УдГУ. Продолжительность обучения: 2 года 10 месяцев – 3 года 10 месяцев. После окончания колледжа студент получает среднее профессиональное образование. Подробная информация на сайте: udsu.ru/admissions/2023/srednee-professionalnoe-obrazovanie
  meta:
    notes: |
      ссылка: udsu.ru/admissions/2023/srednee-professionalnoe-obrazovanie