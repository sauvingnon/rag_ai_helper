- type: Абитуриентам
  name: Чем очная форма обучения в УдГУ отличается от заочной и очно-заочной?
  keywords: формы обучения, очная, заочная, очно-заочная, график занятий, УдГУ
  text: |
    При обучении по заочной форме студенты приезжают в вуз только на сессию (3–4 недели) 2 раза в год, остальное время отводится на самостоятельную работу. При обучении по очно-заочной форме студенты посещают занятия 1–2 раза в неделю, исключение составляют: ИИиД – учатся каждый день в вечернее время, ИНГ – 2 сессии в год + межсессионный дистант. Очная форма предполагает обучение каждый день (пн.–суб.).
  meta:
    notes: ''

- type: Абитуриентам
  name: Можно ли в УдГУ получить высшее образование в ускоренные сроки?
  keywords: ускоренное обучение, сокращённая форма, поступление после СПО, после вуза, УдГУ
  text: |
    Обучение в ускоренные сроки проводится на базе высшего или на базе среднего профессионального образования. Продолжительность обучения – 3–3,5 года. Со всеми направлениями подготовки можно ознакомиться на сайте udsu.ru/admissions/2023/uskorennoe-obuchenie
  meta:
    notes: |
      ссылка: udsu.ru/admissions/2023/uskorennoe-obuchenie

- type: Абитуриентам
  name: Ведется ли прием на целевое обучение в УдГУ?
  keywords: целевое обучение, целевая квота, договор с работодателем, бюджет, УдГУ
  text: |
    Целевое обучение — обучение по программам высшего образования, при котором абитуриент, заключивший с заказчиком договор о целевом обучении, поступает на бюджетные места в рамках целевой квоты, и после окончания вуза должен отработать не менее трёх лет в организации, указанной заказчиком. В УдГУ ведётся приём на целевое обучение. Целевые квоты утверждаются Правительством РФ и размещаются на сайте УдГУ 1 июня. Информация о целевом приёме в 2023 году представлена по ссылке udsu.ru/admissions/2023/cb_2023
  meta:
    notes: |
      ссылка: udsu.ru/admissions/2023/cb_2023

- type: Абитуриентам
  name: Проводятся ли в УдГУ Дни открытых дверей?
  keywords: день открытых дверей, ДОД, поступление, экскурсия, УдГУ
  text: |
    Дни открытых дверей в УдГУ проводятся два раза в год: в марте и декабре. Информация об этом всегда появляется в нашем новостном разделе: udsu.ru/admissions/2023
  meta:
    notes: |
      ссылка: udsu.ru/admissions/2023

- type: Абитуриентам
  name: Где узнать все направления подготовки в УдГУ?
  keywords: направления подготовки, специальности, бакалавриат, магистратура, УдГУ
