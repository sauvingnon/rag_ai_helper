- type: Учебный процесс
  name: Как оплатить обучение?
  keywords: оплата обучения, как заплатить за учёбу, касса УдГУ, онлайн оплата, УдГУ
  text: |
    Оплату обучения можно произвести несколькими способами:

    - в кассах УдГУ (2 корпус, 2 этаж);
    - через онлайн-сервисы (подробнее на сайте udsu.ru/news/show/oplata-za-obuchenie-i-za-prozhivanie-v-obschezhitii-v-onlajn-rezhime)
  meta:
