- type: Учебный процесс
  name: Как перевестись из другого вуза в УдГУ?
  keywords: перевод из другого вуза, поступление в УдГУ, перевод на бюджет, перевод на платное, УдГУ
  text: |
    Перевод в УдГУ возможен из образовательных организаций, имеющих государственную аккредитацию, только на вакантные места в вузе. Перевод на бюджет осуществляется:

    - если обучение по соответствующей образовательной программе не является получением второго или последующего образования;
    - если общая продолжительность обучения не будет превышать более чем на один учебный год срока освоения образовательной программы.

    Перевод в УдГУ на платное обучение проводится при оплате обучения в соответствии с условиями заключаемого договора об образовании. Решение о переводе принимает Комиссия по переводу в УдГУ на основании заявления студента (образец заявления доступен на сайте udsu.ru/students/obraztsy-zayavlenij-studentov)
  meta:
    notes: |
      ссылка: udsu.ru/students/obraztsy-zayavlenij-studentov

- type: Учебный процесс
  name: Как перевестись в другой институт УдГУ?
  keywords: перевод внутри УдГУ, смена института, смена направления, УдГУ, внутренний перевод
  text: |
    Перевод с одного направления подготовки осуществляется по заявлению студента (образец заявления доступен на сайте УдГУ: udsu.ru/students/obraztsy-zayavlenij-studentov). Заявление о переводе подлежит согласованию с руководителями направляющего и принимающего учебных направлений.
  meta:
    notes: |
      ссылка: udsu.ru/students/obraztsy-zayavlenij-studentov

- type: Учебный процесс
  name: Как осуществляется перевод студентов на бюджет при наличии свободных мест?
  keywords: перевод на бюджет, бюджетные места, УдГУ, как попасть на бюджет, задолженности нет
  text: |
    Перевод студента на бюджет осуществляется по соответствующему заявлению (образец заявления на сайте УдГУ: udsu.ru/students/obraztsy-zayavlenij-studentov). Главные условия перевода на бюджет:

    - у студента должна быть закрыта сессия на «хорошо» и «отлично»;
    - на бюджете должны быть свободные места.

    Документы, необходимые для перевода:
    - заявление с визой и резолюцией директора института;
    - выписка из экзаменационных ведомостей;
    - сведения о составе семьи;
    - сведения о доходах всех членов семьи;
    - свидетельство о рождении ребенка (для женщин, родивших ребенка в период обучения в университете).
  meta:
    notes: |
      ссылка: udsu.ru/students/obraztsy-zayavlenij-studentov

- type: Учебный процесс
  name: В каких ситуациях и на сколько предоставляется академический отпуск?
  keywords: академический отпуск, отпуск по здоровью, призыв, семья, УдГУ, как оформить академ
  text: |
    Академический отпуск предоставляется студенту:

    - по медицинским показаниям;
    - по семейным обстоятельствам;
    - в случае призыва на военную службу;
    - в других исключительных случаях (стихийные бедствия и пр.).

    Кроме академического отпуска выделяют следующие виды отпусков:
    - отпуск по беременности и родам;
    - отпуск по уходу за ребенком до достижения им возраста трёх лет.

    Академический отпуск предоставляется обучающемуся на период времени, не превышающий двух лет. Решение о предоставлении академического отпуска принимается ректором УдГУ или иным уполномоченным лицом в десятидневный срок со дня получения от студента заявления и прилагаемых к нему документов. Образцы заявлений на предоставление академического отпуска: udsu.ru/students/obraztsy-zayavlenij-studentov
    Порядок предоставления академического отпуска в УдГУ: i.udsu.ru/files/04-education/methodics/5_Poryadok_Ak_otp_2018.pdf
  meta:
    notes: |
      ссылка на заявления: udsu.ru/students/obraztsy-zayavlenij-studentov
      ссылка на порядок: i.udsu.ru/files/04-education/methodics/5_Poryadok_Ak_otp_2018.pdf