- type: Общежития
  name: Каким студентам предоставляется место в общежитии?
  keywords: общежитие, заселение, иногородние, очная форма, заочная форма, сессия, УдГУ
  text: |
    Иногородним студентам очной формы обучения по программам СПО, бакалавриата, специалитета, магистратуры, аспирантуры. Иногородним студентам заочной формы обучения на период сессии.
  meta:
    notes: ''

- type: Общежития
  name: Какие категории студентов имеют преимущественное право на заселение в общежитие?
  keywords: льготы, инвалидность, сироты, ветераны, многодетная семья, общежитие, приоритетное заселение
  text: |
    Студенты, имеющие любую группу инвалидности, сироты, студенты, у которых один из родителей являются участниками или ветераны боевых действий, студент из многодетной семьи.
  meta:
    notes: ''

- type: Общежития
  name: Какие документы необходимы для заселения в общежитие?
  keywords: документы для общежития, заселение, паспорт, фотографии, справка, УдГУ
  text: |
    Заявление на имя директора института, паспорт, 4 фотографии 3х4, справка о состоянии здоровья из здравпункта УдГУ.
  meta:
    notes: ''

- type: Общежития
  name: Можно ли переселиться из одного общежития в другое?
  keywords: переселение, смена общежития, Студгородок, администрация, УдГУ
  text: |
    Для переселения в другое общежитие необходимы основания (проживать с родственником в одном общежитии, если вы являетесь спортсменом при УдГУ и вам нужно тренироваться и т.п.). Для решения этого вопроса нужно обращаться в администрацию Студгородка.
  meta:
    notes: |
      контакт: администрация Студгородка

- type: Общежития
  name: Сколько стоит проживание в общежитии?
  keywords: стоимость общежития, оплата проживания, цена, УдГУ, сколько платить
  text: |
    Стоимость проживания зависит от того, в каком общежитии проживает студент, составляет от 650 рублей до 850 рублей в месяц.
  meta:
    notes: |
      диапазон: 650–850 руб/мес

- type: Общежития
  name: Как оплатить проживание в общежитии?
  keywords: оплата общежития, касса, счёт-квитанция, бухгалтерия, УдГУ
  text: |
    При наличии счёт-квитанции оплата производится в кассе бухгалтерии УдГУ (1 корпус, 2-й этаж).
  meta:
    notes: |
      место оплаты: 1 корпус, 2 этаж, касса бухгалтерии

- type: Общежития
  name: Как выписаться из общежития?
  keywords: выписка, выселение, паспортный стол, общежитие, УдГУ
  text: |
    При принятии решения выписаться из общежития необходимо обратиться в паспортный стол УдГУ.
  meta:
    notes: |
      место: паспортный стол УдГУ

- type: Общежития
  name: Могут ли в общежитии проживать несовершеннолетние студенты?
  keywords: несовершеннолетние, заселение, 18 лет, родители, общежитие, УдГУ
  text: |
    Несовершеннолетний студент может самостоятельно заселиться в общежитие, если ему исполняется 18 лет до Нового Года. При исполнении 18 лет после Нового Года, при заселении в общежитие присутствие одного из родителей обязательно.
  meta:
    notes: ''

- type: Общежития
  name: Могут ли в общежитии находиться посетители (родственники студентов, их друзья, знакомые)?
  keywords: посетители, гости, общежитие, родственники, ограничения, COVID-19, УдГУ
  text: |
    В период ограничений, связанных с распространением коронавирусной инфекции COVID-19, посещение общежитий УдГУ посторонними лицами запрещено за исключением родителей, родных братьев и сестёр.
  meta:
    notes: |
      актуально при действующих ограничениях (например, во время пандемии)