- type: Дополнительное образование в УдГУ
  name: По каким предметам ведутся подготовительные курсы для школьников?
  keywords: подготовительные курсы, ЕГЭ, ОГЭ, школьники, Центр довузовского образования, УдГУ
  text: |
    Подготовительные курсы к ОГЭ и ЕГЭ организованы Центром довузовского образования. Готовиться можно по всем предметам школьной программы, а также к творческим вступительным испытаниям. Тел. для справок 916-250.
  meta:
    notes: |
      телефон: 916-250

- type: Дополнительное образование в УдГУ
  name: Как записаться на курсы подготовки к ЕГЭ и ОГЭ?
  keywords: запись на курсы, ЕГЭ, ОГЭ, Центр довузовского образования, ВКонтакте, УдГУ
  text: |
    Записаться можно:
    - в группе ВК «Центр довузовского образования» (vk.com/cdo_udsu);
    - по ссылке «запись на курсы» на сайте вуза в разделе «довузовское образование»;
    - по тел. 916-250;
    - лично в каб. 123 второго корпуса.
  meta:
    notes: |
      ВК: vk.com/cdo_udsu
      кабинет: 2 корпус, 123
      телефон: 916-250

- type: Дополнительное образование в УдГУ
  name: Что такое «Дом научной коллаборации» в УдГУ? Как туда записаться?
  keywords: ДНК, Дом научной коллаборации, профориентация, дети, дополнительное образование, УдГУ
  text: |
    «ДНК» — ключевой центр дополнительного образования детей, открытый в УдГУ в рамках национального проекта «Образование». Задача ДНК – через практическую деятельность помочь учащимся выбрать будущую профессию, освоить некоторые компетенции, работая на современном высокотехнологичном оборудовании. Группа «ДНК им. Вернадского» в ВК содержит подробное описание проекта и новости о его реализации. Подробную информацию можно получить на сайте УдГУ f-idpo.udsu.ru/dom-nauchnoj-kollaboratsii
  meta:
    notes: |
      сайт: f-idpo.udsu.ru/dom-nauchnoj-kollaboratsii
      ВК: поиск по «ДНК им. Вернадского»

- type: Дополнительное образование в УдГУ
  name: Могу ли я пройти профориентационное тестирование в УдГУ?
  keywords: профориентация, профтестирование, выбор профессии, Центр довузовского образования, УдГУ
  text: |
    Профтестирование проводится по предварительному согласованию времени. Записаться на тест и узнать информацию о нём можно по тел. 916-250, в Центре довузовского образования.
  meta:
    notes: |
      телефон: 916-250

- type: Дополнительное образование в УдГУ
  name: Как записаться на курсы профессиональной переподготовки?
  keywords: профессиональная переподготовка, второй диплом, дополнительная квалификация, УдГУ
  text: |
    Записаться можно по тел. 916-082, лично в кабинете 013 6 корпуса УдГУ. Подробная информация о курсах профессиональной переподготовки на сайте УдГУ f-idpo.udsu.ru/professionalnaya-perepodgotovka. У студентов также есть возможность получить дополнительную квалификацию (второй диплом).
  meta:
    notes: |
      телефон: 916-082
      кабинет: 6 корпус, 013
      сайт: f-idpo.udsu.ru/professionalnaya-perepodgotovka

