- type: Кафедра
  name: Кафедра химии и химической технологии
  keywords: кафедра, факультет математика и естественные науки, химия, нанотехнологии, электрохимия, проектное обучение
  text: |
    Кафедра химии и химической технологии ИжГТУ — ассоциированный участник Центра компетенции по новым источникам энергии при ИПХФ РАН, сотрудничает с Удмуртским ФИЦ УрО РАН и промышленными предприятиями («Элеконд», «Купол», «Сарапульский радиозавод»); готовит специалистов по программам: специалитет «Фундаментальная и прикладная химия», бакалавриат «Химия» (очно-заочно), магистратура «Нанотехнологии в электрохимическом производстве»; внедряет проектное обучение — студенты решают реальные задачи предприятий, проходят практики по трудовому договору, темы ВКР формируются совместно с работодателями; имеет в составе Международный ЦКП «Центр технологий обработки поверхности» (создан при поддержке Германии в 2013 г.); научные направления — химическая физика наноструктур и электрохимические процессы; коллектив — 2 доктора, 5 кандидатов наук; за 5 лет защищено 1 докторская и 3 кандидатские диссертации; ежегодно — 10+ публикаций, патенты, промышленные заказы.
    Кафедра факультета математики и естественных наук
    Глава: Плетнев Михаил Андреевич
  meta:
    notes: |
      Основано: 1952
      Адрес: корпус 1, ауд. 521
      Телефон: 8 (3412) 77-60-55 доб. 1147
      Почта: cct@istu.ru

- type: Кафедра
  name: Кафедра «Инженерная графика, профессиональная педагогика и технология рекламы»
  keywords: кафедра, факультет математика и естественные науки, инженерная графика, технология рекламы, реклама и PR, педагогика, квалиметрия, олимпиады, электроника, радиотехника, компьютерная графика
  text: |
    Кафедра «Инженерная графика, профессиональная педагогика и технология рекламы» ИжГТУ создана в 2020 г. объединением двух кафедр; ведёт подготовку по направлениям «Реклама и связи с общественностью» и «Профессиональное обучение (электроника, радиотехника, связь)»; обеспечивает графическую подготовку всех инженеров вуза с 1952 г., использует проектное обучение и цифровые технологии, имеет уникальную библиотеку рекламы, победила в 2011 г. как лучшая кафедра России по рекламе среди 97 конкурентов, возродила олимпиады по графике с 2017 г., развивает научную школу квалиметрии образования им. В.С. Черепанова.
    Кафедра факультета математики и естественных наук
    Глава: Жуйкова Ольга Викторовна
  meta:
