    Кафедра «Высшая математика» — одна из основательниц ИжГТУ (с 1952 г.), обучает математике более 60% студентов вуза; систематизировала программы по 20 специальностям, активно развивает электронные учебные комплексы и методическую базу — выпущено 46 методических пособий (5200 экз.), включая работы с грифом Минобрнауки России.
