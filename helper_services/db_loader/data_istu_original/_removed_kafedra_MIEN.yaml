- type: Кафедра
  name: Кафедра «Физика и оптотехника»
  keywords: кафедра, факультет математика и естественные науки, высшая математика, физика, оптотехника, лезерные технологии, подготовка
  text: |
    Кафедра «Физика и оптотехника» ИжГТУ создана в 2010 г. объединением кафедр «Физика» и «Лазерные системы»; обеспечивает фундаментальную физическую подготовку студентов всех специальностей вуза (механика, оптика, квантовая физика и др.), ведёт выпуск бакалавров и магистров по направлению «Лазерная техника и лазерные технологии» — востребованному в науке, медицине, оборонке, авиастроении и промышленности; коллектив — 28 человек (2 доктора, 15 кандидатов наук); студенты побеждают в олимпиадах, успешно проходят федеральное тестирование; выпускники трудоустраиваются в РФЯЦ-ВНИИЭФ, ВНИИТФ, «Красногорский завод», «Элеконд», ижевские и воткинские предприятия.
    Кафедра факультета математики и естественных наук
    Глава: Шихов Юрий Александрович
