    И ТЕХНОЛОГИИ РЕМОНТА И ПРОИЗВОДСТВА»

    Главными направлениями научных исследований

    кафедры являются:

    Разработка комбинированных (гибридных) энергосиловых установок транспортных машин.

    Структурная и параметрическая оптимизация узлов, агрегатов и систем транспортных средств.

    Разработка методического и программного обеспечения исследования транспортных средств.

    Дизайн-проектирование транспортных средств.

    Разработка технологий ремонта узлов, агрегатов и систем транспортных средств.

    Совершенствование процессов механической обработки материалов.

    Разработка научных основ технологии шлифования деталей из труднообрабатываемых материалов.

    Разработка и создание высокотехнологичного производства унифицированной машины технологического электротранспорта.

    Учебно-научный производственный центр «Ремонт, обслуживание станков и автомобилей»

