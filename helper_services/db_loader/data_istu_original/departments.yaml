    С

    2005 г

    . – подготовка бакалавров по направлению «Менеджмент»;

    С

    2008 г

    . – подготовка магистрантов по направлению «Менеджмент».

    Кафедра «Менеджмент» активно реализует программы международного сотрудничества и академических обменов.

    Образовательные программы

    38.04.02 «Менеджмент» «Стратегическое управление»

    (Магистратура)

    Ещё не время, нет времени, не хватает времени... сколько раз мы повторяли эти слова в разных вариациях: «Не сегодня… завтра…или
    займусь когда придет время!»

    Проходят дни, недели, месяцы, годы… а время всё не приходит и не приходит…

    Давай честно – время есть. Прямо сейчас. И всегда есть.

    Просто у нас всегда было оправдание собственной лени.

    У вас и сейчас не хватает времени?

    Проанализируйте:

    Сколько времени тратите на мессенджеры, просматривая бесполезные бесконечно пересылаемые друг другу видео и картинки…

    Сколько времени вы тратите на информационный мусор ..

    Сколько времени тратите на сериалы, фильмы, игры…

    Или вас так нагрузили преподаватели, что у вас не хватает времени выполнить все самостоятельные, курсовые, контрольные
    и выпускные квалификационные работы?

    ИМЕННО СЕЙЧАС ЕСТЬ ВРЕМЯ для своего личностного роста, освоения новых навыков и умений.

    Задумайтесь, в будущем не будет времени лучше, проводите его с пользой, начните развиваться прямо сегодня!

