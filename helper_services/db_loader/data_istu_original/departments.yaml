    Стратегия развития кафедры «Менеджмент» направлена на формирование кадрового потенциала менеджеров для предприятий региона,
    соответствующего требованиям инновационного развития современной экономики.

    Особенностью подготовки является практикоориентированность. Наши студенты становятся предпринимателями и регистрируют
    свой бизнес еще во время учебы.

    На кафедре в настоящий момент ведется подготовка по следующим направлениям подготовки:

