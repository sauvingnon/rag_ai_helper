    АСПИРАНТУРА

    по научной специальности:

    «Управление жизненным циклом объектов строительства».

    В составе кафедры 3 докторов наук, профессоров; 13 кандидатов наук, доцентов. Ведется подготовка специалистов по сокращенным
    срокам обучения на базе ВО, СПО специальности «Промышленное и гражданское строительство» очно-заочной и заочной формы
    обучения.

    Кафедра ПГС готовит квалифицированных специалистов в таких областях строительства, как проектно-конструкторская, организационно-управленческая,
    производственно- технологическая, научно-исследовательская. Студенты имеют свободный доступ к базовым электронным системам
    «Кодекс» и «Строй-консультант», содержащим основные законодательные акты и нормативную документацию, программам AutoCAD,
    ArchiCAD, Гранд-смета, nanoCAD.

    Учеными кафедры установлены и поддерживаются тесные связи с научно-исследовательскими организациями и ведущими вузами
    нашей страны (МГСУ, СПбГАСУ, КазГАСУ), а также стран ближнего и дальнего зарубежья. Кафедра тесно сотрудничает с Министерством
    строительства, архитектуры и жилищной политики УР, Администрацией города Ижевска, Строительное управление №2 ФГУП «ГВСУ
    №4», ОАО «Спецгазавтотранс», ОАО «Уралметаллургмонтаж» и другими.

    Область профессиональной деятельности выпускников по направлению подготовки «Строительство» включает: инженерные изыскания,
    проектирование, возведение, эксплуатация, оценка и реконструкция зданий и сооружений; инженерное обеспечение и оборудование
    строительных объектов и городских территорий; применение машин, оборудования и технологий для строительства и производства
    строительных материалов, изделий и конструкций. Объектами профессиональной деятельности выпускников по направлению подготовки
    «Строительство» являются: промышленные, гражданские здания, гидротехнические и природоохранные сооружения; строительные
    материалы, изделия и конструкции; системы теплогазоснабжения, вентиляции, водоснабжения и водоотведения промышленных,
    гражданских зданий и природоохранные объекты; машины, оборудование, технологические комплексы и системы автоматизации,
    используемые при строительстве и производстве строительных материалов, изделий и конструкций; объекты недвижимости, земельные
    участки, городские территории.

    Выпускники работают в области организации и управления строительства промышленных и гражданских объектов, исследования
    и проектирования зданий и сооружений.

    При поддержке Д.Ф. Устинова Министерство высшего и среднего специального образования РСФСР в 1972 г. открыло в ИМИ при
    инженерно-экономическом факультете специальность «Промышленное и гражданское строительство» в составе 2-х студенческих
    групп. Это год является годом рождения строительного факультета. В 1973 г. факультет пополнился ещё одной специальностью
    – «Сельскохозяйственное строительство». Уже через год набор на строительные специальности составлял 200 человек только
    на дневное отделение. Первым деканом факультета был назначен Шумилов В.А. Параллельно с дневным обучение велось на вечернем
    и заочном отделениях. На факультет были переданы кафедры инженерной графики, сопротивления материалов, гидравлики и теплотехники.

    История развития кафедры «Промышленное и гражданское строительство» уходит своими корнями к моменту организации и становления
    инженерно-строительного факультета ИМИ в 1972 году. Кафедра была выпускающей, по окончании которой, студенты получали
    диплом инженера-строителя. В связи с развитием инженерно-строительного факультета и открытием новых специализаций, кафедра
    ПГС была преобразована и с 1989 года носила название «Технология и организация строительства», а с 2004 года – «Технология,
    организация и экономика строительства», с 2009 года вновь – «Промышленное и гражданское строительство». В период перехода
    от плановой экономики к рыночной в 90-е годы на базе специальности «Промышленное и гражданское строительство» на выпускающих
    кафедрах факультета были открыты специализации: «Исследование и проектирование зданий и сооружений», «Технология и организация
    строительного производства», «Экономика и управление в строительстве». В 1999 году Министерство образования РФ утвердило
    новую специальность «Экспертиза и управление недвижимостью» и требования к минимуму содержания и уровню подготовки специалиста
    по недвижимости. В результате активной работы сотрудников в 2006 году на кафедре «Промышленное и гражданское строительство»
    открывается новая специальность «Экспертиза и управление недвижимостью». А в 2009 году, в связи с возросшим спросом на
    инженеров строительной специальности, объединяются две крупные выпускающие кафедры: «Технология, организация и экономика
    строительства» и «Строительные конструкции и строительная механика». И кафедра снова приобретает название «Промышленное
    и гражданское строительство».

