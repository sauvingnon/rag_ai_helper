    Нанотехнология

    – междисциплинарная область науки, в которой изучаются закономерности физико-химических процессов в пространственных областях
    нанометровых размеров с целью управления отдельными атомами, молекулами, молекулярными системами при создании новых молекул,
    наноструктур, наноустройств и материалов со специальными физическими, химическими и биологическими свойствами.

    Наносистемная техника – созданные полностью или частично на основе наноматериалов и нанотехнологий фун

    кционально законченные системы и устройства, характеристики которых кардинальным образом отличаются от показателей систем
    и устройств аналогичного назначения, созданных по традиционным технологиям.

    Основные области применения

    :

    элементы наноэлектроники и нанофотоники (полупроводниковые транзисторы и лазеры;

    фотодетекторы; солнечные элементы; различные сенсоры);

    устройства сверхплотной записи информации;

    телекоммуникационные, информационные и вычислительные технологии; суперкомпьютеры;

    видеотехника — плоские экраны, мониторы, видеопроекторы;

    молекулярные электронные устройства, в том числе переключатели и электронные схемы на молекулярном уровне;

    нанолитография и наноимпринтинг;

    топливные элементы и устройства хранения энергии;

    устройства микро‑ и наномеханики, в том числе молекулярные моторы и наномоторы, нанороботы;

    нанохимия и катализ, в том числе управление горением, нанесение покрытий, электрохимия и фармацевтика;

    авиационные, космические и оборонные приложения;

    устройства контроля состояния окружающей среды;

    целевая доставка лекарств и протеинов, биополимеры и заживление биологических тканей, клиническая и медицинская диагностика,
    создание искусственных мускулов, костей, имплантация живых органов;

    биомеханика; геномика; биоинформатика; биоинструментарий;

    регистрация и идентификация канцерогенных тканей, патогенов и биологически вредных агентов;

    безопасность в сельском хозяйстве и при производстве пищевых продуктов.

    Предприятия, где могут работать наши выпускники

    :

    ОАО «ИЭМЗ «Купол»

    ОАО «Ижевский радиозавод»

    ОАО «ИжМАШ»

    ОАО «АКСИОН Холдинг»

    Концерн «Наноиндустрия»

    ЗАО «НТ-МДТ»

    ООО «НТИЦ АпАТэК-Дубна»

    ГК по атомной энергии «РОСАТОМ»

    НПО «Квант»

    Фонд «Сколково»

    НО «Фонд развития Центра разработки и коммерциализации новых технологий»

    Холдинг «Росэлектроника» ГК «Ростехнологии»

    В настоящее время кафедра готовит выпускников

    по следующим направлениям и специальностям

    :

    28.03.01 – «Нанотехнологии и микросистемная техника», программа «Компоненты микро- и наносистемной техники», уровень бакалавриата;

    28.04.01 – «Нанотехнологии и микросистемная техника», программа «Компоненты микро- и наносистемной техники», уровень магистратура.

    Контактная информация

    : Шушков Андрей Александрович,

    ligrim@mail.ru

    Комплексная система измерений Nanotest 600

    Назначение

    : Предназначена для исследования физико-механических свойств материалов в нано- и микромасштабе.

    Определяет

    : Модуль упругости, твердость, коэффициент трения, шероховатость поверхности, работу, затраченную на упруго-пластическую
    деформацию, податливость контакту, ползучесть, износостойкость, адгезию сцепления, сопротивление развитию трещин и др.

    Технические характеристики

    :

    Разрешение в глубину - 0.04 нм.

    Разрешение в горизонтальной плоскости - 0.02 мкм.

    Диапазон нагрузки - (0.01 - 500) мН, (0.5 - 20) Н.

    Оснащен четырьмя оптическими микроскопами с увеличением до 1000 раз.

    Производитель: Англия.

    Год выпуска: 2006.

    Бесконтактный оптический профилометр NewView 6300

    Область применения

    : Использование прибора возможно для исследования различных поверхностей и материалов с отражательной способностью света
    1-100%.

    Назначение

    : Предназначен для исследования трехмерной структуры поверхности материалов в микро- и наномасштабе.

    Метод измерения

    : бесеонтактный трехмерный, сканирующий белым светом интерферометр.

    Технические характеристики

    :

    Объективы в комплекте: 1X, 2.5X, 5X, 10X, 20X, 50X, 100X.

    Увеличительные линзы в комплекте: 0.5X, 0.75X, 1.0X, 1.5X, 2.0X.

    Глубина сканирования: до 150 мкм при помощи пьезодвигателя, возможно увеличение глубины до

    15 мм

    при подключении основного двигателя.

    Вертикальное разрешение: до 1А (0,1 нм).

    Горизонтальное разрешение: от 0.43 до 11.6 мкм в зависимости от объектива.

    Максимальная область сканирования: 89 x 203 x

    203 мм

    (высота х ширина х глубина).

    Оптимальная рабочая температура: 15-

    30°C

    (59-

    86°F

    ).

    Допустимая влажность: 5-95%.

    Производитель: ZygoCorporation, Middlefield, Connecticut.

    Год выпуска: 2007.

    Микроскоп (Оптико-цифровой комплекс)

    Прибор предназначен для получения снимков микросмесей и микросоставов при увеличении до 200 раз.

    Состав комплекса

    :

    Цифровой фотоаппарат Canon PowerShot A560;

    LCD-телевизор SONY KDL-26U2000;

    Широкоформатный LCD-телевизор SONY KDL-26U2000.

    Дисковая центрифуга фирмы CPS

    Центрифуга распределяет частицы по размерам методом осаждения. Частицы осаждаются в жидкости под действием гравитации
    по закону Стокса. Скорость осаждения пропорциональна квадрату диаметра частиц, поэтому частицы, размеры которых отличаются
    лишь на несколько процентов, осаждаются с существенно различными скоростями.

    Диапазон измерения: 0.01…40 микрон.

    Скорость вращения центрифуги: до 24000 об./мин.

    Воспроизводимость: 99.95%.

    3D принтер Wanhao Duplicator 4X

    3D-принтер Wanhao Duplicator 4X c двумя печатающими головками от компании Wanhao, имеет новое усовершенствованное программное
    обеспечение, лучшее позиционирование головки по осям. Дверца и крышка, защищают камеру от пыли и грязи, а ваши 3d-модели
    от неравномерного охлаждения и деформации.

    Количество экструдеров (печатающих головок) : 2.

    Количество рабочих осей: 5.

    Область печати: 225 х 150 х

    145 мм

    .

    Объем печати:

    5 литров

    .

    Толщина печатного слоя – 0.1-

    0.4 мм

    (100-400 микрон).

    Расходные материалы: Пластик ABS/PVA, толщина

    1.75 мм

    .

    Диаметр сопла печатающей головки:

    0.4 мм

    .

    Скорость печати: 40 мм/сек.

    Скорость построения 3D-объекта: 24 см3/час.

    Скорость плавления: 10-30 грамм/час.

    Точность позиционирования: ось Z – 0.005мм (5 микрона), оси XY –

    0.020 мм

    (20 микрон).

    Технология печати: FDM (метод плавления пластиковой нити).

    Подключение к ПК: USB, SD, 5-позиционный джойстик на передней панели.

    Входное напряжение: 95-230В, 50-60Гц.

    Мощность: 220 Вт.

    Размер принтера: 466 х 320 х

    382 мм

