    Адрес

    О подразделении

    Структура

    Сотрудники

    Учебный центр осуществляет организацию и координацию учебной работы по программам среднего профессионального образования.

    Основные задачи центра

    :

    организацию учебного процесса по соответствующим направлениям и специальностям подготовки СПО;

    контроль реализации основных профессиональных образовательных программ по специальностям подготовки;

    формирование штатов преподавательского состава, планирование и распределение нагрузки совместно с группой финансово-экономического
    сопровождения и выпускающими кафедрами;

    координацию работы с выпускающими кафедрами по учебным вопросам;

    организацию учета успеваемости, посещаемости студентов и анализ его результатов;

    подготовку отчетной документации при мониторинге, аккредитации.

