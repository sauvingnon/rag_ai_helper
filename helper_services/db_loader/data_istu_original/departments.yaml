    Положение о подразделении

    О подразделении

    Структура

    Сотрудники

    Цель

    Формирование единой финансовой стратегии университета, обеспечение эффективного планирования, бюджетирования, учета и
    контроля средств федерального бюджета и приносящей доход  деятельности, а также мониторинга и анализа финансово-хозяйственной
    деятельности, разработки экономически обоснованных механизмов реализации мероприятий стратегического развития университета,
    соблюдения финансовой дисциплины в университете.

    Структура управления:

    Отдел планирования и бюджетирования

    Расчетно-аналитический отдел

    Отдел планирования труда

    Основные задачи:

    Экономическое планирование, направленное на эффективное использование финансовых ресурсов.

    Контроль над  движением финансовых ресурсов.

    Формирование финансовой стратегии университета.

    Анализ финансово-хозяйственной деятельности университета.

    Направления деятельности:

    Формирование плана финансово-хозяйственной деятельности в соответствии с требованиями Министерства науки и высшего образования
    РФ и подготовка соответствующих отчетов.

    Планирование и распределение бюджетов Университета, его структурных подразделений и филиалов.

    Распределение и контроль  использования стипендиального фонда.

    Обеспечение учета движения денежных средств, составление отчетности о результатах финансовой деятельности подразделений
    университета.

    Контроль составления и исполнения смет доходов и расходов в соответствии со статьями КВР и КОСГУ.

    Определение источников финансирования производственно-хозяйственной деятельности университета.

    Расчет стоимости на оказание предоставляемых услуг (в т.ч. образовательных) и выполнение работ.

    Учет контингента обучающихся по программам высшего и среднего профессионального образования.

    Финансовый учет по договорам на оказание услуг в области научных исследований и разработок, в том числе по государственному
    заданию, грантам, хоздоговорам.

    Планирование фонда оплаты труда, формирование эффективной системы оплаты труда.

    Формирование штатного расписания в соответствии с текущими задачами университета.

    Выполнение иных задач в рамках компетенции управления экономики и финансов.

