    6.

    Информация для первого курса

    .

    Обратите внимание, в графике установочных и экзаменационных сессий у вас будет три сессии в году.

    Первая – установочная.

    Вторая – установочно-экзаменационная

    Третья – экзаменационная

    Находите  в данном  графике свой курс — 1 курс.

    И свой срок обучения — 3,5 года или 4,5 года (смотря на какой срок заключался договор).

