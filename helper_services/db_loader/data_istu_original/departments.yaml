    Положение о подразделении

    О подразделении

    Структура

    Новости

    Сотрудники

    Цели

    Цель УИСиК состоит в наиболее эффективном обслyживании зданий и сооружений Университета в направлепии функционирования
    инженерных сетей и коммуникаций, осуществлении их капитального и текущего ремонта.

    Задачи

    обеспечение бесперебойного функционирования инженерных сетей и коммуникаций университета;

    обеспечение учебного процесса и научных исследований помещениями соответствующих требованиям санитарно эпидемиологической
    слyжбы;

    поддержание требуемых: температурного режима, освещения, водоснабжения и канализационных стоков в зданиях и сооружениях
    Университета;

    поддержание и развитие материально-технической базы инженерных сетей и коммуникаций Университета;

    разработка и обработка предложений при подготовке проведения конкурсов по выбору лyчших предложений на проведение работ
    по совершенствованию и поддержанию бесперебойности функционирования инженерных сетей и коммуникаций Университета.

    Участок ремонта инженерных сетей

    Группа по учету энергоресурсов, организации и планирования ремонтов инженерных сетей и коммуникаций

