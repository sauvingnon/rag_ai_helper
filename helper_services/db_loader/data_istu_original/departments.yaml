    машиностроительных производств» (профиль «Металлорежущие станки и станочные комплексы») специальные аудитории оснащены
    соответствующим металлообрабатывающим оборудованием (токарный станок с ЧПУ мод. ТМ500Ф3, токарный станок с ЧПУ мод. ИТ-42,
    фрезерный станок с ЧПУ мод. СФП250, зубофрезерный станок мод. 532, зубодолбежный станок мод. 5А12, токарно-револьверный
    автомат мод. 1А36, токарно-винторезный станок мод. 250ИТП, зубообрабатывающий станок мод. 5А26, круглошлифовальный станок
    мод. 3Б151, плоскошлифовальный станок мод. 3Г71, резцозаточной станок мод. 3659А, сверлозаточной станок-автомат мод. 3659А
    и др.).

    Для проведения лабораторных работ по дисциплинам специальности 23.05.01 «Наземные транспортно-технологические средства»
    (специализация «Автомобили и тракторы») и направления подготовки 23.03.03 «Эксплуатация транспортно-технологических машин
    и комплексов» (профиль «Автомобили и автомобильное хозяйство») специальные аудитории оснащены соответствующими макетами
    и стендами агрегатов, узлов и систем отечественных и зарубежных автомобилей, диагностическим оборудованием электронных
    систем управления двигателями.

    В целях повышения качества образовательного процесса на кафедре АМО открыта аудитория, оснащенная современным оборудованием:
    ноутбук, колонки для прослушивания аудиоматериалов, стационарный мультимедиа-проектор, интерактивная доска SMARTBoard,
    позволяющая внести дополнительную динамику и активное вовлечение студентов в деловые и ролевые игры, учебные дискуссии,
    разборы конкретных ситуаций, программированное обучение, компьютерные симуляции и другие формы цифровых занятий.

    В компьютерных классах установлена новая современная компьютерная техника. На компьютерах установлено современное лицензионное
    программное обеспечение фирмы Аскон ( Компас 3D v16, ВертикальV14, Лоцман V14), продукты фирмы Autodesk (AutoCAD Mechanical
    2010, Autodesk Inventor 2010). А также установлены программы

    1C

    Предприятие 8.1, Mathcad 14 и программное обеспечение Open Office 4.1.1. Установленное программное обеспечение позволяет
    студентам выполнять проектные работы связанные с разработкой 3D моделей деталей и сборочных едениц и последующим изготовлением
    чертежей, используя в качестве источника информации 3D модели деталей и сборочных единиц. В процессе проектирования можно
    посчитать напряжения, возникающие в деталях и конструкциях. Результаты расчёта можно представить в графической интерпретации
    или в виде аналитических таблиц. С помощью программы Mathcad 14 можно решать системы уравнений, не линейные уравнения
    и элементарные экономические задачи. Программные продукты фирмы Аскон позволяют выполнять проектирование объектов в единой
    системе: разработка 3D модели в Компас 3D v16, автоматизированное создание технологии изготовления спроектированных  объектов
    в программе ВертикальV14 и управление инженерными данными в Лоцман V14.

    Также для обеспечения учебного процесса преподаватели кафедры используют ноутбуки с колонками, переносной мультимедиа-проектор
    и экран.

    Также создана базовая кафедра «Современные транспортные системы»  на базе ООО «АСПЭК-АВТО». Данное предприятие имеет следующее
    оборудование:

    плунжерные подъёмники Rotary Lift  грузоподъемностью  3,5т;

    ножничные подъемники Rotary Lift грузоподъемностью 5т;

    локальные системы отвода выхлопных газов на каждый рабочий пост;

    тестеры АКБ Midtronics GR-590, Midtronics MICRO 390;

    специализированные емкости для слива технических жидкостей ALFA, OMA;

    станции обслуживания и заправки системы кондиционирования автомобиля Tecnoclima Evolution;

    специализированные установки для замены тормозной жидкости Wynns Brake Serve;

    стенды проверки тормозной системы и амортизаторов автомобиля Maha Eurosystem v7.0;

    оборудование для проверки токсичности отработавших газов Maha MGT5 и  Maha MDO2-LON;

    стенды для регулировки света фар Lite3, autosistem HL26;

    специализированные стенды для проверки и регулировки углов установки колес Hunter DSP 600;

    зарядные устройства для зарядки АКБ Telwin dynamic 620, Telwin computer 48/2;

    балансировочное и шиномонтажное оборудование Hunter GSP970, CORGHI FM43, Hunter TC3510A, CORGHI JOLLY.

    гидравлические стойки и гидравлические кран-балки Oma;

    оборудование для диагностики и проверки топливных форсунок SPIN SR4, SPIN EVO, Wynns Fuel Serve;

    стапели для ремонта кузовов Shark W32;

    стенды смешивания красок и колористки MaxMeyer,Dupont;

    сушильные камеры  GARMAT;

    зоны подготовки кузовов автомобилей;

    аппараты инверторной сварки TECNA;

    инфракрасные сушки IRT-400XLNC;

    Диагностическое оборудование компании Nissan, Ford, Datsun, KIA, Toyota, Lexus, Skoda, Honda.

    Материалы V Всероссийской научно-практической конференции «АВТОМОБИЛЕСТРОЕНИЕ: ПРОЕКТИРОВАНИЕ, КОНСТРУИРОВАНИЕ, РАСЧЕТ
    И ТЕХНОЛОГИИ РЕМОНТА И ПРОИЗВОДСТВА»

