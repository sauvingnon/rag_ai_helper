    История

    Для поступающих

    Для обучающихся

    Наука

    Структура

    Новости

    Сотрудники

    За 62 года деятельности кафедры «Металлорежущие станки и инструменты» (в 2004г. кафедра переименована – «Автомобили и
    металлообрабатывающее оборудование») подготовлено более 4000 специалистов. Выпускники кафедры успешно работают практически
    на каждом машиностроительном заводе Удмуртской республики, на других предприятиях и в учреждениях, на административных
    и общественных должностях. Среди выпускников кафедры доктора и кандидаты наук, заслуженные деятели науки и техники Удмуртской
    республики, Российской Федерации. Многие из них стали видными государственными деятелями, крупными учёными, выдающимися
    конструкторами и технологами, главными инженерами, руководителями предприятий.

    История кафедры

    1956 г

    .

    Приказом Ректора ИМИ Остроумова В.П. в соответствии с решением ученого совета ИМИ была образована кафедра «Металлорежущие
    станки и инструменты».

    Начата подготовка инженеров – механиков в области проектирования, эксплуатации станков и инструментов по специальности
    0501 «Технология машиностроения. Металлорежущие станки и инструменты».

    Заведующим кафедрой «Металлорежущие станки и инструменты» назначен А.И. Плужников.

    1957 г

    .

    Из «Мосстанкина» по распределению приезжает на кафедру к.т.н. В.В. Пузанов.

    1959 г

    .

    Заведующим кафедрой избран к.т.н., доцент Н.В. Талантов.

    Состоялся первый выпуск инженеров – механиков по специальности 0501.

    Начаты научно-исследовательские работы по алмазному точению и алмазной абразивной обработке, восстановлению алмазных лезвийных
    инструментов. Руководители Н.В. Талантов, В.Л. Безбородый.

    1960 г

    .

    По распределению на кафедре оставлены в качестве ассистентов Р.Х. Галимов, Т.В. Шитова, Ф.Ю. Свитковский, Ю.П. Потапов.

    Из Тульского политехнического института по распределению направлен А.К. Георгиев.

    1961 г

    .

    Начата научно-исследовательская работа по контактным и тепловым процессам при механической обработке материалов. Научный
    руководитель Н.В. Талантов.

    1963 г

    .

    Открыта аспирантура на кафедре. Руководители: Н.В. Талантов, В.В. Пузанов и А.А. Модзелевский.

    1964 г

    .

    Первый кандидат технических наук на кафедре «МСИ» из выпускников – инженеров и аспирантов кафедры – Ю.Г. Глухов. Руководитель
    к. т. н., доцент Н.В. Талантов.

    1965 г

    .

    Заключен долгосрочный договор с заводом «Ижтяжбуммаш» в области исследования процессов шлифования деталей бумагоделательных
    машин, в т.ч. процессов алмазной и эльборовой обработки.

    1966 г

    .

    Защищена кандидатская диссертация старшим преподавателем кафедры Т.В. Шитовой. Руководитель к.т.н. доцент Н.В. Талантов

    1969 г

    .

    Защищена в КАИ первая в истории кафедры докторская диссертация Н. В. Талантовым.

    1970 г

    .

    Переезд кафедры «МСИ» из старого корпуса (ул. М. Горького, 79) в 4-ый корпус ИМИ (ул. 30 лет Победы, 49).

    Продолжены работы с Киевским институтом сверхтвердых материалов по широкому применению алмазного инструмента на предприятиях
    Удмуртской АССР.

    1971 г

    .

    Заключен хоздоговор с заводом «Ижтяжбуммаш» по обработке каландровых валов бумагоделательных машин из сверхпрочного чугуна.
    Руководитель Ф.Ю. Свитковский.

    1972 г

    .

    Защищены кандидатские диссертации на ученом совете ППИ г. Перми А.И. Тананиным, руководитель д.т.н. Н.В. Талантов и Ф.Ю.
    Свитковским, руководитель к.т.н. В.В. Пузанов.

    Заведующим кафедрой «МСИ» избран к.т.н., доцент В.В.Пузанов.

    1974 г

    .

    Защищены кандидатские диссертации в ППИ г. Перми О.А. Трифоновым, руководитель к.т.н. В.В. Пузанов и Л.А. Хохряковым,
    руководитель д.т.н. Н.В. Талантов.

    1975 г

    .

    На хоздоговорных условиях с «Ижтяжбуммашем» проведены исследования в области механической обработки обрезиненных валов
    бумагоделательных машин, руководитель Ф.Ю. Свитковский.

    1977 г

    .

    Заключен хоздоговор с заводом «Ижсталь» на разработку и изготовление специального заточного станка по заточке топоров
