    Научно-исследовательская работа студентов

    Важная составная часть научной работы на кафедре – научно-исследовательская работа студентов, к которой привлекаются учащиеся
    всех курсов, как бакалавриата, так и магистратуры. Результаты исследований представляются на ежегодно проводимых студенческих
    научно-технических конференциях по итогам работы за истекший учебный год, публикуются в сборнике трудов научно-технических
    конференций. Авторы лучших работ участвуют во всероссийских конференциях молодых ученых, в конкурсах студенческих научно-исследовательских
    работ.

    Два раза в год на кафедре проводится Международная научно-практическая конференция «Фотинские чтения» (весна, осень) с
    изданием сборника трудов, индексируемого в РИНЦ (Российский индекс научного цитирования).

    Ежегодно студенты кафедры принимают участие в работе зарубежных научно-практических конференций:

    Форум проектов программ Союзного государства – Форум вузов инженерно-технологического профиля (БНТУ, г. Минск, Республика
    Беларусь);

    Актуальные проблемы экономики и управления: теория и практика: Республиканский с международным участием Конкурс научно-
    исследовательских работ студентов, магистрантов и аспирантов (г. Донецк, Донецкий национальный университет экономики и
    торговли имени Михаила Туган-Барановского);

    студенческая научно-практическая конференция «Экономика и маркетинг в промышленности» (БНТУ, г. Минск, Республика Беларусь);

    международный научный семинар «Мировая экономика и бизнес-администрирование малых и средних предприятий» в рамках международной
    научно-технической конференции «Наука – образованию, производству, экономике» (БНТУ, г. Минск, Республика Беларусь).

    В декабре 2021 года Алевтина Семенова — магистрант программы «Управление инвестиционно-строительной деятельностью» (руководитель
    программы д.э.н., профессор В.П. Грахов) приняла участие в Х Форуме вузов инженерно-технологического профиля Союзного
    государства, проходившего на базе Белорусского национального технического университета. Где заняла призовое II место в
    бизнес-бое со своим проектом «Виртуальное учебное пособие «Стройплощадка» (секция «Молодежное инновационное предпринимательство»),
    разработанное с использованием ТИМ и визуализации процессов.

    Традиционно, на кафедре «ПГС» сильно олимпиадное движение. В 2022 году четыре команды студентов заняли призовые места
    в заключительных этапах Всероссийских студенческих олимпиад по направлению «Строительство», которые проходили в ведущих
    строительных вузах нашей страны: ННГАСУ (Нижний Новгород), ВГТУ (Воронеж), ПГУАС (Пенза), СамГТУ (Самара).

    70 научных докладов было представлено нашими студентами за 2022 год на научных конференциях, семинарах, форумах различного
    значения. Опубликовано более 100 научно-исследовательских статей в российских и зарубежных журналах.

    Достаточно высока публикационная активность научно-педагогических работников кафедры ПГС. Только за 2022 год учеными кафедрами
    написано и опубликовано в журналах российского и международного значения более 90 научных статей, из них 21 статья ВАК
    и 5 статей, входящих в ядро РИНЦ. Изданы 3 монографии, одна из которых отмечена Дипломом I степени всероссийского конкурса
    «Лучшая научная книга».

    В 2020 году молодые ученые кафедры Ольга Симченко и Александр Сунцов выиграли ректорский грант на разработку проекта,
    специализированного приложения для шлема виртуальной реальности. Приложение формирует цифровую симуляцию реального строительного
    объекта и позволяет осуществлять действия внутри нее.

    Пособие представляет собой тренажер, который с помощью очков виртуальной реальности позволяет студентам «погрузиться»
    прямо на строительную площадку, увидеть в реальном времени основные производственные процессы, выполнить ряд заданий,
    отработать практические навыки и самим принимать решения.

    Ведущие ученые кафедры «Промышленное и гражданское строительство»

    :

    Грахов В. П. (д.э.н., профессор), Тарануха Н. Л. (д.э.н., профессор), Мохначев С.А (к.э.н., доцент).

    Молодые ученые кафедры «Промышленное и гражданское строительство»

    :

    Симченко О. Л., Карпова Е. А., Саидова З. С., Пушкарев И. А., Чазов Е. Л., Сунцов А. С.

