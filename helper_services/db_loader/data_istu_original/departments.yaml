    Миссия кафедры

    Подготовка специалистов в условиях интеграции новых отраслей знаний (информационных технологий, электроники, автоматического
    управления) с фундаментальными науками (механика, гидро-пневматика, электротехника)

    Хронологические даты кафедры «Мехатронные системы»

    1954 г.

    Организация кафедры «Детали машин и подъемно-транспортные машины»

    1956 г.

    Открыта аспирантура при кафедре

    1987 г.

    Открыта подготовка инженеров по специальности 210600 «Робототехнические системы и комплексы»

    1989 г.

    Реорганизация кафедры в профилирующую «Основы машиноведения и робототехника»

    1990 г.

    Открытие филиала кафедры на ДОАО "Станкозавод"

    1992 г.

    Открыта подготовка бакалавров по направлению 552900 (150900) «Технология, оборудование и автоматизация машиностроительных
    производств»

    1993 г.

    Открыта докторантура при кафедре

    1995 г.

    Открыта подготовка инженеров по специальности 210300 «Роботы и робототехнические системы»

    1996 г.

    Открыта подготовка инженеров по специальности «Мехатроника» по специальности 071806 «Мехатроника и международный инжиниринг»

    1996 г.

    Открыта подготовка магистров по направлению 150900 «Технология, оборудование и автоматизация машиностроительных производств»

    1999 г.

    Подписан договор о сотрудничестве  и организуется преддипломная практика в Высшей технической школе, г. Люнебург, Германия

    2003 г.

    Открытие аспирантуры по специальности 05.02.05 «Роботы, мехатроника и робототехнические системы»

    2003 г.

    Разработка бинациональной образовательной программы и получение двойных дипломов

    2005 г.

    Кафедра «Основы машиноведения и робототехника» переименована в кафедру «Мехатронные системы»

    2005 г.

    Открыта подготовка магистров по направлению 220100 «Системный анализ и управление»

    2008 г.

    Прохождение международной аккредитации ZEVA

    2008 г.

    Выдача первых дипломов магистров, признаваемых в ЕС

    2010 г.

    Организация и проведение ежегодных стажировок студентов в университете Лейфана, г. Люнебург, Германия, Словацком техническом
    университете, Техническом университете г.Брно (Чехия).

    2011 г.

    Начало подготовки бакалавров и магистров по направлению 221000 «Мехатроника и робототехника»

    2013 г.

    При кафедре создана Научно-учебная лаборатория «Мобильные системы»

    2015 г.

    Подготовка бакалавров по направлению 15.03.06 «Мехатроника и робототехника» профиль «Мехатронные системы в машино- и приборостроении»
    и магистров по направлению15.04.06 «Мехатроника и робототехника» профиль «Мехатронные системы в машино- и приборостроении»

    2018 г.

    Кафедра «Мехатронные системы» вошла в состав  института СТМАиМ

    2019 г.

    Кафедра «Мехатронные системы» стала ведущей по программам подготовки аспирантуры:

    - направление 01.06.01 «Математика и механика», направленность программы «Динамика и прочность машин, приборов и аппаратуры»;

    - направление 15.06.01 «Машиностроение», направленность программы «Роботы, мехатроника и робототехнические системы»;

    - направление 15.06.01 «Машиностроение», направленность программы «Машиноведение, системы приводов и детали машин»;

    - направление 15.06.01 «Машиностроение», направленность программы «Технология машиностроения».

    2021 г.

    Открыта подготовка бакалавров по направлению 15.03.06 «Мехатроника и робототехника» профиль «Автоматизация и цифровые
    двойники производства»

    2022 г.

    Открыта подготовка магистров по направлению 15.04.06 «Мехатроника и робототехника» профиль «Автоматизация технологических
    процессов и цифровые двойники производства»

    Кафедра «Мехатронные системы» создала лабораторию «Системы технического зрения».

    2022 г.

    Кафедра ведет подготовку обучающихся по программе СПО 25.02.08 Эксплуатация беспилотных авиационных систем:

    2023 г.

    Программа СПО 25.02.08 «Эксплуатация беспилотных авиационных систем» прошла аккредитацию и получила 25 бюджетных мест.

    2024 г.

    Открыта подготовка бакалавров по направлению 27.03.03 «Системный анализ и управление», профиль «Искусственный интеллект
    и управление беспилотными системами».

    Основные образовательные программы кафедры уровней бакалавриата и магистратуры, направление 15.03.06 и 15.04.06 «Мехатроника
    и робототехника», профили «Мехатронные системы в машино и приборостроении», «Автоматизация и цифровые двойники производства»,
    27.03.03 «Системный анализ и управление» профиль «Искусственный интеллект и управление беспилотными системами» прошли
    в этом году рассмотрение и утверждение у ведущих предприятий г. Ижевска : АО "Концерн Калашников", АО "ИЭМЗ "КУПОЛ", ОАО
    НИТИ "Прогресс", АО "Ижевский мотозавод "Аксион холдинг», «Финко», «ИжБС» и др.

    Большая часть выпускных квалификационных работ студентов связаны с развитием систем управления беспилотных мобильных транспортных
    систем, беспилотных водных и подводных систем, беспилотных авиационных систем. Много работ направлено на совершенствование
    квадрокоптеров и других летающих аппаратов.

    Образовательные программы

    27.03.03 «Системный анализ и управление» «Искусственный интеллект и управление беспилотными системами»

    (Бакалавриат)

    15.04.06 «Мехатроника и робототехника» «Автоматизация технологических процессов и цифровые двойники производств»

    (Магистратура)

    15.03.06 «Мехатроника и робототехника» «Мехатронные системы в машино- и приборостроении»

    (Бакалавриат)

    График консультаций ППС кафедры «МС»

