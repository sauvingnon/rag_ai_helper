    Кафедра «Информационная безопасность» осуществляет подготовку специалистов в сферах науки, техники и технологий, охватывающих
    совокупность проблем, связанных с обеспечением информационной безопасности систем в условиях существования угроз в информационной
    сфере.

    Кафедра "Информационная безопасность" является инициатором создания Авторизованного учебного центра ООО "РусБИТех-Астра"

    Программы Astra Linux

    Курсы по ОС Astra Linux Special Edition 1.7

    Занятия ведут высокопрофессиональные педагоги – доценты, кандидаты наук и ведущие сотрудники предприятий отрасли информационной
    безопасности.

    Разрабатывать модели возможных угроз и модели нарушителя информационной безопасности автоматизированной системы.

    Оценивать риски информационной безопасности автоматизированной системы.

    Разрабатывать и внедрять проекты защищенных информационных технологий в автоматизированных системах сбора, обработки,
    хранения и передачи информации, вычислительных системах и компьютерных сетях.

    Выполнять проекты по созданию программ, комплексов программ, программно-аппаратных средств, баз данных, компьютерных сетей
    для защищённых автоматизированных систем.

    Проверять работоспособность и эффективность применяемых программно-аппаратных (средства авторизации, антивирусные средства,
    системы обнаружения и предотвращения вторжений, системы аутентификации), криптографических (шифрование, цифровая подпись)
    и технических средств (например, звукоизоляция помещений, приборы по зашумлению или по выявлению устройств перехвата информации)
    защиты информации.

    Администрировать подсистемы информационной безопасности автоматизированных систем.

    Восстанавливать работу систем защиты информации при сбоях и внештатных ситуациях.

    Разрабатывать предложения по совершенствованию системы управления информационной безопасностью автоматизированной системы.

    Составлять правила, положения, инструкции и другие организационно-распорядительные документы для управления информационной
    безопасностью автоматизированных систем.

    Проводить мониторинг безопасности автоматизированной системы.

    Применять законы в области обеспечения информационной безопасности.

