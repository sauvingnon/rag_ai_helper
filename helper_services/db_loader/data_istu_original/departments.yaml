    1. История кафедры «Информационные системы»

    Кафедра открыта на основании приказа № 634 от 20.11.2000 г. и вошла в структуру факультета «Прикладная математика и механика».
    Первоначальное название кафедры – «Механика и прикладная информатика».

    Приказом № 558 от 07.04.2005 г. кафедра «Механика и прикладная информатика» переименована в «Информационные системы».

    Приказом № 622 от 04.04.2007 г. выведена из структуры ф-та «Прикладная математика» и переведена на факультет «Менеджмент
    и маркетинг».

    В

    2018 г

    . кафедра вошла в состав института «Информатика и вычислительная техника».

    Заведующие кафедрой:

    2000-2003 гг. – к.ф.-м.н., доцент Камалетдинов Анвар Шагизович;

    с 01.01.2004 г. по наст. время д.ф.-м.н., профессор Горохов Максим Михайлович.

    Местоположение кафедры: ауд. 3-5, 6-401, 6-402, 6-403, 6-408, 6-409.

    Общая нагрузка кафедры – 10154,1  ак.часов:

