    Угловые штампы ВКР

    Основная научная тематика кафедры

    :

    разработка концепций маркетинг-менеджмента в региональном инвестиционно-строительном комплексе;

    теория и практика организационно-технологических и экономических решений;

    автоматизированные системы расчетов строительных конструкций, численные методы расчетов пластин и оболочек;

    экономика отрасли, стратегическое планирование и системный анализ;

    тенденции в развитии техники и технологии строительства;

    проблемы использования инновационных технологий в технической эксплуатации зданий и городских инженерных систем;

    инновационные, ресурсосберегающие технологии для повышения экономической эффективности строительства и сферы ЖКХ.

    Перечисленные выше темы научных исследований нашли отражение в тематике докторских и кандидатских диссертаций преподавателей
    кафедры, темах диссертационных работ аспирантов, выпускных квалификационных работ выпускников, научных публикациях, в
    том числе с участием студентов.

    Научно-исследовательская деятельность

    Для осуществления научно-исследовательской деятельности преподавателей и студентов кафедры, для выполнения научных работ,
    интеграции науки и производства, практического обучения студентов, открыты и действуют научные лаборатории:

    1.

    Научно-исследовательская лаборатория базового предприятия ФГУП «ГВСУ № 8»

    , на базе которой создано МИП ООО «Научно-исследовательский институт «Строительная лаборатория» (3-3Б).

    Направление научных исследований

    – фундаментальные и прикладные исследования в области физико-механических свойств материалов, экспериментальные разработки
    в области исследования грунтов.

    Практическое назначение

    : проведение научных исследований, НИРС, привлечение заказов по испытаниям стройматериалов, экспертизе, сертификации и
    др.

    Лаборатория оснащена современным оборудованием, необходимым для проведения разнообразных исследований (пресса, измерители
    прочности бетона, освещенности, плотномеры, гигрометры, толщиномеры и др.).

    Действующие и потенциальные заказчики НИР и ОКР

    – ООО «Технология», МИП НИИ «Стройлаб».

    2.

    Лаборатория информационных технологий в недвижимости

    (3-4А).

