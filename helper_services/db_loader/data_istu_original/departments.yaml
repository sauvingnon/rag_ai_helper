    Научно-исследовательская деятельность кафедры «Физика и оптотехника» ведётся по следующим основным направлениям:

    Мониторинг окружающей среды с использованием лазерных технологий (профессор Алексеев В.А., к.т.н. Усольцев В.П.).

    Изучение влияния низкоинтенсивного лазерного излучения на биологические объекты (профессор Алексеев В.А, ст. преп. Перминов
    А.С.).

    Оптические свойства и электронная структура неметаллов (д.ф.-м.н. Соболев В.Вал., профессор Соболев В.В.).

    Развитие приборной базы фотоплетизмографии с использованием лазерной техники (профессор Юран С.И., профессор Алексеев
    В.А.).

    Формирование на поверхности материалов легированных аморфных и наноструктурных слоев методом лазерного воздействия (доцент
    Бесогонов В.В., Карачев С.Е.).

    Актуализация образовательного потенциала курса физики в иноязычной подготовке студентов технического университета (доцент
    Михалкин В.С.).

    На кафедре «Физика и оптотехника» функционируют две научные школы:

    Адаптивные методики и аппаратура для исследования неоднородных сред (профессор Алексеев В.А., профессор Юран С.И., профессор
    Заболотских В.И.).

    Оптические свойства и электронная структура неметаллов (д.ф.-м.н. Соболев В.Вал., профессор Соболев В.В.).

