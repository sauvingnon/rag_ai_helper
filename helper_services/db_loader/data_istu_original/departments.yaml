    Сотрудники

    Институт энергетики включает в себя три выпускающих кафедры:

    «Теплоэнергетика»

    «Водоснабжение и водоподготовка»

    «Техносферная безопасность»

    и две базовые кафедры:

    «Инженерные системы ЖКХ» при МУП «Ижводоканал»

    «Системы газораспределения и газопотребления» при АО «Газпром газораспределение Ижевск»

    Подготовка осуществляется по следующим направлениям:

    Строительство

    Теплоэнергетика и теплотехника

    Техносферная безопасность

    Хочешь узнать подробнее об «Институте энергетики»?

    Смотри официальную

    презентацию

    Отзывы выпускников

    Говоря о настоящем «Института энергетики», нельзя забывать об истоках, а именно, все началось в 1955 году с создания одной
    из старейших кафедр ИжГТУ «Гидравлика и теплотехника». Поэтому следует вспомнить и тех, кто внес огромный вклад в становление
    кафедры «Гидравлика и теплотехника»: канд. техн. наук, доцент

    С. И. Локинский

    (заведующий кафедрой «Гидравлика и теплотехника» 1955-1964); доцент

    В. Г. Бычков

    (заведовал кафедрой «Гидравлика и теплотехника» в период 1964-1969 и 1980-1984 г.г.); канд. техн. наук, доцент

    Г. М. Ключников

    (заведующий кафедрой «Гидравлика и теплотехника» 1969-1980); доктор. техн. наук, профессор

    В. А. Никулин

    (заведующий кафедрой «Гидравлика и теплотехника» 1984-1994); доцент

    В. А. Шумилов

    (декан Инженерно-строительного факультета); старший преподаватель

    Э. В. Пржиялковский

    ; канд. техн. наук, доцент

    К. Н. Падун

    ; старший преподаватель

    Н. М. Кургузкина

    .

    Приказом ректора от 30 июня 2003 года кафедра «Гидравлика и теплотехника» была преобразована в Теплотехнический факультет.
    Деканом стал доктор техн. наук, профессор

    Валерий Николаевич Диденко

    . В 2015 году деканом факультета была избрана к.т.н, доцент кафедры «Теплоэнергетика»

    Ольга Ивановна Варфоломеева

    . В 2018 году Теплотехнический факультет был преобразован в Институт энергетики и жилищно-коммунального хозяйства. В 2022
    году был переименован в Институт энергетики и его возглавила к.т.н., доцент кафедры «Водоснабжение и водоподготовка»

    Анна Александровна Абрамова

    .

    Без специалистов, которых готовит наш Институт, не может обойтись ни одна отрасль промышленности и, конечно, жилищно-коммунальное
    хозяйство и энергетика. В настоящее время ощущается огромная потребность в таких специалистах не только в Удмуртской Республике,
    но и во многих регионах России. Наши выпускники обеспечены высокооплачиваемой работой при любых экономических ситуациях
    в стране.

    В содружестве с университетами Германии наш Институт реализует уникальную для России программу по подготовке универсальных
    специалистов в области водо- и теплоснабжения.

    Направления научных исследований

    Теплоснабжение, газоснабжение, вентиляция, кондиционирование

    ;

    Водоснабжение, водоотведение

    ;

    Безопасность технологических процессов, охрана труда

    .

    Направления хоздоговорных работ в интересах предприятий

    Институт энергетики имеет более 20 реализованных проектов с предприятиями Удмуртской Республики и Российской Федерации
    по следующим объектам и направлениям:

    Объекты

    :

    Газоснабжение;

    Теплоснабжение;

    Вентиляция;

    Кондиционирование;

    Водоснабжение;

    Водоотведение;

    Безопасность технологических процессов;

    Охрана труда.

    Направления

    :

    Экспертиза

    Рецензирование экспертного заключения;

    Инженерно-техническое обследование:

    Энергетическое обследование;

    План мероприятий по энергосбережению;

    Разработка теплообменных аппаратов;

    Разработка сушильных агрегатов;

    Утилизация боеприпасов обычного типа, переработка получаемых компонентов во вторичную товарную продукцию;

    Улучшения условий труда в стрелковых тирах, на предприятиях машиностроительного комплекса;

    Разработка моделей и методов сбора, обработки и анализа информации по условиям и охране труда и интеграции с соответствующими
    цифровыми платформами.

