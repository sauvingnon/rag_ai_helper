    О подразделении

    Новости

    Сотрудники

    Осуществляет организацию внеучебной и воспитательной работы со студентами, обучающимися по программам среднего профессионального
    образования,направленную на раскрытие творческих, интеллектуальных и организационных способностей обучающихся, их патриотическое,
    эстетическое, духовно-нравственное развитие и пропаганду здорового образа жизни.

    Основными задачами отдела являются:

    помощь в адаптации студентов к учебному процессу и содействие качеству образования студентов;

    развитие студенческого самоуправления;

    организация института кураторства;

    формирование гражданско-патриотических качеств студентов, здорового образа жизни;

    организация и контроль воспитательной работы в общежитиях, социальная поддержка студентов.

