    Студенты  для выполнения лабораторной и самостоятельной работы и подготовки к демоэкзамену  получают доступ  к облачному
    порталу  1С.

    Преимущества облачной системы заключены в том, что в облачный портал можно зайти из любой удобной для студента точки со
    смартфона или ноутбука.

    Ваш трекинг выполненных практических и лабораторных заданий будет  виртуально проверяться в системе электронного обучения
    студентов, в которой по основным модулям и дисциплинам есть весь необходимый материал, пополняемый и изменяемый ежегодно
    под новые требования и законодательство.

    Кафедра образована в 2003-2004 уч. году (осень 2003 г.) в результате разделения кафедры «Менеджмент». Начиная с этого
    времени кафедра является выпускающей по специальности 080502 «Экономика и управление на предприятии (машиностроения)»,
    с 2004 года открыта подготовка специалистов по специальности 080505 «Управление персоналом» (первый выпуск – весна 2009
    г.), с 2006 – по специальности 080601 «Статистика» (первый выпуск – весна 2011 г.). Также с 2006 года начата подготовка
    бакалавров по направлениям «Экономика» и «Менеджмент», подготовка магистров по магистерской программе 080100.68-06 «Экономика
    фирмы и отраслевых рынков» (первый выпуск магистров – июнь-июль 2008 г.).

    Кафедра, имея достаточно высокий научно-педагогический потенциал, обеспечивает современные требования подготовки высококвалифицированных
    специалистов.

    В 2018 году произошли еще одни изменения кафедры: «Экономика предприятия», «Экономика и управление» и «Бухгалтерский учет
    и анализ хозяйственной деятельности» объединили. Так появилась вновь созданная кафедра «Экономика и управление организацией».

    За этот период кафедра подготовила более 1000 квалифицированных специалистов по разным формам обучения. Выпускники кафедры
    работают сегодня на всех крупнейших предприятиях Удмуртии, в банках республики, в системе государственного и муниципального
    управления, а также за пределами республики.

    Образовательные программы

    38.04.03 «Управление персоналом» «Стратегическое управление персоналом организации (предприятия)»

    (Магистратура)

    38.03.01 «Экономика» «Экономика предприятий и организаций»

    (Бакалавриат)

    Уважаемые студенты, в этом разделе вы сможете ознакомиться со свежей информацией: Расписание консультаций преподавателей
    кафедры, темы курсовых работ, билеты к экзаменам и зачетам и т.д.

