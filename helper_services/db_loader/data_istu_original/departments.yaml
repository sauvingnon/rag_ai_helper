    О подразделении

    Новости

    Институт Механики Ижевского государственного технического университета (ИжГТУ) является на протяжении многих лет одной
    из ведущих отечественных научных школ в области зубчатых передач признанным лидером в нашей стране и за рубежом в области
    изучения, разработки и внедрения в различные области техники спироидных передач и редукторов.

    Цель

    Повышение эффективности и качества подготовки научных кадров, выполнение научных исследований, создание наукоемких конкурентоспособных
    образцов редукторной техники, прогрессивной технологии их изготовления, организация их производства путем интеграции интеллектуальных
    и материальных ресурсов, оказание содействия в подготовке инженерных кадров.

    Задачи

    разработка и адаптация в образовательном процессе современных технологий подготовки инженерных и научных кадров;

    вовлечение педагогических и научных работников, обучающихся, аспирантов, докторантов в научно-инновационную и производственно-инновационную
    деятельность;

    разработка и выполнение бюджетных и внебюджетных научно-исследовательских работ (далее - НИР) и опытно-конструкторских
    работ (далее - ОКР);

    подготовка материалов для участия в грантах, конкурсах, программах, выставках республиканского, федерального и международного
    уровней;

    совершенствование материального оснащения образовательной, научной и производственно-инновационной деятельностей;

    подготовка и проведение научных мероприятий по тематике НП "Институт механики", участие в научных мероприятиях российского
    и международного уровней;

    подготовка учебно-методических материалов, монографий, статей, докладов, заявок на изобретения

    создание современных методов и программных средств автоматизированного исследования и проектирования передач и трансмиссий,
    синтеза структур объектов и процессов;

    создание современных наукоемких образцов изделий с прогрессивными зубчатыми передачами, прогрессивных технологий их изготовления;

    разработка новых и совершенствование имеющихся экспериментальных методик исследования передач и редукторов, модернизация
    и поддержание в работоспособном состоянии имеющегося парка оборудования с целью повышения точности проводимых исследований,
    расширения круга объектов;

    привлечение широкого круга студентов и аспирантов к освоению и использованию современных методов исследования передач;

    организация консультаций, стажировок практикумов и семинаров;

    создание перспектив для реализации продукции и объектов инновационной деятельности на отечественном и зарубежном рынках,
    привлечения отечественных и зарубежных инвестиций для реализации образовательных, научных и инновационных проектов.

