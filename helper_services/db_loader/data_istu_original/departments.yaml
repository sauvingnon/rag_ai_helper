    Кафедра «Экономика и финансы» осуществляет подготовку:

    Магистров по направлению 38.04.08 «Финансы и кредит» программа «Финансы» (дневная и заочная форма обучения)

    Бакалавров по направлению 38.03.01 «Экономика» профиль «Финансы и кредит» (дневная, заочная, заочно-ускоренная форма обучения)

    Специалистов среднего профессионального образования по специальности 38.02.07 «Банковское дело» (дневная форма обучения)

    Магистранты и бакалавры получают профессиональные знания в области государственных и муниципальных финансов, банковского
    и страхового дела, финансового рынка, рынка ценных бумаг, налогов и налогообложения на уровне предприятий и организаций
    различных сфер деятельности.

    Специалисты СПО в области банковской сферы получают знания и умения связанные с реальной и перспективной практикой банковской
    системы, которая играет важнейшую роль в обеспечении эффективного функционирования экономики страны

    Преподавательская кафедры «ЭиФ»

    находится в корпусе 6 комната 303

    Кабинет заведующего кафедрой

    : корпус 3 комната 9

    Методический кабинет

