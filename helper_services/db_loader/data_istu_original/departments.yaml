    2.1. Направления подготовки бакалавров:

    Направления подготовки бакалавров на каф. «ИС»:

    09.03.02 – «Информационные системы и технологии» профиль

    «Информационные системы и технологии экономики и управления»

    ;

    09.03.03– «Прикладная информатика по областям», профиль

    «Прикладная информатика в экономике»

    .

    2.2. Направления подготовки магистров:

    09.04.02– «Информационные системы и технологии», программа

    «Информационные системы планирования ресурсов и управления предприятием»

    , рук. профессор М.М. Горохов.

    Основной целью образовательных программ является подготовка специалистов для промышленного сектора, малого и среднего
    бизнеса Удмуртской Республики владеющих проектно-конструкторской, проектно-технологической, организационно-управленческой
    и инновационной видами деятельности, способных отслеживать развитие информационных технологии и определять политику в
    области внедрения информационных систем планирования ресурсов и управления на предприятиях.

    Программы ориентированны на подготовку специалистов обладающих знаниями способов и методов проектирования, разработки,
    отладки, производства, внедрения и эксплуатации информационных систем планирования ресурсов и управления современным предприятием.

    Образовательные программы

