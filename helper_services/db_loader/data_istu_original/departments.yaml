    О подразделении

    Задача Базовой кафедры «1С» - усовершенствовать образовательный процесс:

    усилить связи Университета с ИТ-бизнесом Республики -главным заказчиком высококвалифицированных кадров,

    привлечь к процессу обучения   преподавателей–практиков из сфер науки и ИТ-бизнеса

    Базовая кафедра «1С» проводит учебную, методическую и научно-исследовательскую работу:

    Разработка учебно-методические комплексов, планов, программ, материалов

    Развитие научно-исследовательской работы по областям:

    Разработка и внедрение программного обеспечения корпоративных информационных систем

    Бизнес-анализ

    Консалтинг

    Прикладное программирование

    Системное программирование

    Организация и проведение практики студентов ИТ-специальностей;

    Организация и проведение тиражируемых фирмой «1С» курсов по программным продуктам  «1С».

    Организация и проведение олимпиад, конкурсов дипломных проектов и других специализированных мероприятий.

