    11.03.03 (бакалавриат) «Конструирование и технология электронных средств», программа «Проектирование и технология радиоэлектронных
    средств». Формы: очная (4 года), заочная полная (4,5 года) и заочная сокращенная (3,5 года, на базе СПО).

    11.04.03 (магистратура) «Конструирование и технология электронных средств», программа «Информационные технологии в проектировании
    радиоэлектронных средств». Форма: очная, 2 года.

