    Основная цель отдела мультимедийных технологий:

    обеспечение Университета высококачественными дизайнерскими разработками в областях, связанных с корпоративным фирменным
    стилем (полиграфия, сайтостроение, презентации, визуальное оформление для выставок, конкурсов, семинаров и т.п.).

    Основные задачи отдела мультимедийных технологий:

    разработка дизайна корпоративного сайта (-ов);

    создание выставочных, рекламных полиграфических материалов (брошюры, листовки, буклеты, визитки, бланки, конверты, календари
    и др.);

    создание выставочных презентаций, рекламных клипов, учебных видеоматериалов с использованием компьютерной анимации.

    Функции отдела мультимедийных технологий:

    создание и выпуск дизайнерской продукции для текущих нужд Университета;

    создание новых техник и технологий в дизайн-проектах с целью достижения уровня мировых стандартов;

    обеспечение налаженного производственного процесса создания выставочных материалов;

    обеспечение налаженного производственного процесса создания графических материалов для сайта Университета;

    создание, модификация и сопровождение информационных ресурсов.

