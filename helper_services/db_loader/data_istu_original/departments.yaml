    Хочешь узнать подробнее о факультете «Экономика и право»? Скачивай

    официальную презентацию

    .

    Институт «Цифровая экономика» имеет большую и весомую историю.

    Началось все в 1965 году, когда был образован Инженерно-экономический факультет, который  стоял у истоков экономического
    образования в Удмуртии, начав  подготовку инженеров-экономистов.

    За годы своей деятельности «Инженерно-экономический» факультет подготовил не одну тысячу специалистов, которые работают
    практически во всех отраслях и организациях республики. Являясь патриархом экономического образования в республике.

    В 2018 году на базе «Инженерно-экономического» факультета был образован  новый  Институт «Цифровая экономика», который
    постоянно развивается, совершенствуя мастерство преподавателей, поднимая образования на уровень современных требований
    к высшей школе.

    Институт в настоящее время  готовит высококвалифицированных, эстетически и стратегически мыслящих экономистов, способных
    ответственно принимать решения в условиях неопределенности и риска для построения цивилизованного бизнеса в России.

    Мы обеспечиваем сильную академическую подготовку в лучших традициях экономического образования. Тесное сотрудничество
    с ведущими компаниями дает нашим студентам уникальную возможность уже в процессе обучения подготовиться к решению практических
    задач реального сектора экономики, а после окончания учебы получить престижную работу и добиться профессионального роста.

    «В 1966 году я окончила школу. Встал вопрос – куда пойти учиться?»

    К юбилею факультета «Экономика и право» (2025 год)

    Г.Н. Полушина (Богомолова), выпускница 1971 года (второй выпуск экономистов)

    К этому времени уже знала, что в Ижевском механическом институте в 1965 году открылся новый факультет «инженерно-экономический».
    По тем временам это звучало очень по-современному – и инженерный и экономический! И выбор был сделан.

    Для поступления нужно было сдать 5 экзаменов – математику (устно и письменно), физику, химию, написать сочинение и пройти
    по конкурсу - аж 7 человек на место!  Экзамены сдала успешно, по конкурсу прошла и, я – счастливая студентка инженерно-экономического
    факультета Ижевского механического института! Специальность моя - «Экономика и организация машиностроительной промышленности».
    Шифр у нашей специальности тогда был 1709

    Большой подарок-праздник нам первокурсникам подготовили «аборигены-старшекурсники». Вечером 1 сентября на площади перед
    2-м корпусом института у знаковой для ИМИ статуи «Вечному студенту» собрались сотни студентов и вчерашних абитуриентов
    в карнавальных масках и костюмах. Нам вручили символические студенческие билеты и мы, новоиспеченные студенты, произнесли
    тожественную клятву студента:

    «Я, юный гражданин Республики ИМИ, в этот памятный день, вступая на каменистые тропы знаний, торжественно КЛЯНУСЬ:

    - все силы отдавать учебе: КЛЯНУСЬ!

    - жить единым дыханием с родным институтом: КЛЯНУСЬ!

    - уже со студенческой скамьи вносить свой вклад в науку: КЛЯНУСЬ!

    - никогда и нигде не запятнать честь студента, труженика Республики ИМИ  КЛЯНУСЬ!».

    Потом был большой концерт, конкурсы и веселые танцы. А поздно вечером – большой праздничный фейерверк. Это был первый
    «КВАС» – карнавальный вечер абитуриентов и студентов, Такие «КВАСы» потом стали известны на весь город и стали традиционными
    на годы вперед!

    А дальше началась студенческая жизнь. Чему нас только ни учили… Высшая математика, физика, химия, начертательная геометрия,
    черчение, история, политэкономия, основы взаимозаменяемости и даже, пресловутый сопромат! На более старших курсах мы выполняли
    курсовые проекты по технологии машиностроения, технологии приборостроения, электротехнике, кузнечно-штамповочному производству,
    технологии металлов, теоретической механике, деталям машин, сопромату….

    И, наконец, появились такие родные: экономическая теория, экономика предприятия, организация производства, статистика,
    финансы, бухгалтерский учет. И мы не всегда понимали для чего нам изучать такое количество технических дисциплин? Но со
    временем, на практике стало понятно, что приставка к квалификации экономиста «инженер» оправдана, так как после окончания
    учебы многих распределили на промышленные предприятия как специалистов.

    Лично я была распределена на Климовский машиностроительный завод в Московской области, где 3 года проработала экономистом
    большого цеха по сборке станков для текстильной промышленности и получила большой практический опыт, который в будущем
    пригодился как преподавателю, особенно при руководстве экономической частью дипломных проектов студентов технических специальностей.

    Отдельно, с особым чувством и благодарностью вспоминаем мы преподавателей Ижевского механического института, которые дали
    нам путевку в самостоятельную профессиональную жизнь.

    Николай Иванович Майоров

    - первый декан инженерно-экономического факультета. Интеллигентный, образованный, преданный факультету, добрый и понимающий
    наставник. Он знал проблемы почти каждого студента, присутствовал на студенческих мероприятиях и болел за нас душой. Если
    он замечал, что кто-то из студентов оказался в трудном материальном положении, вызывал в деканат, разговаривал «за жизнь»
    и выписывал материальную помощь. Николай Иванович читал нам лекции по политэкономии капитализма. Мы практически ничего
    не записывали за ним, а только слушали. А зачет сдали все. Для нас он всегда оставался самым лучшим деканом.

    Нина Ивановна Закирова

    -  секретарь нашего деканата. Чуткий, жизнерадостный и все понимающий человек. Вход в деканат был открыт для всех. Нина
    Ивановна знала почти каждого студента и, как и Николай Иванович, всегда готова была помочь. Как-то раз у нас случился
    конфликт с преподавателем по бухгалтерскому учету, пришли в деканат и стали просить экзаменационные задачи по предмету.
    Она долго не соглашалась, но все же дала, взяв с нас обещание, что все задачи решим и сдадим экзамен. И экзамен сдали
    все.

    Иосиф Абрамович Шпилькин

    – почти 4 года он преподавал нам математику. Иосиф Абрамович человек необыкновенный! Это заключалась в огромной любви
    к своему предмету и желании заставить и нас полюбить его! Он очень увлеченно читал лекции, исписывал доску мелом сверху
    донизу. Как-то раз ему не хватило места на доске, он стал искать тряпку, затем вынул ее из кармана, отжал ее, стер с доски
    верхние строки и продолжил писать дальше. Никто не засмеялся, мы продолжили записывать формулы и решения. Мы любили и
    уважали Иосифа Абрамовича, старались на экзамене доказать ему, что мы знаем его предмет и очень стыдно бывало, если ты
    что-то не смог решить на экзамене. Мы прощали все его колкости в наш адрес.

    В студенческой «мифологии» особняком стоит наука о сопротивлении материалов – сопромат. Говорили - сдал сопромат, можно
    жениться. Этот предмет мы изучали 2 семестра, лекции нам читал

    Леонид Петрович Васильев

    , а практические занятия вел

    Илья Борисович Покрас

    . Несмотря на сложность предмета, Илья Борисович вел занятия с юмором, учил нас рассчитывать крутящие силы и моменты.
    И мы постепенно осваивали сопротивление материалов и начинали понимать – для чего нужны эти расчеты.

    Экономику предприятия начинала читать нам

    Лидия Дмитриевна Белослудцева

    . Читала интересно, доступно, но по семейным обстоятельствам курс экономики не дочитала. Продолжил читать этот предмет

    Валерий Капитонович Бажутин

    . Это был педант, эстет, человек, любящий порядок во всем – в делах, в бумагах, во внешности. Он научил нас как правильно
    записывать лекционный материал, оформлять таблицы, формулы, чтобы удобно изучать записанный материал. Его лекции я долго
    хранила, а когда сама стала преподавателем, то долго использовала его лекционный материал. Кроме того, Валерий Капитонович
    был моим наставником, когда я пришла работать на кафедру. Особенно его советы были важны и необходимы, когда я начинала
    консультировать экономическую часть дипломных проектов технических специальностей.

    Владимир Леонидович Павленко

    – эрудированный, строгий, не терпящий опозданий на занятия. Преподавал он не очень «веселую» науку по нормированию труда.
    Отлично знал свой предмет и требовал от нас качественного выполнения расчетов. Мы научились проводить хронометраж рабочего
    времени и рассчитывать трудовые показатели времени. Лично мне эти знания очень пригодились, когда я работала на заводе.

    Светлана Петровна Чукавина

    очень долго 2-3 семестра читала нам лекции по организации производства. Большое внимание уделялось курсовому проектированию
    по дисциплине. Эти проекты были достаточно объемны, но интересны и, как оказалось потом, были очень полезны в самостоятельной
    практической работе.

    Заведующим кафедрой экономики и организации был

    Виктор Морисович Розенфельд

    . Познакомились мы с ним на защите дипломных проектов. Очень тактично и по-отечески, он готовил нас к последнему экзамену.
    Он не только подсказал, как необходимо построить выступление, как выделить главное, как завуалировать в докладе те вопросы,
    которые могут возникнуть у членов комиссии, но и как, в каком виде прийти на защиту - обязательно должен быть строгий
    костюм и минимум украшений. На самой защите подбадривал, давая понять, что свою работу мы лучше знаем, чем члены комиссии.

    Работал на кафедре

    Владимир Васильевич Елисеев

    , умный, очень тактичный, добрый, скромный человек. Позже он руководил кафедрой. Он был участником ВОВ, служил в разведке,
    о чем мы узнали совершенно случайно. Я очень благодарна ему тем, что на первое мое занятие, как преподавателя, он зашел
    в аудиторию вместе со мной, представил меня студентам, а сам просидел в аудитории до конца, не поднимая головы, что-то
    писал, чтобы меня не смущать. После окончания занятия очень корректно сделал замечания, что-то похвалил, подбодрил. Я
    это хорошо помню до сих пор.

    Геннадий Ефимович Храпков

    . Мы хорошо знали о его неординарном мышлении, эрудиции и очень боялись его вопросов на защите дипломов. Некоторые студенты
    вступали с ним в полемику, возражали и в результате защита диплома получалась интересной уже с научной точки зрения.

    Маргарита Васильевна Титова

    – старейший работник кафедры, приехала из Ленинграда, пережила блокаду. Она читала лекции по организации производства
    студентам технических специальностей. Маргарита Васильевна была очень требовательным, добрым, чутким, справедливым человеком.
    Мне пришлось работать с ней на одной кафедре, когда я уже сама была преподавателем. От Маргариты Васильевны я получила
    много добрых и умных советов. Я была удивлена, когда пожаловалась ей, что всегда очень волнуюсь, когда первый раз иду
    в поток на лекцию. А она мне ответила, что сама испытывает подобное состояние и это естественно.

    Татьяна Ивановна Антонова

    приехала на работу в ИМИ из Москвы. Читала лекции по организации производства студентам технических специальностей. Эрудированная,
    умная, требовательная не только к студентам, но и к себе. Проработала в вузе почти до 80 лет, была заместителем декана
    факультета. В ее характере бороться за справедливость, защищая либо честь факультета, либо преподавателя, либо студента.
    Под ее руководством я начала работать в качестве заместителя декана уже на факультете менеджмента и маркетинга.

    Особо хочется сказать о

    Николае Федоровиче Ревенко

    . Говоря о кафедре, я подразумевала кафедру экономики и организации производства. Николай Федорович начинал работать на
    этой кафедре, а в 1976 году после разделения ее на две, возглавил одну из них. Одна кафедра стала работать со студентами
    технических специальностей, другая – с экономистами. Ревенко возглавил кафедру «Экономика промышленности и строительства»,
    которая работала со студентами технических специальностей. В составе кафедры в течение многих лет работали: Титова М.В.,
    Антонова Т.И., Калядина Э.Г., Базаров В.Т., Глухова Л.М., Гайворонская К.Д., Широбоков А.С., Белослудцева Г.Б., Багрец
    Г.Т., Фишер Б.А., Трухина А.С., Трибушная В.Х., Ончукова Г.Е., Шмакова Н.А., Мартьянова Г. А., Калинкина Г.Е., Радыгина
    И.И., Шмелев В.Л., Воронов Н.Л, Лобанова Г.А., Янцен Т.В.

    Вклад Николая Федоровича в развитии факультета переоценить трудно. Под его руководством почти половина преподавателей
    нашей кафедры защитили кандидатские диссертации, ежегодно арсенал кафедры пополнялся научными публикациями, методическими
    указаниями. По каждой преподаваемой дисциплине были написаны и изданы учебники, практические пособия, в написании которых
    участвовали все преподаватели.

    Николай Федорович не только руководил кафедрой, но очень много времени уделял научной работе на факультете – создал диссертационный
    совет, работал с магистрантами.

    Как много хороших, умных, незабываемых преподавателей остались в памяти, которые давали нам знания различных предметов.
    В памяти остались: Янченко И.И. (технология машиностроения); Глухов Ю.Г.(инструменты);Модзалевский А.А.(станки); Корепанова
    Г.Н. (технология металлов); Данкова Т.П.(финансы);Ланцев Г.Н. и Ходыкин А.В.(физвоспитание), Горинов М.Н. (политэкономия);
    Шибанов О.К. (вычислительная техника) и много других. Все они незаурядные личности, обладающие огромным багажом знаний,
    которым делились с нами.

    В наше время ректором был

    Николай Васильевич Талантов

    . Это был высокообразованный, энергичный, неординарный и азартный человек. На работу он ходил пешком, знал в лицо не только
    профессорско-преподавательский состав, но и рядовых рабочих и, конечно, многих студентов. В его повседневной практике
    было нормой все вопросы студенческой жизни решать вместе с комитетом ВЛКСМ и студенческим профкомом. Мы очень уважали
    его и гордились своим ректором.

    Мы хорошо помним и проректора

    Бориса Николаевича Шульгу

    , который всегда был в курсе студенческой жизни и был первым помощником в материальной поддержке всех институтских мероприятий.
    И не случайно, в последствии Б. Н. Шульга возглавил Удмуртский государственный университет.

    Студенческая жизнь на факультете протекала бурно. Наш инженерно-экономический факультет был только организован, но мы
    изо всех сил старались ни в чем не уступать маститым прибористам и машиностроителям. Это и участие и в спортивной жизни
    института, и обязательные смотры художественной самодеятельности, и организация студенческих строительных отрядов и, конечно
    же, борьба за высокие показатели в учебе. Кстати, наша группа дважды была «лучшей группой» на факультете и в институте.
    Была награждена в 1968 году путевкой в спортивный лагерь, а в 1969 году поездкой в город Волгоград. Руководителем с нами
    поехал

    Владимир Семенович Каракчеев

    . Быть лучшей группой института – ставить такие цели и достигать их помогали молодость, оптимизм, и даже подзабытый сегодня
    патриотизм. Благодаря активной и довольно привычной для того времени работе комсомольской организации, кто-то открыл свои
    способности в спорте или стал «звездой» самодеятельной сцены, приобрел бесценный опыт в строительных отрядах.

    В институте, на факультете мы ощущали себя большой семьей! Это была большая комсомольская организация, которая, в первую
    очередь, воспитывала и которой до всего было дело.

    Я с уважением и благодарностью вспоминаю тех, с кем мне посчастливилось встретиться в студенческие годы и работать в комсомольской
    организации. Это Людмила Саламатова, Надежда Фаюршина, Михаил Горинов, Олег Шибанов, Игорь Смолин, Леонид Поварницын,
    Анатолий Харитонов, Зинаида Липатова, Вера Маслич, Валерий Куприн, Владимир Модзалевский, Владимир Каракчеев. И этот список
    можно продолжать.

    Но самое главное, здесь я встретила своих друзей на всю оставшуюся жизнь. Это очень дорогие для меня люди: Людмила Шмыкова,
    Лариса Мезенцева, Надежда Григорьева, Татьяна Пыхтина.

    Хочется вспомнить своих «одногруппников»: Елмашев О., Дерябина Г., Филинова Н., Красноперова Л., Злобина О., Данилов Н.,
    Кожевников Н., Мезрина Н., Хурматулина Д., Недошитова Т., Михайлов Л., Звездина Л., Елховская Н., Добрынина О., Иванова
    Н., Богатырева Л., Шмыкова Л., Мезенцева Л., Пыхтина Т., Григорьева Н.

    Благодаря полученным знаниям почти все выпускники, окончившие наш факультет, работали по специальности, отлично справляясь
    с порученной работой. Кто-то достиг больше, кто-то меньше, но никто не пожалел о том, что выбрал эту специальность.

    Хочется отметить своих сокурсников, которые добились больших успехов, о которых мне удалось найти информацию. Надежда
    Григорьева (Бобкова) – руководитель бюро нормативного хозяйства, которое создавало экономическую информационную базу Ижмаша.
    Людмила Красноперова - главный экономист Увинского лесокомбината. Олег Елмашев– зам мэра г. Ижевска по приватизации, организатор
    курсов повышения квалификации руководителей предприятий г. Ижевска. Леонид Дедов – зам. директора по науке Глазовского
    филиала ИжГТУ, профессор кафедры информационной технологии в экономике, доктор экономических наук, профессор экономики,
    действительный член Российского географического общества. Подготовил 8 кандидатов экономических наук. Александр Стаханов–
    начальник отдела АСУ медсанчасти Ижмаша. Виктор Печенкин– начальник бюро ОТиЗ ЭМЗ. Людмила Богатырева– начальник бюро
    ПЭО Ижмаша. Наталья Бейлинсон (Белоголовкина)– начальник агентства Союзпечать. Нонна Омельчук (Бейлина)– начальник отдела
    экономического планирования и бюджетирования ООО концерна «Ижмаш», заслуженный экономист УР 2009 г. Людмила Шмыкова (Грачева)–
    главный бухгалтер Юридического института РПА Минюста РФ, предприниматель, директор частного предприятия. Татьяна Журавлева
    – кандидат экономических наук, доцент, после окончания института проработала в ИМИ-ИЖГТУ до 2018 года.

    Прошли годы. Многое изменилось в жизни, возникла необходимость в новых специалистах: маркетологах, финансистах, бухгалтеров,
    коммерсантах и т. д. И начинается набор на новые специальности. Факультет получает новое название «Менеджмент и маркетинг»
    (МиМ»). Появляются новые кафедры, новые студенты.

    Около 15 лет я работала заместителем декана по учебно-воспитательной работе МиМ-факультета и на протяжении этих лет была
    возможность близко общаться со студентами, знать их сегодняшние проблемы. И невольно сравнивать. Такие же молодые, такие
    же разные.

    Уважаемые студенты, в разделе «Для обучающихся» своей выпускающей кафедры вы сможете ознакомиться со свежей информацией:
    Расписание консультаций преподавателей кафедры, темы курсовых работ, билеты к экзаменам и зачетам и т.д.

    По всем интересующим Вас вопросам ответят

    сотрудники деканата

    .

    По вопросам оформлении и переоформлении договоров об оказании платных образовательных услуг и дополнительных соглашений
    к ним обращаться к специалисту

    Карташовой О.А

    .

    А также приглашаем Вас вступить в официальную группу Института «Цифровая экономика» в соц.сети

    «Вконтакте»

    , где регулярно появляются новости, посвященные внеучебной, спортивной и научной направленности.

