    Цели:

    Цель УЦМТО состоит в обеспечении подразделений Университета товарно - материальными ценностями, работами, услугами для
    их успешного функционирования.

    Задачи:

    обеспечение материально-техническими ценностями подразделений университета;

    сбор, планирование и размещение  заказов на закупку товаров (работ, услуг);

    экспертиза заявок подразделений на закупку товаров (работ, услуг);

    контроль материально - технического обеспечения университета;

    контроль за заключением и исполнением договоров на поставку материально- технических и других ресурсов;

    выявление, профилактика, предотвращение возможных действий работников Университета, направленных на совершение нарушений,
    злоупотреблений в сфере материально-технического снабжения;

    взаимодействие с правоохранительными, контролирующими органами (территориальными органами ФАС, МВД, ФСБ, Прокуратуры,
    и другими) в пределах компетенции УЦМТО.

