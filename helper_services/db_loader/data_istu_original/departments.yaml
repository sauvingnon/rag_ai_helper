    Положение о подразделении

    О подразделении

    История

    Для обучающихся

    Наука

    Новости

    Сотрудники

    Кафедра «Английский язык» обеспечивает преподавание базового и профессионального английского языка студентам 1 и 2 курсов,
    магистрантам и аспирантам всех направлений и форм обучения в ИжГТУ имени М.Т. Калашникова.

    Кафедра выполняет образовательные, организационно-методические, научно-исследовательские, информационно-аналитические
    и экспертно-консультационные задачи в области языковой подготовки и эффективного использования английского языка в целях
    профессионального межкультурного взаимодействия.

    Миссия кафедры – развитие культуры и образованности будущих специалистов, формирование их академической и профессиональной
    мобильности, повышение уровня профессиональной компетентности на основе обучения иностранному языку в сфере профессиональной
    коммуникации, а также способствование дальнейшему продвижению и утверждению профилирующих кафедр в международных профессиональных
    сообществах.

    Одно из важных направлений работы кафедры «Английский язык» – реализация курсов дополнительного образования и дополнительного
    профессионального образования языковой и педагогической направленности в

    Научно-образовательном центре «Инновационные технологии в языковом профессиональном образовании»

    О кафедре "Английский язык": 65-летию кафедры посвящается

    Архив кафедры

    Кафедра «Английский язык» создана в год основания Механического института (1952 г.) как кафедра иностранных языков. Согласно
    приказу №59-к заведующим кафедрой была назначена Арнольдова Ирина Константиновна. Коллектив состоял из четырех преподавателей
    и одного лаборанта:

    Ирины Константиновны Арнольдовой

    (зав. кафедрой),

    Вероники Аркадьевны Шалавиной

    ,

    Серафимы Викторовны Абрамовой

    и

    Маргариты Лутфулловны Тамповой

    .

    Ежегодно на кафедре проводились олимпиады на   лучшее знание иностранного языка, тематические конференции, где студенты
    выступали с докладами на иностранном языке, тематические вечера. Студенты, изучающие немецкий, французский и английский
    языки, многократно занимали призовые места на городских и республиканских олимпиадах по иностранному языку.

    Преподаватели кафедры проходили повышение квалификации в вузах Москвы, Ленинграда, Калинина, Воронежа, Свердловска, в
    ГДР, Англии.

    С 1970 г. кафедру возглавляла

    Стерхова Г.В.

    В 1974 г., поскольку штат кафедры вырос до 35 человек, руководством ВУЗа было принято решение о разделение кафедры на
    две: кафедру английского языка и кафедру немецкого и французского языков. Заведовать кафедрой английского языка было поручено

    Бабушкину В.П.

    , а затем

    Кедровой М.П.

    С 1987 по 2005 гг. кафедрой заведовала

    Федорова Надежда Трофимовна

    . В период ее руководства велась активная работа со студентами. Так, в 1987 г. во время «Недели науки» прошла конференция,
    посвященная вопросам страноведения. В 1990 г. кафедра «Английский язык» победила в конкурсе на лучшую конференцию «Электроника
    и исследование космоса».

    В 80-е на кафедре было создано отделение референтов-переводчиков. На завершающем этапе обучения студенты защищали дипломы
    на английском языке, сдавали экзамен и получали удостоверение нашего института, что давало им определенные преимущества
    при устройстве на работу.

    1990-е. Первая группа инженеров-переводчиков

    В начале 1990-х гг. ведущие преподаватели кафедры под руководством

    Федоровой Н.Т.

    (доцент

    Пирожкова Л.Н.,

    старшие преподаватели

    Иванова В.Г

    .,

    Сарузская В.К

    .,

    Степанова Е.В

    .,

    Филатова  Р.М

    .,

    Кочурова М.М

    .) стали новаторами образовательного процесса, направленного на подготовку инженеров-переводчиков. В 1990-х гг. ИжГТУ
    стал одним из первых российских неязыковых вузов, включивший в образовательный процесс преподавание полного цикла дисциплин 
    на английском языке наряду с курсом углубленного изучения английского языка. У истоков этой инициативы стояли декан Робототехнического
    факультета, профессор

    Пичугин И.К

    ., зав. кафедрой «Английский язык», доцент Федорова Н.Т. и доцент кафедры  Пирожкова Л.Н., которые организовали инновационное
    обучение при подразделении Робототехнического факультета «Лингва-плюс», собрав коллектив преподавателей-единомышленников
    с профилирующих кафедр и специалистов с предприятий для чтения лекций на английском языке. На обучение по новаторской
    программе принимали лучших абитуриентов на основании результатов олимпиад по английскому языку, физике и математике. Совместно
    с Надеждой Трофимовной преподаватели кафедры ездили в школы Удмуртской республики, проводили подготовительные курсы и
    олимпиады по английскому языку.

    С 1998 г. преподаватели кафедры участвуют в языковой подготовке студентов, желающих получить дополнительную квалификацию
    переводчика в сфере профессиональной коммуникации, в Институте переводчиков ИжГТУ, где под руководством его директора
    Еленского А.В.  было продолжено новаторское обучение.

    С 2005 по 2007 гг. кафедрой заведовал к.т.н.,

    доцент Крылов Эдуард Геннадьевич

    .

    В 2006 г. сделан ещё один шаг в направлении развития языковой подготовки – на кафедре открыта специальность «Перевод и
    переводоведение».

    С 7 марта 2008 г. по настоящее время кафедрой заведует канд. пед. наук, доцент

    Архипова Елена Игоревна

    В 2004 – 2015 гг. кафедра входила в состав факультета «Экономика, право и гуманитарные науки».

    В 2016-2017 гг. – в состав

    факультета «Право и гуманитарные науки»

    .

    С сентября 2018 г. кафедра «Английский язык» является структурным подразделением Института  международных образовательных
    программ.

    Учебно-методические материалы

    Издания кафедры «Английский язык» за 2014-2024 гг

    .

    Научно-исследовательская деятельность на кафедре «Английский язык» осуществляется в следующих формах:

    • выполнение инициативных фундаментальных и прикладных работ;

    • подготовка диссертационных работ, монографий и статей в ведущих наукометрических базах (РИНЦ, Scopus, Web of Science);

    https://istu.ru/material/izdatelstvo-springer-sbornik-teoriya-i-praktika-zubchatyh-peredach-pod-redakciey-uchenyh-izhgtu

    https://istu.ru/news/zhizn-universiteta/mezhvuzovskiy-seminar

    https://istu.ru/news/obrazovanie/uchebnyy-blog-pomozhet-osvoit-yazyk

    • участие с докладами и проведение региональных, всероссийских и международных конференций, вебинаров, семинаров и круглых
    столов;

    http://epign.istu.ru/news/37-aya/355-assistent-kafedry-anglijskij-yazyk-aspirant-gareev-andrej-aleksandrovich-poluchil-gramotu-za-luchshij-doklad-na-khkhiv-mezhdunarodnoj-nauchnoj-konferentsii-studentov-aspirantov-i-molodykh-uchenykh-lomonosov-2017-v-moskovskom-gosudarstvennom-universitete-imeni-m-v-lomonosova

    http://epign.istu.ru/pp/novosti-i-ob-yavleniya-kafedry/467-aspirant-kafedry-professionalnaya-pedagogika-andrej-gareev-poluchil-diplom-za-luchshij-nauchno-issledovatelskij-doklad-na-vii-vserossijskom-kongresse-molodykh-uchenykh-v-sankt-peterburge

    https://istu.ru/news/nauka/prepodavateli-kafedry-angliyskiy-yazyk-prinyali-uchastie-v-mezhdunarodnoy-konferencii

    https://istu.ru/news/nauka/sotrudniki-izhgtu-v-mezhdunarodnom-proekte-po-sozdaniyu-seti-yazykovyh-centrov-i-obrazovatelnyh-programm

    https://istu.ru/news/nauka/kruglyy-stol-shkola-tehnikum-vuz-aktualnye-yazykovye-aspekty-nepreryvnogo-obrazovaniya

    https://istu.ru/news/nauka/professor-kafedry-angliyskiy-yazyk-provel-vebinar-posvyashchennyy-specifike-akademicheskogo-angliyskogo

    https://istu.ru/news/nauka/vserossiyskiy-nauchnyy-forum-v-izhgtu-itogi

    • научно-методическое обеспечение учебного процесса, в том числе электронного обучения. Кафедральные научно-методические
    разработки высоко оценивают внешние эксперты, многие публикации получают признание на международном уровне.

    https://istu.ru/news/obrazovanie/prepodavateli-kafedry-angliyskiy-yazyk-prizery-mezhdunarodnogo-konkursa

    На кафедре развиваются следующие направления научной деятельности:

    1. Современные педагогические технологии для формирования иноязычной коммуникативной и межкультурной компетенций будущего
    специалиста.

    2. Предметно-языковое интегрированное обучение (CLIL) (руководитель - зав. кафедрой, канд. пед. наук, доцент Архипова
    Е.И.).

    3. Русская и зарубежная литература эпохи модерна: литературный процесс и литературные контакты (руководитель - доктор
    филол. наук, профессор Ерохин А.В.).

    4. Межкультурная профессиональная и научная коммуникация в современном образовательном пространстве: лингвистические и
    лингводидактические аспекты.

    https://sites.google.com/view/academicconference/

    5. Функционирование языка в интернет-пространстве, особенности коммуникационного пространства интернет-дискурса.

    Выполненные диссертационные исследования преподавателей кафедры:

    1. Архипова Е.И. Формирование иноязычного лексикона специалиста в интегративном обучении иностранному языку и общепрофессиональным
    дисциплинам: диссертация ... канд. педагогических наук (13.00.08, Диссертационный совет К 212 283 05 при ГОУ ВПО «Уральский
    государственный педагогический университет», 2007).

    2. Соломатина С.Ю. Художественное своеобразие натурфилософской эссеистики Генри Дэвида Торо: диссертация ... канд. филологических
    наук(10.01.03, Нижегор. гос. ун-т им. Н.И. Лобачевского, 2008 г.)

    3. Мензаирова Е.А. Актуализация концептов "любовь" и "женщина" в песенном дискурсе: диссертация ... канд. филологических
    наук(10.02.19. Диссертационный совет Д 212.275.06 на базе Удмуртского государственного университета, 2010 г.)

    4. Мартемьянова М. А. Особенности формирования современных научных технических терминологических систем: на примере терминов
    нанотехнологий: диссертация ... канд. филологических наук (10.02.19. Диссертационный совет Д 212.275.06 на базе Удмуртского
    государственного университета, 2011 г.)

    5. Ардашева Т. Г. Лингвокогнитивный анализ концепта "свобода": на материале русского, английского и французского языков:
    диссертация ... канд. филологических наук (10.02.19. Диссертационный советД 212.275.06 на базе Удмуртского государственного
    университета, 2012 г.).

    6. Фаррахов А. Ф. Одиночество как социокультурный феномен: концептуализация и практическое проявление в современном обществе:
    диссертация ... канд. филоcофских наук (09.00.11. ДМ 203.017.01 по философским и социологическим наукам при Краснодарском
    университете МВД России, 2014 г.).

    7. Крылов Э. Г. Интегративное билингвальное обучение иностранному языку и инженерным дисциплинам в техническом вузе: диссертация
    ... доктора педагогических наук (13.00.02, Уральский государственный педагогический университет, 2016 г.).

    8. Красавина Ю. В. Организация самостоятельной работы студентов - будущих бакалавров профессионального обучения на основе
    метода междисциплинарных электронных проектов: диссертация ... канд. педагогических наук (13.00.08, Д212.080.04 на базе
    ФГБОУ ВО «Казанский национальный исследовательский технологический университет», 2017 г.).

    9. Ульянова М. А. «Категория эмотивности и средства ее выражения в спортивной блогосфере (на материале русского, английского
    и немецкого футбольного блога и комментария»: диссертация ... канд. филологических наук(10.02.19.Диссертационный совет
    Д 212.275.06при Удмуртском государственном университете, 2017 г.).

    10. Гареев А.А. «Учебный блог как средство организации самостоятельной работы студентов технического вуза по развитию
    профессиональной иноязычной компетенции». (13.00.08, Д212.080.04 на базе ФГБОУ ВО «Казанский национальный исследовательский
    технологический университет», 2020 г.).

    11.

    Пономаренко Е.П. «Формирование языковой личности студентов бакалавриата технического университета на основе методики рефлексивного
    обучения иностранному языку»: диссертация … канд. педагогических наук  (5.8.2. Диссертационный совет 24.2.344.01 на базе
    ФГБОУ ВО «Нижегородский государственный лингвистический  университет им. Н.А. Добролюбова», 2023 г.)

    В настоящее время ведется работа над следующими диссертационными исследованиями:

    1. Сомова К.Д. «Система интегративной коммуникативно-когнитивной подготовки по иностранному языку студентов технического
    ВУЗа», научный руководитель профессор, доктор пед. наук Крылов Э.Г.

    Ежегодно подаются заявки на гранты, многие из которых получили поддержку.

    Полученные гранты:

    1. Индивидуальный грант фонда им. Гумбольдта (Германия). Рабочее название грантовой заявки: «Восприятие литературной классики
    Вальтером Беньямином и Михаилом Бахтиным» (на немецком языке). Время и место выполнения заявки: июнь-август 2023, университет
    Кельна (Германия). Участник – доктор филол. наук, профессор кафедры «Английский язык» Ерохин Александр Владимирович.

    2. Грант РГНФ по приоритетному направлению деятельности «Проведение фундаментальных научных исследований и поисковых научных
    исследований малыми отдельными научными группами» в 2022-23 гг.. Тема: «Исследование особенностей познавательной деятельности
    студентов с нарушением слуха в электронной среде». Руководитель - кандидат пед. наук, доцент кафедры «Английский язык»
    Красавина Юлия Витальевна, участники – кандидат пед. наук, доцент кафедры «Английский язык» Гареев Андрей Александрович»,
    старший преподаватель кафедры «Английский язык» Пономаренко Екатерина Петровна.

    3. Грант Российского фонда фундаментальных исследований, проект «Исследование особенностей восприятия и обработки визуальной
    информации студентами с нарушениями слуха в зависимости от вида ее носителя», руководитель - кандидат пед. наук, доцент
    кафедры «Английский язык» Красавина Юлия Витальевна, участник - старший преподаватель кафедры «Английский язык» Пономаренко
    Екатерина Петровна. Реализация проекта в течение трех лет — с 2019 по 2021 гг.

    4. Проект «Когнитивные исследования национальной концептосферы: язык, текст, культура» в рамках федеральной целевой программы
    «Научные и научно-педагогические кадры инновационной России» на 2009-2013 гг. на повышение квалификации и проведение научного
    исследования «Рецепция творчества Г.Д. Торо в русской литературе» в научно-образовательном центре актуальных проблем гуманитарных
    и социальных наук Нижегородского государственного университета имени Н.И. Лобачевского. (участник – к.ф.н, доцент кафедры
    «Английский язык» Соломатина С.Ю.)

    Апробация инновационных образовательных методик и технологий реализуется в Научно-образовательном центре «Инновационные
    технологии в языковом профессиональном образовании» (руководитель НОЦ канд. пед. наук, доцент Архипова Е.И)

