    Институт международных образовательных программ (ИМОП)
    Обеспечивает международную образовательную деятельность ИжГТУ: языковая подготовка, двойные дипломы, академическая мобильность и обучение иностранных студентов.
    Декан: Рябчиков Алексей Вячеславович
    Институт имеет в совем составе несколько кафедр: «Языковая подготовка в профессиональной сфере»; «Русский язык как иностранный»; «Лингвистика»; «Английский язык». А также отдельные отделы/центры: Регистрационно-визовый сектор, Центр международного академического сотрудничества, Подготовительное отделение для иностранных гражджан, Отделение языковой подготовки в профессиональной сфере, Отдел цифрового маркетинга и коммуникаций, Центр китайского языка и культуры
  meta: 
    notes: |
      Основано: 2018
      Адрес: корпус 5, каб. 703
      Телефон: 8 (3412) 77-60-55 доб. 5102
      Почта: imop@istu.ru

