- type: Факультет/Институт
  name: Институт дополнительного профессионального образования (ИДПО)
  keywords: ИДПО, дополнительное образование, повышение квалификации, профессиональная переподготовка, ИжГТУ
  text: |
    Институт дополнительного профессионального образования (ИДПО)
    Занимается повышением квалификации и профессиональной переподготовкой специалистов.
    Декан: Тарануха Наталья Леонидовна
    В институте дополнительного профессионального образования разрабатываются и реализуются программы опережающей профессиональной переподготовки и повышения квалификации. Основным направлением является развитие кадрового потенциала образовательных проектов, в частности, в сфере наноиндустрии. В ИДПО уже реализовано 5 таких проекта для предприятий ОАО «Элеконд», ООО «НПЦ «Пружина», ОАО «ЧМЗ», АО «ИЭМЗ «Купол», а также для строительных предприятий и сферы ЖКХ.
  meta:
    notes: |
      Основано: 1998
      Адрес: Корпус 5
      Телефон: 8 (3412) 77-05-27, 77-60-55 доб. 5112
      Почта: sfpidpo@istu.ru

- type: Факультет/Институт
  name: Факультет информационные технологии (ФИТ)
  keywords: информатика, вычислительная техника, ИжГТУ, программирование, программист, айтишник, искусственный интеллект, компьютер, базы данных, системный анализ, ЭВМ, ИИ, ИТ, IT
  text: |
    Факультет информационные технологии (ФИТ)
    Занимается подготовкой ИТ/IT-специалистов в области информатики и вычислительной техники, компьютерной математики, системного и прикладного программирования, организации ЭВМ, вычислительных систем и сетей, операционных систем и систем программирования, баз данных и инструментальных средств разработки программного обеспечения, системного анализа и машинного моделирования, принятия решений и управления, систем обработки данных и искусственного интеллекта.
    Декан: Архипов Игорь Олегович
    Факультет имеет в совем составе несколько кафедр: «Вычислительная техника»; «Программное обеспечение»; «Автоматизированные системы обработки информации и управления»; «Защита информации в компьютеризованных системах»; «Информационные системы»; базовой кафедры «1С».
  meta: 
    notes: |
      Основано: 1993
      Адрес: корпус 3, кабинет 512 (5-й этаж)
      Телефон: 8 (3412) 77-39-89, 8 (3412) 77-60-55 доб. 3235
      Почта: iwt@istu.ru

- type: Факультет/Институт
  name: Институт международных образовательных программ (ИМОП)
  keywords: международное образование, иностранные студенты, лингвистика, английский язык, чешский язык, двойные дипломы, академическая мобильность, переводчик, дипломат
