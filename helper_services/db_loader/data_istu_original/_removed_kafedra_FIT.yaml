- type: Кафедра
  name: Кафедра «Программное обеспечение» (ПО)
  keywords: кафедра, факультет информационные технологии, программное обеспечение, программная инженерия, бакалавриат, магистратура, СПО, искусственный интеллект, базы данных, олимпийский резерв
  text: |
    Кафедра программное обеспечение (ПО) факультета информационные технологии (ФИТ) готовит бакалавров и магистров по направлению «Программная инженерия», а также техников-программистов по СПО; студенты осваивают программирование, базы данных, ИИ, системный анализ, сети и ОС; выпускники работают в IT-компаниях, банках, науке и промышленности, могут создавать собственные продукты.
    Глава: Леонов Михаил Витальевич
    Образовательная программа по направлениям: бакалавариат 09.03.04 - Разработка программно-информационных систем, магистратура 09.04.04 - Разработка программно-информационных систем
  meta:
    notes: |
      Основано: 1969
      Адрес: корпус 3, каб. 711
      Телефон: 8 (3412) 77-60-55 доб. 3252, 8-919-915-64-57
      Почта: po@istu.ru

- type: Кафедра
  name: Кафедра «Вычислительная техника» (ВТ)
  keywords: кафедра, факультет информационные технологии, вычислительная техника, ЭВМ, микропроцессоры, системное программирование, Си, Ассемблер, искусственный интеллект, компьютерные сети, защита информации
  text: |
    Кафедра «Вычислительная техника» (ВТ) факультета информационные технологии (ФИТ) готовит бакалавров и магистров по архитектуре ЭВМ, вычислительным сетям, микропроцессорам, системному ПО и информационно-измерительным системам; студенты осваивают языки Си, Ассемблер, параллельное и моделирующее программирование, компьютерную графику, ИИ, защиту информации, а также основы экологии и экономики производства.
    Глава: Петухов Константин Юрьевич
    Образовательная программа по направлениям: 09.03.01 «Организация и программирование вычислительных и информационных систем» (Бакалавриат)
  meta:
    notes: |
      Основано: 1959
      Адрес: корпус 2, каб. 120
      Телефон: 8 (3412) 77-60-55 доб. 2300
      Почта: vt@istu.ru

- type: Кафедра
  name: Кафедра «Информационные системы» (ИС)
  keywords: кафедра, факультет информационные технологии, информационные системы, прикладная информатика, ИС, базы данных, языки программирования, корпоративные системы, ИТ-менеджмент
  text: |
    Кафедра «Информационные системы» ИжГТУ реализует программы бакалавриата «Информационные системы и технологии» и «Прикладная информатика», 
    фокусируясь на ключевых корпоративных IT-направлениях: ERP-системы (планирование ресурсов предприятия), CRM (управление клиентами), ECM (управление контентом), 
    проектирование баз данных и освоение высокоуровневых языков программирования.
    Глава: Горохов Максим Михайлович
  meta:
    notes: |
      Основано: 20.11.2000 
      Адрес: корпус 6, каб. 408
      Телефон: 8 (3412) 77-60-55 доб. 6354, +7-982-997-7010
      Почта: insys2005@mail.ru

- type: Кафедра
  name: Кафедра «Информационная безопасность» (ИБ)
  keywords: кафедра, факультет информационные технологии, информационная безопасность, Astra Linux, РусБИТех-Астра, криптография, защита данных, автоматизированные системы, безопасность сетей, стандарты ИБ, техническая защита информации
  text: |
    Кафедра «Информационная безопасность» ИжГТУ готовит специалистов для проектирования, внедрения и администрирования защищённых информационных систем; 
    студенты осваивают моделирование угроз, оценку рисков, криптографию, безопасность ОС и сетей, стандарты ИБ, защиту персональных данных и технические средства защиты; 
    кафедра — инициатор создания Авторизованного учебного центра «РусБИТех-Астра», где ведутся курсы по Astra Linux SE 1.7 под руководством опытных преподавателей и отраслевых экспертов.
    Глава: Вологдин Сергей Валентинович
  meta:
    notes: |
      Основано: 28.04.2004
      Адрес: корпус 2, ауд. 425
      Телефон: 8 (3412) 77-60-55, доб. 7194
      Почта: zics-istu@mail.ru

- type: Кафедра
  name: Кафедра «Автоматизированные системы обработки информации и управления» (АСОИУ)
  keywords: кафедра, факультет информационные технологии, АСОИУ, автоматизированные системы, информатика, вычислительная техника, дизайн интерфейсов, искусственный интеллект, доктора наук, САПР
  text: |
    Кафедра «Автоматизированные системы обработки информации и управления» ИжГТУ ведёт историю с 1969 г. (изначально — «Машинная обработка экономической информации»),
     с 1999 г. готовит бакалавров по направлению «Информатика и вычислительная техника» с профилями «АСОИУ» и «Дизайн пользовательских интерфейсов», 
     а также магистров по программе «Разработка моделей ИИ»; коллектив — 15 человек, включая 2 докторов и 5 кандидатов наук.
    Глава: Мокроусов Максим Николаевич
