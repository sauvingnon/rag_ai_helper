  text: 'Липанов Алексей Матвеевич

    доктор технических наук, профессор

    Кафедра «Прикладная математика и информационные технологии»

    - профессор

    корпус 1

    , каб. 406

    stud.meh.mod@yandex.ru

    Информация

    Публикации

    Квалификация

    Должности:

    Кафедра «Прикладная математика и информационные технологии»

    - профессор

    Окончил Томский университет (1959) по специальности «

    баллистика

    » с квалификацией «баллистик». После под руководством профессора Р. Е. Соркина и академика

    Б. П. Жукова

    занимался математическим моделированием физико-химических процессов, происходящих в

    ракетных двигателях на твёрдом топливе

    (РДТТ), участвовал в создании первой советской управляемой твердотопливной ракеты с подвижным стартом «

    Темп-С

    ». В 1965 году защитил

    диссертацию

    на соискание учёной степени

    кандидата технических наук

    .

    С 1967 участвовал в создании межконтинентальной ракеты «

    Темп-2С

    ». К 1974 году с его участием были разработаны две системы автоматизированного проектирования зарядов к ракетным двигателям
    на твёрдом топливе и система автоматизированной обработки экспериментальной информации. В 1970 году защитил

    докторскую

    диссертацию, посвящённую решению двух проблем: обоснованию применимости одномерной газодинамической модели при исследовании
    внутрикамерных процессов и исследованию случайных полей скорости горения заряда по его объёму. Исследовал в эксперименте
    физико-химические процессы, происходящие при горении твёрдых топлив в их прогретых слоях и примыкающей к поверхности раздела
    фаз газовой фазе. Участвовал в создании лаборатории горения твёрдых топлив.

    В 1975 присвоено учёное звание «

    профессор

    » по специальности «

    Механика жидкости, газа и плазмы

    », в том же году включён в состав межведомственной комиссии по проектированию морской твердотопливной управляемой ракеты
    «

    Тайфун

    ».

    Затем в течение 8 лет работал ректором

    Ижевского механического института

    , где создал конструкторское бюро при машиностроительном факультете, ряд отраслевых и проблемных лабораторий, способствовал
    оснащению института мощной вычислительной техникой. Под его руководством велось активное жилищное строительство: построены
    два учебно-лабораторных корпуса, четыре жилых дома, два 12-этажных общежития квартирного типа, столовая, дворец культуры,
    профилакторий, детский комбинат, загородная экспериментальная база, загородная база отдыха.

    В 1983 году назначен заместителем министра

    высшего и среднего специального образования РСФСР

    по науке. С его участием создавались малые экономические формы, позволяющие привлечь в вузы средства для оснащения их
    приборами и оборудованием; производства, конструкторские бюро и заводы при вузах. В 1987 году избран

    членом-корреспондентом

    Академии наук СССР

    .

    С 1988 году по приглашению академика

    Г. А. Месяца

    начал трудовую деятельность в

    Академии наук

    . Им создан

    Институт прикладной механики

    и

    Удмуртский научный центр

    , в составе центра образованы ряд филиалов и отделов, являющихся подразделениями институтов Уральского отделения Академии
    наук.

    Действительный член

    Российской академии наук

    с 2000 года.

    Впервые в мире создал метод исследования

    турбулентных потоков

    теоретическими средствами, который оказался физически состоятельным и позволяет получить общее решение данной проблемы.
    Метод позволяет без дорогостоящих натурных испытаний и без использования

    аэродинамических труб

    оптимально подойти к проблеме проектирования летательных, наземных и различных подводных аппаратов, сократить сроки создания
    новых образцов вооружения и военной техники.

    Разработал физическую, химическую и математическую модели процессов, протекающих в прогретом реакционном слое горящего
    смесевого твердого ракетного топлива. Выполнил математическое описание данных моделей, получил формулы линейных скоростей

    горения

    как классических, так и современных смесевых твёрдых ракетных топлив.

    Инициатор и участник проектирования и ввода в эксплуатацию уникальной плазмогазодинамической установки — плазматрона («ЛипаТрон
    2000») для получения

    наночастиц

    ; разработал «горячий» и «холодный» методы создания наночастиц и

    нанотрубок

    .

    Соавтор работ: по созданию универсальных мельниц для измельчения сельскохозяйственного сырья и горных пород; по получению
    макрохарактеристик веществ (в том числе металлов и полимеров) последовательным увеличением количества атомов в частице;
    решению ряда проблем для наноструктур: закачке молекул водорода в углеродные нанокапсулы с последующим их истечением при
    заданных условиях; исследованию размеров наночастиц и их поверхности; определению с заданной точностью местоположений
    различных образований на наночастицах; созданию и осуществлению технологий получения атомарноострых игл и многие другие.

    Именем Академика Липанова назван параметр, характеризующий эрозионное горение твердого ракетного топлива —

    число Булгакова-Липанова

    . Автор — профессор

    Сабденов, Каныш Оракбаевич

    . Использование числа Булгакова-Липанова оказывается универсальным средством для определения области доминирования положительной
    или отрицательной эрозии. Число Булгакова-Липанова активно используется в практике проектирования РДТТ.

    Подготовил более 60 докторов и кандидатов наук. Автор 16

    монографий

    , соавтор 65 изобретений и более 600 научных статей в отечественных и зарубежных журналах.

    РАЗРАБОТКА МАТЕМАТИЧЕСКОГО И ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ ДЛЯ РЕШЕНИЯ ЗАДАЧ ВНЕШНЕБАЛЛИСТИЧЕСКОГО ПРОЕКТИРОВАНИЯ

