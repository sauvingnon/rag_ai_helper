  text: 'С 2003 г. преподает на кафедре «Водоснабжение и водоподготовка» в должности ассистента, а с 2005 г. по настоящее
    время – старшего преподавателя.

    Ч

    итает лекции, проводит практические и лабораторные занятия по дисциплинам

    кафедры «Водоснабжение и водоподготовка»

    :

    «Очистка природных вод», «Очистка сточных вод», «Водоснабжение и водоотведение», «Трубы и их соединения», «Трубопроводы,
    арматура и их соединения», «Противопожарное оборудование зданий и сооружений», «Технология водоподготовки», «Технология
    очистки сточных вод», руководит

    дипломным и курсовым проектированием

    . По всем дисциплинам разработаны рабочие программы, УМКД и демонстрационные материалы на ЭВМ к лекциям и практическим
    занятиям.

    Активно

    участвует в научно-исследовательской

    (№№ УИР-31-06, УИР-31-07, УИР-31-08, ВНП/И-11. ГЗ/ИВГ-2012, ВиВ-1-12/С, СМВ, ПСР/М4/Н4.1.1/ИВГ,

    2018/083-07360

    )

    и методической работе кафедры и факультета.

    В 2012 году вручена Почетная грамота Администрации Октябрьского района г. Ижевска, в 2013 году  - Почетная грамота Минобрнауки
    УР, в 2019 году - Грамоты РОР "Союз строителей Удмуртии" и Союза машиностроителей России. Имеются благодарности ректоров
    университетов РФ.'
