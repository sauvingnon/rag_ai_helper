  text: "Муравьев Виталий Васильевич\nдоктор технических наук, профессор\n8 (3412) 77-60-55 доб. 1132\nкорпус 1\n, каб. 501\n\
    pmkk@istu.ru\nИнформация\nПубликации\nПортфолио\nУчебные планы:\n2021-2022 ИПР Муравьев В.В..pdf\n2023-2024_ИПП_Муравьев.pdf\n\
    Заведующий кафедрой «Приборы и методы измерений, контроля, диагностики», д.т.н., профессор.\nЗаслуженный деятель науки\
    \ Российской Федерации.\nВ 1972 году закончил технологический факультет Сибирского металлургического института  в г. Новокузнецке\
    \ с квалификацией инженер-металлург по специальности «Физика металлов».\nДействительный член Российской Академии транспорта, Академии\
    \ проблем качества, Академии военных наук.\nЧлен научного совета РАН по физике конденсированных сред, секция \"Неразрушающие\
    \ физические методы контроля\".\nЧлен технического комитета ТК-371 Госстандарта (Неразрушающий контроль), ПК-3, ПК-7,\
    \ ПК-9.\nЧлен Координационного совета ОАО РЖД по секции «Неразрушающий контроль».\nЧлен правления РОНКТД и Председатель\
    \ Удмуртского РО РОНКТД.\nГлавный редактор журнала \"Вестник  ИжГТУ имени М.Т. Калашникова\",\nЧлен редколлегий журналов\
    \ \"Дефектоскопия\", \"Интеллектуальные системы в производстве\",\n«Diagnostics, resource and mechanics of materials and\
    \ structures» и «Вестник Концерна ВКО \"Алмаз-Антей\"»\n.\nНаграды:\nПочетное звание «Заслуженный деятель науки Российской\
    \ Федерации», Нагрудный знак МПС «Почетный железнодорожник», Премия им. А.Н. Косыгина «За достижения в решении проблем\
    \ экономики России», Знак в честь 110-летия со дня основания города Новосибирска «за плодотворную работу на благо города», Нагрудный\
    \ знак «За добросовестный труд 20 лет СГУПС-НИИЖТ», Нагрудный знак Министерства транспорта «30 лет Байкало-Амурской магистрали», Нагрудный\
    \ знак Минобрнауки «Почетный работник науки и техники РФ», Почетная грамота Удмуртской республики (2.02.2018), Человек\
    \ года ИжГТУ имени М.Т. Калашникова в номинациях: профессор (2013), эффективный менеджер в области образования и науки\
    \ (2017, 2024), победитель конкурсов (2018), почетный профессор (2020), лауреат государственной премии Удмуртской республики (21.10.2020).\n\
    Область научной деятельности:\nНеразрушающий контроль, техническая диагностика и материаловедение.\nРуководитель научной\
    \ школы\n«Физические методы и средства измерений, контроля и диагностики технических и биомедицинских объектов».\nАвтор\
    \ более 650 публикаций, из них статей в российских журналах – 197, в зарубежных - 18, Web of Science - 90, Scopus - 114,\
    \ ВАК - 178, ядро РИНЦ - 153, книги и сборники статей - 61, патенты – 46, суммарное число цитирований РИНЦ – 4383, НЭБ\
    \ - 4851.\nПодготовлено\n3 д.т.н. и 18 к.т.н., научный руководитель 5 аспирантов.\nСпециалист III уровня в области неразрушающего\
    \ контроля по АК, МК, АЭК и ВТК.\nЧлен трех докторских диссертационных советов:\nЗаместитель председателя Объединенного\
    \ диссертационного совета Д\n99.0.077.02\nпо специальности 2.2.8 «Методы и приборы контроля и диагностики материалов,\
    \ изделий, веществ и природной среды» на базе УдмФИЦ УрО РАН и ИжГТУ имени М.Т. Калашникова,\nЧлен диссертационного совета\
    \ Д 212.065.06 по специальности 2.3.3 «Автоматизация и управление технологическими процессами и производствами (в машиностроении\
    \ и приборостроении)» в ИжГТУ имени М.Т. Калашникова.\nЧлен Объединенного диссертационного совета ОДС 99.1.087.02 на базе\
