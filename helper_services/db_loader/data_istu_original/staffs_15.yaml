    Работает на кафедре с 2008 г.

    Выпускница кафедры «Приборы и методы контроля качества» 2009 года. Аспирант профессора О.В. Муравьевой. В 2012 году защитила
    кандидатскую диссертацию на тему «Закономерности возникновения артефакта "псевдопоток" в неоднородных средах и его применение
    в ультразвуковой диагностике» по специальности 05.11.17.

    Специалист II уровня по акустическому (ультразвуковому), визуально-измерительному, капиллярному и акустико-эмиссионному видам неразрушающего
    контроля.

    С 2017 г. является аккредитованным экспертом, привлекаемым для проведения аккредитационной экспертизы организаций, осуществляющих
