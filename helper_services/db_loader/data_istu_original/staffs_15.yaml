    \ 2020-21 скан.pdf\nСведения об образовании:\nУчебное заведение, дата окончания: Ижевский механический институт, 1971\
    \ год\nСпециальность, квалификация: полигонные установки, инженер-механик\nДополнительное профессиональное образование\
    \ -\nпрофессиональная переподготовка по программе «Управление охраной труда. Техносферная безопасность» в объеме 276 часов\
    \ с 24 февраля по 14 апреля 2015 года,\nна ведение профессиональной деятельности в сфере «Техносферная безопасность».\n\
    Ученая степень: кандидат педагогических наук, 1976 г., доктор технических наук, 1998 г.\nУченое звание: профессор, 2001\
    \ г.\nПочетные звания, награды:\nЗаслуженный изобретатель Российской Федерации, 2002 г.\nПочетный профессор ИжГТУ имени\
    \ М.Т.Калашникова, 2014 г.\nНагражден медалью\nК.Д.Ушинского\nза заслуги в области педагогических наук (Приказ Минобрнауки\
    \ России от 29 декабря 2010 г. №1453/к-н).\nНагражден Почетной грамотой Президиума Академии военных наук за активное участие\
    \ в разработке спецситем для утилизации боеприпасов в рамках выполнения Государственного оборонного заказа.\nНагражден\
    \ золотым знаком отличия «Готов к труду и оборе», приказ Минспорта России, от 4 июля 2016 года № 91нг.\nНагражден памятным\
    \ знаком «ГЕНЕРАЛ-ПОЛКОВНИК ПИКАЛОВ», приказ начальника Федерального управления по безопасному хранению и уничтожению\
    \ химического оружия от 02 февраля 2022 г. № 22.\nТематика научных исследований:\nутилизация боеприпасов обычного типа,\
    \ переработка получаемых компанентов во вторичную товарную продукцию, 05.02.08\nохрана труда, 05.26.01\nВ 2018 году заключены\
    \ договоры на НИР по грантам:\n«Разработка способов повышения эффективности систем управления охраной труда отдельных\
    \ групп персонала промышленного предприятия», шифр № 20.06.01/18СБВ, объем  финансирования 150 000 руб.\n«Применение системного\
    \ анализа в прогнозировании показателей производственного травматизма Удмуртской Республики», шифр № 20.04.01/18СБВ, объем\
    \  финансирования 75 000 руб.\nГрант для ученых ФГБОУ ВО «ИжГТУ имени М.Т.Калашникова» на тему: «Развитие региональной\
    \ системы управления охраной труда и промышленной безопасности на предприятиях Удмуртской Республики»\n, номер проекта\
