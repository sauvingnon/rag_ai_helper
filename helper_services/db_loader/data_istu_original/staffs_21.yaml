  text: 'Диденко Валерий Николаевич

    доктор технических наук, профессор

    Кафедра «Теплоэнергетика»

    - профессор

    8 (3412) 77-60-55 доб. 8102

    корпус 8

    , каб. 2-1

    rsg07-9624@udm.net

    Информация

    Публикации

    Портфолио

    Квалификация

    Должности:

    Кафедра «Теплоэнергетика»

    - профессор

    Учебные планы:

    ИПР-2 Диденко В.Н 2019-20.pdf

    ИПР Диденко В. Н. 21-22.pdf

    1. Автобиографические данные

    Родился в

    1947 г

    . в с. Крутово Владимирской обл. В 1965 году с отличием закончил Воткинский машиностроительный техникум и был распределен
    на подшипниковый завод г. Ижевска, где последовательно прошел путь слесаря, техника-конструктора, инженера-технолога,
    совмещая работу с учебой на вечернем отделении Ижевского механического института. В

    1969 г

    . был переведен на его очное отделение, которое с отличием закончил в 1973 году по специальности «Производство летательных
    аппаратов» с рекомендацией в аспирантуру. По распределению был оставлен работать в ИМИ в научно-исследовательской лаборатории,
    где проявил себя как талантливый экспериментатор. В дальнейшем работал на кафедрах «Динамика машин» и «Проектирование
    автоматических машин».

    Был командиром сводного ССО «Удмуртия» на строительстве ВАЗа. Из всех республиканских отрядов СССР, работающих на строительстве
    ВАЗа, ССО «Удмуртия» был признан лучшим.

    С 1973 по 1975 год руководил комсомольской организацией ИжГТУ. В

    1975 г

    . поступил в аспирантуру ИжГТУ (руководитель проф. М. С. Горохов).

    В 1978 году успешно защитил кандидатскую, а в 1994 году - докторскую диссертацию. На педагогической работе с 1975 года.
    Прошел все ступени: от ассистента до профессора. Читает лекции и ведет все виды учебных занятий по дисциплинам «Теплотехника»,
    «Механика, теплотехника и гидрогазодинамика», «Техническая термодинамика», «Теория горения», «Термодинамика (спецкурс)»,
    «Тепломассообмен», «Химическая термодинамика и энергетика топлива», «Физико-химические основы горения топлива». Читаемые
    им лекции отличаются высоким научным уровнем и методической проработкой. В. Н. Диденко - известный ученый в области внутренней
    баллистики. Он внес весомый вклад в разработку теории и методов баллистического проектирования, что легло в основу расчетных
    инженерных методик, используемых для проектирования изделий специального назначения. В настоящее время плодотворно работает
    в области механики жидкости и газа, строительной теплофизики, конверсионных технологий. Валерий Николаевич Диденко хорошо
    известен в научных кругах своими публикациями и изобретениями (более 120 публикаций и 7 изобретений), а также как руководитель
    крупных хоздоговорных тем, выполнявшихся по приказам МОП и ММ. Он руководит работой  магистрантов и подготовил пять кандидатов
    технических наук, является членом трех специализированных советов по защите докторских диссертаций. Опубликовал более
    30 методических разработок. В 2000 году он избран членом-корреспондентом РАРАН.

    2. Заслуги перед университетом

    В. Н. Диденко был организатором и руководителем лаборатории «Импульсные тепловые машины» НКТБ «Восход», но в полной мере
    его организаторский талант проявился после избрания в 1994 году заведующим кафедрой «Гидравлика и теплотехника». Под его
    руководством коллективом кафедры получены лицензии на подготовку инженеров по специальностям: «Теплогазоснабжение и вентиляция»
    (

    1996 г

    .), «Водоснабжение и водоотведение» (

    1998 г

    .). На базе этих специальностей по инициативе В. Н. Диденко открыты специализации: «Теплогенерирующие установки и теплогазоснабжение»
    (

    1997 г

    .), «Экономика, организация и управление в ТГВ» (

    1999 г

    .), «Экономика, организация и управление в «ВиВ» (

    1999 г

    .).

    В 1999 году кафедра успешно прошла аккредитацию Минвуза РФ по вышеперечисленным специальностям. Руководимый В. Н. Диденко
    коллектив кафедры успешно вел подготовку студентов по более, чем 70 дисциплинам общеинженерных и специальных циклов. Под
    руководством В. Н. Диденко открыты специализации - «Очистка природных и сточных вод» и «Городское планирование и управление
    жилищно-коммунальным хозяйством». По инициативе В. Н. Диденко и при его активном участии  была открыта кафедра «Управление
    городским хозяйством» для совместной целевой подготовки специалистов по инженерным сетям городского жилищно-коммунального
    комплекса г. Ижевска. На кафедре проводилась большая работа по развитию лабораторной базы специальностей и направлений,
    компьютеризации учебного процесса, ремонту и расширению аудиторного фонда, улучшению методического обеспечения учебного
    процесса.

    Для развития материально-технической базы кафедры в 1995 году по инициативе В. Н. Диденко был открыт Высший колледж «Теплоэнергетик»
    - структурное подразделение ИжГТУ, в 2000 году реорганизованное в Институт городского хозяйства ИжГТУ. В. Н. Диденко успешно
    руководил этими подразделениями со дня их основания.

    В. Н. Диденко был инициатором создания в ИжГТУ  Теплотехнического факультета (2003г)

    С мая

    2003 г

    . по октябрь

    2015 г

    . В. Н. Диденко являлся деканом Теплотехнического факультета, председателем Учёного совета факультета и членом Учёного
    совета ИжГТУ.

    По инициативе В. Н. Диденко и при его активном участии  было лицензировано новое для ИжГТУ направление «Теплоэнергетика
    и теплотехника»  и открыта подготовка студентов по профилю «Промышленная теплоэнергетика».

    В.Н.Диденко активно развивал международные связи факультета. Так  в 2009 году по двум профилям Теплотехнического  факультета 
    ( «Теплогазоснабжение и вентиляция» и «Водоснабжение и водоотведение») была осуществлена международная аккредитация в
    ИжГТУ всего направления «Строительство»..  В 2005 году по  инициативе В.Н.Диденко началась  разработка бинациональной
    программы  подготовки специалистов  с возможностью получения  студентами двух дипломов: ИжГТУ им. М.Т.Калашникова и Высшей
    школы Остфалия (Германия).  В 2011 году при участии В.Н.Диденко  между ИжГТУ им. М.Т.Калашникова и Высшей школой Остфалия
    был подписан договор .о подготовке бакалавров по профилю «Водо-и теплоснабжение населенных мест» с возможностью получения
    студентами «двойных дипломов». В 2013 году студенты Теплотехнического факультета первыми в истории  ИжГТУ  успешно защитили
    в Германии  такие «двойные дипломы».

    В 2014г В. Н. Диденко был назначен  ответственным за аккредитацию ИжГТУ по укрупненной группе направлений (УГН 14) и успешно
    справился с этим  поручением Учёного совета ИжГТУ.

    Дважды (в 2006 и 2011гг) В. Н. Диденко был председателем и членом комиссии Учёного совета ИжГТУ по выборам ректора.

    В октябре 2016г В. Н. Диденко ушел в отставку с должности декана Теплотехнического факультета по состоянию здоровья, собственному
    желанию и для продвижения молодых кадров. В настоящее время В. Н. Диденко трудится в должности профессора кафедры «Теплоэнергетика»

    В. Н. Диденко на протяжении всего периода учебы и работы в ИМИ (ныне ИжГТУ) принимал самое активное участие в общественной
    работе» , имеет  много поощрений от руководства университета.

