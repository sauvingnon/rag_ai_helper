    Информация

    Публикации

    Родилась в 1993 году в г. Ижевске.

    В 2015 году начала трудовую деятельность в университете в качестве сотрудника УНИР.

    В 2016 году с отличием окончила бакалавриат по специальности «Системный анализ и управление» (программа «Теория и математические
    метода системного анализа и управления в экономических, социальных и технических системах») ИжГТУ имени М.Т. Калашникова
    и начала работу в качестве специалиста по УМР по совметитульсту зам.декана по внеучебной и воспитетльной работе.

    В 2018 году Гиззатуллина А.Ф. окончила магистратуру с отличием по направлению «Механика и математическое моделирование»
    (программа «Механика сплошных сред»).

    На сегодняшний день является аспирантом направления «Математика и механика»  (программа «Механика жидкости, газа и плазмы»).
    Активно занимается научно-исследовательской деятельностью. Занимается исследованиями,  связанными с математическим моделированием
    газодинамических процессов в различных установках, а также аэро- и гидродинамикой.

    Проводит практические  занятия по дисциплинам «Механика жидкости и газа», «Вычислительная математика», «Математическое
    моделирование».

    Гиззатуллина А.Ф. дважды проходила обучение в рамках Международной летней суперкомпьютерной академии в МГУ имени М.В.
    Ломоносова. Имеет ряд научных статей.

