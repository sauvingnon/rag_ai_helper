  text: "Грахов Валерий Павлович\nдоктор экономических наук, профессор\nКафедра «Промышленное и гражданское строительство»\n\
    - профессор\nКафедра «Промышленное и гражданское строительство»\n- профессор\n8 (3412) 77-60-55 доб. 3-256\nкорпус 3\n\
    , каб. 201а\npgs@istu.ru\nИнформация\nПубликации\nКвалификация\nДолжности:\nКафедра «Промышленное и гражданское строительство»\n\
    - профессор\nКафедра «Промышленное и гражданское строительство»\n- профессор\nУчебные планы:\nГрахов В.П. ИПР 2024-2025\
    \ (1).pdf\nЧисло, месяц, год и место рождения:\n21 июня 1959 г., с. Грахово, Граховского р-на Удмуртской АССР\nСведения\
    \ об образовании:\n1976 – 1981 гг. «Ижевский механический институт», по специальности «Сельскохозяйственное строительство»,\
    \ квалификация - инженер-строитель.\n1996 – 1998 гг. Высшая школа приватизации и предпринимательства г. Москва, по специальности\
    \ «Менеджмент», квалификация – менеджер.\nСведения о присуждении ученых степеней:\nРешением диссертационного совета Московского\
    \ гос. индустриального университета (от 01 ноября 2000 г., № 16) присуждена ученая степень Кандидата экономических наук.\n\
    Решением Высшей аттестационной комиссии Министерства образования и науки Российской Федерации (от 17 октября 2008 г.,\
    \ № 39д/56) присуждена ученая степень Доктора экономических наук.\nСведения о присвоении ученых званий:\nРешением Министерства\
    \ образования Российской Федерации (от 19 октября 2005 г. № 972-д) присвоено ученое звание Доцента по кафедре технологии,\
    \ организации и экономике строительства.\nПриказом Федеральной службы по надзору в сфере образования и науки (от 15 июля\
    \ 2009 г., № 1732/243-п) присвоено ученое звание Профессора по кафедре технологии, организации и экономике строительства.\n\
    Сведения о работе:\n01.09.1976 - 15.06.1981 – Студент - Учеба в Ижевском Механическом институте\n03.07.1981 - 05.07.1983\
    \ - Мастер-строитель - Граховская ПМК-19\n05.07.1983 - 10.06.1985 - Заместитель председателя РАПО по строительству - Граховское\
    \ управление сельского хозяйства УАССР\n11.06.1985 - 10.02.1986 – Начальник - Граховская МПМК объединения «Удмуртколхозстрой»\n\
    12.02.1986 - 01.10.1989 – Начальник - Граховская МПМК объединения «Удмуртагропромстрой»\n02.10.1989 - 17.10.1994 – Директор\
    \ - Камский ЖБИиК треста «Агропромстройматериалы»;\n17.10.1994 - 23.04.1999 - Генеральный директор - АООТ «Камский завод\
    \ ЖБИиК»\n23.04.1999 - 09.04.2004 - Генеральный директор - АООТ «Камский завод ЖБИиК» (переименован в ОАО «Камский завод\
    \ ЖБИиК»);\n12.04.2004 - 07.10.2004 - К.э.н., доцент кафедры «Технология и организация строительного производства»; Заведующий\
    \ кафедрой «Технология и организация строительного производства». (на постоянной основе) - Чайковский технологический\
    \ институт (филиал) ИжГТУ\n11.10.2004 - 21.10.2004 - И.о. заместителя главы Администрации (высшая муниципальная должность\
    \ муниципальной службы) - Администрация города Ижевска\n21.10.2004 - 28.02.2011 - Заместитель главы Администрации - Администрация\
    \ города Ижевска\n01.04.2011 - по настоящее время - Заведующий кафедрой «Промышленное и гражданское строительство» - Федеральное\
    \ государственное бюджетное образовательное учреждение высшего образования «Ижевский государственный технический университет\
    \ имени М.Т. Калашникова»\nНаграды:\n1995 г. – Заслуженный строитель Российской Федерации.\n1995 г. – Грамота ассоциации\
    \ «Нечерноземагропромстрой».\n1996 г. – Почетный строитель Нечерноземагропромстрой.\n1999 г. – Звание «Кадровый работник\
    \ завода».\n1999 г. – Почетная грамота Государственного комитета РФ по строительной, архитектурной и жилищной политике, \
    \ Госстрой России, г. Москва.\n2000 г. – Почетный строитель России.\n2003 г. – Победитель Всероссийского конкурса «Менеджер\
    \ года» в номинации «Научно-исследовательские и опытно-конструкторские разработки».\n2007 г. – Благодарность Администрации\
    \ г. Ижевска.\n2008 г. – Почетный знак «Строительная слава».\n2009 г. – Заслуженный строитель Удмуртской Республики.\n\
    2009 г. – Почетная грамота главы Администрации г. Ижевска.\n2009 г. – Памятный знак «ФГУП «УССТ № 8 при Спецстрое России»\
    \ 70 лет».\n2009 г. – Медаль  «Имени академика С.П. Королева за заслуги перед космонавтикой».\n2010 г. – Орден за «Заслуги\
    \ в строительстве» Российского Союза Строителей.\n2010 г. – Памятная медаль «60 лет Спецстрою России».\n2010 г. – Благодарность\
    \ главы Администрации г. Ижевска.\n2011 г. – Благодарность Главы муниципального образования «город Ижевск».\n2012 г. –\
    \ Победа в конкурсе «Человек года ИжГТУ – 2012» в номинации «Профессор года».\n2013 г. – Диплом I степени в номинации\
    \ «Человек и общество» как один из авторов фильма «От речки Адамки» на V Межрегиональном фестивале документального кино\
    \ «Премьера на Вятке», г. Киров.\n2013 г. – Победа в конкурсе «Человек года ИжГТУ – 2013» в номинации «Победы в творческих\
    \ конкурсах».\n2013 г. – Почетный строитель Удмуртии.\n2014 г. – Благодарность ФГБОУ ВПО «ИжГТУ имени М.Т. Калашникова».\n\
    2014 г. – Заслуженный работник народного образования Удмуртской Республики.\n2014 г. – Памятный знак «ФГУП «ГУССТ № 8\
    \ при Спецстрое России» 85 лет».\n2014 г. – Медаль «За заслуги в предпринимательстве».\n2015 г. – Победа в конкурсе «Человек\
    \ года ИжГТУ – 2015» в номинации «Эффективный менеджмент в области организации, образования и науки».\n2016 г. – Благодарность\
    \ ФГБОУ ВПО «ИжГТУ имени М.Т. Калашникова» за высокопрофессиональное взаимодействие с предприятиями строительного комплекса\
    \ УР, организацию и непосредственное участие в создании «Лаборатории информационных технологий в недвижимости».\n2017\
    \ г. - Благодарственное письмо от имени Организационного комитета VIII-ой Всероссийской (с международным участием) студенческой\
    \ междисциплинароной Интернет-олимпиады инновационного характера \"Инновационные технологиив сложных системах\".\n2017\
    \ г. -  Присуждение почетного звания \"Почетный гражданин Граховского района\".\n2017 г. - Присвоение звания \"Российский\
    \ лидер качества\" - Всероссийская организация качества, г.Москва.\n2017 г. - Победа в конкурсе \"Гуманитарная книга -\
    \ 2017\" за монографию \"Разработка методики дифференциации земельных участков по престижности для многоэтажного жилищного\
    \ строительства (на примере г. Ижевска)\" в номинации \"Экономика и экономические науки\".\n2017 г. - Победа в конкурсе\
    \ \"Гуманитарная книга - 2017\" за монографию \"Управление проектами в строительстве с применением композитной арматуры\"\
    \ в номинации \"Организация и управление\".\n2017 г. - Лауреат конкурса \"Гуманитарная книга - 2017\" за монографию \"\
    Строили село Грахово\" в номинация \"История. Исторические науки\".\n2018 г. - Благодарность за существенный вклад в развитие\
    \ интеграционных процессов Беларуси и России в образовательной сфере и за популяризацию идей развития межвузовской науки\
    \ в Союзном государстве.\n2018 г. - Благодарность Главы Удмуртской Республики за участие в организации и проведении III\
    \ Открытого регионального чемпионата \"Молодые профессионалы\" (WORLD SKILLS RUSSIA) УР.\n2018 г. - Грамота \"За вклад\
    \ в подготовку и проведение XIX Всемирного фестиваля молодежи и студентов 2017 года в г. Сочи\".\n2018 г. - Благодарственное\
    \ письмо \"За активное участие в районной экологической акции \"Чисто-TERRA 2018\".\n2018 г. Диплом победителя регионального\
    \ этапа Всероссийского конкурса в области педагогики, работы с детьми и молодежью до 20 лет \"За нравственный подвиг учителя\"\
    \ в номинации \"За организацию духовно-нравственного воспитания в рамкаъх образовательного учреждения\".\n2018 г. -  Благодарственное\
    \ письмо \"За содействие и помощь в организации выставки \"Планета творчества - позывной \"Митхим\".\n2018 г. -  Благодарственное\
    \ письмо \"За проведение комплекса работ по организации сотрудничества Ижевского государственного технического университета\
