    «Парадигмы национальной идеи в историко-философском контексте российской действительности XIX века»: 1999 г.

    «Национальная идея России: история и современность»: 2005 года.

    Разработанные курсы

    «Философия технических наук»,  «Философские проблемы науки и техники» (в рамках программ магистратуры), «История и философия
    науки»  (по программе магистерской подготовки); «История и философия науки» для аспирантов.

    «Философия», «Логика», «Этика и этикет деловых отношений», «Современные международные отношения», «Теория и практика массовой
    информации»,

    Член ГЭК по приёму кандидатских экзаменов по дисциплине «История и философия науки»

