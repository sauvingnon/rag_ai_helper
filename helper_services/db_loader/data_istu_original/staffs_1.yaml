    E-mail:

    philosoph@istu.ru

    Учёная степень, учёное звание

    : кандидат философских наук, доктор политологии, доцент

    Образование

    : Высшее. Московский государственный университет им. М.В. Ломоносова: 1985 год, философский факультет, специальность «Философия»,
    красный диплом.

    Аспирантура

    : 1985-1988 годы, Московский государственный университет им. М.В. Ломоносова, философский факультет.

    Кандидатская диссертация

    : Тема: «Специфика обоснования философского знания». Защита состоялась 24 ноября 1989 года в специализированном Совете
    К 053.05.40 по философским наукам при МГУ им. М.В. Ломоносова. Научный руководитель доктор философских наук, профессор
    Ю.А. Петров.

    Докторская диссертация

    : Тема: «Парадигмы русской национальной идеи: история и современность». Защита проходила 27 декабря 2000 года   в Диссертационном
    Совете Д. 053.05.52 по философским и политическим наукам. Научный консультант: А.С. Панарин. По специальности 23.00.03
    – Политическая культура и идеология.

    Аспиранты и соискатели

    : 5. октября 2005 года   под руководством Петровой М.В. защищена   диссертация на соискание ученой степени кандидата политических
    наук по специальности: «Политические институты, этнополитическая конфликтология, национальные и политические процессы
    и технологии»   аспиранткой Чукавиной Е.С. в Диссертационном совете (К 501.001.01) по политическим наукам при МГУ им.
    М.В. Ломоносова на тему: «Механизмы обеспечения политического лидерства женщин в современной России и Германии».

    2 декабря 2010 г. под руководством Петровой М.В. защищена диссертация на соискание ученой степени кандидата политических
    наук по специальности 23.00.02. – «Политические институты, процессы и технологии»   на заседании диссертационного совета
    Д 212.166.10 при Нижегородском государственном университете им. Н.И. Лобачевского на тему: «Формирование образа здоровья
    в рамках политической системы общества. Трушиной В.А.

    В 2012 г. 28 марта под руководством Петровой М.В. защищена диссертация на соискание ученой степени кандидата философских
    наук по специальности «Социальная философия» – 09.00.11. на заседании диссертационного совета Д 212.275.08 при Удмуртском
    государственном университете Шишкиной А.А. на тему: «Культурный ландшафт как система ценностей экологического сознания».

    Под руководством Петровой М.В. в 2016 году   подготовлена к защите кандидатская диссертация по специальности 09.00.11
    – «Социальная философия» старшим преподавателем кафедры «Философия» Пилюшенко Александрой Валерьевной на тему: «Здоровый
    образ жизни как феномен субъектно-объектных отношений».

    Основные научные интересы: политическая идеология в современном мире, перспективы развития российской цивилизации, диалог
    цивилизаций, философия техники, аксиология.

    Участие в конференциях

    :

    1.Петрова М.В. доклад на пленарном заседании «Аксиологические основания современного кризиса техногенной цивилизации»//
    Всероссийская научно-практическая конференция с международным участием «Гуманитарное образование и наука в техническом
    вузе», посвященная 100-летию со дня рождения М.Т. Калашникова 24-27 октября 2017 года, г. Ижевск. С. 9-13 URL: https://drive.google.com/file/d/1e2mUMNIzhNxiUjYVWdb5qZKFv3OUxrLI/view

    Научные публикации

    : Более 40 работ.

    Монографии

