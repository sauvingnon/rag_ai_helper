    Клековкин (2).pdf

    Механ всегда на марше и в строю

    Профессор В.С.Клековкин 2022г.

    Когда Отечество за жизнь на смерть отчаянно боролось ,

    Возникли наши корни и на вечно закрепились .

    Чтоб Армия достойнейшим оружием оборонялась.

    Никто

    ни времени ни силы не щадил,

    Чтобы фашизм народ Советский победил.

    А после той жестокой и Великой для страны войны :

    Наш город оружейным стал,

    В партнеры наш Механ призвал ,

    В котором кузницу надежного оружия создал ,

    А для нее трудолюбивый и умный коллектив собрал.

    Теперь Калашниковскому Механу семь десятков лет

    И служит он , чтоб враг не смог зажечь запал,

    А милая страна жила без страшных бед.

    И в этом мудрость всех отцов и матерей Великих тех Побед,

    Поэтому Сегодня мы даем обет , что не забудем тех Побед.

    Сейчас мы снова видим  ядовитые ростки фашизма,

    Которые ползут в среде подлейшего нацизма .

    Поэтому перед Механом- стоят задачи :

    Давать Отечеству такие результаты и удачи ,

    Которые приводят в трепет алчущих врагов.

    Пусть дух наш укрепиться в ЮБИЛЕЙ.

    И к новым целям двинемся скорей.

    Найдем для этих дел достойнейших вождей.

    А коллектив ,намоленный в делах прошедьших поколений,

    Возникнет глубже во сто крат и ярче и умней !

