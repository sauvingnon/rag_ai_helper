  text: 'Сенилов Михаил Андреевич

    доктор технических наук, профессор

    8 (3412) 77-60-55 доб. 3252

    корпус 3

    , каб. 715

    senilov@bk.ru

    Информация

    Публикации

    Учебные планы:

    Инд. план Сенилов.pdf

    НАУЧНО-ПЕДАГОГИЧЕСКАЯ ДЕЯТЕЛЬНОСТЬ

    Сенилов Михаил Андреевич, 1951 года рождения, окончил в 1974 году факультет автоматики и вычислительной техники (специальность
    «Прикладная математика») Ленинградского электротехнического института (ЛЭТИ) имени В.И. Ульянова (Ленина) (ныне Санкт-Петербургский
    государственный электротехнический университет "ЛЭТИ"). В 1975 году поступил в очную аспирантуру ЛЭТИ, после окончания
     которой в 1979 году защитил кандидатскую диссертацию.

    С 1979 года вся трудовая деятельность Сенилова М.А. связана с Ижевским механическим институтом (ныне Ижевский государственный
    технический университет имени М. Т. Калашникова), где он прошел путь от ассистента до профессора, заведующего кафедрой
    «Программное обеспечение» (1996-2005 гг.), декана факультета «Информатика и вычислительная техника» (2004-2012 гг.). В
    1984 году присвоено звание доцента. В 2005 году защитил докторскую диссертацию, присуждена ученая степень доктора технических
    наук. В 2009 году присвоено звание профессора. В 2013-2016 гг. работал деканом инженерного факультета и заведующим кафедрой
    информационно-вычислительных технологий и программной инженерии (ИВТПИ) Камского института гуманитарных и инженерных технологий.
    С 2016 года работает профессором кафедры ПО ИжГТУ.

    Сениловым М.А. освоено преподавание более 10 дисциплин, проводилась работа по методическому обеспечению курсового и дипломного
    проектирования, лабораторных работ, практических занятий и самостоятельной работы студентов, разрабатывались учебные планы
    специальностей и направлений подготовки. Издано более 20 учебно-методических работ.

    В 1996-2001 гг. Сенилов М.А. являлся руководителем госбюджетных НИР, выполняемых в рамках Комплексной программы «Целевая
    интенсивная подготовка специалистов» (ЦИПС), связанных с разработкой информационных технологий в образовании.

    В 2000-2005 гг. Сенилов М.А. активно участвовал в научно-исследовательской работе по тематике кафедры «Программное обеспечение».
    Тема научных исследований – «Математические модели и программные средства интеллектуальных систем интерпретации данных
    геофизических исследований скважин». В этот период Сенилов М.А. участвовал в выполнении ряда хоздоговорных НИР, проводимых
    ИжГТУ с ОАО «Удмуртгеология», ОАО «Белкамнефть», ОАО «ТНК-ВР», связанных с разработкой программного обеспечения автоматизированной
    системы хранения, обработки и интерпретации геолого-геофизической информации (2004-2005 гг.).

    В целом по результатам научной деятельности им опубликовано более 150 научных работ, из них  1 монография и более 30 статей
    в центральных изданиях. Сенилов М.А. участвовал с докладами на многих международных, Всесоюзных и Всероссийских научно-технических
    конференциях. Осуществлял руководство научно-исследовательской работой аспирантов и студентов. Им подготовлено 5 кандидатов
    наук. Выполненные под его руководством научные студенческие работы награждались нагрудным знаком «Лауреат Всероссийского
    конкурса» и премией ЦС ВОИР. Итогом его научно-исследовательской деятельности явилась защита в 2005 году докторской диссертации.

    В период работы деканом факультета ИВТ ИжГТУ Сенилов М.А. участвовал в организационной работе на уровне факультета, университета
    и Удмуртской республики, являясь членом ученого совета университета, членом ректората, членом научно-технического совета
    университета, членом приемной комиссии университета, председателем ученого совета факультета ИВТ, председателем учебно-методического
    совета факультета, председателем отборочной комиссии (комиссии по зачислению) факультета и направлений магистратуры, членом
    трех докторских диссертационных советов, членом редакционного совета научно-технического журнала «Вестник ИжГТУ», членом
    совета по информатизации университета, членом рабочей группы по подготовке IT-специалистов в вузах Удмуртской Республики
    при Министерстве информатизации и связи УР .

    Будучи заведующим кафедрой программного обеспечения, а затем деканом факультета ИВТ ИжГТУ, Сенилов М.А. большое внимание
    уделял организационной работе по подготовке и проведению олимпиад по информатике и программированию для школьников и студентов.
    На протяжении  10 лет (с 1997 г. по 2007 г.) являлся председателем оргкомитета региональных олимпиад по информатике. На
    факультете ИВТ велась целенаправленная подготовка школьников, студентов, студенческих команд к участию в самых престижных
    соревнованиях, таких как республиканские, Всероссийские олимпиады по информатике, первенства Урала, России и чемпионаты
    мира по программированию. С этой целью на факультете ИВТ был создан Центр подготовки программистов олимпийского резерва
    для студентов и школьников. Проведенная работа дала выдающиеся результаты: серебряные (2004 г.), бронзовые (2005 г.) и
    золотые (2008 г.) медали на командных студенческих чемпионатах мира по программированию. Образовательная программа по
    направлению «Информатика и вычислительная техника», подготовленная под руководством Сенилова М.А. на факультете ИВТ ИжГТУ,
    получила по итогам Всероссийского мониторинга 2010 года высокий рейтинг (3 место из 75 российских вузов) и вошла в число
    лучших образовательных программ инновационной России.

    Сенилов М.А. имеет государственные и отраслевые  награды РФ. В 2001 году ему присвоено звание «Заслуженный работник народного
    образования Удмуртской Республики», в 2004 году награжден Почетной грамотой Министерства образования Российской Федерации,
    в 2006 году награжден нагрудным знаком «Почетный работник высшего профессионального образования Российской Федерации»,
    в 2013 году присвоено почетное звание «Заслуженный работник высшей школы Российской Федерации».

