    Сотрудники

    Основная цель УСО состоит в укреплении имиджевой привлекательности Университета как образовательного и научного государственного
    бюджетного учреждения.

    Управление по связям с общественностью решает следующие задачи:

    Формирование и продвижение единой стратегии Университета на информационном и рекламном поле, укрепление положительного
    имиджа Университета.

    Информационное представительство Университета в государственных и муниципальных органах.

    Сбор, анализ и систематизация информации, связанной с высшим образованием, молодежью и студенчеством.

    Проведение единой политики по разработке и использованию различных форм информирования в учебном и воспитательном процессе.

    Организация PR- взаимодействия со всем структурными подразделениями Университета, организациями и предприятиями с целью
    более полного и объективного информационного обеспечения обучающихся, преподавателей и работников Университета.

    Информирование преподавателей, работников и обучающихся Университета о процессах и событиях, происходящих в студенческой
    среде, в Университете и в системе высшего образования в целом через средства массовой информации.

