  keywords: конфиденциальности, консолидированного, совершенствованию, государственного, квалификационных, противодействие,
    экзаменационных, своевременности
  text: 'Группа аттестации и оформления документов

    Контакты подразделения

    8 (3412) 77-60-55 доб. 1360

    Телефон

    diploms@istu.ru

    Почта

    корпус 1

    , каб. 6

    Адрес

    О подразделении

    Сотрудники

    Группа аттестации и оформления документов в соответствии с возложенными задачами на Отдел осуществляет следующие функции:

    Анализ результатов внутренней системы оценки качества подготовки:

    текущая и промежуточная аттестация;

    государственная итоговая аттестация.

    Координация деятельности структурных подразделений по совершенствованию рейтинговой системы учебного процесса и кредитно-модульной
    системы обучения.

    Организация и сопровождение государственной итоговой аттестации:

    формирование приказов о составе председателей и членов государственных экзаменационных комиссий (ГЭК);

    подготовка проекта документа о составе председателей ГЭК для утверждения в Минобрнауки России;

    контроль организации и проведения ИГА;

    формирование сборника отчетов председателей ГЭК;

    контроль своевременности предоставления и качества исполнения отчетов председателей ГЭК о результатах и качестве ИГА,
    анализ их работы и представление на обсуждение Ученому совету Университета;

    разработка внутреннего порядка учета, хранения и выдачи выпускных квалификационных работ;

    анализ качества подготовки выпускников на основе отчетов председателей ГЭК и подготовка консолидированного отчета по Университету.

    Сопровождение и организация оформления и выдачи документов об образовании и/или квалификации:

    заказ бланков, приобретение бланков документов государственного и установленного образца об образовании и/или квалификации,
    выдача и учет документов об образовании и/или о квалификации и их дубликатов, документов установленного Университетом
    образца и других документов;

    формирование данных для ФИС Рособрнадзора;

    оформление документов государственного образца об образовании;

    регистрация документов установленного образца об образовании;

    внесение информации в Федеральный реестр сведений о документах об образовании и (или) о квалификации, документах об обучении;

    формирование книги выдачи документов об образовании и (или) о квалификации, документах об обучении;

    взаимодействие со сторонними организациями по подтверждению подлинности документов государственного образца, выданных
    Университетом.

