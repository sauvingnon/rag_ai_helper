    Научные направления

    информационно-аналитические системы в области теплофизики, энергетики и энергосбережения;

    математическое моделирование объектов механики, машиностроения и приборостроения;

    математическое моделирование объектов экономики;

    химическая физика процессов формирования и превращений наноструктур и наносистем;

    адаптивные системы измерений мониторинга окружающей среды;

    физические процессы в материалах при лазерном воздействии;

    прогнозирование в медицине, разработка медицинского мониторинга.

    оптические свойства и электронная структура твердых тел;

    основы педагогических коммуникаций в инклюзивном обучении (ОВЗ по слуху);

    исследование возможностей использования дистанционных образовательных технологий в учебном процессе,

    исследования в области инклюзивного образования, проектного обучения и междисциплинарности;

    разработка интегративных технологий обучения студентов, взаимно сочетающих традиционные, инновационные и компьютерные
    технологии;

    система подготовки спортивного резерва;

    проблемы государственного и муниципального управления в Российской Федерации;

    культура, общество и личность.

