    времени и выполнять расчет итоговых показателей, необходимых для качественной оценки достоверности измерительной информации.

    •    Разработана математическая модель напряженно-деформированного состояния длинномерного изделия с учетом механического
    и теплового нагружения при воздействии импульсов.

