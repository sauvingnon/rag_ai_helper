    Новости

    Сотрудники

    Вся деятельность коллектива ДОУ «Детский сад № 105» направлена на достижение трех основных целей:

    Сохранять и укреплять здоровье детей, формировать у них привычку к здоровому образу жизни.

    Способствовать своевременному и полноценному психическому развитию каждого ребенка.

    Обеспечить каждому ребенку возможность радостно и содержательно прожить период дошкольного детства.

    Работа в первую очередь адресована тем, кто заинтересован во всестороннем и гармоничном развитии своего ребенка, кто хочет
    поделиться своим опытом и рассказать о трудностях воспитания и обучения дошкольников, кто готов сотрудничать с квалифицированными
    педагогами.

    В детском саду функционируют 5 групп:

    с 2 до 3 лет – 1 младшая группа;

    с 3 до 4 лет – 2 младшая группа;

    с 4 до 5 лет – средняя группа;

    с 5 до 6 лет – старшая группа;

    с 6 до 7 лет – подготовительная к школе группа.

    В ДОУ

    «Детский сад №105»

    имеется: музыкальный зал, физкультурный зал, ИЗО-студия, методический кабинет, кабинет психолога, медицинский блок (мед.
    кабинет, прививочный кабинет).

    Порядок приема, перевода, восстановления и отчисления воспитанников дошкольного образовательного учреждения детский сад
    № 105

