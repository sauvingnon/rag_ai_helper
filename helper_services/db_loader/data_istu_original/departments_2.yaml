    Научный руководитель

    Соболев Валентин Валентинович

    Основные научные результаты:

    впервые разработана методика разложения интегральных спектров диэлектрической проницаемости и характеристических потерь
    электронов на элементарные компоненты с определением основных параметров каждой компоненты с использованием методики объединенных
    диаграмм Арганда. Методика успешно применена при решении фундаментальных задач  оптической спектроскопии;

    исследованы оптические свойства и электронная структура ряда материалов в кристаллическом и аморфном состояниях на примере
    кварца, диоксида германия, диселенида германия. Впервые экспериментально – расчетно установлена фундаментальная роль экситонов
    малого радиуса в формировании электронной структуры этих материалов;

    исследованы оптические свойства и электронная структура фуллеренов, фуллеритов, фуллеридов в широкой области энергии.
