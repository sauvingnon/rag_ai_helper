    Положение о подразделении

    О подразделении

    Новости

    Центр исследований и сертификации проводит квалификационные экзамены и сертификацию (ресертификацию) по неразрушающему
    контролю на I и II квалификационные уровни в соответствии с ГОСТ Р ИСО 9712-2023 в производственном секторе «Железнодорожный
    транспорт» в следующих секторах продукции по ГОСТ 34513-2018: - детали и составные части подвижного состава при изготовлении
    (магнитный, вихретоковый, акустический (ультразвуковой) виды; проникающими веществами (капиллярный), визуальный и измерительный
    методы контроля);

    - детали и составные части вагонов при ремонте (магнитный, вихретоковый, акустический (ультразвуковой) виды контроля);

    - детали и составные части локомотивов и моторвагонного подвижного состава при ремонте (магнитный, вихретоковый, акустический
    (ультразвуковой) виды; проникающими веществами (капиллярный), визуальный и измерительный методы контроля);

    - детали и составные части специального железнодорожного подвижного состава при ремонте (магнитный, вихретоковый, акустический
    (ультразвуковой) виды контроля);

    - сварные соединения подвижного состава (магнитный, акустический (ультразвуковой) виды; проникающими веществами (капиллярный),
    визуальный и измерительный методы контроля);

    - рельсы железнодорожные при изготовлении (вихретоковый, акустический (ультразвуковой) виды);

    - железнодорожные рельсы и элементы стрелочных переводов при эксплуатации и ремонте (акустический (ультразвуковой) вид);

    - сварные стыки рельсов и элементов стрелочных переводов (акустический (ультразвуковой) вид);

    в производственном секторе «Машиностроение и металлопроизводство» в следующих секторах продукции по ГОСТ Р ИСО 9712-2023:
    отливки; поковки; сварные швы; трубы и трубопроводы; обработанные изделия за исключением поковок (магнитный, вихретоковый,
    акустический (ультразвуковой) виды; проникающими веществами (капиллярный), визуальный и измерительный методы контроля).

    Консультационная подготовка к квалификационным экзаменам проводится очно (на территории ИжГТУ имени М.Т.Калашникова) или
    дистанционно через сеть интернет. Экзамены проводятся на территории ИжГТУ имени М.Т.Калашникова

