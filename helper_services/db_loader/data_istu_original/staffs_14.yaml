    Учебные планы:

    1.pdf

    ИПР 2022-23 Байметова Е.С..pdf

    Обучалась на кафедре "Профессиональная педагогика" - единственной кафедре в УР, выпускающей преподавателей технических
    дисциплин уверенно сочетающих в себе владение современными педагогическими технологиями с фундаментальной инженерной подготовкой.

    В 2012 году получила диплом бакалавра с отличием по направлению "Технологическое образование".

    С 2012 года обучалась в магистратуре на базовой кафедре "Механика и моделирование" по направлению "Механика и математическое
    моделирование". С 2012 трудоустроена на факультет "Математика и естественные науки", с 2012-2017 г. работала ведущим инженером,
    старшим преподавателем и заместителем декана по ВР со студентами.

    В 2014 году получила диплом магистра с отличием по направлению "Механика и математическое моделирование" и поступила в
    аспирантуру по направлению "Математика и механика".

    Совместно с Алиевым А.В. активно поддерживали сотрудничество с заместителем директора НИВЦ МГУ им. М.В. Ломоносова Воеводиным
    В.В. и добились вступления ИжГТУ им. М.Т.Калашникова в суперкомпьютерный консорциум университетов России. Ежегодно участвовала
    в совещаниях консорциума и отправляла студентов факультета на обучение в "Международной летней суперкомпьютерной академии".
    В 2015 году сама успешно прошла обучение в рамках "Международной летней суперкомпьютерной академии" МГУ им. М.В. Ломоносова.

    Совместно со студентами и Алиевым А.В. работала над созданием музея вычислительной техники МиЕН факультета.

