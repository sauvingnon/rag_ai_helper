    Ученая степень кандидата технических наук присуждена решением диссертационного совета Ижевского государственного технического
    университета от 20.12.2002 г. №7 и выдан диплом КТ № 090837 (решение ВАК Министерства образования и науки Российской Федерации
    от 14.03.2003 г.).

    Стаж педагогической работы в образовательных организациях высшего образования и (или) организациях дополнительного профессионального
    образования, научных организациях Барминой Натальи Александровны составляет 10 лет. Общий стаж работы в ИжГТУ – 20 лет
    (научное подразделение «Институт механики», должность – старший научный сотрудник).

    Бармина Н.А. ведет практические занятия по курсам: «Английский язык» – базовый курс, деловой, профессиональный перевод
    на 1 и 2 курсах бакалавриата и магистратуры очно-заочной и заочной формы обучения, а также участвует в подготовке студентов,
    обучающихся по дополнительной квалификации «Переводчик в сфере профессиональной коммуникации» (дисциплины «Профессиональный
    перевод», «Основы теории английского языка – Теоретическая грамматика, Лексикология», «Практикум письменного перевода»).

    По результатам научной и учебно-методической деятельности Барминой Н.А. опубликовано 27 статей и 8 учебно-методических
    пособий, в том числе 5 публикаций в зарубежных изданиях с индексом цитирования в реферативной базе данных «Скопус».

    Редактор трёх научных сборников статей на английском языке по зубчатым передачам в издательстве Springer:

    1. “Theory and Practice of Gearing and Transmissions: In Honor of Professor Faydor L. Litvin”, Springer International
    Publishing AG

