    Организатор 7 научно-технических конференций и симпозиумов различного уровня «Теория и практика зубчатых передач», проводимых
    НП «Институт механики» в ИжГТУ с 1998 года.

    Занимается письменным техническим переводом на английский язык научно-технических статей и монографий магистрантов, аспирантов,
    преподавателей и научных сотрудников ИжГТУ для публикаций и участия в международных конференциях.

    2 ноября 2013 года на заседании Исполнительного Совета Международной Федерации по ТММ (IFToMM) Бармина Н.А. была официально
    выбрана членом PC PCA - Постоянной Комиссии по Публикациям, Коммуникациям и Архивингу МФТММ, область деятельности – руководитель
    административной группы по сопровождению, обновлению и модернизации официального сайта IFToMM

    www.iftomm.net

    на английском языке.

