  text: 'Волохин Аркадий Викторович

    канд. пед. наук

    8 (3412) 20-44-82

    корпус 2

    , каб. 2-415

    neo-nik@bk.ru

    Информация

    Аркадий Викторович Волохин

    ,

    Директор Автономного профессионального образовательного учреждения Удмуртской республики «Топливно-энергетический колледж»

    Аркадий Викторович Волохин окончил Бугурусланский нефтяной техникум. Работал на объектах нефтяной и газовой промышленности
    Оренбуржья и Самары. После службы в армии, проработав начальником смены ЛИТС, поступил на нефтяной факультет Куйбышевского
    политехнического института. Получив профессию инженера-механика (нефтяник), работал старшим механиком нефтепромысла, старшим
    инженером НГДУ «Бугурусланнефть». В 1982-84 г. – заместитель директора Бугурусланского Нефтяного техникума. По приглашению
    руководства ПО «Удмуртнефть» с 1984 г. по настоящее время работает директором АПОУ УР «Топливноэнергетический колледж».
    С 2006г. руководит и Ресурсным центром подготовки кадров для нефтяной и газовой промышленности УР. В 2015 году окончил
    Удмуртский Государственный Университет по специальности «Менеджмент в системе образования». Кандидат педагогических наук,
    Член-корреспондент Академии Профессионального образования.

    Имеет почетные звания: «Ветеран труда», «Отличник профессионально- технического образования РФ», «Заслуженный работник
    народного образования УР», «Почетный нефтяник» ОАО «Удмуртнефть», «Почетный нефтяник» топливно-энергетического комплекса
    России. Награжден медалью ордена «За заслуги перед Отечеством» II степени, а в соответствии с Указом Президента РФ от
    12.04.2010 г. № 453 за достигнутые трудовые успехи и многолетнюю добросовестную работу, Аркадий Викторович награжден еще
    и медалью ордена «За заслуги перед Отечеством» I степени и орденом «Признание».

    В 2007 году он награжден медалью «Золотой жезл» и «Петровским Зерцалом» абсолютного победителя Всероссийского конкурса
    «Лидер Образования-2007», а также почетной грамотой госсовета УР. Имеет благодарность полномочного представителя Президента
    РФ в Приволжском Федеральном округе.

    В феврале 2010 года руководимое А.В. Волохиным учреждение признано Лауреатом конкурса «100 лучших образовательных учреждений
    НПО России» с вручением диплома и памятного знака, а Аркадий Викторович отмечен почетным знаком «Директором года 2010».

    В 2011 году признан Лучшим директором системы НПО Удмуртской Республики. Руководством Удмуртской Республики Аркадий Викторович
    Волохин неоднократно отмечался в специальных ежегодных изданиях Удмуртии «Люди года» и «Признание Республики» (2007,2009,2011
    годы).

    В 2012 году в ТПП РФ награжден дипломом Международного форума «Интеллектуальная собственность-XXI век».

    В 2013 г. объявлена Благодарность Великой Княгиней Марией Владимировной, Главой Российского Императорского Дома за примерное
    служение отечеству и высокополезный труд, способствующий укреплению, развитию и благополучию Государства Российского.

    Имеет свыше 25 отраслевых почетных грамот и благодарностей, является автором ряда авторских свидетельств СССР и патентов
    РФ.

    Аркадий Викторович является экспертом Торгово-промышленной палаты РФ в области профессионального образования.

    Имеет около 50 научных публикаций, является автором свыше 15 учебных и учебно методических пособий.

    Биография А.В. Волохина опубликована в энциклопедии «Who is Who в России»

