    Родилась в 1985 году в г. Ижевске. В 2006 году с отличием окончила бакалавриат по специальности «Авиа- и ракетостроение»
    (программа «Теория и математические метода системного анализа и управления в экономических, социальных и технических системах»)
    ИжГТУ, в 2008 году с отличием окончила магистратуру по специальности «Авиа- и ракетостроение» (программа «Теория и математические
    метода системного анализа и управления в экономических, социальных и технических системах») ИжГТУ имени М.Т. Калашникова.
    В 2012 году защитила кандидатскую диссертацию по специальности 01.02.05 "Механика жидкости, газа и плазмы". В 2018 году
    приказом ВАК РФ присуждено ученое звание доцента по сециальности 01.02.05 "Механика жидкости, газа и плазмы".

    2004 - 2009 г.г. - предедатель Профкома Студентов ИжГТУ, зам.председателя Профсоюзной организации преподавателей, сотрудников
    и студентов ИжГТУ; 2008 - 2011 г.г - председатель Молодежного совета федерации Профсоюзов УР; 2009 - 2012 г.г. - инженер
    2й категории конструкторского бюро численного моделирования ОАО "Ижевский радиозавод"; 2012 - 2017 г.г. - научный сотрудник
    (старший научный сотрдуник) Института механики Уральского отделения РАН, с 2013 года - доцент кафедры "Механика и моделирование"
    ИжГТУ им. М.Т. Калашникова.

    Активно занимается научно-исследовательской деятельностью. Область научных интересов связана с чилсенным моделированием
    процессов газо- и гидродинамики и теплообмена, в том числе внутрикамерных процессов в РДТТ. В 2016 - 2017 годах являлась
    руководителем гранта РФФИ "Исследование влияния собственных колебаний упругих тел на процесс ультразвукового распыления
    тонких слоев жидкости".

    Преподает дисциплины: "Механика жидкости и газа"; "Механика сплошных сред". Имеет более 40 публикаций.

