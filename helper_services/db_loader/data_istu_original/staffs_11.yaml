    4 курса

    в системе электронного обучения ИжГТУ имени М.Т. Калашникова https://ee.istu.ru. В педагогической деятельности Дайаной
    Дамировной активно используются

    мультимедийные средства

    при проведении лекционных занятий («Математический анализ», «Высшая математика», «Методы оптимизации», «Эконометрика»)
    и средства

    информационных технологий

