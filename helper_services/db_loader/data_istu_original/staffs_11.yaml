  text: 'Королева Мария Равилевна

    кандидат физико-математических наук, доцент

    Кафедра «Тепловые двигатели и установки»

    - доцент

    koroleva@udman.ru

    Информация

    Публикации

    Квалификация

    Должности:

    Кафедра «Тепловые двигатели и установки»

    - доцент

    Королева Мария Равилевна окончила с отличием Ижевский Государственный Технический Университет (ИжГТУ) в 2001 году по специальности
    «Прикладная математика». В этом же году поступила в очную аспирантуру Института прикладной механики УрО РАН, которую окончила
    в 2004 году. Под руководством д.ф.-м.н., профессора Кисарова Ю.Ф. занималась исследованием турбулентных течений вязкого
    сжимаемого газа на основе методов прямого численного моделирования. Основные результаты исследований опубликованы в печати.

    В 2005 году защитила кандидатскую диссертацию на тему «Прямое численное моделирование турбулентных течений в несимметричном
    диффузоре». Ученая степень кандидата физико-математических наук утверждена в 2006 году.

    С 2012 года работает на кафедре «Механика и моделирование» ИжГТУ имени М.Т. Калашникова в должности доцента. Королева
    М.Р. в соавторстве разработала электронные курсы «Механика жидкости и газа», «Гидравлика», «Современные проблемы механики»,
    которые активно используются в обучении  студентов очного и заочного отделений.

    В 2014 году повышала квалификацию по программе «Методики электронного обучения» в ИжГТУ имени М.Т. Калашникова.

    C 2018 по 2020 год Королева М.Р. исполняла обязанности заведующего кафедрой "Механика и моделирование".

    С 2020 года является доцентом кафедры "Тепловые двигатели и установки".

