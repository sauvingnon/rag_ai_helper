  text: 'Кафедра «Физическая культура и спортивные технологии»

    Анисимова Александра Юрьевна

    кандидат педагогических наук, доцент

    И.о. заведующего кафедрой, доцент

    корпус 4

    ,

    a.mihailovaalex@yandex.ru

    Контакты подразделения

    8(3412) 77-60-55 доб. 4330, 8(3412)77-44-76

