    Положение о подразделении

    О подразделении

    История

    Для поступающих

    Для обучающихся

    Наука

    Структура

    Новости

    Сотрудники

    Кафедра «Стрелковое оружие»

    ведет подготовку конструкторов-оружейников в рамках специальности высшего образования
    «Стрелково-пушечное, артиллерийское и ракетное оружие» по специализации «Стрелково-пушечное
    вооружение» и специальности среднего профессионального образования 15.02.04 «Специальные
    машины и устройства». За 70 лет работы кафедра подготовила порядка

    3000

    специалистов, а имена многих её выпускников, разработчиков первоклассного оружия,
    широко известны в нашей стране и за рубежом:

    Г.Н. Никонова, В.А. Ярыгина, А.И. Нестерова, Б.М. Зорина, И.Е. Дерюшева, В.М.
    Калашникова, В.Д. Стронского, М.Е. Драгунова, А.Ю. Чукавина

    и других.

    В настоящее время ФГБОУ ВО «ИжГТУ имени М.Т. Калашникова» является единственным
    ВУЗом в стране, которому в рамках действующего оружейного законодательства удалось
    сохранить и преумножить материально-техническую базу, необходимую для  осуществления
    качественной подготовки инженеров-оружейников.

    При кафедре функционирует Лаборатория Стрелково-пушечного вооружения (СПВ), включающая
    в себя сектор обеспечения хранения образцов стрелково-пушечного вооружения и сектор
    испытаний.

    В Лаборатории СПВ собрана уникальная коллекция образцов стрелково-пушечного вооружения
    различных годов выпуска: от дульнозарядных ружей до современных образцов отечественного
    и зарубежного производства. В ходе обучения студенты в рамках дисциплин осуществляют
    непосредственную работу с образцами стрелково-пушечного вооружения.

    Сектор испытаний Лаборатории СПВ включает в себя тир, оснащенный современным оборудованием
    зарубежного и отечественного производства, учебную слесарную мастерскую, оснащенную
    оборудованием для проведения ремонта и восстановления стрелкового оружия, а также
    для изготовления испытательных стендов различного назначения.

    Кроме того на кафедре «Стрелковое оружие» с 2022 года функционирует участок 3D
    моделирования и прототипирования, включающий в себя мощные компьютеры с современным
    программным обеспечением, 3D сканер, позволяющий создать трехмерную модель деталей
    любой сложности, и современный 3D принтер с точностью печати до 0,04 мм.

    Вся инфраструктура кафедры доступна студентам в ходе обучения.

    Краткая история становления и развития кафедры «Стрелковое оружие»

    (материал подготовлен к 70-летию со дня создания кафедры)

    Период с 1954 по 1968 гг.

    Кафедра основана в 1954 г., как кафедра

    специальных дисциплин

    , а первым её заведующим стал

    Аркадий Андрианович Юркин

    , работавший в Ижевском механическом институте со дня его основания. На тот момент
    Аркадий Андрианович уже имел ученую степень кандидата технических наук (с 1945
    г.), большой опыт преподавательской и производственной работы в конструкторском
    бюро Ижевского машиностроительного завода.

    Учебный год в 1954 году Юркин А.А. начал со своим молодым коллегой

    Владимиром Ивановичем Кулагиным

    , выпускником 1954 г. МВТУ им. Баумана. Помогал им

    Гринберг Владимир Наумович

    – выпускник МВТУ им. Баумана 1952 г., который в то время работал в отделе главного
    конструктора Ижевского машиностроительного завода.

    А.А. Юркин                           В.И. Кулагин                   В.Н. Гринберг

    Весной 1955 года в Ижевский механический институт прибыл

    Михайлов Лев Евгеньевич

    – выпускник МВТУ им. Баумана, возглавивший только что организованную учебную лабораторию
    кафедры. Ближе к осени 1955 года по распоряжению министерства на кафедру приехали

    Земцов Виктор Митрофанович

    , полковник – выпускник Артиллерийской Академии им. Дзержинского и

    Карпунин Василий Александрович

    , к.т.н. – выпускник Академии оборонной промышленности.

    Л.Е. Михайлов

    В 1956 году кафедра разделилась на две: стрелковую кафедру «Проектирование механизмов»
    во главе с Юркиным А.А. и артиллерийскую кафедру «Проектирование машин», заведующим
    которой стал В.М. Земцов.

    В 1957 году состоялся первый выпуск Машиностроительного факультета. Дипломы инженеров
    получили, в частности,

    Виктор Петрович Ионов

    , ныне Герой социалистического труда, и

    Алексей Афанасьевич Коновалов

    – первый доктор наук среди выпускников ИМИ, впоследствии заведующий кафедрой «Проектирование
    автоматических машин» (название стрелковой кафедры с 1980-го до 2000-го г.)

    В.П. Ионов                       А.А. Коновалов

    В 1959 году стрелковая («Проектирование механизмов») и артиллерийская («Проектирование
    машин») кафедры вновь объединились. После объединения кафедру «Проектирование
    машин и механизмов» возглавил В.М. Земцов, а с 1961 г. заведующим кафедры вновь
    назначается А.А. Юркин.

    До 1964 года на кафедре функционировали три учебные лаборатории: по стрелковому,
    артиллерийскому и ракетному оружию. По мере развития техники совмещать в рамках
    одной кафедры три направления стало затруднительно,поэтому вполне логичным стало
    создание в 1964 году «ракетной» кафедры «Аппаратостроение», которую в 1967 г.
    возглавил

    Гринберг Владимир Наумович

    , имеющий к этому времени богатый опыт создания образцов ракетной техники. В том
    же году на базе артиллерийской лаборатории создается артиллерийская кафедра «Динамика
    машин», заведующим которой назначается

    В.А. Карпунин

    . Таким образом, ракетная и артиллерийская кафедры образовались на базе кафедры,
    возглавляемой А.А. Юркиным.

    Период с 1968 по 1991 гг.

    В 1968 г. по инициативе

    В.И. Кулагина

    при кафедре создается отраслевая научно-исследовательская Лаборатория автоматических
    машин (ЛАМ). Лаборатория при кафедре просуществовала более 20 лет и внесла значительный
    вклад в её развитие.

    В 1968 году заведующим кафедрой назначается

    Виктор Григорьевич Кучеров

    , выпускник МВТУ имени Баумана 1954 г., защитивший в 1968 г. под руководством
    А.А. Юркина диссертацию на соискание ученой степени кандидата технических наук.
    В 1970 г. В.Г. Кучерову по семейным обстоятельствам пришлось переехать в г. Волгоград.
    В период с 1979 по 1995 гг. В.Г. Кучеров возглавлял артиллерийскую кафедру Волгоградского
    государственного технического университета.

    В.Г.Кучеров

    В 1970 году кафедру возглавил

    Алексей Афанасьевич Коновалов

    , защитивший в 1969 году докторскую диссертацию под руководством

    В.А. Карпунина

    , ректора Ижевского механического института.

    А.А. Коновалов был человеком талантливым, творческим, мыслил широко, внедрял системную
    методологию в работу кафедры, лаборатории и подготовил десятки кандидатов и докторов
    наук. Алексей Афанасьевич руководил кафедрой 28 лет и определил перспективы её
    развития на долгие годы.

    В начале 70-х годов был построен уникальный подземный стрелковый тир, успешно
    функционирующий до настоящего времени. Это событие способствовало проведению научных
    работ и эффективной работе отраслевой научно-исследовательской Лаборатории автоматических
    машин.

    В 1980 г. кафедра получила название «Проектирование автоматических машин».

    В 1989 г. артиллерийская кафедра вновь вошла в состав кафедры «Проектирование
    автоматических машин». Все преподаватели и сотрудники кафедры были переведены
    с «Динамики машин» на кафедру ПАМ.

    Период с 1991 по 2020 гг.

    В 90-е годы XX века вся наша страна переживала сложные времена. В это время фактически
    прекращает свою работу Лаборатория автоматических машин. На кафедре, возглавляемой
    А.А. Коноваловым, делается попытка перестройки системы научно-исследовательских
    работ, перевод её в коммерческое русло. В это время сотрудниками кафедры с привлечением
    студентов начинается разработка охотничьего карабина Бекас (рис. 6). Образец выполнен
    под патрон для гладкоствольного оружия 32 калибра.Для организации производства
    карабина «Бекас»Ижевский механический институт стал одной из первых организаций
    в стране, получивших лицензию на производство гражданского и служебного стрелкового
    оружия.

    Охотничий карабин Бекас

    К сожалению, по ряду причин указанные проекты не получили развития, а предпринятая
    А.А. Коноваловым попытка перестройки научно-исследовательской деятельности кафедры
    не увенчалась успехом. К концу 90-х годов на кафедре практически прекращаются
    хоздоговорные научно-исследовательские работы, многие талантливые ученые в этот
    период были вынуждены покинуть родную кафедру, а материально-техническая база
    кафедры по многим позициям устарела, что привело к практическому прекращению работ
    в тире кафедры.

    В это непростое время кафедру возглавил д.т.н., профессор

    С.А.Писарев

    , работающий в то время в аппарате Правительства Удмуртской Республики.

    Писарев Сергей Анатольевич (начало 2000-х годов)

    Возглавив кафедру в 1998 г. С.А. Писарев предложил программу развития кафедры
    сроком на пять лет, обозначив главные задачи:

    укрепление и развитие связей с заводами, оборонными кафедрами, научными организациями;
    создание Попечительского совета кафедры;

    разработка концептуальных документов, направленных на совершенствование системы
    подготовки конструкторов-оружейников УР;

    повышение качества учебно-методического сопровождения учебного процесса;

    развитие материально-технической базы: оснащение кафедры современными образцами
    оружия; измерительной и компьютерной техникой;

    проведение научных исследований, подготовка кандидатов и докторов наук; издание
    учебников, монографий; написание статей и оформление патентов;

    совершенствование дипломного проектирования;

    изменение названия кафедры для облегчения набора на специальность;

    обеспечение доступа к специализированной информации и ряд других задач.

    Большая часть обозначенных задач была выполнена. В этот промежуток времени кафедра
    получает название «Стрелковое оружие» (2000 г.). В 1999 г. создается институт
    стрелкового оружия, которому распоряжением правительства Удмуртской Республики
    присваивается имя М.Т. Калашникова. Благодаря поддержке Правительства УР и руководства
    оружейных предприятий г. Ижевска проведен ремонт аудиторий кафедры, получены современные
    на тот момент компьютеры и новые образцы стрелкового оружия.

    В 2006 году Правительством УР была утверждена Концепция развития системы подготовки
    конструкторов-оружейников в УР, которая разрабатывалась под руководством первого
    заместителя Председателя Правительства УР Виктора Алексеевича Савельева. На базе
    Концепции была разработана Программа сотрудничества кафедры с оружейными предприятиями
    г. Ижевска с конкретным перечнем мероприятий. Благодаря этой Программе были начаты
    ремонтные работы в тире. Три года было потрачено только на работы, связанные с
    восстановлением гидроизоляции. Из-за кризиса 2009 года ремонтные работы в тире
    были приостановлены. Реконструкция тира была завершена только к 2015 году.

    В 2014 году Ижевским государственным техническим университетом, носившим уже имя
    М.Т. Калашникова, была получена лицензия на разработку и производство гражданского
    и служебного стрелкового оружия. В 2015 году в рамках программы стратегического
    развития университета в тире кафедры был завершен монтаж баллистического комплекса
    фирмы Prototypa (Чехия). В состав баллистического комплекса вошло оборудование
    для исследований процессов внутренней и внешней баллистики, высокоскоростная видеокамера
    с максимальной скоростью съемки до 150000 кадров в секунду (рис. 8). С этого времени
    в тире кафедры были возобновлены все виды работ с использованием гражданского
    и служебного оружия.

    В 2017 г. ИжГТУ имени М.Т. Калашникова получил лицензию Минпромторга РФ на испытания
    боевого стрелкового оружия, что позволило в полной мере легализовать в рамках
    действующего законодательство использование в учебном процессе образцов боевого
    стрелкового оружия.

    После реконструкции тира и получения лицензий в учебный процесс кафедры были внедрены
    16 лабораторных работ, связанных со стрельбой из различных образцов стрелкового
    оружия.

    Оборудование тира кафедры «Стрелковое оружие», полученное в 2015 году

    В рассматриваемый период кафедра награждена двумя Почетными грамотами Государственного
    Совета Удмуртской Республики (2004 и 2009 гг.) и Почетной грамотой Удмуртской
    Республики (2014 г.).

    Период с 2020 года по настоящее время

    В 2020 г. после продолжительной болезни из жизни уходит

    Сергей Анатольевич Писарев

    , руководивший кафедрой 22 года. При С.А. Писареве кафедра сумела преодолеть кризис
    90-х годов XX века и выйти на траекторию стабильного развития.

    Писарев Сергей Анатольевич, д.т.н.. к.э.н., профессор, заведующий кафедрой «Стрелковое
    оружие» с 1998 по 2020 гг. (фото 2015 г.)

    С 2020 года и.о. заведующего кафедрой «Стрелковое оружие» назначается

    Чирков Денис Викторович

    , работавший на кафедре в должности заведующего лабораторией с 2013 года. К этому
    моменту Чирков Д.В. защитил диссертацию на соискание ученой степени доктора технических
    наук.

    Вручение диплома доктора технических наук Д.В. Чиркову: слева - академик А.М.
    Липанов, справа – и.о. ректора А.В. Губерт (2021 г.)

    В 2020 г. по инициативе ректора В.П. Грахова ИжГТУ имени М.Т. Калашникова возобновляет
    связи с предприятием ООО «Молот-Оружие» (ранее Вятско-Полянский машиностроительный
    завод «Молот»). В результате этого взаимодействия в 2021 г. на кафедре внедряется
    новая форма сотрудничества с предприятиями посредством создания при кафедре студенческих
    конструкторских бюро (СКБ). В 2021 г. создается сразу два СКБ (ООО «Молот-Оружие»
    и ООО «Арма»). В настоящее время на кафедре функционирует СКБ предприятия ООО
    «Молот-Оружие», а с 2025 г. планируется открытие СКБ АО «Концерна «Калашников»».

    Работа студенческих конструкторских бюро,2023 г.

    Также в 2020 году разработана новая для университета образовательная программа
    среднего профессионального образования по специальности «Специальные машины и
    устройства». Первый набор студентов по внебюджетной форме на указанную специальность
    был осуществлен в 2022 году. Для студентов, окончивших указанную образовательную
    программу, предусмотрена возможность поступления на 2-ой курс специальности высшего
    образования 17.05.02 «Стрелково-пушечное, артиллерийское и ракетное оружие». Открытие
    нового направления подготовки позволило кафедре увеличить количество преподавателей,
    привлекая к учебному процессу молодых специалистов.

    С 2021 года кафедра усилило направление работ, связанное с профориентацией школьников.
    Так, в 2022 году, кроме профориентационных мероприятий, проводимых ВУЗом, кафедра
    впервые провела масштабные занятия по истории развития стрелкового оружия для
    школьников г. Ижевска. Ежегодно кафедру посещает порядка 500 школьников г. Ижевска
    и районов УР.

    Профориентационные занятия на кафедре

    Кафедра систематически продолжает активную научно-исследовательскую деятельность.
    Продолжаются работы по разработке модульной системы индивидуального стрелкового
    оружия. В 2023 г. найденные новые технические решения в этом направлении были
    защищены в диссертации на соискание ученой степени кандидата технических наук
    заведующей лабораторией кафедры Федоровой Е.А.

    Вручение диплома кандидата технических наук Федоровой Е.А. (апрель 2024 г.)

    С 2024 года на кафедре восстановлена профильная аспирантура, направленная на обеспечение
    кадрового резерва кафедры.

