    На кафедре существует

    научная школа

    , созданная д.т.н., профессором Веркиенко Ю.В.,

    «Информационно-измерительные системы на основе наукоемких технологий с использованием
    физических измерений, идентификации моделей систем косвенных измерений и распознавание
    зрительных и речевых образов»

    . В рамках школы успешно развиваются пять научных направлений, тесно связанных
    между собой общностью теоретических математических методов, схемотехнической базы
    и программно-аппаратного обеспечения.

    I. Информационно-измерительные системы в науке и промышленности  (профессор В.С.
    Казаков)

    Начало направлению дала в 1968 г. тема «ОСОКА-М» с Н. Тагилом, в основу которой
    легло авторское свидетельство на изобретение определения координат попадания пули
    или снаряда по методу блокирующих плоскостей, предложенное В.С. Казаковым и Г.М.
    Ревяко. В дальнейшем, благодаря научным исследованиям и новым результатам в теории
    измерений, получено 32 авторских свидетельства СССР и 11 патентов РФ. На основании
    предложенных научных идей и технических решений были разработаны многочисленные
    испытательные станции, в том числе:

    механизированная испытательная станция для приведения к нормальному бою и проверки
    качества автомата Калашникова;

    система «Координата-1» для испытания стрелкового оружия;

    система «Осока-М» для испытаний пушек на кучность боя по щитам;

    система «ЭОЛ» для испытаний автоматических авиационных пушек;

    образцовая баллистическая трасса БТО-1 для автоматического стрелкового оружия;

    система охраны «Дозор»;

    оптико-электронный тренажер для тренировки и обучения навыкам стрельбы из стрелкового
    оружия;

    оптико-электронные мишени для испытания стрелкового оружия;

    системы управления конвейерами мотопроизводств;

    система «Дробь» для оценки кучности стрельбы дробового оружия.

    В 1989 г. коллективу разработчиков в составе Ю.В. Веркиенко, В.С. Казакова, А.Д.
    Савиных, К.Ю. Петухова была присвоена премия имени С.И. Мосина. В рамках этих
    работ было подготовлено 17 кандидатских и 1 докторская диссертации.

    Ведутся работы по созданию систем: пономерного учета изделий (оружия) в процессе
    производства; учета расхода патронов при испытаниях; определения углового положения
    пули или снаряда на траектории у преграды и др.

    Вот далеко не полный перечень решенных технических и практических вопросов:

    Создание теории обоснования требуемой точности измерений при испытаниях оружия
    на кучность и меткость стрельбы;

    Создание методологии перехода к оптимальным оценкам и их нахождения;

    Разработка алгоритмов и методов идентификации мишеней по методу светового клина,
    акустических мишеней (идентификация дробно-рациональных моделей, идентификация
    с дополнительными условиями, идентификация связанных объектов);

    Создание и реализация теории оптимального измерителя времени прихода одиночного
    видеоимпульса;

    Оптимизация параметров моделей оптико-электронных мишеней и построение оптимальных
    планов для идентификации;

    Разработка имитатора оружия, моделирующего отдачу при выстреле;

    Разработка оптимальных алгоритмов и программ для создания реалистичной цветопередачи
    изображений местности и движущихся целей на видеопроекторах тренажеров;

    Разработка системы имитации акустического воздействия на стрелка;

    Создание методов и устройств идентификации личности: для предотвращения несанкционированного
    доступа в охранные системы; системы учета; методов нанесения штрих-кодов на оружие
    и патроны; для идентификации оружия и патронов (в криминалистической практике
    и пр.);

    В 1991 г. был создан вузовско-академический отдел по методам испытаний тепловых
    машин совместно с Институтом прикладной механики Уральского отделения РАН. При
    научном руководстве и непосредственном участии Юрия Всеволодовича разработан и
    принят на вооружение в Российской Армии оптико-электронный тренажер для коллективного
    боя. По результатам работ издана монография «Оптико-электронные стрелковые тренажеры.
    Теория и практика». В перспективе издание трех монографий по мишеням, обоснованию
    требуемой точности и обработке результатов измерений. В плане разработчиков создание
    баллистической трассы на Ижмаше, построение новых мишеней для дробового выстрела,
    переход на новую элементную базу и применение новых оптимальных методик испытаний.

    Эти комплексные проблемы потребовали привлечения различных областей знаний (пневматики,
    электроники, программирования, машинной графики, вычислительной техники, теории
    вероятностей и математической статистики, теории планирования эксперимента, теории
    связи, теории информационно-измерительных систем и др.) и свидетельствуют о связях
    с другими научными направлениями кафедры.

    II. Информатизация научной, учебной и производственной деятельности (профессор
    С.В. Моченов)

    Научная деятельность в рамках направления на кафедре началась еще под руководством
    профессора Г.А.Тихонова. Тематика касалась вопросов построения самонастраивающихся
    и самоорганизующихся систем. Период 60-70-х годов был периодом расцвета теории
    распознавания образов. Тема кандидатской диссертации Станислава Васильевича Моченова
    была связана с разработкой и машинным моделированием алгоритмов, анализа изображений
    микроструктур металлов и сплавов. Теперь это направление связывают с областью
    нанотехнологий. Научные результаты успешно использовались при проведении хоздоговорных
    работ, в частности, при автоматическом анализе текстурных изображений, получаемых
    из космоса, анализе текстурных изображений минных полей и др.

    В период с середины 90-х годов работы в университете по информатизации вуза проводились
    под руководством С.В. Моченова в ранге начальника департамента образования и далее
    проректора по информатизации. В этот период создается развитая телекоммуникационная
    система, формируется корпоративная сеть ИжГТУ, создается сайт университета. Осуществляется
    подключение кафедр и подразделений к сети Интернет, внедряются новые информационные
    технологии в образовательный процесс. В настоящее время корпоративная сеть ИжГТУ
    это почти семь километров оптики, около тридцати километров проводных линий связи,
    Wi-Fi, 67 компьютерных классов, множество локальных сетей подразделений, более
    2 тысяч компьютеров. В образовательном и научном процессе используется более 400
    наименований программных продуктов различных мировых производителей. Нормой стало
    проведение семинаров и видеоконференций через Интернет, в том числе, с зарубежными
    странами. С 2005 года в университете работает система электронного документообеспечения
    управления.

    Направления работы с аспирантами связаны с развитием информационных процессов
    в вузе. Это – защита информации, автоматизированное создание информационных ресурсов
    по направлениям подготовки (электронные учебники, конструктивные электронные издания,
    фонд электронных изданий, автоматизированная система «ИТ-ресурсы»), анализ и синтез
    текстовой информации (система анализа текста «Текстан»), обработка визуальной
    информации. Под руководством профессора Моченова С.В. защищено 4 кандидатских
    диссертации, готовится к защите еще одна диссертация по визуальному отображению
    информации. В аспирантуре учится 2 аспиранта. Работы связаны с развитием информационной
    системы вуза.

    В рамках направления выполнялись работы по федеральным целевым программам (ФЦП):
    ФЦП «Электронная Россия», ФЦП «Развитие единой образовательной информационной
    среды». Выполнены тематические научные исследования по темам: «Разработка модельного
    пространства для анализа учебного процесса в информационно-образовательной среде
    и формирование критериев качества его динамичного развития», «Разработка модельного
    представления и формирование критериев качества системы знаний».

    Учебно-научная работа связана с подготовкой бакалавров, специалистов и магистров
    по дисциплине «Микропроцессорные системы». Практикуется индивидуальная реализация
    студентами микропроцессорных систем различного назначения при выполнении курсовых
    проектов, исследовательских дипломных проектов, магистерских диссертаций.

    В настоящее время в университете уделяется большое внимание переходу на свободное
    программное обеспечение. С этой целью создан сайт отдела информатизации, где отражаются
    различные аспекты использования вычислительной техники и программного обеспечения
    в вузе. Работает центр дистанционной поддержки образования. Работает полностью
    компьютеризированный отдел «Патентно-информационных исследований и интеллектуальной
    собственности». В управлении «Институт Информатики ИжГТУ» работают в основном
    выпускники и сотрудники кафедры «Вычислительная техника» ИжГТУ.

    III. Системы распознавания речи (профессор В. Б. Гитлин)

    Работы по распознаванию диктора по голосу начались с создания контрольно-пропускного
    пункта на одном из предприятий г. Ижевска. Работы проводились в лаборатории «Технической
    кибернетики», возглавляемой Н.И. Калядиным, и выполнялась совместно с П.Г. Кузнецовым
    при активном участии студентов приборостроительного факультета: В.А. Пономарева,
    Ю.М. Мерзлякова, В.К. Барсукова, Н. Никифоровой и др. По результатам этих работ
    В.Б. Гитлиным и П.Г. Кузнецовым были защищены диссертации сначала на степень кандидата
    технических наук, затем доктора технических наук. По этому же направлению была
    защищена кандидатская, затем докторская диссертация В.А. Пономаревым.

    Под руководством В.Б. Гитлина успешно защищены кандидатские диссертации А.М. Сметаниным
    и И.О. Архиповым. Аспирант В.Б. Гитлина Д.А. Лузин дважды награжден грамотами
    «За лучшую научную работу молодого ученого» на всероссийских акустических конференциях.
    Полученные П.Г. Кузнецовым и В.Б. Гитлиным научные подходы используются во всех
    современных системах распознавания диктора по голосу, разработанных и разрабатываемых
    в России и за рубежом, в том числе в криминалистике. Предложенные В.Б. Гитлиным
    методы измерения параметров речевого сигнала изложены в статьях, опубликованных
    в центральных российских и зарубежных изданиях, в частности в «Акустическом журнале»
    АН РФ, в журнале «Pattern Recognition» американского общества электроинженеров.

    В настоящее время на кафедре совместно с кафедрой английского языка разработана
    система обучения интонационным особенностям устной речи, которая может быть использована
    для обучения разговору на произвольном языке: английском, китайском, французском,
    татарском, удмуртском. Ведутся совместные работы по отождествлению машиниста электропоезда
    по голосу во время управления им локомотивом.

    В рамках данного направления разработаны системы идентификации диктора по голосу,
    используемые для построения контрольно-пропускных пунктов и в криминалистике.
    В перспективе представляется интересным решить следующие задачи:

    построение систем диагностики заболеваний речевого тракта по голосу;

    разработка систем сжатия полосы речевого сигнала (вокодеров);

    разработка систем идентификации человека и его эмоционального состояния по голосу;

    построение систем синтеза речи по тексту;

    оценка индивидуальности голоса диктора.

    IV. Методы и системы измерения тепловых величин и температурной диагностики  (профессор
    В. А. Куликов)

    Научное направление сформировалось в середине восьмидесятых годов прошлого века
    на базе разработок для ОАО «КАМАЗ» и ВНИИ «МОТОПРОМ» по измерению температуры
    цилиндра работающего двигателя внутреннего сгорания. Разработаны и успешно сданы
    две информационно-измерительные системы на базе ПК ДВК-3 и РС-16.

    С начала девяностых годов в связи с экономическим спадом в промышленности работы
    были перенесены в область медицины и, в частности, судебной медицины. Начались
    разработки первичных преобразователей температуры повышенного разрешения в диапазоне
    от -40 до +120 С для температурной диагностики человека в прижизненном и посмертном
    периодах. Были разработаны также ИИС для измерения теплопроводности и теплоемкости
    биологических тканей.

    Работы проводились совместно с кафедрой судебной медицины Ижевской государственной
    медицинской академии и Бюро судебно-медицинской экспертизы МЗ УР.

    Для судебной медицины при проведении экспертиз живых объектов создан дифференциальный
    портативный термометр поверхностных температур (1994). Прибор может применяться
    при исследовании внутренних кровоизлияний и воспалительных процессов, сопровождающихся
    локальным повышением поверхностной температуры. Термометр снабжен двумя плоскими
    датчиками, которые в процессе измерений прижимаются к исследуемым участкам поверхности.
    Изготовлен опытный экземпляр прибора, испытанный в лабораторных условиях.

    Мrногоканальный дистанционный термометр «ТЕМП-4» (1995) разработан для исследования
    процессов умирания биологических тканей в начальном периоде после констатации
    факта наступления смерти. Для судебной медицины, в частности, представляет интерес
    посмертный метаболизм в органах, влияющий на характер остывания объекта и, следовательно,
    на точность определения давности наступления смерти тепловым методом. Термометр
    имеет четыре параллельных информационных канала. Реализован ввод в компьютер по
    интерфейсу RC232. Программное обеспечение компьютера позволяет вести автоматизированные
    измерения температуры в течение длительного времени. Прибор снабжен набором датчиков.

    Для кардиохирургии создана термометрическая установка «ИГЛА» (1995) с независимым
    энергоснабжением, предназначенная для использования при проведении операций на
    сердце. Искусственная гипотермия, применяющаяся в таких операциях, требует постоянного
    контроля температуры миокарда. Установка «ИГЛА» спроектирована с учетом обеспечения
    повышенной надежности функционирования, имеет блок самоконтроля. Выпущен опытный
    экземпляр установки, успешно использованный при проведении операций на сердце
    в Республиканском кардиологическом клиническом диспансере (г. Ижевск). Внедрение
    прибора позволило отработать режимы гипотермической защиты человека и внесло существенный
    вклад в повышение качества хирургических операций на сердце.

    Вместе с разработкой специализированных средств термометрирования проводились
    работы по тепловому моделированию человека в прижизненном и посмертном периодах.
    Результаты, получаемые в ходе этих исследований, представляют интерес как для
    медицинской науки, так и для практической медицины, поскольку устанавливаются
    новые связи тепловых процессов с другими биологическими процессами, что позволяет
    создавать новые методы диагностики и лечения болезней, основанные на измерениях
    температуры и управлении температурой человека.

    По работам в области медицины подготовлены и защищены одна докторская и несколько
    кандидатских диссертаций, в том числе, по медицинским наукам.

    В последние годы проводятся работы по разработке и моделированию систем для измерения
    теплопроводности грунта. Предложен и апробирован в лабораторных условиях метод,
    основанный на представлении теплового процесса, использованного в измерениях,
    как аналога процесса растекания тока в зоне точечного электрического контакта.
    Одновременно разрабатывается в новой модификации метод анализа тепловых процессов
    на основе электротепловой аналогии, реализуемый на виртуальных (компьютерных)
    электрических моделях.

    В НИР активное участие принимают аспиранты, магистранты и студенты кафедры.

