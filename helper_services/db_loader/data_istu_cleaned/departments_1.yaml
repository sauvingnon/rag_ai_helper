    Приборостроительный факультет организован в 1961 году для подготовки инженерных
    кадров в области радиоэлектроники и электронно-вычислительных машин. В настоящее
    время факультет является одним из крупнейших в университете и обеспечивает подготовку
    кадров в области инфокоммуникационных технологий стационарной и мобильной связи,
