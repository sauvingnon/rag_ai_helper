    Осуществляет организацию и координацию научно-методической работы по программам
    среднего профессионального образования, дополнительного образования и профессионального
    обучения на выпускающих кафедрах Университета и его филиалов.

    Основные задачи центра

    :

    контроль реализации основных профессиональных образовательных программ по специальностям
    подготовки на соответствие ФГОС СПО и другим нормативным документам;

    осуществление мониторинга обеспеченности дисциплин учебных планов учебно-методическими
    комплексами;

    рассмотрение и оценивание состояния методической работы на кафедрах Университета
    (филиалах), реализующих программы среднего профессионального образования;

    оказание методической, консультационной и практической помощи педагогическим работникам,
    специалистам в рамках своей компетенции.

    Организационные документы подразделения

