- type: Подразделение
  name: Кафедра «Архитектура»
  keywords: профессионального, квалифицированных, градостроительных, исследовательская,
    профессиональную, производственная, трудоустройством
  text: 'Кафедра «Архитектура»

    Хузяхметова Олеся Асхатовна

    И.о. зав. кафедрой, доцент

    8 (3412) 77-60-55 доб. 3249

    корпус 3

    , каб. 3-15

    Olesya_khy@mail.ru

    Контакты подразделения

    8(3412) 77-60-55 доб. 3249

    Телефон

    arh@istu.ru

    На кафедре реализуется программа БАКАЛАВРИАТА – направление 07.03.01 «Архитектура»,
    профиль подготовки «Архитектурное проектирование», очная форма обучения, со сроком
    обучения 5 лет.

    В составе кафедры 4 доцента, 2-ое из которых кандидаты наук. Кафедра «Архитектура»
    готовит квалифицированных специалистов, в чью профессиональную деятельность может
    входить выполнение следующих задач: архитектурно-проектная; конструкторская; организационно-управленческая;
    производственно-технологическая; научно-исследовательская.

    Преподаватели и студенты кафедры «Архитектура» принимают участие в градостроительных
    Советах и имеют возможность прикоснуться к насущным проблемам городского строительства
    и архитектуры.

    Проблем с трудоустройством выпускники кафедры практически не имеют, потребность
    в проектировщиках и архитекторах по-прежнему высока. Выпускники работают в области
    архитектурно – конструкторского проектирования зданий, дизайнерского и ландшафтного
    проектирования как в регионе, так и за его переделами (Москва, Казань, Санкт-Петербург,
    Екатеринбург, Уфа), в том числе дальнем зарубежье (Англии, Италии, Чехии).

    Кафедра «Архитектура» организована 1 июля 1995 года на базе архитектурной секции
    кафедры «Строительные конструкции и строительная механика». Эта дата и стала днем
    рождения кафедры «Архитектура». Первым заведующим кафедрой был

    Герман Алексеевич Уржумцев

    , до этого возглавлявший институт «Удмуртсельпроект».

    С 1996 по 2005 год кафедру возглавляла

    Лилия Изосимовна Ившина

    , кандидат архитектуры, доцент, Почетный работник высшего профессионального образования
    РФ, заслуженный архитектор УР, член Союза архитекторов России. Именно тогда была
    организована архитектурная школа Удмуртии.

    Первоначально кафедра выпускала инженеров-строителей со специализацией «Архитектура
    и конструирование зданий». В 2000 году кафедра выпустила 19 первых специалистов.
    С появлением в 1997 г. новой специальности «Проектирование зданий» кафедра одна
    из первых в России начала подготовку инженеров-архитекторов. В 2008 г. был сделан
    первый выпуск. С этого же года кафедра стала принимать участие во Всероссийских
    конкурсах по специальности «Проектирование зданий», на которых неизменно входила
    в тройку лучших Российских инженерно-архитектурных школ.

    В настоящее время кафедру возглавляет

    Александр Николаевич Зорин

