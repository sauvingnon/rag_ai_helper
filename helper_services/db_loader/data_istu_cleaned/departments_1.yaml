    «Магнитный и ультразвуковой контроль деталей подвижного состава»

    Цель программы:

    Усовершенствование профессиональных компетенций, знаний и навыков специалистов,
    занятых на проведении неразрушающего контроля деталей и узлов вагонов и моторвагонного
    подвижного состава при изготовлении и ремонте.

    Категории слушателей:

    Дефектоскопист по магнитному и ультразвуковому контролю, Бригадир освобожденный,
    Инженер-дефектоскопист, Мастер участка неразрушающего контроля, Начальник лаборатории
    неразрушающего контроля

    Срок и форма обучения:

    очно-заочная, возможно с применением дистанционных образовательных технологий
    – 72

    По окончании слушатель получает удостоверение о повышении квалификации.

    «Магнитный и ультразвуковой контроль деталей подвижного состава»

    Цель программы:

    Усовершенствование профессиональных компетенций, знаний и навыков специалистов,
    занятых на проведении ультразвукового неразрушающего контроля сварных соединений
    подвижного состава.

    Категории слушателей:

    Дефектоскопист по магнитному и ультразвуковому контролю, Бригадир освобожденный,
    Инженер-дефектоскопист, Мастер участка неразрушающего контроля, Начальник лаборатории
    неразрушающего контроля

    Срок и форма обучения:

    очная, возможно с применением дистанционных образовательных технологий – 72

    По окончании слушатель получает удостоверение о повышении квалификации.

    Программа профессиональной подготовки по рабочей профессии

    «Дефектоскопист по магнитному контролю. Дефектоскопист по ультразвуковому контролю»

    Цель курса:

    Привитие практических навыков по применению методов неразрушающего контроля, обслуживанию
    и использованию дефектоскопов; выполнению неразрушающего контроля объектов машиностроительного,
    нефтегазового и транспортного комплексов; освоение соответствующих профессиональных
    компетенций и присвоение разряда (2-6).

    Задачи курса:

    - Дать представление об основных видах дефектах и физических основах методов неразрушающего
    контроля;

    - Сформировать представление об устройстве и принципах работы магнитных и ультразвуковых
    дефектоскопов;

    - Научить проводить контроль ультразвуковым, акустико-эмиссионным, магнитным методами
    контроля;

    - Научить работе с приборами, выявлять причины возникновения неисправностей при
    работе приборов и способы их устранения.

    Курс ориентирован на учащихся, начинающих дефектоскопистов, желающих повысить
    свои знания и умения в сфере проведения неразрушающего контроля.

    По окончании слушатель получает свидетельство о получении рабочей профессии.'
