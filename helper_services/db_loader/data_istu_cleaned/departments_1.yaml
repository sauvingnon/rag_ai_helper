  name: Научно-образовательный центр «Инфокоммуникационные технологии»
  keywords: ccnaroutingandswitching, cybersecurityessentials, телекоммуникационного,
    среднеобразовательных, инфокоммуникационные, приборостроительного, телекоммуникационные,
    webofscienceиscopus
  text: 'Научно-образовательный центр «Инфокоммуникационные технологии»

    Абилов Альберт Винерович

    кандидат технических наук, доцент

    руководитель

    8 (3412) 77-60-55 доб. 1133

    корпус 1

    , каб. 311

    albert.abilov@istu.ru

    Контакты подразделения

    8 (3412) 77-60-55 доб. 1133

    Телефон

    albert.abilov@istu.ru

    Почта

    корпус 5

    , ауд. 303

    Научно-образовательный центр «Инфокоммуникационные технологии» (НОЦ «ИКТ») является
    структурным подразделением университета, которое образовано 28 июня 2018 года
    путем реорганизации структурного подразделения «Центр инфокоммуникаций», созданного
    2 февраля 2009 года. Центр инфокоммуникаций изначально был создан в связи с началом
    реализации на

    приборостроительном факультете

    проекта по открытию сетевой академии Cisco на базе

    кафедры «Сети связи и телекоммуникационные системы»

    . Руководителем НОЦ «ИКТ» является декан приборостроительного факультета, к.т.н.,
    доцент Абилов Альберт Винерович.

    Сегодня НОЦ «ИКТ» играет важную роль в образовательной и научной деятельности
    университета.Территориально центр размещается на 3-м этаже 5-го учебного корпуса
    университета по адресу г. Ижевск, ул. 30 лет Победы, д.2 (каб. 301–306).В центре
    функционируют следующие лаборатории и кабинеты:

    Учебная лаборатория «Инфокоммуникационные сети» (Сетевая академия Cisco) – каб.
    5-301.

    Учебная лаборатория «Интернет вещей» (Учебный центр D-Link, ИКТ академия Huawei)
    – каб. 5-302.

    Учебная лаборатория «Сети связи» (совместно с ПАО «МТС») – каб. 5-304.

    Научно-образовательная лаборатория «Беспилотные системы» (совместно с ООО «Беспилотные
    системы») – каб. 5-305.

    Кабинет совещаний – каб. 5-303.

    Студенческий проектный офис – каб. 5-300 и 5-306

    Научно-образовательный центр «Инфокоммуникационные технологии» оснащен современным
    учебно-научным оборудованием. Для учебного процесса и проведения научных исследований
    в лабораториях используются:

    Оборудование передачи данных:

    Коммутаторы Cisco Catalyst 2960 (10 шт)

    Маршрутизаторы Cisco 2801 (10 шт)

    Беспроводные маршрутизаторы Linksys WRT-54GL (10 шт)

    Коммутаторы L2 DES-3528 (10 шт)

    Коммутаторы L3 DES-3810-28 (10 шт)

    Межсетевые экраны DFL- 860Е (10 шт)

    Коммутаторы Huawei S2328TP-EI-AC (5 шт)

    Оборудование IP-телефонии

    Телефонная АТС Panasonic (1 шт)

    Телефонные станции IP АТС MyPBX 400 (10 шт)

    IP телефоны Yealink T-20 (10 шт)

    Оборудование Интернета вещей и киберфизических систем

    Комплекты Raspberry Pi3 (10 шт) и Arduino (10 шт) c датчиками и исполнительными
    устройствами

    Роботы-манипуляторы (2 шт)

    Оборудование беспилотных систем

    Конструктор БПЛА Erlecopter, Испания (1 шт)

    Конструкторы БПЛА Клевер 4 Code, Россия (5 шт)

    НОЦ «ИКТ» обеспечивает учебный процесс для студентов кафедры «Сети связи и телекоммуникационные
    системы» очной и заочной форм обучения направления «Инфокоммуникационные технологии
    и системы связи» по дисциплинам в области передачи данных в локальных и корпоративных
    сетях, сетях Интернет проводной и беспроводной связи, Интернета вещей, информационной
    и сетевой безопасности, а также в области программирования на языках C++ и Phyton.
    При этом лабораторный практикум для студентов проходит с применением современного
    телекоммуникационного оборудования компаний Cisco,D-Link, Huawei. Аудиторные теоретические
    занятия (лекции) проходят по учебным программам на основе сертифицированных курсов
    для студентов вузов, разработанных этими компаниями и реализованных на своих онлайн-образовательных
    платформах:

    http://netacad.com

    (Cisco),

    http://learn.dlink.ru

    (D-Link),

    http://e.huawei.com/en/talent

    (Huawei).

    Применение современных образовательных программ и технологий в области ИКТ для
    студентов стало возможным благодаря тесному сотрудничеству приборостроительного
    факультета с этими компаниями.  В настоящее время университет является официальным
    представителем этих компаний в образовательной сфере деятельности. В университете
    были открыты и успешно функционируют:

    Сетевая академия Cisco (с 2009 года),

    Учебный центр D-Link (с 2012 года),

    ИКТ академия Huawei (с 2019 года).

    НОЦ «ИКТ» со дня своего основания активно внедряет и реализует в университете
    программы дополнительного образования в области ИКТ как для специалистов и студентов,
    так и для детей школьного возраста.

    Начиная с 2010 года более 300 специалистов прошли обучение по программам повышения
    квалификации по сертифицированным курсам:

    «Маршрутизация и коммутация в сетях Cisco»

    (CCNARoutingandSwitching – 3 модуля CCNA),

    «Безопасность в сетях Cisco»

    (CCNASecurity),

    «Технологии коммутации современных сетей Ethernet»

    (D-Link),

    «Основы программирования на C++»

    (CPA: Programming Essentials in C++).

    НОЦ «ИКТ» активно участвует в университетской программе

    «Школьный университет»

    , в рамках которой реализует профориентационные программы дополнительного образования
    для детей школьного возраста. В 2019 и 2020 годах свыше 400 учащихся 7-10 классов
    среднеобразовательных школ г. Ижевска прошли обучение по программам летней школы
    (2 недели) и годовым программам (8 месяцев). НОЦ «ИКТ» в рамках программы «Школьный
    университет» реализует следующие образовательные курсы:

    Основы сетевых технологий

    (Networking Essentials)

    Основы кибербезопасности

    (CybersecurityEssentials)

    Введение в Интернет вещей

    (IntroductiontoIoT)

    Основы электроники

    Основы Python

    (PCAP: Programming Essentials in Python)

    НОЦ «ИКТ» постоянно улучшает и расширяет линейку образовательных программ как
    для студентов по основным образовательным программам университета, так и для специалистов
    и учащихся среднеобразовательных школ по дополнительным образовательным программам.
    В феврале 2020 года совместно с компанией «Финко» (ООО «Беспилотные системы»)
    в структуре НОЦ «ИКТ» создана научно-образовательная лаборатория «Беспилотные
    системы».

    НОЦ «ИКТ» ведет активную научную деятельность благодаря коллективу квалифицированных
    научно-педагогических работников под руководством декана приборостроительного
    факультета, к.т.н., доцента Абилова Альберта Винеровича, а также имеющимся в лабораториях
    современным программным и аппаратным средствам. Основная часть коллектива является
    сотрудниками кафедры «Сети связи и телекоммуникационные системы». Научные исследования
    проводятся в области обеспечения качества обслуживания в самоорганизующихся сетях
    мобильной связи, но не ограничиваются этим. Основное внимание уделяются сетям
    беспилотных летательных аппаратов и сетям наземных транспортных средств.

    Научный коллектив центра на протяжении многих лет является исполнителем различных
    научно-исследовательских грантов и НИОКР по заказам предприятий. Результаты исследований
    ежегодно публикуются в отечественных и зарубежных рецензируемых научных изданиях,
    в том числе входящих в международные базы цитирования WebofScienceиScopus. Под
    руководством руководителя центра Абилова А.В. защищены две кандидатские диссертации:

    Емельянов В.Н. Разработка моделей передачи потоковых данных и алгоритмов адаптивного
    управления в одноранговых сетях Интернет, 2013 год

    Васильев Д.С. Разработка алгоритмов передачи потоковых данных наприкладном уровне
    в сетях беспилотных летательных аппаратов

    В прошедшие годы, а также в настоящее время научный коллектив НОЦ «ИКТ» является
    исполнителем различных научно-исследовательских грантов:

    2

    019–2022 годы – Грант РФФИ. Договор 19-29-06076_мк. Методы мультипотоковой передачи
    данных от множества источников в сенсорных летающих сетях. Руководитель: Абилов
    А.В. Объем на 2020 год: 3 000 000 руб.

    2018–2020 годы – Грант программы УМНИК. Договор 14258ГУ/2019. Разработка программы
    для имитационного моделирования передачи данных в сети беспилотных летательных
    аппаратов. Руководитель: Кайсина И.А. Объем: 500000 руб.

    2018–2019 годы – Грант РФФИ. Договор 18-37-00218_мол-а. Метод ретрансляции потоковых
    данных в самоорганизующихся сетях малых беспилотных летательных аппаратов на основе
    сетевого кодирования. Руководитель: Васильев Д.В.. Объем: 1 000 000 руб.

    2016–2018 годы – Грант РФФИ. Договор 16-07-01201_а. Методы доставки потоковых
    данных для сенсорных самоорганизующихся сетей беспилотных летательных аппаратов.
    Руководитель: Абилов А.В. Объем: 1 420 000 руб.
