    Новости

    Шестьдесят лет машиностроительный факультет готовит специалистов для предприятий
    нашей страны. За эти годы выпушено более 9000 инженеров-механиков, среди которых
    есть известные ученые, конструкторы, руководители предприятий. Многие отдали себя
    службе в Вооруженных силах, МВД и других силовых структурах и органах государственной
    власти. Создававшийся изначально, как сугубо «оборонный», факультет в последние
    полтора десятилетия расширил спектр своих специальностей и специализаций с учетом
    потребностей предприятий региона.

    Сегодня машиностроительный факультет представлен 5 кафедрами, на которых трудится
    63 преподавателя из них 20 докторов наук, профессоров, 34 кандидата наук, доцента.
    Четыре выпускающих кафедры готовят инженеров по 3 специальностям и бакалавров
    и магистров по пяти направлениям. На факультете есть аспирантура и докторантура.
    Работают специализированные советы по защите кандидатских и докторских диссертаций.
    Конкурентоспособность наших выпускников проверена временем и определяется Российскими
    традициями подготовки специалистов для предприятий оборонного профиля.

