    Кафедра «Производства машин и механизмов» была переименована в кафедру «Технология
    производства систем вооружения» в 2015 году. Кафедра более 60 лет осуществляет
    технологическую подготовку инженеров оружейников для технологической, производственной
    и конструкторской деятельности. За это время подготовлено более 4000 высококлассных
    инженеров широкого профиля, которые успешно трудятся и не только на машиностроительных
    предприятиях России.

    Набор изучаемых дисциплин формирует объем знаний, необходимых для успешной профессиональной
    деятельности на всех этапах производства и систем вооружения, и гражданской продукции.
    Знания, полученные на кафедре, обеспечивают профессиональный рост. Среди выпускников
    кафедры большое количество руководителей предприятий, главных технологов, ведущих
    специалистов.

    В структуру кафедры входит хозрасчетное научно-производственное подразделение,
    в котором с участием преподавателей и студентов выполняются научно-исследовательские
    работы, реализуемые на промышленных предприятиях России. По разработанным технологиям
    созданы производства, в том числе уникальное предприятие – НПЦ «Пружина», одно
    из первых в России производителей наноструктурированной продукции.

    Кафедра готовит научные кадры в аспирантуре и докторантуре. Подготовлено и защищено
    более 100 кандидатских и 20 докторских диссертаций. Защита диссертаций производится
    в специализированном совете ИжГТУ имени М.Т. Калашникова.

    Кафедра под названием «Производство машин и механизмов» (до переименования в 2015
    г.) была организована по приказам Главного управления политехнических и машиностроительных
    ВУЗов №№ 912 и 913 от 15 октября 1956 г. для подготовки инженерных кадров оборонных
    предприятий страны.

    Первым заведующим кафедрой (приказ № 912) был назначен к.т.н., доцент (в последствии
    – профессор) Владимир Павлович Остроумов, одновременно являвшимся первым директором
    ИМИ. В.П. Остроумов, бывший декан МВТУ имени Баумана до 1952 г., «привел» в Вуз
    и своих коллег, которые стали основой преподавательского состава кафедры – кандидаты
    наук Б.А. Сак-Шак, А.М. Егоров, Г.Д. Небогатиков и принятые в ассистенты Б.В.
    Саушкин (бывший участник ВОВ) и Л.И. Потеранская*).

    * Подробная история становления и развития кафедры ПММ описана коллективом авторов
    в книге «Кафедре «Производство машин и механизмов» – 50 лет»/Ижевск , издательство
    ИжГТУ, 2006-198 c .

    Остроумов

    Владимир Павлович

    Сак-Шак

    Борис Александрович

    Егоров

    Александр Михайлович

    Саушкин

    Борис Владимирович

    Под руководством В.П. Остроумова на кафедре в

    1958 г

    . была открыта аспирантура, были приняты 4 аспиранта. Первым успешно защитившим
    в 1967 году кандидатскую диссертацию стал О.И. Шаврин, выпускник кафедры 1960
    года. Остроумов В.П. проработал заведующим кафедрой до 1967 года, затем уволился
    из Вуза и уехал в Москву, как и ранее другие приезжие.

    После отъезда В.П. Остроумова на относительно недолгий срок заведующим кафедрой
    стал Остроумов Николай Константинович с богатой производственно-организаторской
    практикой (Ижмаш, НИТИ «Прогресс»), но в

    1971 г

    . его не стало.

    Коллектив кафедры «Производство машин и механизмов»,

    1976 г

    В 1972 году заведующим кафедрой ПММ был избран к.т.н, доцент О.И. Шаврин, который
     проработал в этой должности более 46 лет, что, является рекордом в Вузе.

    Кандидатская диссертация  О.И. Шаврина по термомеханическому упрочнению пружинных
    сталей зародила на кафедре новое научное направление по разработке и исследованию
    технологических методов повышения эксплуатационной надежности и долговечности
    деталей машин с выходом на разработку нанотехнологий с использованием термодеформационной
    обработки (ТДО). По данной тематике под руководством Олега Ивановича  было защищено
    более 70 кандидатских и 14 докторских диссертаций. Кстати, за все годы работы
    на кафедре получили хорошую технологическую подготовку более 6500 высококвалифицированных
    специалистов, подготовлено около 80 кандидатов наук, и 15 докторов.

    Из выпускников кафедры многие выросли до руководителей предприятий, главных технологов,
    например, О.М. Копейкин, директор НПО «Союз-1», И.В. Лобастов директор ЗАО «Байкал»,
    генеральные директора «Ижмаша» и «Ижевского механического завода» соответственно
    О.И. Собин и В.С. Чугуевский.

    К своему двадцатилетию кафедра полностью укомплектовалась преподавательскими и
    инженерными кадрами «собственной» подготовки (часть коллектива см. на фото)

    Коллектив кафедры 1976 года

    Учебный процесс был отлажен, на высоком уровне проводились все виды учебного процесса,
    оснащенные учебно-методической литературой и лабораторным оборудованием, но преподавателей
    со степенями докторов не было. Первую докторскую диссертацию на ученом совете
    МВТУ имени А.Э. Баумана в 1978 году защитил О.И. Шаврин. В 70-80 е годы в рамках
    научного направления. Под руководством Олега Ивановича выполнялись крупномасштабные
    научно-исследовательские работы, выполняемые в основном аспирантами кафедры с
    широким выходом на защиту кандидатских, а далее и докторские диссертаций. Этому
    во многом способствовала созданная Олегом Ивановичем впервые в ИМИ научно-исследовательская
    лаборатория двойного подчинения, являвшаяся одновременно структурным подразделением
    ИМИ и ИНИМТ (научно-исследовательского института металлургической технологии)
    Министерства оборонной промышленности СССР.

    Сотрудники кафедры получили уникальную возможность привлекать для своих исследований
    и разработок потенциал крупной научно-исследовательской организации.

    Целенаправленная научно-исследовательская работа в этих лабораториях нашла практическое
    применение, в том числе в виде уникальных технологий в производстве: валков станов
    холодной прокатки ПО «Ижсталь» и ещё 12 заводов – разработки д.т.н. Крекнина Л.Т.
    и к.т.н, Савинова высокопрочной проволоки (ПО «Ижсталь», разработки к.т.н. В.И.
    Щербакова и д.т.н. Л.Н. Маслова; высокопрочных пружин (ООО «Союз ТМО» для ВАЗа
    г. Тольятти и Камаза разработка д.т.н. Л.М. Редькина) и др. уникальные упрочняющие
    технологии.

    В 80 е годы на базе научного коллектива кафедры был создан отдел ОКТБ «Восход»,
    составивший основу этой организации. Был выполнен ряд ответственных  научно-инженерных
    работ с масштабными внедрениями.

    К концу 90-х годов сформировался самый многочисленный коллектив кафедры, включающий
    25 человек, из которых – 12 преподавателей и 13 человек – инженеры, лаборанты 
    и аспиранты (фото).

    Коллектив кафедры «Производство машин и механизмов», 1996 год

    Полноценная работа кафедры, как в учебном процессе, так и в НИР, во многом зависит
    от квалифицированных УВП, и, в свою очередь, от лаборантского состава.

    Первым заведующим лабораторий был Александров А.А., проработавший до 1962 года,
    хороший организатор и универсальный исполнитель. В его подчинении были отличные
    высококвалифицированные исполнители – старший лаборант Викулов П.И. и лаборанты
    Н.В. Бениволенская, проработавшая до конца 60-х годов и Дубровин В.Л, рабочий
    универсал Кислицин Н.П.

    После ухода Александрова А.А., заведующим лабораторией кафедры до нынешних времен
    были (Замены происходили не часто, но регулярно) Федоров А, Костылев В, Кузьмин
    Б. В настоящее время (за последние 15 лет)заведующим лабораторией является опытный
    квалифицированный инженер (бывший начальник одного из цехов Ижмехзавода) Русских
    Андрей Васильевич. Долгое время в его подчинении работал учебный мастер, человек
    «золотые руки» Дмитриев Сергей Афанасьевич.

    Лаборантами в общем понятии (должности были разные) после Н.В. Бениволенской работали
    женщины: Соловьева Анфиса Николаевна и Зуева Альбина Ильинична.

    Относительно длительное время с 1995 года в качестве квалифицированного, специалиста
    (по многим вопросам организационно-технического характера в учебном процессе)
    работает Ольга Алексеевна Стерхова.

    Начальником компьютерного класса кафедры трудиться бывшая выпускница факультета
    инженер с немалым стажем Ирина Ивановна Красильникова.

    В разное время на кафедре работали непродолжительное время и другие исполнители
    УВП, кафедра благодарна им всем

    В 90 е годы, когда решениями Министерства образования было затруднено участие
    вузов в научно-исследовательской работе  по предложению О.И. Шаврина  на базе
    кафедры было создано ТОО НПИЦ «Качество» и с участием кафедры ООО «Союз-ТМО»,
    для практической реализации  результатов НИР в виде новых производств.

    Новые современные формы организации НИР позволили получить значительные результаты.

    Совместно с кафедрой неразрушающего контроля (д.т.н., профессор Буденков Г.А.,
    к.т.н., доцент Недзвецкая О.В.) был создан комплекс упрочняющее – диагностического
    оборудования для упрочнения штанг нефтедобывающих насосов, который был поставлен
    ряду нефтедобывающих компаний России и за рубежом. Авторам этой работы (д.т.н,
    профессору Шаврину О.И., к.т.н., доценту Кокорину Н.А., д.т.н., профессору Буденкову
    Г.А. и доценту Недзвецкой О.В.)в

    2006 г

    . была присуждена Государственная премия УР в области науки и технологии.

    В ООО НПИЦ «Качество» (д.т.н, профессор Шаврин О.И., д.т.н, профессор Редькин
    Л.М.) была разработана и исследована технология высокотемпературной термомеханической
    обработки для производства высокопрочных пружин горячей навивкой.

    По этой технологии в ООО «Союз ТМО» было создано производство пружин подвески
    автомобиля «Ока» с объемом производства 0,5 миллионов пружин.

    На основе этой технологии д.т.н, профессор Шаврин О.И. разработал способ и технологию
    получения в пружине наноструктур, позволившую обеспечить сверхвысокопрочность
    пружин (долговечность пружин увеличивается в десятки раз).

    Эта технология была признана РОСНАНО, было выделено более одного миллиарда рублей
    и создано ООО НПИЦ «Пружина», впервые в мире предприятие реализующее нанотехнологию
    в производстве пружин.

    За работы в области нанотехнологий была присуждена Государственная премия УР в
    области науки и технологий (д.т.н, профессор Шаврин О.И., д.т.н, профессор Дементьев
    В.Б., д.т.н, профессор Маслов Л.Н.).

    Научно исследовательские работы сотрудников кафедры неоднократно награждались
    премией в области науки и техники Правительства УР и «УРОСНИО» имени М.И. Калашникова.

    Премию получали: д.т.н, профессор Шаврин О.И и д.т.н, профессор Дементьев В.Б.
    – трижды , д.т.н, профессор Маслов Л.Н. – дважды, д.т.н, профессор Крекнин Л.Т.,
    д.т.н., профессор Кугультинов С.Д., д.т.н, профессор Лукин Л.Л., к.т.н., доцент
    Стерхов М.Ю.

    Д.т.н, профессора Крекнин Л.Т и Шаврин О.И, за работы в области производства стрелкового
    оружия награжден  премией имени Мосина С.И.

    В период с 2014 по

    2016 г

    .г был выполнен большой объем работы по госбюджетной теме «Разработка и исследование
    процессов (технологий) получения стальных конструкционных материалов и изделий
    из них» (руководитель проекта д.т.н., Шаврин О.И., основные исполнители Маслов
    Л.Н, Лукин Л.Л., Дементьев В.Б., Скворцов А.Н.). Однако проект не был завершен
    (2 последних раздела) по независящим от исполнителя причинам.

    Заведующий кафедрой ТПСВ (ПММ) с 1972

    по 2018 гг.

    Шаврин О.И.

    О.И. Шаврин избран «Почетным гражданином г. Ижевска.

    К 50-летию (

    2006 г

    .) кафедра достигла наилучших результатов как по учебному процессу, так  и по
    научной работе.

    Последние годы в оборонно-промышленном комплексе страны наметился значительный
    рост объемов производства, что позитивно отразилось на состоянии кафедры. выпускники
    стали востребованы  предприятиями ОК, появились на кафедре аспиранты (но значительно
    в меньшем количестве, чем раньше. Ряд выпускников  организовало  собственные предприятия 
    и фирмы, которые оказывают поддержку в оснащении  материально-технической базы
    кафедры. Так НПО «Гидросистемы» оснастили учебно-научную лабораторию «Пневмогидроавтоматика»
    современным оборудованием. Да и на кафедре, благодаря притоку молодых преподавателей,
    кафедра «помолодела» - приступили к работе выпускники кафедры: кандидаты наук
    Иван Сергеевич и Григорий Сергеевич Аленчинковы,  старшие преподаватели Ломаева
    Т.В., Вылегжанин  Д.Г,  Долганов А.М.

    Профессора кафедры 2006 год.

    Слева направо: Маслов Лев Николаевич, Крекнин Леонид Тимофеевич, Шаврин Олег Иванович,
    Лукин Леонид Лукич, Кугультинов Сергей Данилович, Дементьев Вячеслав Борисович

    Основной задачей кафедры всегда остается подготовка квалифицированных специалистов
    – для этого трудится слаженный коллектив класных преподавателей – профессора О.И.
    Шаврин, С.Д. Кугультинов, Л.Л. Лукин, Л.Н. Маслов, В.Б. Дементьев, а так же  доцент
    Скворцов А.Н., доцент Гайфутдинов М.К., старшие преподаватели Ломаева Т.В., Князев
    А.Г., Вылегжанин Д.Г.

    За последние годы (с 2000 года и позже) были изданы учебники и учебные пособия
    авторов – преподавателей  кафедры:

    1) Кугультинов С.Д., д.т.н., профессор (с соавторами из МГТУ  имени Баумана )

    Технология обработки конструкционных материалов: Учебник для вузов-М: Изд-во МГТУ
    имени Н.Э. Баумана, 2006 - 672 с.

    Основы проектирования технологических процессов  в ракетостроении. – М.: Изд-во
    «Рудомина», 2009 - 128 с.

    Методы обработки деталей летательных аппаратов: Учебное пособие. -М.: Изд-во МГТУ
    имени Н.Э. Баумана, 2003 - 272 с.

    2) О.И. Шаврин  Как формировать выводы по диссертации и составлять заключение
    ученого совета: Изд-во ИжГТУ,

    2008 г

    ., 200 стр.

    3) Л.Л. Лукин Дипломное проектирование по технологии специального машиностроения:
    Учебное пособие в 2 ч.- Ижевск: Изд-во ИжГТУ , 2007:

    Часть I. Структура дипломных и основы разработки  технологических процессов  механической
    обработки - 388 с.

    Проектирование средств технологического оснащения и производственных систем механической
    обработки - 152 с.

    Кроме того, профессором Лукиным Л.Л. разработано и внедрено в учебный процесс
    более 10 оригинальных методических указаний и пособий для студентов, обучающихся
    по специальностям 17 05 02, 24 05 01, 24 03 0.5.

    Коллектив кафедры 2015 г

    1 ряд: Вахрушева В.М, Лукин Л.Л., Стерхова О.А., Шаврин О.И., Ломаева Т.В., Маслов
    Л.Н., Дементьев В.Б.

    2 ряд: Долганов А.М., Красильникова И.И., Князев А.Г., Булдакова В.А.

    3 ряд: Жиляев С.В., Кугультинов С.Д., Вылегжанин Д.Г., Скворцов А.Н., Русских
    А.В., Домнин А.К., Гайфутдинов М.К.

    В

    2019 г

    . издана монография О.И. Шаврина «Производство высокопрочных винтовых пружин»
    в которой обобщены результаты НИР  по созданию нанотехнологий и организации нанопроизводства.

    За последние годы (2015…2019 гг) на кафедре произошли существенные перемены –
    60 летняя эпоха кафедры «Производство машин и механизмов» завершилась в связи
    с изменением (приказ № 1574 от 22.10.2015) названия на «Технология производства
    систем вооружения), что связано с детализацией направления подготовки специалистов
    в рамках предприятий ОПК.

    После ухода по состоянию здоровья с должности заведующего кафедрой О.И. Шаврина 
    и.о. зав. кафедрой ТПСВ был назначен к.т.н., доцент кафедры и заместитель декана
    факультета

    Сергей Васильевич Жиляев

    . С.В. Жиляев опытный преподаватель и грамотный специалист после окончания вуза
    с 1989 года, был прекрасным человеком во всех отношениях. Но беда на кафедру ворвалась
    неожиданно. 18.11.2018г. скоропостижно ушел из жизни Сергей Васильевич, не успев
    в полном объеме организовать учебную и научную работу кафедры.

    После смерти С.В. Жиляева по рекомендации О.И. Шаврина и одобрения членов кафедры
    Приказом №4523К от 14.12.2018 по ИжГТУ заведующим кафедрой был избран

    Вячеслав Борисович Дементьев

    , д.т.н., профессор, руководитель института механики УНЦ РАН, являющийся профессором
    кафедры.

    Образовательные программы

    17.05.02 «Стрелково-пушечное, артиллерийское и ракетное оружие» «Технология производства
    оружия»

    (Специалитет)

