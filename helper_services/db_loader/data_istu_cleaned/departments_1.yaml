    Основная цель отдела разработки, внедрения и сопровождения информационных систем:

    создание, внедрение, сопровождение и развитие информационных ресурсов (сайтов),
    автоматизированных информационных систем документооборота и исполнения поручений
    непосредственно для обеспечения работы Университета;

    ускорение движения документов.

    Основные задачи отдела разработки, внедрения и сопровождения информационных систем:

    приведение информационных систем (ИС) Университета в соответствие с требованиями
    законодательства и отраслевых стандартов РФ;

    мониторинг, анализ и контроль использования ресурсов информационной сети Университета;

    обеспечение бесперебойной работы программной части системы документооборота;

    обеспечение постоянной доступности электронных документов для сотрудников ВУЗа;

    сопровождение и дальнейшее совершенствование разработанных ранее информационных
    ресурсов (сайтов), системы документооборота, системы исполнения поручений;

    разработка и внедрение новых программных продуктов, необходимого для работы Университета.

    Функции отдела разработки, внедрения и сопровождения информационных систем:

    сопровождение работоспособности сервера документооборота.

    сопровождение работоспособности клиентской части системы (установка, переустановка
    ПОна рабочих местах пользователей; обучение и консультирование пользователей);

    проверка целостности данных на сервере документооборота;

    резервное копирование данных;

    сопровождение и модернизация существующих информационных ресурсов (сайтов) Университета;

    подготовка планов проектирования и внедрения новых информационных технологий;

    развитие и поддержка автоматизированных информационных систем документооборота
    и исполнения поручений, в том числе информационная поддержка пользователей;

    проектирование, разработка, внедрение и сопровождение других различных специализированных
