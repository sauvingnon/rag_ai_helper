    О подразделении

    Структура

    Сотрудники

    Основные цели отдела технического и программного сопровождения:

    обеспечение функционирования и бесперебойной работы персональных компьютеров (ПК),
    оргтехники, программного обеспечения, установленного на ПК;

    содействие повышению эффективности учебного процесса и деятельности структурных
    подразделений Университета за счет использования информационных технологий в учебной
    и организационно-управленческой деятельности на основе использования информационных
    систем и специализированного программного обеспечения;

    обеспечение и наладка функционирования систем защиты информации, используемых
    в Университете;

    ремонт и техническое обслуживание офисного оборудования, оргтехники и персональных
    компьютеров в подразделениях Университета.

    Основные задачи отдела технического и программного обеспечения:

    составление технических заданий для проведения закупок оборудования, консультирование
    сотрудников по работе с ПК;

    программно-техническое сопровождение учебного и рабочего процесса;

    обеспечение информационной безопасности за счет использования антивирусных средств
    защиты;

    предоставление обучающимся, преподавателям и сотрудникам доступа к компьютерным
    и сетевым ресурсам, необходимым для реализации учебного и рабочего процесса;

    организация доступа к почтовому серверу Университета (создание почтовых ящиков,
    управление почтовыми ящиками);

    проведение работ по модернизации, замене и списанию устаревшего оборудования;

    обеспечение защиты информации, передаваемой и обрабатываемой в информационной
    сети и центрах обработки данных Университета;

    обеспечение функционирования, развития и модернизации программно-технических средств,
    серверов Университета для поддержки образовательной, научно-исследовательской
    и административно-хозяйственной деятельности Университета;

    резервное копирование данных.

    Функции отдела технического и программного обеспечения:

    техническое и профилактическое обслуживание вычислительной и оргтехники в компьютерных
    классах и структурных подразделениях Университета;

    приемка и подготовка к вводу в эксплуатацию новых средств вычислительной и оргтехники,
    мультимедийного оборудования;

    установка и сопровождение базового программного обеспечения в компьютерных классах
    и структурных подразделениях Университета;

    составление технической документации для приобретения компьютерной и оргтехники,
    мультимедийного оборудования, а также для приобретения расходных материалов и
    комплектующих для компьютерной и оргтехники;

    консультирование преподавателей и сотрудников по вопросам эксплуатации компьютерного
    оборудования, программного обеспечения, установленного в подразделениях Университета;

    программное сопровождение вычислительной техники, установленной в подразделениях
    Университета;

    анализ потребностей подразделений Университета в дополнительных средствах вычислительной
    техники и обработки информации;

    организация своевременного рассмотрения и исполнения заявок на выполнение работ,
    связанных с функционированием программного и аппаратного обеспечения;

    техническая поддержка мероприятий, проводимых в Университете;

    установка на серверах управления информатизации ОС и необходимого для работы программного
    обеспечения;

    поддержка в работоспособном состоянии серверов управления информатизации и программного
    обеспечения серверов;

    регистрация пользователей локальной сети и почтового сервера, назначение идентификаторов
    и паролей;

    настройка прав доступа и контроль использования сетевых ресурсов;

    обеспечение своевременного копирования, архивирования и резервирования данных
    на серверах;

    принятие мер по восстановлению работоспособности серверов при сбоях или выходе
