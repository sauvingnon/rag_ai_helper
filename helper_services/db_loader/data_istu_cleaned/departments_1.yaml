    Кафедра «Языковая подготовка в профессиональной сфере» готовит бакалавров по направлению
    45.03.02 «Лингвистика», профиль подготовки «Перевод и переводоведение».

    Кафедра «Языковая подготовка в профессиональной сфере» также осуществляет подготовку
    на английском языке (полный цикл обучения) студентов по направлению «Программная
    инженерия» (совместно с кафедрой «Программное обеспечение» Института информатики
    и вычислительной техники) и направлению «Промышленное и гражданское строительство»
    (совместно с кафедрой ПГС Института строительства и архитектуры имени В.А.Шумилова).
    Преподаватели кафедры ведут занятия по физике, дисциплинам  «Компьютерные технологии
    в строительстве», «Технология производства мехатронных систем и модулей». «Методы
    искусственного интеллекта в управлении и обработке информации» и др. для студентов,
    осваивающих программы подготовки бакалавров  на английском языке.

    Кафедра «Языковая подготовка в профессиональной сфере» совместно с профилирующими
    кафедрами «Мехатронные системы», «Промышленное и гражданское строительство»  и
     «Сети связи и телекоммуникационные системы» ведет подготовку студентов  Египетско-Российского
    университета по программе двойных дипломов. Выпускники получают диплом бакалавра
    ИжГТУ имени М.Т.Калашникова  и диплом инженера Египетско-Российского университета.
    Обучение ведется на английском языке. Осуществляется также обучение студентов
    Египетско-Российского университета по отдельным модулям (дисциплинам) в рамках
    программы включенного обучения.

    Кафедра «Языковая подготовка в профессиональной сфере» готовит переводчиков по
    английскому и немецкому языкам в сфере основной профессиональной деятельности
    обучающегося. Выпускникам, окончившим ИжГТУ имени М.Т.Калашникова по одному из
    направлений (специальностей) и освоившим программу подготовки переводчиков, наряду
    с квалификацией (степенью) бакалавра, специалиста, магистра выдается  диплом о
    переподготовке по программе «

    Переводчик в сфере профессиональной коммуникации

    » с правом на осуществление профессиональной деятельности в области перевода.
    Срок обучения 2,5 года. Слушатель, осваивающий программу подготовки переводчиков,
    изучает практический курс английского или немецкого) языка, основы теории изучаемого
    языка, теорию и практику перевода в сфере своей профессиональной деятельности,
    культуру профессионально-делового общения, введение в языкознание, стилистику
    русского языка и культуру речи, осваивает курсы по развитию навыков говорения,
    аудирования и чтения.

    Кафедра осуществляет также подготовку преподавателей университета по программе «

    Переводчик в сфере профессиональной коммуникации

    ».

    Кафедра  «Языковая подготовка в профессиональной сфере» организована в сентябре
    2018 года   в структуре созданного в это же время  Института международных образовательных
    программ.

    Кафедра создана на базе Института переводчиков в сфере профессиональной коммуникации, 
    осуществлявшего  с 1994 года подготовку  специалистов  по дополнительной квалификации
    переводчика в сфере профессиональной коммуникации.  Организатором  Института был

    профессор Пичугин Иван Кузьмич

    , работавший  в это время деканом робототехнического факультета.   На специальность
    «Технология машиностроения» по   результатам олимпиады  по английскому языку и
    вступительных экзаменов набирались лучшие  выпускники школ Удмуртии, которые помимо
    освоения основной образовательной программы получали дополнительную квалификацию
    переводчика.  Огромную работу по организации  подготовки переводчиков  проделали
    заместители декана робототехнического факультета  Попова Зинаида Егоровна, Еленский
    Александр Викторович, заведующая кафедрой английского языка Федорова Надежда Трофимовна, 
    ведущие преподаватели кафедры Пирожкова Лариса Николаевна, Филатова Роза Михайловна, 
    Кочурова Маргарита Михайловна.

    Через два года  готовить переводчиков стали по всем направлениям подготовки университета, 
    а также  по инициативе заведующей кафедрой немецкого языка Опалевой Лидии Ивановны
    осуществили  первый набор  переводчиков по дополнительной квалификацией «Переводчик
    в сфере профессиональной коммуникации –  немецкий язык». Программы переводчиков 
    успешно прошли аккредитацию .

    В Институте переводчиков  по грантам различных зарубежных фондов на длительные
    сроки работы  были направлены  и преподавали  специалисты из США, Шотландии, Испании,
    в университете был открыт Центр испанского языка и культуры,  читали курсы лекций 
    профессора из вузов-партнеров Венгрии, Чехии, Словакии, Германии. На базе Института
    переводчиков в течение длительного времени велась подготовка  по чешскому языку:
    при содействии  Южно-Моравского Центра международной мобильности открыт Центр
    чешского языка и культуры – квалифицированные преподаватели из Чехии  обучали
      студентов и преподавателей университета чешскому языку, знакомили  с культурой
    Чешской Республики.  Южно-Моравский  Центр международной мобильности ежегодно
    выделял стипендии для обучения в вузе-партнере  Университете города Брно и других
    университетах Чехии.

    За 28 лет в Институте переводчиков подготовлено более 1500 специалистов, успешно
    совмещающих в своей работе как профессиональные навыки и компетенции, так и переводческую
    деятельность.

    В 2012 году на базе Института переводчиков началась подготовка на английском языке
    студентов  Египетско-Российского университета по программе двойных дипломов. Осуществлялась
    также обучение студентов Египетско-Российского университета по отдельным модулям
    (дисциплинам) в рамках программы включенного обучения. Большой вклад в организацию
    подготовки внес Почетный доктор ИжГТУ имени М.Т.Калашникова

    профессор Шериф Солиман

    – Президент Египетско-Российского университета в Каире.

    Начиная с  2018 года совместно с профилирующими кафедрами  началась подготовка
    иностранных студентов  (полный цикл обучения на английском языке)  по направлениям
    «Программная инженерия», «Промышленное и гражданское строительство», «Менеджмент»,
     «Инфокоммуникационные технологии и системы связи», «Нефтегазовое дело».

    С 2020 года кафедра «Языковая подготовка в профессиональной сфере» готовит бакалавров
    по направлению 45.03.02 «Лингвистика», профиль подготовки «Перевод и переводоведение».

    Образовательные программы

