    Научная тематика кафедры

    1. Разработка теории и методов расчета процессов тепломассообмена в многофазных
    газожидкостных средах:

    барботажные процессы;

    горение твердого топлива в потоке газов;

    аппараты погружного горения для энергосберегающих технологий и промышленной экологии;

    воспламенение и горение природных газов;

    теплообмен с химическими и фазовыми превращениями;

    высокоскоростное взаимодействие газожидкостных сред с твердыми телами;

    2. Исследование и оптимизация рабочих процессов в тепловых машинах импульсного
    типа.

    3. Численное исследование процессов тепломассообмена в оборудовании в составе
    котельной техники:

    Численное моделирование процессов ТМО в системах для разогрева тяжелого жидкого
    топлива;

    Методика расчета температурно-влажностных режимов работы систем дымоудаления теплоэнергетических
    устройств;

    Мобильные энергонезависимые комплексы для производства гранулированного биотоплива;

    4. Разработка и совершенствование технологий получения и использования биотоплива.

    5. Исследование теплозащитных и энергосберегающих технологий при реконструкции
    и строительстве жилых и общественных зданий в условиях климатической зоны Удмуртии
    и РФ:

    Методическое и программное обеспечение обследования энергопотребления зданий.
    Исследование тепломеханической и экономической эффективности энергосберегающих
    мероприятий при строительстве и реконструкции зданий. Разработка региональных
    рекомендаций по энергосберегающему строительству сетей транспортировки теплоты.

    Моделирование теплового режима зданий. Моделирование температурного состояния
    помещений в условиях термогравитационной конвекции и вдува (вентиляции).

    Экспериментальное исследование теплофизических характеристик теплоизоляционных
    материалов.

    Разработка автоматизированной системы проектирования пневмо- и гидроприводов.

    Разработка алгоритмов для автоматизированного расчета систем теплоснабжения. Оптимизация
    гидравлических режимов открытых и закрытых систем теплоснабжения. Исследование
    надежности и тепло-гидравлического режима теплообменного оборудования и распределительных
    сетей теплоснабжения и вентиляции.

    Исследование напорных и безнапорных течений жидкости в каналах санитарно-технических
    систем.

    Моделирование конвективного теплообмена в светопрозрачных ограждающих конструкциях
    и газонаполненных полостях стеновых изделий.

    Утилизация теплоты и использование возобновляемых источников энергии (теплота
    грунта, теплота сточных вод, теплота Солнца, трансформируемые с помощью тепловых
    насосов) в системах теплоснабжения и вентиляции.

