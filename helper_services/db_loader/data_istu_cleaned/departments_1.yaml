    Основные направления деятельности отдела интеллектуальной собственности

    Анализ планируемых к выполнению научно-исследовательских и учебно-методических
    работ и прогнозирование их результатов с целью выявления патентоспособных (охраноспособных)
    объектов интеллектуальной собственности и учебно-методических разработок, обладающих
    коммерческим потенциалом.

    Выполнение патентных и маркетинговых исследований при проведении научно-исследовательских
    и учебно-методических работ; подготовка заявок на выдачу патентов и свидетельств
    на объекты интеллектуальной собственности Университета; заключение лицензионных
    и других договоров.

    Проведение предварительной экспертизы охраноспособности и коммерческого потенциала
    объектов интеллектуальной собственности с целью определения целесообразности их
    правовой охраны.

    Участие в международном сотрудничестве в области интеллектуальной собственности
    и трансфера технологий в рамках международных программ, проектов и профессиональных
    ассоциаций.

    Проведение научно-исследовательской и научно-методической работы в области интеллектуальной
    собственности и трансфера технологий.

    Участие в обучении студентов и аспирантов Университета основам правовой охраны
    и коммерциализации интеллектуальной собственности.

    Осуществление учета в области правовой охраны интеллектуальной собственности Университета
    и его подразделений.

    Проведение анализа состояния деятельности в области интеллектуальной собственности
    Университета и его подразделений, подготовка предложений по его совершенствованию.

