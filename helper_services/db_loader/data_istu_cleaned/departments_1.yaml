    Кафедра основана в 1954 году. Для нужд отечественной промышленности за 55 лет
    своего существования кафедра подготовила более 2 тысяч инженеров – специалистов
    в области обработки металлов давлением, из них более 85 человек получили диплом
    с отличием.

    Наши выпускники работают практически на всех промышленных предприятиях республики
    и далеко за ее пределами. Многие из них стали руководителями предприятий, производств,
    цехов, учеными, работниками научно-исследовательских институтов, преподавателями
    вузов.

    Кафедра «Технологии и оборудование машиностроительных производств» («ТиОМП») создана
    в мае 2018 года на базе кафедр «Машины и технология обработки металлов давлением»
    («МиТОМДиСП»), «Оборудование и технология сварочного производства» («ОиТСП») и
    «Технология металлов и металловедение» («ТМиМ»).

    Ижевский механический институт был организован в 1952 году. Одной из первых профилирующих
    кафедр была создана кафедра «Машины и технология обработки металлов давлением».

    За всё время своего существования кафедра большое внимание уделяла подготовке
    научно-педагогических кадров, развитию научных исследований, привлечению к научной
    работе студентов.

    На кафедре сформировались научные направления, занимающиеся разработкой ресурсосберегающих
    технологий и проектированием оборудования. Научные разработки кафедры  известные
    не только в России, но и за ее пределами.

    Наши выпускники работают практически на всех промышленных предприятиях республики
    и далеко за ее пределами. Многие из них стали руководителями предприятий, руководителями
    производств, цехов, учеными, работниками научно-исследовательских институтов,
    преподавателями вузов.

    В 2010 году к кафедре была присоединена кафедра «Оборудование и технология сварочного
    производства» и  кафедра стала называться «Машины и технология обработки металлов
    давлением и сварочное производство».

    Решение об организации подготовки инженеров-механиков по специальности  «Оборудование
    и технология  сварочного производства» в Ижевском механическом институте было
    принято Минвузом РСФСР в 1964 году.  С момента создания кафедры преподаватели
    и сотрудники активно занимались научно-исследовательской работой, к которой активно
    привлекались студенты специальности. Работы выполнялись  по 2  направлениям:

    Исследование и разработка  наплавочных материалов и  технологии наплавки валков
    горячей прокатки и штампов горячего деформирования

    Исследование металлургических процессов дуговой сварки и наплавки и технологии
    износостойкой наплавки деталей оборудования.

    В мае 2018 года к кафедре «Машины и технология обработки металлов давлением и
    сварочное производство» присоединилась  кафедра «Технология металлов и металловедение».

    Кафедра начала свое существование с момента образования вуза в 1952 году и называлась
    «Технология металлов», в 1956 году была преобразована в кафедру «Технология металлов
    и металловедение».  На кафедре проводятся работы по следующим научным направлениям:

    Повышение конструкционной прочности деталей, полученных объемной штамповкой с
    использованием локального очага пластической деформации (ротационное выдавливание,
    штамповка обкатыванием, торцевая раскатка) по схеме термомеханического упрочнения
    (гидроцилиндры, корпусные детали-обечайка, баллоны высокого давления).

    Формирование диспергированной структуры в конструкционных сталях и сплавах по
    схеме термомеханической обработки с применением прессования, изотермической и
    жидкой штамповки (фитинги, поршни двигателя внутреннего сгорания, профили).

    Реализация эффекта субструктурного упрочнения с использованием индукционного нагрева
    на сталях с прочностью К60, К70 для соединительных деталей нефтегазопроводов.

    Имея большой научный потенциал, кафедра «Технологии и оборудование машиностроительных
    производств» готовит квалифицированных специалистов, востребованных на промышленных
    предприятиях и в частном бизнесе.

    Подготовка специалистов ведется через бакалавриат, магистратуру, аспирантуру и
    докторантуру.

