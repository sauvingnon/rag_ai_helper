    Кафедра была образована в 1959 году и ведет подготовку по электронным вычислительным
    машинам, комплексам, системам и сетям бакалавров и магистров широкого профиля,
    владеющих знаниями по устройству компьютеров и периферийного оборудования, по
    информационно-измерительным системам, по системному программному обеспечению,
    вычислительным сетям и микропроцессорам, по основам их проектирования и программирования.

    В процессе обучения студенты получают глубокие знания в области информатики, вычислительной
    математики, системного и прикладного программирования, организации ЭВМ и вычислительных
    систем, комплексов и сетей, микропроцессорной техники, компьютерной графики, систем
    обработки данных, систем искусственного интеллекта, компьютерного моделирования
    и защиты информации, изучают языки программирования:  Си, Ассемблер, параллельного
    программирования, языки моделирования, языки проектирования сложных цифровых функциональных
    блоков, баз данных и систем искусственного интеллекта, получают необходимые знания
    в области экологии и охраны окружающей среды, экономики и организации производства.

    В 1959 году в Ижевский механический институт на заведование новой кафедрой приборостроительного
    профиля был приглашен из Казанского авиационного института к.т.н., доцент Тихонов
    Георгий Александрович. Перед Г.А. Тихоновым и первым ректором ИМИ В.П. Остроумовым
    была поставлена задача организовать подготовку инженеров для местных приборостроительных
    заводов. Для этого требовалось решить две проблемы: обеспечить подбор преподавательских
    кадров; приобрести соответствующее лабораторное оборудование.

    Решение второй проблемы оказалось сравнительно простым. Руководители местных предприятий
    пошли навстречу. Оборудование для оснащения лабораторий передавалось безвозмездно,
    причем, не устаревшее, а практически новое, только что прошедшее испытания, да
    такое, что в МВТУ «ахнули», узнав о нашей материально-технической базе. Здесь
    уместно отметить добрым словом директоров ижевских заводов: Героя Социалистического
    Труда Н.А. Богданова, Героя Социалистического Труда А.В. Воскресенского, В.А.
    Шутова и др. Кроме того, по просьбе Г.А. Тихонова из Казанского авиационного института
    была прислана целая лаборатория, содержащая датчики и приборы беспилотных летательных
    аппаратов.

    Оснащение лабораторий было выполнено очень оперативно. К сентябрю 1959 года имелось
    все необходимое оборудование для того, чтобы вести подготовку инженеров-прибористов
    по двум специальностям: «Вычислительная техника» (спец. 0608) и «Производство
    и проектирование радиоаппаратуры» (спец. 0705). Первое название кафедры – «Приборостроение».
    Кафедра была многопредметной и обе специальности выпускались на ней.

    Позднее (1961 год) на кафедре под новым названием «Счетно-решающие устройства»
    осталась специальность 0608, а под специальность 0705 из кафедры выделилась новая
    кафедра – «Конструирование радиоаппаратуры». Заведующим новой кафедры стал Пашкин
    Василий Васильевич. Затем ей заведовал Жаравин Анатолий Иванович.

    На кафедре вначале было много совместителей – специалистов Мотозавода: Ю.А. Лебедев,
    Ю.К. Пекшуров, Е.Д. Зайденберг, М.А. Хабенский, Е.Г. Коровкин, Л.И. Аксельрод,
    И.Н. Шутова, Н.Д. Токарев, В.В.Пашкин и др. Но работа совместителей была ненадежной.
    Поэтому с 1961 года была открыта аспирантура для подготовки кандидатов технических
    наук. Первый и долгое время единственный руководитель аспирантуры – Тихонов Георгий
    Александрович. Научное направление кафедры было сформулировано так: «Исследование
    вопросов применения средств автоматики и вычислительной техники для управления
    производственными процессами».

    Первыми аспирантами были Пекшуров Юрий Константинович, Почерняев Станислав Валентинович,
    Веркиенко Юрий Всеволодович, Ктитарев Виталий Николаевич, Компаниец Николай Александрович.

    Далее аспирантами были Калядин Николай Иванович, Лосев Игорь Романович, Леменков
    Владимир Александрович, Златкис Валерий Михайлович, Ревяко Григорий Максимович,
    Моченов Станислав Васильевич, Кучуганов Валерий Никанорович, Гафаров Ренат Мидгатович,
    Казаков Виктор Степанович, Гитлин Валерий Борисович, Ломаев Гелий Васильевич,
    Мерзляков Юрий Минеевич, Барсуков Владимир Константинович, Леньков Сергей Викторович,
    Штин Александр Александрович, Малышев Виктор Сергеевич и др. Всего в аспирантуре
    у профессора Г.А. Тихонова защитилось 34 человека. К 1993-му году защитили докторские
    диссертации: Ю.В. Веркиенко, В.Д. Плыкин, П.Г. Кузнецов, В.Н. Кучуганов.

    Сложность подготовки кандидатов наук состояла в том, что институт не имел совета
    по присуждению ученых степеней. Аспирантам приходилось защищаться в разных вузах:
    КАИ, МВТУ, ЛЭТИ, ЛИТМО, ЛИАП, ЛМИ, УПИ, ГПИ, УАИ, Каунасском политехническом,
    Сибирском отделении АН СССР (г. Новосибирск), Минском радиотехническом и др. В
    то же время связь с этими институтами помогла квалифицированно поставить учебный
    процесс на кафедре. Родственные кафедры делились методическими пособиями и учебниками.
    Большую помощь оказали С.О. Доброгурский (МВТУ), С.А. Майоров (ЛИТМО), В.Б. Смолов
    (ЛЭТИ), Л.А. Преснухин (МВТУ), Б.В. Анисимов (МВТУ), Ю.Н. Мельников (МЭИ).

    В дальнейшем кафедра была переименована вначале в кафедру "Проектирование математических
    приборов и устройств" (ПМПУ), а затем в 1961 году – в кафедру «Вычислительная
    техника» (ВТ), которой заведовал Г.А. Тихонов до 1993 года. Кафедра ВТ стояла
    у истоков создания институтского вычислительного центра с первой цифровой ЭВМ
    «Минск-1».

    В 1965 году при кафедре организуется научная лаборатория технической кибернетики,
    которую возглавил Н.И. Калядин. Впоследствии лаборатория переросла в научно-исследовательский
    отдел технической кибернетики (НИОТК) и выделилась в самостоятельное крупное исследовательское
    подразделение, которое стало инициатором открытия кафедры «Прикладная математика».

    В 1969 году от кафедры «Вычислительная техника» для экономического факультета
    отделяется кафедра механизированной обработки экономической информации (МОЭИ),
    на заведование которой назначается доцент кафедры ВТ С.В. Почерняев, а заведующим
    лабораторией преподаватель кафедры Ю.А. Каюров. После ликвидации экономического
    факультета (1989 г.) организуется факультет «Техническая кибернетика и информатика»,
    на котором начинают функционировать две кафедры: ПО – «Программное обеспечение»,
    возглавляемая доцентом Ю.А. Каюровым, и САПР – «Системы автоматизированного проектериования»,
    возглавляемая доцентом В.Н. Кучугановым.

    В 1992 году факультет «Техническая кибернетика и информатика» переименовывается
    в факультет «Информатика и вычислительная техника» (ИВТ), в состав которого вошли
    кафедры ВТ, ПО и САПР. Все три кафедры возглавили выпускники кафедры ВТ В.Б. Гитлин,
    В.Н. Кучуганов и М.А. Сенилов.

    Заведующими кафедрой ВТ были Г.А. Тихонов (1959-1983 гг.), Ю.В. Веркиенко (1983-1986
    гг.), В.М. Златкис (1986-1989 гг.), В.Б. Гитлин (1989-1996 гг.), Ю.В. Веркиенко
    (1996-2007 гг.). Заместителями зав. кафедрой ВТ долгое время были В.М. Третьяков,
    Г.М. Ревяко, Ю.В. Веркиенко.

    В настоящее время докторами стали выпускники и сотрудники кафедры В.Е. Лялин,
    В.Б. Гитлин, В.А. Куликов, С.В. Прокопчина, В.А. Алексеев, В.Н. Кучуганов, Р.В.
    Голев, В.П. Максимов, Г.В. Ломаев.

    Многие из выпускников кафедры стали руководителями на уровне директоров, заместителей
    директоров, начальников отделов (В.А. Попов, В.Г. Сухотин, В.Л. Гоголев, В.Д.
    Плыкин, В.М. Еговкин, А.В. Зорин, В.Г. Заболотских, О.Е. Обухов, С.И. Стыценко,
    А.Н. Вотяков, Д.Е. Белоголовкин и др.).

    С 2007 года кафедру «Вычислительная техника» возглавляет заслуженный деятель науки
    Удмуртской республики, почетный работник высшего профессионального образования
    РФ, доктор технических наук, профессор Куликов Виктор Александрович.

