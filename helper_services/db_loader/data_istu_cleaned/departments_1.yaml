    Кроме этого, в распоряжении обучающихся имеются светлые, просторные аудитории,
    оснащенные всем необходимым в учебном процессе оборудованием, три именные тематические
    аудитории, оборудованные мультимедиа техникой и наглядными пособиями, а также
    учебно-научный центр, имеющий в распоряжении три дисплейных класса и лекционную
    мультимедийную  аудиторию.

    Изначально кафедра «Тепловые двигатели и установки» имела название «Проектирование
    и производство двигателей летательных аппаратов». Кафедра «Проектирование и производство
    двигателей летательных аппаратов» была организована в октябре 1976 года (приказ
    № 1073 от 19.10.76).

    Во второй половине 70-х годов на предприятиях города Ижевска активно осваивался
    новый вид продукции – малогабаритные противотанковые ракеты (ПТУР), как переносные,
    запускаемые из контейнера, так и предназначенные для ствольной артиллерии. Для
    «больших» ракет – оперативно-тактической и стратегической дальности – в это время
    так же характерен постепенный переход на твердотопливные двигатели. Особое внимание
    уделялось динамике внутрикамерных процессов, проектированию и производству таких
    двигателей. В тесной связи с этим находилось открытие в 1976 году по инициативе
    ректора ИМИ Алексея Матвеевича Липанова кафедры «Проектирование и производство
    двигателей летательных аппаратов», начавшей подготовку инженеров по специальности
    «Ракетные двигатели».

    В конце 80-х годов интерес к ракетной технике резко снижается и с начала 90-х
    на кафедре ТДУ студенты получают возможность обучаться по дополнительной специализации
    «Двигатели внутреннего сгорания».

    В 1997 году специализация «Двигатели внутреннего сгорания» приобретает статус
    специальности. Потребность в выпускниках этой специальности несомненна. Усовершенствование
    автомобильной техники, в особенности двигателей, а также приток автотранспорта
    иностранного производства привели к возрастанию требований к персоналу автосервисов.
    Кроме того двигатели внутреннего сгорания с успехом применяются во множестве других
    областей техники помимо автотранспорта. Дизельные силовые установки применяются
    в судостроении и в нефте-газодобыче, поршневые ДВС – в легкой авиации, в том числе
    для парапланов и мотодельтапланов.

    В 2002 году на базе специальности «Двигатели внутреннего сгорания» был открыт
    набор на направление бакалавриата 140500.62 «Энергомашиностроение».

    В связи с принятием государственных образовательных стандартов 3-го поколения
    (ФГОС) с 2011 года был открыт прием и ведется обучение по направлению бакалавриата
    13.03.03 (старый шифр 141100.62) «Энергетическое машиностроение».

    Ежегодно кафедра выпускает до 15 бакалавров техники и технологии направления «Энергетическое
    машиностроение». Кроме того, значительный процент бакалавров продолжает обучение
    в магистратуре, в том числе по полученному профилю, а так же в аспирантуре.

    На кафедре действует аспирантура по специальностям: 010205 – «Механика жидкости,
    газа и плазмы», 050402 – «Тепловые двигатели», 050705 – «Тепловые, электроракетные
    двигатели и энергоустановки летательных аппаратов» и 051318 – «Математическое
    моделирование, численные методы и комплексы программ».

    С момента открытия базовой специальности основным потребителем выпускаемых специалистов
    является автомобильный завод ОАО «ИжАвто» в настоящее время ОАО «Объединенная
    автомобильная группа», с которым у кафедры ТДУ налажены давние и прочные связи.
    Ведущие инженеры-конструкторы ОАО «ИжАвто» составляют основу государственной аттестационной
    комиссии по направлению бакалавриата13.03.03 «Энергетическое машиностроение».
    В настоящее время выпускники указанного направления находят применение полученным
    знаниям и на других предприятиях республики и Ижевска – ОАО «ИРЗ», ОАО «ИМЗ» и
    проч.

    От 80% до 100% выпускников бакалавриата направления 13.03.03 «Энергетическое машиностроение»продолжают
    обучение в магистратуре ИжГТУ и имеют возможность, сдав вступительные экзамены,
    поменять профиль обучения, однако большинство продолжают обучение посвоему профилю.
    С 2011 года, в связи с принятием новых образовательных стандартов, это магистратура
    направления 13.04.03 (старый шифр 141100.68) «Энергетическое машиностроение» по
    профилю «Поршневые и комбинированные двигатели внутреннего сгорания».

    Начиная с 2013 года кафедра ежегодно выпускает до10 магистров техники и технологии
    направления 13.04.03 «Энергетическое машиностроение» по профилю «Поршневые и комбинированные
    двигатели внутреннего сгорания». Кроме того, как показывает практика, часть магистров
    продолжает обучение в аспирантуре, в том числе по полученному профилю.

    Начиная с 2003 года в ИжГТУ в рамках различных специальностей делаются попытки
    открыть нефтяную специализацию. Поскольку учебные планы направлений 651200 «Энергомашиностроение»
    (куда входит специальность «Двигатели внутреннего сгорания») и 657300 «Оборудование
    и агрегаты нефтегазового производства» (куда входит специальность «Машины и оборудование
    нефтяных и газовых промыслов») совпадают на 75-80%, в 2005 году кафедра ТДУ успешно
    прошла лицензирование и с 2006 года начался набор на специальность 130602.65 «Машины
    и оборудование нефтяных и газовых промыслов». Потребность в инженерах этой специальности
    несомненна. Постоянное увеличение добычи в сложных геологических условиях, стремление
    повысить рентабельность скважин, усовершенствование нефтедобывающей техники, внедрение
    новейших методик нефтегазодобычи приводит к возрастанию требований к работникам
    этой отрасли.

    Востребованность выпускников по данной специальности весьма высока, и поэтому
    неудивительно, что службами занятости не зафиксировано ни одной заявки от выпускников
    специальности 130602.65 «Машины и оборудование нефтяных и газовых промыслов».
    Одновременно с этим, начиная с 2011 года, в связи с принятием новых образовательных
    стандартов, на кафедре действует магистратура направления 15.04.02 (старый шифр151000.68)
    «Технологические машины и оборудование».

    С 2006 года кафедра ТДУ, в сотрудничестве с Ижевским нефтяным техникумом осуществляет
    обучение на заочном отделении по ускоренной программе на базе среднего профессионального
    образования (СПО).

    Актуальность и востребованность специальности «Машины и оборудование нефтяных
    и газовых промыслов» среди молодежи подтверждается стабильно высоким конкурсом
    абитуриентов.

    В связи с принятием государственных образовательных стандартов 3-го поколения
    (ФГОС) с 2011 года открыт прием и ведется обучение по направлению бакалавриата
    15.03.02 (старый шифр 151000.62) «Технологические машины и оборудование», профиль
    подготовки «Машины и оборудование нефтяных и газовых промыслов».

    Ежегодно кафедра выпускает порядка 15 специалистов по специальности 130602.65
    «Машины и оборудование нефтяных и газовых промыслов», а первый выпуск состоялся
    в 2011 году. Кроме того, имеется возможность продолжить обучение в магистратуре,
    в том числе по полученному профилю, а так же в аспирантуре.

    По окончании обучения по направлению бакалавриата 15.03.02, лучшие выпускники
    получают рекомендацию к поступлению в профильную магистратуру направления 15.04.02
    «Технологические машины и оборудование». Начиная с 2013 года кафедра ежегодно
    выпускает в среднем 8 магистров техники и технологии направления «Технологические
    машины и оборудование». Кроме того, как показывает практика, часть магистров продолжает
    обучение в аспирантуре, в том числе по полученному профилю.

    Высокое качество подготовки выпускников, характеризуемое результатами промежуточных
    и итоговых испытаний, проверкой остаточных знаний и отзывами потребителей молодых
    специалистов, обеспечивается профессорско-преподавательским составом кафедры,
    высоким уровнем материально-технического оснащения, включающего в себя несколько
    лабораторий и вычислительный центр, а также тесным взаимодействием с предприятиями-заказчиками.

    Ведущими преподавателями и руководителями бакалавров и магистрантов на протяжении
    многих лет являлись и являются Липанов А.М., Алиев А.В., Калинников А.Е., Бендерский
    Б.Я., Вахрушев А.В., Мищенкова О.В., Губерт А.В., Миловзоров Г.В., Митюков Н.В.,
    Колесникова Л.Н., Стерхов К.В., Колесников М.П., Воеводина О.А., Волохин А.В.,
    Макаров С.С., Терентьев А.Н., Ильин А.П., Королева М.Р., Бойчук А.Е., Копылов
    К.А., Блябляс А.Н.и др.

    Качественная подготовка выпускников аккредитуемого направления базируется на высоком
    уровне профессорско-преподавательского состава, работающего на кафедре «ТДУ».
