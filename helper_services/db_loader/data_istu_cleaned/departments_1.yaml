    Основные функции:

    Организация и сопровождения НИР и ОКР, проводимых учеными Университета, студентами,
    аспирантами, докторантами.

    Организация участия профессорско-преподавательского состава, аспирантов, докторантов,
    студентов, бакалавров, магистрантов в конкурсах грантов и программ.

    Нормативно-правовое, организационно-техническое и финансовое сопровождение выполнения
    НИР в рамках грантов и программ.

    Отслеживание своевременного выполнения НИР и представление отчетных документов
    заказчикам и грантодателям.

    Организация и сопровождение выполнения международных грантов и программ.

    Мониторинг выполнения НИР и соответствия заявленных и полученных результатов,
    контроль полноты и правильности, содействие в оформлении отчетных документов по
    НИР в рамках грантов и программ перед заказчиками и грантодателями.

    Подготовка отчетов о научной деятельности Университета в Министерство образования
    и науки РФ, другие организации.

    Содействие в оформлении договоров по научно-исследовательским и хоздоговорным
    работам; сопровождение заключаемых договоров, контроль за ходом их исполнения.

    Информационный поиск и анализ научных конкурсов, грантов и программ, в которых
    может участвовать Университет.

    Формирование информационной базы по объявленным конкурсам, грантам и программам
    и её актуализация.

    Своевременное информирование структурных подразделений и научно-педагогических
    работников Университета о научных конкурсах, грантах и программах, в том числе
    с помощью сайтов Университета.

    Содействие заявителям в формировании и подготовке заявок и сопроводительной документации
    для участия в конкурсах, программах и грантах.

    Оказание организационной и консультационной помощи в подготовке заявок на участие
    в грантах, программах.

    Формирование информационной базы данных о заявленных и выполненных проектах в
    рамках научных грантов и программ.

    Разработка конкурсной документации и положений внутренних конкурсов, грантов,
