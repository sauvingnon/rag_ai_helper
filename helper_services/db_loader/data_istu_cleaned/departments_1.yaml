    Цели УНЦ «ЭНЕРГОМАШ»

    :

    Повышение качества подготовки специалистов путем увеличения спектра оказываемых
    университетом образовательных услуг.

    Повышение эффективного использования средств вычислительной техники факультета
    в учебном процессе.

    Соответствие образовательной системы мировым тенденциям и росту спроса на качественные
    образовательные услуги.

    Ориентация образовательного процесса на формирование и развитие общекультурных
    и профессиональных компетенций в соответствии с ФГОС.

    Реализация преимуществ Университета в условиях конкуренции со стороны других вузов
    на рынке образовательных услуг.

    Расширение доступа различных категорий населения к качественным образовательным
    услугам.

    Оказание дополнительных образовательных услуг по подготовке водителей транспортных
    средств категории «В».

    Задачи УНЦ «ЭНЕРГОМАШ»

    :

    Проведение всех видов учебной, консультационной и методической работы по оказанию
    основных и дополнительных образовательных услуг в рамках аккредитованных специальностей
    и учебных планов машиностроительного факультета.

    Обеспечение задач, связанных с научно-исследовательской деятельностью студентов
    и сотрудников на машиностроительном факультете.

    Повышение эффективности самостоятельной работы студентов.

    Организация включения выпускающих кафедр машиностроительного факультета в официальную
    систему дистанционного образования университета.

    Увеличение контингента обучающихся за счет предоставления возможности освоения
    образовательных программ в максимально удобной форме - непосредственно по месту
    пребывания.

    Повышение качества подготовки обучающихся за счет внедрения информационно-коммуникационных
    технологий и компьютерных средств обучения.

    Минимизация затрат на организацию и реализацию учебного процесса.

    Повышение качества подготовки водителей транспортных средств категории «В» за
    счет использования в учебном процессе элементов дистанционного образования.

    В состав УНЦ входят

    :

    Бюро компьютерного сопровождения учебного процесса кафедр машиностроительного
    факультета «Тепловые двигатели и установки», «Ракетная техника», «Сопротивление
    материалов», «Стрелковое оружие», «Производство машин и механизмов», «Теоретическая
    механика и теория машин и механизмов» (на базе компьютерных классов и мультимедийных
    аудиторий кафедр машиностроительного факультета).

    Группа оказания дополнительных образовательных услуг (в т.ч. подготовка водителей
    транспортных средств категории «В» на базе специально оборудованных учебных аудиторий
    кафедры «Тепловые двигатели и установки»).

    Группа разработки и реализации электронных образовательных ресурсов (ЭОР) для
    образовательных программ с использованием дистанционных образовательных технологий
    (ДОТ) в соответствии с утвержденными требованиями для студентов специальностей
    машиностроительного факультета.

