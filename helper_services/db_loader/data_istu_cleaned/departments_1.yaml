    Говоря о настоящем кафедры «Теплоэнергетика» нельзя забывать и то, что родоначальницей
    ее является одна из старейших кафедр ИжГТУ «Гидравлика и теплотехника» созданная
    в 1955 году, поэтому следует вспомнить и тех, кто стоял у истоков и  внес огромный
    вклад в становлении кафедры «Гидравлика и теплотехника»: канд. техн. наук, доцент
    С. И. Локинский (заведующий кафедрой «Гидравлика и теплотехника»  1955-1964);
    доцент В. Г. Бычков (заведовал кафедрой «Гидравлика и теплотехника»  в период
    1964-1969 и 1980-1984 г.г.); канд. техн. наук, доцент Г. М. Ключников (заведующий
    кафедрой «Гидравлика и теплотехника» 1969-1980); доктор. техн. наук, профессор
    В. А. Никулин (заведующий кафедрой «Гидравлика и теплотехника»   1984-1994); доцент
    В. А. Шумилов (декан Инженерно-строительного факультета);  старший преподаватель
    Э. В. Пржиялковский;  канд. техн. наук, доцент К. Н. Падун; старший преподаватель
    Н. М. Кургузкина.

    Приказом ректора от 30 июня 2003 года кафедра «Гидравлика и теплотехника» была
    преобразована в Теплотехнический факультет, в состав которого вошли кафедры «Теплогенерирующие
    установки и газоснабжение» (ТГУиГ), «Теплоснабжение, отопление, вентиляция и кондиционирование»
    (ТОВиК), «Водоснабжение и водоподготовка» (ВиВ) и «Управление городским энергетическим
    хозяйством» (УГЭХ). Деканом Теплотехнического факультета стал доктор техн. наук,
    профессор Валерий Николаевич Диденко.

    Сотрудниками кафедры ТГУиГ являлись: доктор техн. наук, профессор Валерий Николаевич
    Диденко; канд. техн. наук, доцент Валерий Алексеевич Стерхов; старшие преподаватели
    Ольга Ивановна Варфоломеева; Марина Валерьевна Гайворонская; Людмила Викторовна
    Малых; ассистент Дмитрий Анатольевич Хворенков; инженер Светлана Сергеевна Малых.
    Возглавил кафедру канд. техн. наук, доцент Дмитрий Николаевич Попов. С 2004 руководила
    кафедрой канд. техн. наук, доцент О. И. Варфоломеева. В 2008 году аспирант заочного
    отделения Дмитрий Анатольевич Плотников успешно защитил кандидатскую диссертацию
    и был принят на кафедру в должности доцента. С 2008 по 2009 года совместно с магистрантом
    кафедры ТОВиК А. В. Дюпиным аспирант Р. З. Касимов проходил стажировку в Западно-Саксонской
    Высшей школе г. Цвиккау (Германия), где выполняли совместную с принимающей стороной
    научно-исследовательскую работу. 27 мая 2010 года кафедра ТГУиГ в результате объединения
    с кафедрой «Управление городским энергетическим хозяйством» была переименована
    в «Теплоэнергетика», заведовала которой канд. техн. наук, доцент О. И. Варфоломеева.
    В состав коллектива кафедры вошел доцент Сергей Александрович Трухин, занимавший
    в то время должность директора ООО «Удмуртские коммунальные системы».

    Основу кафедры ТОВиК на момент ее создания составили сотрудники кафедры «Гидравлика
    и теплотехника» канд. техн. наук, доцент Леонид Ефимович Шейнман, канд. техн.
    наук, доцент Алексей Анатольевич Юркевич, старшие преподаватели Ирина Николаевна
    Булдакова (Осипова), Зульфия Рафаиловна Муфтахутдинова, инженер Галина Константиновна
    Сосновская, заведующий лабораторией Николай Константинович Попов. Возглавил кафедру
    канд. техн. наук, доцент Евгений Витальевич Корепанов, работавший на кафедре «Гидравлика
    и теплотехника с 1975 года. С 2010 заведующим учебной лабораторий кафедры работает
    канд. с-х. наук Марат Галимзянович Ахунов. В 2011 году на должность профессора
    кафедры был избран доктор техн. наук, профессор Андрей Эдуардович Пушкарев. В
    2017 году кафедрой стал руководить канд. техн. наук, доцент А. А. Юркевич. В 2018
    году кафедра ТОВиК вошла в состав кафедры «Теплоэнергетика». С 2018 года кафедрой
    руководит канд. техн. наук Д. А. Хворенков.

