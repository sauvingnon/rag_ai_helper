    Контакты подразделения

    elena_pushina@mail.ru

    Учебно-научный компьютерный центр (УНКЦ) является структурным подразделением факультета
    «Математика и естественные науки»,  создан и действует на основании приказа ректора
    от   02.11.2012   № 1764.

    Учебно-научный компьютерный центр  расположен в 1 корпусе в аудиториях: 412, 413,
    415, 417.

    Начальник УНКЦ административно подчиняется декану факультета. Решение методических
    вопросов, связанных с развитием материальной базы и программного обеспечения УНКЦ
    осуществляет в соответствии с требованиями факультета и программой информатизации
    координационного совета по информатизации.

    Компьютерные классы 1-412, 413, 417 оснащены интерактивными досками,  аудитория
    1-415 – проектором.

    В классах УНКЦ занимаются студенты кафедр факультета «Математика и естественные
    науки»:

    «Высшая математика»,

    «Физика и оптотехника»,

    «Химия и химическая технология»,

    «Инженерная графика, профессиональная педагогика и технология рекламы»,

    «Общественные науки» и др.

    Учебно-научный компьютерный центр (УНКЦ) был создан в 2012 году деканом МиЕН факультета

    Алиевым Али Вейсовичем

    , с целью оптимизации работы кафедр и доступа студентов к компьютерным классам
    в учебное время.

    С каждым годом функционал УНКЦ расширяет список программ для компьютерного моделирования,
    которые ежегодно обновляются.

    Компьютерные классы оснащены необходимыми пакетами программ для успешного выполнения
    лабораторных и практических работ.

    На сегодняшний день компьютерные классы полностью справляются с учебной нагрузкой
    и обеспечивают работу со студентами всех кафедр факультета «Математика и естественные
    науки».

    Назначение аудиторий УНКЦ

    Аудитория № 412, корпус 1.

    Компьютерный класс и учебная аудитория для проведения лабораторных и практических
    работ, занятий семинарского типа, текущего контроля и промежуточной аттестации,
    групповых и индивидуальных консультаций, курсового проектирования (выполнения
    курсовых работ), научно-исследовательской работы, дипломного проектирования, самостоятельной
    работы.

    Аудитория № 413, корпус 1.

    Компьютерный класс и учебная аудитория для проведения лабораторных и практических
    работ, занятий семинарского типа, текущего контроля и промежуточной аттестации,
    групповых и индивидуальных консультаций, курсового проектирования (выполнения
    курсовых работ), научно-исследовательской работы, дипломного проектирования, самостоятельной
    работы.

    Аудитория № 415, корпус 1.

    Учебная аудитория для проведений занятий лекционного типа, семинарского типа,
    текущего контроля и промежуточной аттестации, групповых и индивидуальных консультаций,
    дипломного проектирования.

    Аудитория № 417, корпус 1.

    Компьютерный класс и учебная аудитория для проведения лабораторных и практических
    работ, занятий семинарского типа, текущего контроля и промежуточной аттестации,
    групповых и индивидуальных консультаций, курсового проектирования (выполнения
    курсовых работ), научно-исследовательской работы, дипломного проектирования, самостоятельной
    работы.

    Студенты факультета МиЕН могут самостоятельно заниматься в компьютерных классах
    в рамках читаемых учебных дисциплин, если в классе нет занятий по расписанию.

    Для доступа в аудиторию для самоподготовки необходимо обратиться в деканат МиЕН
    факультета или кабинет 412.

    Компьютерные классы оснащены необходимыми пакетами программ для инженерных и математических
    расчетов и компьютерного моделирования физических процессов:

    КОМПАС-3D

    ParaView

    MS Visual Studio

    MATLAB

    Mathcad и др.

