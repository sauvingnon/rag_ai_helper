    Телегина М.В., к.т.н., доц.

    Интеллектуальные геоинформационные системы

    Системы экологического биомониторинга

    Наиболее важные программные разработки студентов и аспирантов кафедры АСОИУ

    1. KG

    – среда для разработки информационных систем на платформе MySQL

    И.Н.Габдрахманов, Е.А.Шутов – аспиранты. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Предназначена для:

    создания, редактирования и управления базами знаний и данных;

    для разработки предметных онтологий;

    для создания экспертных компонент систем планирования и систем поддержки управленческих
    решений;

    для реинжиниринга и оптимизации бизнес-процессов и баз данных.

    Область применения – образовательный процесс, а также средние и малые производственные
    и коммерческие фирмы. Система ориентирована на пользователей, не владеющих программированием.

    2.

    MotSyn – система компьютерной анимации

    М.М.Семакин – аспирант. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Система MotSyn предназначена для обучения студентов технологиям трехмерной компьютерной
    анимации персонажа:

    создание и редактирование движений по технологии «ключевых кадров» (key framing);

    создание новых движений путем автоматической модификации ранее созданных движений
    на основе пространственно-временных ограничений и требований, заданных с помощью
    логических правил;

    создание нового движения путем комбинирования движений последовательного или одновременного
    выполнения;

    синтез сложного движения персонажа по сценарию - высокоуровневому описанию требуемых
    действий.

    Система MotSyn 1.0 интегрируется в состав СУБЗ KG, разработанной на кафедре, что
    позволяет использовать базу знаний для представления персонажей и их движений,
    а также для логического вывода, применяемого при синтезе сложного движения.

    3. SCULPTER – система геометрического моделирования

    В.В.Харин, аспирант. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Предназначена для создания твердотельных моделей, содержащих «скульптурные» поверхности.
    Система может быть использована в концептуальном проектировании, для обучения
    конструкторов и дизайнеров трехмерному моделированию, а также для создания параметризуемых
    скульптурных портретов.

    4.

    «LifeOn Авто» - автоматизированная система моделирования дорожно-транспортных
    происшествий

    А.А.Сибгатуллин, студент 4 курса. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Система «LifeOn Авто» предназначена для моделирования механизма возникновения
    и развития дорожно-транспортных происшествий.

    На основе показаний свидетелей эксперт создает сценарий происшествия, по которому
    программа синтезирует анимационный ролик и выявляет противоречия между гипотетическим
    сценарием и реальными фактами. Эксперт может оценить достоверность того или иного
    варианта происшествия и дать заключение о степени виновности его участников.

    Система обладает обширной базой данных автомобилей, типовых ДТП и районов города;
    работает в двумерной и трехмерной версии.

    5. «AQResearcher» – модуль векторизации эскизов и чертежей с бумажных носителей

    А.В.Кучуганов, аспирант; А.А.Панюков, студент 3 курса.

    Науч. консультант к.т.н., проф. С.В.Моченов.

    Предназначен для автоматизации работ по созданию электронных архивов конструкторско-технологической
    документации и банков типовых параметризуемых моделей.

    Отличается высоким качеством аппроксимации прямых и дуг при низком качестве исходных
    документов.

    6. «ЭСДиЛ» – экспертная система медицинской диагностики и логического вывода схемы
    лечения

    Т.В.Пушина, Е.С.Корюкова, студенты 5 курса. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Система «ЭСДиЛ» предназначена для повышения степени автоматизации и качества обслуживания
    пациентов в сфере диагностики и лечения заболеваний желудочно-кишечного тракта.
    Система может использоваться как врачом-практиком, так и студентом, а также любым
    человеком, интересующимся медициной.

    Режимы работы:

    Консультация: база данных пациентов; постановка диагноза; логический вывод комплексной
    схемы лечения с учетом индивидуальных особенностей пациента.

    Справочник: диеты; заболевания ЖКТ; медикаменты; методы диагностики; физиотерапевтические
    процедуры.

    7. «Методы пропорционирования» – автоматизированная обучающая система

    В.В.Ермилов, аспирант, О.С.Кузнецова, Н.Л.Лазарева, студенты 5 курса.

    Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    АОС позволяет:

    изменять размеры чертежей по предлагаемым методам, основанным на законах гармонии;

    проанализировать созданный чертеж на гармоничность и пропорциональность;

    освоить теоретический курс «Пропорции и пропорционирование» при помощи электронного
    учебника, который является составной частью АОС «Методы пропорционирования»;

    оценить теоретические знания и практические навыки.

    8. OСReader – программа для распознавания текстов, написанных на арабском языке

    Саид С.Салюм, аспирант. Научн. рук. д.т.н., проф. В.Н.Кучуганов.

    Программа распознает арабские печатные и рукописные шрифты и может быть настроена
    на любой другой язык, если заполнить базы данных.

    9. Экспертная система мониторинга психофизических характеристик и синтеза психологического
    портрета личности по почерку

    Предназначена для:

    выявления психологических черт человека при приеме на государственную или воинскую
    службу;

    идентификации темперамента личности;

    прогнозирования поведения человека в критических ситуациях;

    ранней диагностики психических заболеваний.

    Разработчики: Кучуганов А.В. – к.т.н., доцент; Лапинская Г.В. – аспирант.

    10.

    «Охрана труда и экологическая безопасность» – автоматизированная обучающая система
    и база данных

    Система содержит:

    электронный гипертекстовый учебник;

    онтологический словарь терминов и определений;

    подсистему "Контроль знаний";

    подсистему "База данных происшествий и отчетность".

    Разработчики: Габдрахманов И.Н., Кудряшов Д.А., Кучуганов В.Н., Лебедева С.М.,
    Лекомцева Т.Н., Пушков Д.В., Ямшанова Н.П. Руководитель д.т.н., проф. В.Н.Кучуганов.

    11.

    «Английский язык. Начальный курс» – интерактивная обучающая система

    Предназначена для обучения английскому языку как вспомогательное средство, а также
    при подготовке школьников к сдаче ЕГЭ по английскому языку.

    Система генерирует вопросы и упражнения по произвольным текстам.

    Подсистема контроля знаний основана на морфологическом, синтаксическом и семантическом
    анализе текста.

    Разработчики: Амелина Ю.В. – магистрант; Мокроусов М.Н. – аспирант; Кучуганов
    В.Н. Руководитель д.т.н., проф. В.Н.Кучуганов.

    12.

    GUSTAV – интерактивная обучающая система «азбука английского» – для дошкольников
    и школьников младших классов.

    Разработчики: Григорьева Ю.В., Томилова С.А. – студенты 4 курса. Руководитель
    д.т.н., проф. В.Н.Кучуганов.

