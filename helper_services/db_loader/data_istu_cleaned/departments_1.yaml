  name: Санаторий-профилакторий
  keywords: электросветолечение, общеобразовательных, продолжительностью, распространенность,
    функционирования, государственного, профилактических
  text: 'Санаторий-профилакторий

    Контакты подразделения

    8(3412) 77-60-55, доб. 9291

    Телефон

    sanprof@istu.ru

    Почта

    Положение о подразделении

    О подразделении

    Для обучающихся

    Новости

    Цель

    Санаторий-профилакторий является многопрофильным лечебно-санаторно-курортного
    типа,

    профилактическим структурным подразделением, предназначенным для проведения лечебных
    и оздоровительных мероприятий со студентами, преподавателями и сотрудниками Университета
    с учетом условий их учебы, труда и быта и особенностей работы Университета.

    Задачи

    оказание лечебно-профилактической, а в случае необходимости, консультационно диагностической
    помощи в максимально возможном объеме;

    укрепление здоровья студентов, преподавателей и сотрудников Университета, формирования
    у них навыков здорового образа жизни - рaзумное сочетание учебы и труда, отдыха
    и лечения, рационального питания, предупреждение и профилактика различных заболеваний,
    вредных привычек, наркозависимости и снижение на основе этого заболеваемости.

    Известно, что на состояние здоровья подрастающего поколения оказывает влияние
    сложный комплекс разнообразных факторов, среди которых особое место принадлежит
    учебной нагрузке, связанной с интенсивной умственной деятельностью, нарушением
    режима труда и отдыха, гиподинамией, стрессовыми ситуациями. В этой  связи во
    многих странах мира студенчество, как социальная группа, выделено в отдельную
    группу риска. Следует отметить, что на сегодня лишь 9% выпускников общеобразовательных
    учреждений России могут быть признаны здоровыми, а распространенность среди молодежи
    разнообразных болезней и функциональных расстройств превышает 73%.

    В состоянии умеренного и выраженного стресса, обусловленного учебой, находятся
    от 30% до 52% учащихся вузов.

    Анализ состояния здоровья студентов ИжГТУ показал, что среди студентов отмечается
    высокая распространенность ряда заболеваний и функциональных расстройств.  В целом
    полученные данные свидетельствуют о  неблагополучной ситуации со здоровьем студентов
    ИжГТУ, что говорит об актуальности проведения оздоровительных, профилактических
    и лечебных мероприятий в ВУЗе.

    Санаторий-профилакторий оздоравливает студентов очной бюджетной формы обучения,
    сотрудников и преподавателей и их детей. Оздоровление преподавателей и сотрудников
    проходит в соответствии с программой «Обеспечение системы мероприятий по профилактике
    заболеваемости, оздоровлению и лечению работников ИжГТУ», являющейся приложением
    к коллективному договору.

    Лечебная база представлена следующими отделениями и кабинетами: электросветолечение,
    теплолечение, лечебные души, ингаляторий, ЛФК, лечебный массаж, процедурный кабинет,
    кабинет фитотерапии, гелиотерапии. В 2010 г. открыт кабинет сухого вытяжения позвоночного
    столба с помощью вибромассажа. В 2011 году кабинет вибромассажа с методикой Relaks.
    В 2013 открыт кабинет кислородного фитококтейля.

    В летний период в санатории-профилактории организуются заезды «Мать и дитя» для
    сотрудников вуза и их детей.

    В лечении используются привозные питьевые воды.

    С 2010 г. в санатории-профилактории проводится лечение и оздоровление студентов-спортсменов
    ИжГТУ, членов сборных команд по волейболу, играющих на Первенство и кубок России.

    Разработана и внедрена программа оздоровления и коррекции заболеваний позвоночного
    столба и суставов, в т.ч. последствий спортивных травм у студентов.

    Разработана и внедрена программа оздоровления и профилактики спортивной травмы
    у студентов-спортсменов, членов сборных команд Университета.

    Разработан и внедрен комплекс лечения заболеваний позвоночника у сотрудников и
    преподавателей ИжГТУ.

    Основные методы лечения

    Аппаратная физиотерапия:

    гальванизация,

    электрофорез с лекарственными веществами.

    ДДТ,

    Дарсонвализация,

    УВЧ,

    ультразвук,

    ультразвук с лекарственными веществами (фонофарез),

    СМТ-терапия «Рефтон»,

    магнитотерапия,

    биоптрон большой и маленький,

    УФО,

    терапия инфракрасным излучением,

