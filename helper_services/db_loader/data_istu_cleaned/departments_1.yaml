    Положение о подразделении

    О подразделении

    Новости

    Сотрудники

    Кафедра «Русский язык как иностранный»

    осуществляет обучение русскому языку как иностранному иностранных граждан и лиц
    без гражданства.

    НАПРАВЛЕНИЯ РАБОТЫ

    •

    Курсы русского языка как иностранного

    •

    Подготовка к поступлению и обучению в российском вузе

    (инженерно-технологическое, технологическое, естественно-научные, медико-биологическое,
    гуманитарное направление)

    •

    Знакомство с социальной и культурной жизнью

    Ижевска и Удмуртской Республики

    •

    Творческие мероприятия

    •

    Лингводидактическое тестирование по русскому языку как иностранному (

    ТРКИ/ TORFL

    )

    СРОКИ ОБУЧЕНИЯ

    Кафедра предлагает два варианта обучения:

    1) 1 учебный год (10 месяцев (два семестра) – с сентября по июнь текущего года),

    2) 1,5 учебных года (15 месяцев (три семестра) – с февраля по июнь текущего года
    (5 месяцев) и сентября по июнь последующего года (10 месяцев)).

    Предлагаемые кафедрой учебные программы рассчитаны на разные периоды обучения
    в зависимости от желания, возможностей и инициатив обучающихся, а также от времени
    их въезда в страну:

    – студенты, въехавшие в Россию не позднее ноября, зачисляются на годовую программу
    обучения,

    – студенты, въехавшие в Россию начиная с декабря, зачисляются на полуторагодовую
    программу обучения.

    УСЛОВИЯ ОБУЧЕНИЯ

    Группы комплектуются начиная с сентября и состоят из 12-15 человек.

    Заявки на обучение принимаются в течение года.

    По всем вопросам, связанным с получением приглашения и оформлением документов
    на визу, следует обращаться в

    Регистрационно-визовый сектор.

    Занятия ведутся с использованием современных технологий в офлайн и онлайн формате
    на английском языке, а со студентами, приехавшими из арабских стран, – с поддержкой
    арабского языка.

    Обучение осуществляется по уникальной, разработанной на кафедре программе, позволяющей
    по завершении обучения достигнуть уровня владения русским языком не ниже уровня
    В2, а при серьёзном подходе студентов и интенсивности обучения – С1.

    Обучение завершается в середине июня.

    По завершении обучения студенты сдают итоговый экзамен по русскому языку как иностранному
    и получают сертификаты государственного образца, позволяющие им поступить в любые
    российские университеты без дополнительных вступительных испытаний по русскому
    языку и подтверждающие следующие уровни владения языком:

    – I сертификационный уровень (ТРКИ-1) / B1 (для обучения по программам бакалавриата);

    – II сертификационный уровень (ТРКИ-2) / B2 (для обучения по программам магистратуры);

    – III сертификационный уровень (ТРКИ-3) / C1 (для обучения по программам аспирантуры).

    Тестирование проводится в

    Центре тестирования

    Тестирование проводят:

    Некипелова Ирина Михайловна

    ,

    Созина Екатерина Олеговна

    В конце июня студенты получают документы об окончании обучения и сертификат с
    результатами экзамена по русскому языку.

    Кроме сертификата студентам выдаётся справка об освоенных ими и сданных дисциплинах
    выбранного ими направления для предоставления в приёмную комиссию университета.

