    Задачи Службы охраны труда и экологической безопасности

    обеспечение выполнения требований законодательных, нормативно-правовых документов
    в области охраны труда и охраны окружающей среды;

    организация и ведение профилактической работы по оказанию и обеспечению здоровых
    и безопасных условий и охраны труда работников и обучающихся в университете, предупреждению
    производственного травматизма и профессиональных заболеваний, недопущению аварий
    и загрязнения окружающей природной среды на объектах университета;

    оперативный контроль за состоянием и условиями охраны труд работников и обучающихся
    университета;

    участие в работе комиссий по контролю за состоянием и условиями и охраны труда
    работников и обучающихся в университете;

    организация проведения всех видов инструктажей, обучения и проверки знаний по
    охране труда с работниками и обучающимися в университете;

    организация работ по проведению аттестации рабочих мест в университете по условиям
    труда.

