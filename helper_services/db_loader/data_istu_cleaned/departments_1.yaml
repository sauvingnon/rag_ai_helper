    Гришина Е.П., Григорьева О.О., Ахмедзянов Э.Р., Бушмакина Т.В.

    История развития кафедры «Профессиональная педагогика»

    Кафедра «Профессиональная педагогика» основана в 1997 году на базе Инженерно-педагогического
    факультета. Необходимость создания кафедры была вызвана потребностями рынка труда
    в подготовке педагогических кадров для учреждений среднего и начального профессионального
    образования. Развитие промышленности региона невозможно без высококвалифицированных
    рабочих, мастеров, инженеров. Преподавателю, занимающемуся подготовкой таких кадров,
    не достаточно иметь высшее техническое образование. Основной проблемой техникумов,
    колледжей, профессиональных училищ и лицеев является то, что зачастую преподаватели
    и мастера производственного обучения этих учреждений не имеют специального педагогического
    образования. Это несомненно сказывается на качестве профессиональной подготовки.

    За 21 год плодотворной работы кафедра выпустила специалистов различных областей:
    учителей общеобразовательных школ по физике, математике, черчению, преподавателей
    в области профессионального образования, инженеров-технологов, конструкторов,
    бакалавров по направлению «Технологическое образование», магистров по направлениям
    «Технологическое образование» и «Педагогическое образование». На кафедре защитились
    более 20 докторов и кандидатов педагогических наук.

    История создания и развитие кафедры неразрывно связаны с именами ученых, известных
    далеко за пределами Удмуртской Республики.

    Большой вклад в развитие кафедры внес декан Инженерно-педагогического факультета
    профессор

    Мочалов Вячеслав Львович

    , кандидат технических наук, Заслуженный работник культуры УР, Почетный работник
    ВПО РФ, Член УМО по профессионально-педагогическому образованию РФ.

    Кафедра по праву гордится своей научной работой, основа для которой была заложена
    заслуженным работником высшей школы РФ, почетным профессором ИжГТУ имени М.Т.Калашникова,
    доктором педагогических наук, профессором

    Вячеславом Сергеевичем Черепановым

    . Научная школа «Квалиметрия образования имени профессора В.С. Черепанова» широко
    известна своими трудами в области квалиметрии образования. Под научным руководством
    профессора В.С. Черепанова было защищено 10 докторских диссертаций в области квалиметрии
    образования.

    Научная школа профессора В.С. Черепанова и ученики Вячеслава Сергеевича поддерживают
    тесное сотрудничество с образовательными организациями: Уральским отделением Российской
    Академии образования, государственным научным учреждением «Исследовательский центр
    проблем качества подготовки специалистов» (г. Москва), ФГАОУ ВПО «Российский государственный
    профессионально-педагогический университет» (г. Екатеринбург).

    В настоящее время руководителем научной школы «Квалиметрия образования имени профессора
    В.С. Черепанова» является кандидат физико-математических наук, доктор педагогических
    наук, профессор

    Юрий Александрович Шихов

    . Ю.А. Шихов занимается фундаментальными и прикладными исследованиями в области
    квалиметрии образования в аспекте оценки качества учебных занятий, учебно-методической
    литературы, педагогических контрольных материалов; выпускных квалификационных
    и дипломных работ; магистерских, кандидатских и докторских диссертаций; а также
    квалиметрического мониторинга фундаментальной подготовки специалистов в техническом
    вузе. Является автором более 180 научных работ, в том числе 6 монографий, более
    30 учебных и учебно-методических работ, 5 авторских свидетельств на изобретение,
    3 свидетельств о государственной регистрации программы для ЭВМ.

    Научные исследования по основным направлениям школы сегодня ведутся под руководством
    доктора педагогических наук, профессора

    Ольги Федоровны Шиховой

    , и доктора педагогических наук, профессора

    Семина Юрия Николаевича

    . Научные статьи посвящены исследованиям в области стандартологии образования
    (обоснование и выбор критериев оценки качества образовательных стандартов, разработке
    компетентностно-ориентированных образовательных программ и средств диагностики).

    В настоящее время на кафедре активно развивается научное направление, связанное
    с исследованием возможностей использования дистанционных образовательных технологий
    в учебном процессе, проводятся исследования в области инклюзивного образования,
    проектного обучения и междисциплинарности.

    Кафедра «Профессиональная педагогика» – единственная в Удмуртской Республике кафедра,
    выпускающая преподавателей технических дисциплин по направлению 44.03.04 – Профессиональное
    обучение (по отраслям), профиль бакалавриата «Электроника, радиотехника и связь»

    Основная задача кафедры «Профессиональная педагогика» – это повышение качества
    профессиональной подготовки инженерных кадров, что в свою очередь обеспечит уверенное
    развитие промышленности Удмуртской Республики и улучшение экономической ситуации
    в России.

    В 2020 году произошло объединение двух кафедр «Инженерная графика и технология
    рекламы» и «Профессиональная педагогика» и кафедра получила название

    «Инженерная графика, профессиональная педагогика и технология рекламы»

    Образовательные программы

