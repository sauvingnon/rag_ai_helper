    корпус 4

    ,

    Физическому воспитанию и спортивной подготовке студентов в университете уделяется
    большое внимание. Курс физической культуры введен в учебную программу всех факультетов.
    Занятия по физической культуре и спорту проводятся с целью укрепления здоровья,
    всестороннего развития студентов и  подготовки здоровых кадров для предстоящей
    трудовой деятельности.

    В настоящее время кафедра обеспечивает учебный процесс одновременно как общеобразовательная –
    преподавание федеральной дисциплины «Физическая культура и спорт» и как выпускающая –
    подготовка бакалавров по направлению 49.03.01 «Физическая культура» (очная и заочная
    формы обучения), а также  магистратура 49.04.01 «Физическая культура» (заочная 
    форма обучения.

    Учебные занятия по физической культуре и спорту проводятся с 1 по 3 курсы на 9
    факультетах по специализациям: аэробика, легкая атлетика, атлетическая гимнастика,
    волейбол, футбол, баскетбол, лечебная физкультура, бадминтон, плавание, восточное
    боевое единоборство.

    Хороший контакт кафедры со студенческой поликлиникой обеспечивает своевременный
    медицинский осмотр студентов в начале учебного года и последующий анализ их здоровья.
    Для студентов, отнесенных по состоянию здоровья к спецгруппе и ЛФК, медосмотр
    проводится дважды в год.

    Кафедра физического воспитания была создана в 1952 году, в год основания механического
    института.

    Должность первого заведующего кафедрой занял выпускник института физической культуры
    им. П.Ф. Лесгафта А.М. Герасимов. В 1954 году эстафету руководства кафедрой принял
    Е.В. Ханыков также выпускник института им. П.Ф. Лесграфта.

    С 1955 по 1988 годы (более 30 лет) заведующим кафедрой был

    А.В. Ходыкин

    Обязательные занятия по физической культуре были введены вначале на первом, а
    затем и на втором курсах института, были созданы секции волейбола, баскетбола,
    шахматы, лыжная секция, легкая атлетика.

    Отличительной чертой в работе кафедры с первых лет ее существования стало вовлечение
    в спортивно-массовую работу студенческого актива, привлечение широких студенческих
    масс к занятиям физической культурой и спортом. Уже в 1956 году «Механики» выиграли
    эстафету Мира, городские и республиканские турниры по легкой атлетике, баскетболу,
    гандболу, волейболу, шахматам, боксу, настольному теннису, стрельбе, водно-моторным
    видам спорта.

    Успешное выступление в студенческой спартакиаде открыло путь спортсменам на зональные
    соревнования Первой российской универсиады, а затем и в финал российских и Всесоюзных
    студенческих игр. Выход спортсменов на такой уровень соревнований способствовал
    росту мастерства студентов.

    Для 60-х годов незабываемым событием в спортивной истории механического института
    стало строительство своего стадиона «Буревестник» силами студентов и преподавателей.
    Стадион впервые в истории страны был награжден спорткомитетом СССР первой премией
    за самодеятельное строительство.

    В 2013 году стадиону «Буревестник» было присвоено имя Ходыкина А.В., почетного
    профессора ИжГТУ имени М.Т. Калашникова.

    В 1970 году было закончено строительство водно-моторной станции на ижевском пруду,
    спортивно-оздоровительного лагеря в с. Галево Воткинского района.

    В 1984 году началась стройка третьего учебного корпуса с двумя спортивными залами.
    Спортивный комплекс был сдан в 1986 году. Его открытие существенно повлияло на
    учебный процесс, на массовость и мастерство в таких видах как волейбол, баскетбол,
    настольный теннис.

    Заведующие кафедрой

    Герасимов А.М.

    Ханыков Е.В.

    Ходыкин А.В.

    Ланцев Г.Н.

    Галичанина З.М.

    Манохин Е.П.

    С 2002 по 2012 гг. на базе кафедры физвоспитания был организован факультет «Физическая
    культура и спорт» – декан Гибадуллин И.Г.

    С 2012 г. по 2018 г. – зав. кафедрой Лукин В.М. Кафедра «Физическая культура и
    спорт» входила в состав факультета «Право и гуманитарные науки».

    С 2018 г. по наст. время – зав. кафедрой «Физическая культура и спортивные технологии»
    к. пед. н.,  доцент Кожевников В.С.

    Образовательные программы

    49.04.01 «Физическая культура» «Управление подготовкой спортсменов высокой квалификации»

    (Магистратура)

    49.03.01 «Физическая культура» «Спортивная тренировка»

    (Бакалавриат)

