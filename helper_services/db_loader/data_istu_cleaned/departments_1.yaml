    Институт международных образовательных программ создан 1 сентября 2018 г. на базе
    управления международного образования и сотрудничества, Института переводчиков
    в профессиональной сфере и кафедр «Английский язык», «Лингвистика» и «Научно-технический
    перевод и межкультурная коммуникация».

    В Институте реализуются образовательные программы для российских и иностранных
    обучающихся в следующих направлениях:

    подготовка иностранных граждан и лиц без гражданства к освоению профессиональных
    образовательных программ на русском языке;

    обучение российских и иностранных обучающихся по программам бакалавриата, частично
    реализуемым на английском языке;

    обучение российских и иностранных обучающихся по программам бакалавриата «Лингвистика»
    и «Фундаментальная и прикладная лингвистика»;

    подготовка всех студентов университета по языковым дисциплинам («Иностранный язык»,
    «Русский язык и культура речи»);

    переподготовка студентов и преподавателей университета по программе «Переводчик
    в сфере профессиональной коммуникации»;

    совместное с Южноморавским центром международной мобильности обучение студентов
    и преподавателей университета чешскому языку.

    Институт сотрудничает со всеми факультетами и институтами университета в рамках
    разработки и реализации совместных образовательных программ двух дипломов, программ
    академической мобильности и стажировок студентов и преподавателей.

