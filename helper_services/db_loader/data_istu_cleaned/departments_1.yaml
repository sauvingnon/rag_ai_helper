    Сегодня на кафедре «Технология промышленной и художественной обработки материалов»
    (ТПиХОМ) реализуется двухуровневая система образования: бакалавриат-магистратура.
    Реализуется 3 образовательные программы, из них:

    Две программы БАКАЛАВРИАТА – направления:

    29.03.04

    «Технология художественной обработки материалов», профиль подготовки «Проектирование
    и технологии изготовления художественно-промышленных изделий. Форма обучения:
    очная, заочная,

    54.03.01

    «Дизайн», профиль подготовки «Дизайн интерьера». Форма обучения: очная, очно-заочная;

    Одна программа МАГИСТРАТУРЫ, направление

    29.04.04

    «Технология художественной обработки материалов» по программе «Художественное
    проектирование и производство изделий из древесины и стекла и ансамблей на их
    основе»: руководитель программы д.т.н., профессор Черных Михаил Михайлович. Форма
    обучения: очная, заочная;

    Уникальность кафедры «ТПиХОМ» заключается в том, что в техническом вузе ведется
    обучение по направлениям инженерно-художественной направленности. Художественно-дизайнерская
    подготовка становится весьма необходимой выпускникам не только кафедры «ТПиХОМ»,
    но и специалистам в области машиностроения и приборостроения, поскольку внешний
    вид, дизайн изделий являются важными составляющими потребительских свойств продукта,
    во многом определяющими в рыночных условиях его конкурентоспособность.

    В составе кафедры 6 кандидатов наук, 2 доктора наук, 3 члена «Союза художников
    России», 3 старших преподавателя. Ведется подготовка специалистов по сокращенным
    срокам обучения на базе ВО, СПО специальности «Дизайн (по отраслям)» очной формы
    обучения.

    Целью направлений «Технология художественной обработки материалов» и «Дизайн»
    является подготовка специалистов по созданию художественно-промышленных изделий
    из материалов разных классов, средовых объектов, проектирование интерьеров промышленного,
    общественного или жилого назначения.

    Направления находятся на стыке искусства, науки и промышленности, весьма благоприятном
    для реализации творческих способностей. Широкий спектр изучаемых дисциплин от
    художественных и гуманитарных до специальных технических дает возможность стать
    универсальным специалистом, способным разрабатывать как дизайн – проекты художественных
    изделий, так и техническую документацию для их внедрения в производство.

    В процессе обучения в теории и на практике изучаются современные материалы, технологии
    их обработки и оборудование, осваиваются компьютерные программы, необходимые в
    проектно – художественной деятельности: Adobe Photoshop, Corel Draw, 3DS Max,
    Компас и др.

    Кафедра ТПиХОМ готовит квалифицированных специалистов в сфере производства художественно-промышленных
    изделий, в том числе мебели и средового оборудования, изделий прикладных искусств,
    на предприятиях легкой, текстильной, ювелирной и деревообрабатывающей промышленности,
    в области полиграфии и web–дизайна, а также в сфере научных исследований по направлению
    технической эстетики и дизайна. Они могут занимать следующие должности:

    дизайнер;

    конструктор;

    технолог;

    художник-оформитель;

    начальник дизайнерского отдела;

    руководитель проектно-художественной мастерской и другие.

    Учеными кафедры установлены и поддерживаются тесные связи с вузами РФ по направлениям
    ТХОМ и Дизайн (СПбГУПТД, МГГУ, МГХПА им. С.Г. Строганова, ИрГтУ, СВФУ им. М.К.
    Аммосова, ЮРГТУ, ДГТУ, МаГУ и др.).

    Кафедра тесно сотрудничает с крупными и малыми предприятиями УР и города Ижевска:
    ОАО «Концерн «Калашников», ООО «Ижевские ружья», ОАО «НПО «Ижмаш», ОАО «ИМЗ»,
    ООО «ТПК Светлый город», ООО «ЭгоВуд», ООО «ТПК ЭДЕЛЬВЕЙС», ООО «Альфа-Мебель»,
    ООО «Алтрейдс», ИП Воронцов К.Н., ИП Буторин А.М., ИП Шарипов Р.Ж., ООО «Ижмашпроект»,
    ООО ПКИ «Промпроект», ГУП УР «Институт комплексного проектирования», Студия дизайна
    «DL», ООО «Фабрика Мирлачева», ООО «МСТ-Мебель», ООО «Мастер Кларк», ООО «ГРОССО
    мебель», ООО «Деко» и многими другими.

    Студенты кафедры ежегодно становятся призёрами внутривузовских, региональных,
    всероссийских и международных конкурсов, фестивалей и выставок.

    Наибольшее влияние на выбор абитуриентами направлений обучения оказывают креативность
    образовательных программ, предлагаемых кафедрой ТПиХОМ, востребованность выпускников
    рынком и успешность трудоустройства, возможность получения интересной творческой
    работы после окончания ВУЗа. Важное значение также имеют профессионализм преподавателей
    кафедры, высокий уровень материально-технической базы и методического обеспечения.

    История кафедры «Технология промышленной и художественной обработки материалов»
    (ТПиХОМ) началась с открытия в 1996 году новой специальности «Технология художественной
    обработки материалов». Открытию специальности предшествовала большая организационная
    работа: с руководством предприятий Удмуртии были обсуждены перспективы развития
    новой специальности, а в 1996 году на базе ИжГТУ проведена республиканская выставка
    художественно-промышленных изделий Удмуртской Республики. Большую помощь и поддержку
    оказал в то время директор Удмуртского института истории, языка и литературы Куликов
    Кузьма Иванович – заслуженный деятель науки РФ и Почетный гражданин УР. Главная
    идея – развитие национальных традиций, а также новых технологий в производстве
    художественно-промышленных товаров Удмуртской республики.

    Кафедра ТПиХОМ была создана в ноябре 2000 года. В разное время кафедра готовила
    инженеров – художников, инженеров – технологов, дизайнеров, полиграфистов, рекламщиков
    в области художественного дизайна в рекламе.

    Основателем и организатором кафедры является

    д.т.н., профессор Черных Михаил Михайлович

    , заслуженный работник высшей школы РФ, заслуженный деятель науки и образования
    Удмуртской республики.

    Окончив с отличием Ижевский механический институт в 1969 г., М.М.Черных работал
    до 1971 г. инженером-технологом и старшим инженером-технологом на Ижевском машиностроительном
    заводе. В 1971 г. поступил в очную аспирантуру Ижевского механического института,
    которую окончил в 1974 г. Затем работал в Ижевском механическом институте старшим
    научным сотрудником исследовательского сектора кафедры «Машины и технология ОМД»,
    начальником отраслевой лаборатории «Новые технологические процессы и оборудование
    ОМД», доцентом, заместителем декана Робототехнического факультета, профессором.
    В 1997 г. возглавил кафедру «Машины и технология ОМД». С 1999 по 2002 г.г. — декан
    Робототехнического факультета. С 2002 г. по 2018 г.г. декан факультета «Реклама
    и дизайн». С 2018 г. и по настоящее время  работает профессором кафедры «Технология
    промышленной и художественной обработки материалов».

    В 1977 г. М.М.Черных защитил кандидатскую диссертацию, в 1993 г. — докторскую
    диссертацию, в 1995 г. ему было присвоено ученое звание профессора. Общий стаж
    научно-педагогической работы М.М.Черных — 45 лет.

    Из воспоминаний (интервью) Черных Михаила Михайловича

    «В 90-е годы резко изменилась ситуация на рынке труда. Развитие малого и среднего
    бизнеса потребовало подготовки специалистов новых направлений. Приведу только
    один пример. За 2-3 года на предприятии «Ижмебель» на порядок расширился ассортимент
    выпускаемой продукции, а число мебельных предприятий в Удмуртской республике увеличилось
    кратно. Нужны были новые, более «гибкие» и универсальные специалисты, адаптированные
    к рыночным условиям. Для удовлетворения потребностей рынка Министерство образования
    и науки поддерживало создание и развитие новых специальностей.

    Одной из востребованных специальностей, как показала двадцатилетняя практика,
    является «Технология художественной обработки материалов (ТХОМ)». Это направление
    особенно актуально для малого и среднего бизнеса. Образовательная программа охватывает
    полный цикл жизни продукции от создания творческого образа объекта до утилизации
    изделия. Студенты изучают художественные и технические дисциплины, востребованность
    продукции рынком. Выпускник подготовлен как к разработке творческих идей, так
    и их промышленной реализации.

    Инициатором и организатором данной специальности в России был известный ученый,
    автор многих учебников и монографий, лауреат престижных международных премий,
    профессор Куманин Владимир Игоревич, заведующий кафедрой Московского университета
    приборостроения и информатики, заслуженный деятель науки РФ.

    Сейчас по направлению «Технология художественной обработки материалов» ведется
    подготовка студентов более чем в 30 вузах России от Владивостока до Санкт-Петербурга,
    от Архангельска до Владикавказа.

    В 1994 году из Федерального УМО в ИМИ поступило предложение об открытии этой специальности.
    К тому моменту я защитил докторскую диссертацию, высвободилось время для организационной
    работы. В связи со слабой востребованностью тогда выпускников кафедры «Машины
    и технология обработки металлов давлением», из-за приостановки работы ряда заводов,
    было принято решение об организации на кафедре направления ТХОМ. В это время я
    руководил несколькими программами, финансируемыми Министерством образования и
    науки. В результате их выполнения, сложился коллектив единомышленников, будущий
    костяк нового направления: Крапивкин Владимир Яковлевич (заведующий лабораторией),
    Пьянков Александр Иванович (ст. преподаватель, впоследствии доцент), Рябчиков
    Алексей Вячеславович (аспирант). Вот такой командой мы начинали работу по созданию
    новой специальности.

    Инициативу поддержали ректор – Абрамов Иван Васильевич, он выдал доверенность
    для взаимодействия с предприятиями и организациями республики и декан робототехнического
    факультета – Пичугин Иван Кузьмич. Мы получили поддержку от предприятий, в первую
    очередь от Ижевского механического завода, одно из производств которого связано
    с декоративной отделкой охотничьего и огнестрельного оружия. Особую поддержку
    оказало структурное подразделение этого завода – Школа оружейного мастерства имени
    Леонарда Васева, руководимая добрейшим человеком, замечательным организатором
    Климовой Любовью Алексеевной, а впоследствии Ломаевой Людмилой Геннадьевной. Нас
    активно поддержали мебельные предприятия Удмуртии, испытывающие потребность в
    специалистах создаваемого направления, школы искусств республики и дворец творчества
    юных, увидевшие перспективу получения высшего образования творческого профиля
    их выпускниками, не выезжая из республики. Положительно восприняли информацию
    родители выпускников художественных школ.

    Для открытия специальности потребовалось решать комплекс задач – подготовить комплект
    документов и получить лицензию на право обучения, обеспечить учебный процесс кадрами,
    создать материальную базу и методическое обеспечение, организовать набор абитуриентов
    с творческими способностями. После многочисленных согласований и поездок получили
    заключение УМО и лицензию.

    В организацию материальной базы неоценимый вклад внес Крапивкин Владимир Яковлевич,
    имеющий большой опыт в организации материально-технического снабжения и практической
    работы на различном оборудовании, мастер на все руки. В 90-е годы предприятия
    активно продавали оборудование, можно было недорого приобрести станки, кафедра
    оснастилась оборудованием, необходимым для художественной обработки древесины.
    Впоследствии при поддержке нового ректора – Якимовича Бориса Анатольевича было
    приобретено современное дорогостоящее оборудование по обработке древесины и художественного
    стекла и организован Центр коллективного пользования «Инновационные технологии
    художественной обработки материалов», высокий уровень технического оснащения которого
    позволил не только создавать уникальные изделия, но и проводить коммерческие практики
    студентов ведущих вузов Москвы, Санкт-Петербурга, Томска и других городов России.

    Инженерные дисциплины специальности были освоены собственными преподавателями,
    художественные – преподавателями Удмуртского государственного университета. Нас
    поддержали члены Союза художников России – Козлов Борис Михайлович (скульптор,
    художник), Горбатков Павел Васильевич (художник), Лукьяненко Василий Сергеевич
    (дизайнер, архитектор, художник), Тишин Владимир Дмитриевич (художник), Прокопьев
    Виктор Николаевич (художник), Первина Любовь Ивановна (дизайнер) и др.

    Особенности специальности, двуединство ее художественной и технической составляющей
    показали необходимость специализированной подготовки преподавателей, знающих как
    творческую художественную, так и инженерную стороны обучения. Оказалось, что лучше
    всего в качестве преподавателей подходят наши выпускники, которые знают специфику
    специальности «изнутри». Их подготовку удалось организовать через аспирантуру.
    Уже из первого выпуска, который состоялся в 2001 г., в аспирантуру поступили сразу
    четверо: Ложкин Юрий Валериевич, Конягина Татьяна Владимировна, Пахомова Надежда
    Юрьевна, Дрюкова Анна Эдуардовна. Впоследствии в аспирантуре обучались Санду Ольга
    Михайловна, Поярков Андрей Валерьевич, Сергеева Вера Владимировна, Сурнина Наталья
    Александровна, Федяева Евгения Владимировна, Останина Полина Александровна, Загоруйко
    Александра Андреевна, Валиева Гульназ Рафисовна. Большинство из них, защитившись,
    работают на кафедре.

    Для обеспечения набора абитуриентов с творческими способностями организовали вузовскую
    олимпиаду школьников по художественным дисциплинам. В проведении олимпиады, оценке
    качества работ абитуриентов активно помогали директор «Школы оружейного мастерства
    имени Леонарда Васева» Климова Любовь Алексеевна, директор школы искусств № 9
    Власов Александр Петрович, директор школы искусств № 11 Плотников Алексей Алексеевич
    и преподаватели кафедры. Набор абитуриентов через олимпиаду продолжается в настоящее
    время, кафедра и специальность продолжают развиваться.

    Также в разное время на кафедре были открыты направления «Дизайн», «Реклама» и
    «Полиграфия». Полиграфию открывал Рябчиков Алексей Вячеславович.

    Первым заведующим кафедрой был Пьянков Александр Иванович, к.т.н., доцент, который
    руководил кафедрой с 15.11.2000 г. по декабрь 2008 г. Затем, с декабря 2008 г.
    по декабрь 2012 г. кафедрой руководил Рябчиков Алексей Вячеславович, к.т.н., доцент.
    Следующим заведующим с 2013 г. по сентябрь 2019 г. была Санду Ольга Михайловна,
    к.т.н., доцент. С сентября 2019 г. по настоящее время заведующим кафедрой является
    Ложкин Юрий Валериевич, к.т.н., доцент.

    Направления кафедры

    В настоящее время на кафедре ведется подготовка бакалавров и магистров по направлению
    29.03.04 «Технология художественной обработки материалов», профиль «Проектирование
    и технологии изготовления художественно-промышленных изделий», и бакалавров по
    направлению 54.03.03 «Дизайн», профиль «Дизайн интерьера».

    1. «Технология художественной обработки материалов»

    Направление подготовки находится на стыке искусства, науки и промышленности, весьма
    благоприятном для реализации творческих способностей. Широкий спектр изучаемых
    дисциплин от художественных и гуманитарных до специальных технических дает возможность
    стать универсальным специалистом. На специальности изучаются различные технологии
    изготовления и обработки художественно-промышленных изделий, материалов и оборудования.
    Ведется обучение современным компьютерным технологиям.

    Выпускники владеют такими дизайнерскими и конструкторскими программами как Adobe
    Photoshop, Corel DRAW, 3ds Max, Компас-3D и др.

    В процессе обучения выполняются работы для реальных заказчиков. Логически завершенный
    цикл обучения позволяет выпускникам успешно реализовать себя в условиях рынка.
    Студенты учатся не только вырабатывать и воплощать идеи, но и вести собственный
    бизнес.

    Выпускники работают дизайнерами, дизайнерами-конструкторами, технологами, менеджерами-консультантами
    по реализации художественных изделий, руководителями малых предприятий, специализирующихся
    на проектировании и производстве мебели, художественных изделий и оформлении интерьеров.

    2. «Дизайн»

    Выпускники направления «Дизайн» профессионально подготовлены к художественному
    проектированию мебели и интерьеров, способны формировать гармоничный облик внутренних
    пространств жилых, общественных и производственных зданий.

    Образовательная программа предусматривает изучение предметов дизайна, искусства
    и декоративного убранства, а также различных технологий, материаловедения, инженерного
    конструирования, экономики и компьютерных программ.

    Студенты осваивают весь цикл проектирования от исследования и поиска идеи продукта
    до стадии разработки и изготовления промышленного образца.

    Область профессиональной деятельности художника-проектировщика, владеющего знаниями
    в области архитектуры, изобразительного и декоративно-прикладного искусства –
    это промышленные предприятия, проектные и конструкторские бюро, творческие организации,
    художественные учебные заведения и др.

    Специфика кафедры заключается в том, что студентам в полном объеме даются знания
    как технического, так и гуманитарного плана. Выпускники кафедры – инженеры-технологи,
    инженеры-проектировщики, дизайнеры – это, прежде всего, творческие личности, изобретатели
    с эстетическим вкусом.

    Основная задача кафедры – подготовка специалистов, знающих производство. Кафедра
    готовит специалистов высокого класса благодаря квалифицированному преподавательскому
    составу. К учебному процессу привлекаются известные в республике и за её пределами
    ученые-инженеры, художники и дизайнеры.

    На кафедре читают различные художественные, проектные, конструкторско-технологические
    дисциплины. К основным дисциплинам можно отнести следующие – композицию, рисунок,
    живопись, историю искусств, проектную графику, компьютерный дизайн, технологию
    обработки материалов, оборудование для реализации технологии художественной обработки
    материалов, механические свойства и испытания материалов, разработку конструкторско-технологической
    документации, 3d-моделирование и анимация, компьютерное проектирование, технологии
    изготовления художественных изделий из металлов и сплавов, мастерство, моделирование
    художественных изделий в материале, промышленный дизайн, технологии соединения
    материалов в художественных изделиях, скульптуру и лепку, технологии изготовления
    художественных изделий из стекла, компьютерную подготовку производства художественных
    изделий, технологии изготовления художественных изделий из древесины и древесных
    материалов, художественное материаловедение, проектирование и конструирование
    в дизайне, историю и теорию дизайна, компьютерное моделирование в дизайне, эргономику
    и антропометрию в проектировании, макетирование и моделирование, оборудование
    и технологии в дизайне, производственное мастерство, декоративную отделку и др.

    Кафедра активно и плодотворно сотрудничает с различными предприятиями и организациями
    республики.

    Многие студенты успешно занимаются художественно-выставочной и научно-исследовательской
    работой, постоянно участвуют в конкурсах различного уровня, ежегодно занимают
    призовые места во Всероссийских конкурсах студенческих работ по специальности
    «Технология художественной обработки материалов».

    Образовательные программы

    29.04.04 «Технология художественной обработки материалов» «Художественное проектирование
    и производство изделий из древесины и ансамблей из материалов разных классов»

    (Магистратура)

    29.03.04 «Технология художественной обработки материалов» «Проектирование и технологии
    изготовления художественно-промышленных изделий»

    (Бакалавриат)

    54.03.01 «Дизайн» «Дизайн интерьера»

    (Бакалавриат)

    На кафедре ТПиХОМ многие годы функционирует научная школа под руководством д.т.н.,
    профессора, заслуженного работника высшей школы РФ, заслуженного деятеля науки
    и образования Удмуртской республики Черных Михаила Михайловича.

    Основные направления научно-исследовательской деятельности научной школы:

    Разработка конструкции и технологии автоматизированного производства эргономичных
    элементов удержания спортивного и охотничьего ружья;

    Разработка технологии фактурообразования на художественно-промышленных изделиях,
    получаемых из материалов разных классов, создание методов оценки восприятия и
    прогнозирования фактуры;

    Разработка технологии лазерного гравирования материалов художественно-промышленных
    изделий;

    Исследование закономерностей спекания листового стекла и стеклянной крошки с целью
    повышения эстетических свойств художественных изделий;

    Дизайн художественно – промышленных изделий из древесины и древесных материалов.

    Результаты деятельности научной школы профессора Черных М.М. регулярно докладываются
    на ежегодных научно-практических конференциях, таких, как:

    Международная научно-практическая конференция «Наука и образование в области технической
    эстетики, дизайна и технологии художественной обработки материалов» г. С.-Петербург.
    С.- Пб университет промышленных технологий и дизайна;

    Российская научно-практическая конференция с международным участием «Универсальный
    дизайн. Равные возможности - комфортная среда», г. Москва, Московский технологический
    университет – МИРЭА;

    Коллективом научной школы ежегодно публикуются более 20 статей в различных отечественных
    и зарубежных рецензируемых научных журналах и изданиях, таких как:

    Вестник ИжГТУ имени М.Т. Калашникова.

    Научный журнал «Дизайн. Материалы. Технология».

    Научный журнал «Интеллектуальные системы в производстве»

    Научно-практический журнал «Труды академии технической эстетики и дизайна».

    Научный журнал Томского института бизнеса «Gaudeamus Igitur».

    Сборник материалов ежегодной международной научно-практической конференции вузов
    России «Наука и образование в области технической эстетики, дизайна и технологии
    художественной обработки материалов» С.-Петербург, С.-Пб университет промышленных
    технологий и дизайна.

    Научный журнал «Стекло и керамика»;

    Научный журнал «Acta facultatis xylologiae Zvolen» (Словакия).

    Для апробации и выполнения научно-исследовательских работ на кафедре функционируют
    несколько проектно-производственных лабораторий:

    Лаборатория обработки древесины на станках с ЧПУ;

    Лаборатория художественной обработки древесины;

    Лаборатория художественной обработки стекла.

    Основные направления деятельности лабораторий:

    Разработка и изготовление экспериментальных образцов мебели и предметов интерьера;

    Разработка и изготовление декоративных изделий, украшений и сувениров;

    Разработка и изготовление малых архитектурных форм в материале;

    Обучение различным технологиям художественной обработки древесины и стекла.

    Научной школой подготовлены 13 кандидатов наук по научной специальности «Техническая
    эстетика и дизайн», проведены три Всероссийские научные конференции по направлению
    «Технология художественной обработки материалов» с изданием сборников научных
    трудов.

