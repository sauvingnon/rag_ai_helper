    связи». В настоящее время кафедра обеспечивает обучение студентов по программам:

    бакалавриат «Инфокоммуникационные сети и системы» – 4 года очно, 4 года и 6 мес.
    заочно

    магистратуры «Интернет вещей и искусственный интеллект» – 2 года очно, 2 года
    и 6 мес. заочно

    После завершения обучения по программе магистратуры выпускники имеют возможность
    продолжить обучение в аспирантуре по специальности «Системы, сети и устройства
    телекоммуникаций».

    Студенты кафедры готовятся к работе в следующих, а также смежных областях знаний:

    коммутация и маршрутизация в сетях,

    Имитационное моделирование сетей связи,

    Интернет вещей и анализ больших данных,

    IP-телефония (Asterisk),

    сетевое администрирование и операционные системы,

    программирование (языки C++, Python и Java),

    электроника и микропроцессорные устройства,

    сети беспроводной связи (WiFi, 5G),

    нейронные сети и машинное обучение в системах искусственного интеллекта,

    кибербезопасность,

    базы данных.

    Занятия проходят в лабораториях кафедры, оснащенных современным учебным и научным
    оборудованием, программным обеспечением и фирменными средствами онлайн-обучения
    от зарубежных компаний – лидеров отрасли: Cisco, D-Link, Huawei, Samsung, Oracle.
    Университет в лице кафедры является официальным представителем этих компаний.
    По результатам обучения студенты готовятся к сдаче экзаменов на международные
    сертификаты.

    Кроме основных образовательных программ высшего образования кафедра предлагает
    для студентов и специалистов программы дополнительного профессионального образования
    (ДПО)

