    Цель:

    Обеспечение функционирования системы экономической безопасности и противодействия
    коррупционным проявлениям, направленным на установление устойчивой и эффективной
    деятельности университета, сохранность материальных ценностей, профилактику, предупреждение
    и пресечение экономических и коррупционных правонарушений.

    Задачи:

    Выявление, оценка, анализ экономических факторов и коррупционных факторов, как
    внешнего свойства, так и внутреннего, оказывающих влияние на устойчивое, стабильное,
    эффективное и безопасное существование Университета.

    Выявление причин и условий, велущих к экономическим и коррупционным правонарушениям
    в Университете.

    Выработка рекомендаций для практического использования по предотвращению и профилактике
    экономических и коррупционных правонарушений в деятельности Университета, а также
    экономическая и антикоррупционная экспертиза внутривузовских нормативных актов
    и проектов.

    Организация защиты законных прав, интересов и имиджа Университета во взаимоотношениях
    с органами государственной власти, общественными организациями, отечественными
    и зарубежными партнерами.

    Обеспечение информацией по вопросам безопасности, полученной из открытых источников,
    руководства Университета.

    Организация работы по сохранению материальных, финансовых ресурсов Университета
    от потенциальных потерь и противодействию коррупционным проявлениям.

    Обеспечение координации и взаимодействия с государственными и правоохранительными
    органами в вопросах противодействия коррупции и экономической безопасности, а
    также со службами безопасности юридических лиц, входящих во взаимоотношения с
    Университетом.

    Оказание консультативной помощи по вопросам, связанными с применением на практике
    общих принципов служебного поведения сотрудников, студентов и аспирантов Университета,
    в том числе обязанности сообщать о ставших им известных фактах коррупционных проявлений
    и экономических преступлений.

    Создание в Университете благоприятного морального климата, способствующего качественному
    воспитательному и образовательному процессам.

