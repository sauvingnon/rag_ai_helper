    Положение о порядке и основаниях перевода, отчисления и восстановления обучающихся
    в ИжГТУ имени М.Т. Калашникова

    Правила внутреннего распорядка обучающихся ИжГТУ имени М.Т. Калашникова

    Положение о порядке предоставления академического отпуска, отпуска по беременности
    и родам, отпуска по уходу за ребенком до достижения им возраста трех лет

    Положение об экстернате в ИжГТУ имени М.Т. Калашникова

    Положение о порядке освоения факультативных и элективных дисциплин (модулей) в
