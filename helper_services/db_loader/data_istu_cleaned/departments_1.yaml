  text: 'Кафедра «Лингвистика»

    Баранов Виктор Аркадьевич

    доктор филологических наук, профессор

    заведующий кафедрой

    776055 (7112)

    корпус 7

    , каб. 412

    victor.a.baranov@istu.ru

    Контакты подразделения

    8 (3412) 77-60-55 доб. 7-210; 8-919-915-63-46

    Телефон

