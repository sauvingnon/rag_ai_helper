    Сотрудники

    Кафедра выпускает дипломированных специалистов в области двигателестроения и нефтегазового
    дела: сначала это была специальность «Ракетные двигатели», а с 1996 года к ней
    добавилась специальность «Двигатели внутреннего сгорания», c 2006 года началась
    подготовка инженеров-нефтяников по направлению/профилю «Технологические машины
    и оборудование/Машины и оборудование нефтяных и газовых промыслов», а c 2019 года
    началась подготовка нефтяников по направлению «Нефтегазовое дело».

    Фундаментальные знания, которые получают студенты за годы обучения на кафедре,
    конечно же, не могут даваться легко, зато после окончания обучения наши выпускники
    без труда адаптируются в условиях современных условий экономики и достаточно насыщенного
    рынка труда.

