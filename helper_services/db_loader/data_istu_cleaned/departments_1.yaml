    Цели

    обеспечение сохранности объектов Университета от любого рода угроз, противоправных
    посягательств, предупреждение и пресечение правонарушений на охраняемых объектах университета,
    проведение профилактических мероприятий по линии комплексной безопасности, поддержание
    необходимого пропускного и внутриобъектового режима, контроль за перемещением
    товарно-материальных ценностей.

    Задачи

    физическая защита охраняемых объектов Университета;

    осуществление комплексных мероприятий по предупреждению и пресечению преступлений
    и правонарушений на территории Университета;

    обеспечение социальной защиты работников Университета;

    контроль за обеспечением доступа на объекты Университета;

    поддержание надлежащего пропускного и внутриобъектового режимов;

    контроль за перемещением товарно-материальных ценностей;

    предупреждение и пресечение правонарушений на объектах Университета;

    охрана материальных ценностей, в том числе при их сопровождении;

    организация и осуществление профилактической работы в сфере пожарной безопасности;

    разработка в пределах предоставленной компетенции, мер по обеспечению пожарной
    безопасности;

    контроль за содержанием в исправном состоянии систем и средств противопожарной
    защиты, включая первичные средства тушения пожаров;

    проведение регламентно-восстановительных работ и обслуживание собственных инженерно-технических
    систем охраны, теле-видеонаблюдения, устройств контроля и ограничения доступа,
    радиосвязи и т.д;

    техническая и электронная защита охраняемых объектов Университета;

    инспектирование объектов на предмет выявления мест потенциальной опасности;

    составление актов и других контрольно-нормативных документов, кacaeмыx защищенности
    объектов Университета и его филиалов, а также контроль за их исполнением;

    аналитическая деятельность по контролю оперативной обстановки на территории Университета.

