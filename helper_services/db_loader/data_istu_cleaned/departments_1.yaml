    Положение о подразделении

    О подразделении

    Цель создания

    НОЦ «Экологическая энергетика, жилищно-коммунальное хозяйство и энергосбережение»:

    повышение уровня подготовки квалифицированных специалистов, соответствующих требованиям
    промышленных предприятий, предприятий и организаций ЖКХ и строительного комплекса;

    получение дохода от коммерциализации результатов научной и инжиниринговой деятельности
    в сфере энергоэффективности и энергосбережения систем генерации, транспортировки,
    распределения и использования энергии;

    становление НОЦ как ведущего научно-инновационного и образовательного центра Удмуртской
    Республики, осуществляющего переподготовку и повышение квалификации специалистов,
    а также обеспечивающего подготовку специалистов высшей квалификации в Университете
    в соответствии с потребностями предприятий отрасли.

    Достижение указанных целей осуществляется за счет решения следующих

    задач

    :

    повышение научного уровня и инновационной эффективности фундаментальных и прикладных
    разработок за счет объединения научно-исследовательской, инновационной и учебной
    деятельности по решению перспективных научных, технических и образовательных проблем
    в области проектирования, создания и эксплуатации инженерных систем, в первую
    очередь, имеющих региональное значение;

    достижение максимальной эффективности использования кадрового потенциала и приборного
    парка Университета за счет кооперации специалистов разных профилей и интеграции
    технических возможностей профильных и базовых кафедр;

    повышение качества подготовки выпускников за счет максимальной оптимизации междисциплинарных
    связей в теоретическом обучении и в учебных практиках на производственных процессах,
    интеграции обучения и самостоятельной научно-исследовательской работы обучающихся;

    расширение ассортимента и повышение качества дополнительных образовательных услуг
    по повышению квалификации и переподготовке специалистов Удмуртской Республики
    в сфере энергоэффективности и энергосбережения.

    Научно-исследовательская деятельность

    :

    проведение научных исследований по фундаментальным и прикладным направлениям в
    области энергоэффективности и энергосбережения;

    материально-техническое обеспечение научных исследований.

    Инновационно-внедренческая деятельность

    :

    решение прикладных проблем, проектно-конструкторские разработки;

    внедрение результатов научных исследований в практику и учебный процесс;

    создание и реализация научно-технической и наукоемкой продукции с целью вовлечения
    в инновационный процесс профессорско-преподавательского состава, научных работников,
    докторантов, аспирантов, магистрантов, студентов Университета и специалистов Организации;

    сохранение и развитие научно-технического потенциала Университета по направлениям
    работы, создание рабочих мест.

    Образовательная деятельность

    :

    организация и обеспечение научно-исследовательской работы и учебных практик студентов,
    магистрантов и аспирантов;

    оказание дополнительных образовательных услуг по индивидуальным программам переподготовки
    кадров и повышения квалификации специалистов;

    методическое обеспечение работы аспирантов и магистрантов.'
