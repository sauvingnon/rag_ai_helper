    Научная работа

    В различные временные периоды на кафедре проводились следующие научные исследования
    для потребностей ведущих научно-исследовательских институтов страны и промышленных
    предприятий РФ, в ходе которых защищено несколько десятков кандидатских и докторских
    диссертаций:

    В области внутренней и промежуточной баллистики

    :

    пути повышения дульной скорости снаряда за счет изменения различных параметров
    оружия, повышения коэффициента полезного действия заряда, последовательного горения
    отдельных частей комбинированного заряда, за счет применения многокамерных схем
    оружия, расширительных камер и других конструктивных схем оружия;

    исследованы предельные баллистические возможности ствольного оружия и определены
    рациональные границы повышения баллистических параметров оружия; стрельбы проводились
    на специально спроектированных баллистических установках при сверхвысоких давлениях,
    относительных весов заряда, длинах ствола.

    В области стрелково-пушечного вооружения разработаны

    :

    теоретические основы проектирования газовых двигателей; исследованы физические
    процессы ударных волн сопровождающих выстрел и влияние избыточного давления на
    стрелка;

    теоретическая модель функционирования системы «стрелок-оружие» и исследованы вопросы
    обеспечения эффективности стрельбы и устойчивости оружия;

    методики расчета двигателей автоматики различных узлов и деталей автоматического
    оружия;

    вопросы внешней баллистики стрелкового оружия, теоретические модели движения пули
    на траектории с учетом влияния конструктивных и динамических факторов на вылет
    пули из ствола и на устойчивость её движения на траектории;

    автоматизированные комплексы (автоматизированные мишени) по замеру параметров
    стрельбы из оружия;

    разработаны методы и системы автоматизированного проектирования оружия;

    термогазодинамические основы проектирования принципиально новой ствольной реактивной
    системы, созданы образцы такого оружия на стадии ОКР для различных областей военного
    применения;

    вихревые дульные тормоза и разработаны теоретические основы их проектирования.

    В настоящее время кафедра активно продолжает научные работы по различным направлениям,
    в частности, осуществляется поиск и реализация технических решений вооружения
    БПЛА малого класса системами стрелково-гранатометного вооружения, ведутся работы
    по разработке и реализации индивидуальных стрелковых комплексов для борьбы с БПЛА,
    совершенствуются методики проектирования оружия, ведутся работы по совершенствованию
    математических моделей внутренней, промежуточной и внешней баллистики.

    В рамках функционирования студенческих конструкторских бюро предприятий, студентами
    под руководством ведущих преподавателей кафедры ведутся работы по совершенствованию
    перспективных систем стрелкового оружия, а также по созданию экспериментальных
    прототипов.

