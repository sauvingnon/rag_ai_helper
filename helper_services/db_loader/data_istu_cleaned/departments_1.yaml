    Кафедра является ассоциированным участником Центра компетенции по технологиям
    новых и мобильных источников энергии при Институте проблем химической физики РАН,
    сотрудничает с  НОЦ химической физики и мезоскопии при УдМФИЦ  УрО РАН и  общественной
    организацией УРОО СНИОО «Наноматериалы и нанотехнологии».

    Кадровый состав

    : 2 доктора наук, 5 кандидатов наук, 1 ассистент, 1 зав. лаб., 2 учебных мастера.

    Магистратура: Нанотехнологии в электрохимическом производстве

    Программа разработана для того, чтобы удовлетворить потребности высокотехнологичных
    предприятий региона в кадрах, владеющих подходами материаловедения и электрохимии
    для решения конструкторских и технологических задач развития новых направлений
    производства. Программа реализуется в сотрудничестве с Центром компетенции по
    технологиям новых и мобильных источников энергии при Институте проблем химической
    физики РАН, сотрудники которого проводят занятия по специальным курсам, организованы
    практики на базе ИПХФ. В настоящее время в рамках магистерской программы проходят
    обучение сотрудники предприятий Удмуртской Республики и Пермского края.

    Специалитет: 04.05.01 Фундаментальная и прикладная химия (очная форма)

    Программа ориентирована на подготовку специалистов с пятилетним сроком обучения
    по двум основным направлениям: электрохимические технологии и технологии материалов
    для радиоэлектронной промышленности. Основой подготовки специалистов-химиков будет
    проектная деятельность.

    Бакалавриат:04.03.01 Химия (очно-заочная форма)

    Программа ориентирована на подготовку специалистов химического профиля, работающих
    на предприятиях региона, но не имеющих базового химического образования. Программа
    предполагает получение высшего образования без отрыва от производства . Основой
    подготовки специалистов-химиков будет проектная деятельность.

    Проектная деятельность студентов ориентирована на раскрытие личности обучающегося,
    развитие интереса к учебной и научно-технической деятельности, развитие интеллектуальных,
    творческих способностей в процессе решения какой-либо задачи в интересах развития
    предприятия-заказчика подготовки специалиста.

    Реализация проектной деятельности предполагает участие студента в работе группы
    (бюро,  отдела, цеха и т.д.)  на предприятии для решения конкретной задачи. Руководитель
    проекта от предприятия (если надо, совместно с преподавателем университета) управляет
    процессом, организует, мотивирует, исследует вместе с обучающимися заявленные
    проектом объекты и задачи.

    Результатом такой работы могут быть аналитический отчет, доклад, техпроцесс, патент
    и т.д.

    Все практики студент будет проходить на промышленном предприятии в рамках заключенного
    трудового договора на какую-то долю ставки, возможно, эта доля будет расти по
    мере завершения очередного образовательного цикла (курса).

    Проектное обучение не должно подменять собой традиционные университетские занятия
    и аттестации. Университет и предприятие по договоренности интегрируют проекты
    в образовательные программы без ущерба для семинаров и лекций.

    Тематика курсовых и выпускных квалификационных (дипломных) работ будут формироваться
    с учетом требований промышленных предприятий, выполняться на базе предприятий
    или по договоренности совместно на базе университета и предприятий.

    Каждый проект реализуется в несколько этапов, в целом аналогичных этапам подготовки
    научного исследования и квалификационной работы (ВКР):

    выбор темы;

    разработка и организация плана проекта;

    осуществление запланированной проектной деятельности;

    презентация проекта;

    оценка и анализ результатов.

    Реализация программы предполагается в сотрудничестве с  Центром компетенции по
    технологиям новых и мобильных источников энергии при Институте проблем химической
    физики РАН, Удмуртским федеральным исследовательским центром УрО РАН, высокотехнологичными
    предприятиями региона.

    Защиты диссертаций

    : 1 докторская и 3 кандидатские за пять лет.

    Научные направления

    :

    Химическая физика процессов формирования и превращений наноструктур и наносистем;

    Электрохимические процессы: физико-химическое описание и практические приложения.

    Ежегодно не менее 10 публикаций, одного патента и одной заявки на патент.

    Партнеры

    : Институт проблем химической физики РАН, Удмуртский федеральный исследовательский
    центр УрО РАН, АО «Элеконд», АО «Сарапульский радиозавод», АО «Ижевский радиозавод»,
    АО «Ижевский электромеханический завод «Купол».

    Центр коллективного пользования

    в составе кафедры:  Международный центр коллективного пользования «Центр технологий
    обработки поверхности». Создан в 2013 году при организационной поддержке HTW Aalen
    (университет г. Аален) и Zeh Metallveredelungs GmbH, при финансовой поддержке
    министерства образования и науки Германии в 2010-2013 гг. был реализован проект
    создания Международного центра гальванических технологий обработки поверхности.
    Основа Центра –- учебное и экспериментальное оборудование для ручной гальванической
    обработки ИжГТУ имени М.Т. Калашникова, разработанное и поставленное немецкой
    стороной в качестве единого научно-образовательного комплекса. Аналогичные центры
    были созданы в КНР, Иране, ЮАР, Бразилии.

    В рамках деятельности МЦКП «Центр технологий обработки поверхности» были проведены
    ряд семинаров по новым гальваническим технологиям, выполнены заказы промышленности
    по разработке гальванических линий, систем очистки стоков, опытно-промышленному
    покрытию небольших партий наукоёмких изделий сложной конфигурации.

    Кафедра «Общей химии» были сформирована при создании Ижевского механического института
    в 1952 году.

    Первым заведующим кафедрой был А.С. Воробьев. В разные годы кафедрой заведовали
    Иванов Б.Е. (1960-1965 гг.), Зиновьева З.М. (1961-1965 гг., 1969), Юрченко Э.Н.
    (1965-1968 гг.), Грозина Л.А. (1970-1974 гг.), Кибенко В.Д. (1974-1983 гг.). С
    1983 года по 2018 год кафедрой заведовал д.х.н., профессор Кодолов В.И., с 2018
    по 2020  и.о. заведующего кафедрой являлся к.т.н., доцент Бондарь А.Ю. В настоящее
    время заведующим кафедрой является д.х.н., доцент Плетнев М.А.

    На кафедре с 1985 года появилась аспирантура, а с 1997 г. – докторантура по специальности
    «Химическая физика, в том числе физика горения и взрыва». В 1990 г. создан вузовско-академический
    отдел физикохимии и механики полимеров ИжГТУ-УдГУ-ИПМ УрО РАН на базе проблемной
    научно-исследовательской лаборатории ИМИ.

    С 1995 г. кафедра общей химии переименована в кафедру «Химия и химическая технология».
    Кафедра входит ассоциированным участником в НОЦ наноматериаловедения ИжГТУ, который
    является сателлитом НОЦ химической физики и мезоскопии при Президиуме УдНЦ УрО
    РАН, входит также в общественную организацию УРОО СНИОО «Наноматериалы и нанотехнологии».

    Более 80% преподавателей кафедры имеют ученые звания профессоров и доцентов, ученые
    степени докторов и кандидатов наук.

