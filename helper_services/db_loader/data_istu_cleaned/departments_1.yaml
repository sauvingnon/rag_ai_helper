    Кафедра «Инженерная графика, профессиональная педагогика и технология рекламы»
    организована в 2020 году, путем объединения двух кафедр «Инженерная графика и
    технология рекламы» и «Профессиональная педагогика».

    Кафедра «Инженерная графика и технология рекламы» является общетехнической для
    студентов всех факультетов, которые осваивают язык графики, профессионально-ориентированный
    язык инженерного творчества.

    История кафедры началась в 1952 году - год основания Ижевского механического института.
    Кафедра "Начертательная геометрия и графика" (так она раньше называлась)  уверенно
    прошла длинный, светлый  и значимый путь, сохраняя традиции высшего технического образования
    для подготовки инженерно - технических кадров.

    С 2003 года кафедра стала выпускающей по  направлению 42.03.01 «Реклама и связи
    с общественностью».

    Учебная деятельность кафедры связана, прежде всего, с преподаванием геометро-графических
    дисциплин и компьютерной графики, направлена на формирование базовых инженерно-графических
    компетенций студентов, а также общекультурных, общепрофессиональных, профессиональных
    компетенций в области рекламы, соответствующих самым высоким требованиям современных
    высокотехнологичных производств, современному уровню развития науки и техники,
    и общества.

    При чтении лекций и проведении практических и лабораторных работ широко используются
    современные компьютерные технологии и методы обучения, интенсивные и интерактивные
    технологии, реализуется метод проектного обучения.

    На кафедре ведется большая учебно-методическая работа. Огромное внимание уделяется
    разработке современных электронных средств обучения - электронные учебники и пособия,
    тесты и тест-тренажёры, задания, справочные системы, видеоуроки и т.д. Разработана
    и внедрена в учебный процесс система опорных конспектов и рабочих тетрадей по
    всем дисциплинам.

    Компьютерный класс с программным обеспечением расположен в аудитории 1-302, аудитории
    1-301, 302, 305 оснащены мультимедийным оборудованием. Для выполнения практических,
    лабораторных и курсовых работ  в аудиториях кафедры 1-301, 302, 303, 304, 305
    размещены наглядные дидактические пособия: плакаты, чертежи, 3D-модели, комплекты
    деталей и сборочных единиц. В аудитории 1-302а собрана  уникальная библиотека
    книг по рекламе и связям с общественностью, видеоматериалы с лучшими образцами
    мировой рекламы и методические пособия, составляющие фонд кафедры.

    В апреле 2011г. на Международной конференции заведующих кафедрами маркетинга,
    рекламы и связей с общественностью  кафедра «Инженерная графика и технология рекламы» 
    награждена дипломом Ассоциации коммуникационных агентств России, как лучшая кафедра
     России  по направлению «Реклама и связи с общественностью», победив на Всероссийском
    конкурсе выпускающих кафедр, среди 97 кафедр  из 47 регионов России.

    Ежегодно кафедра принимает участие и занимает призовые места во Всероссийских
    конкурсах выпускных квалификационных работ по рекламе и связям с общественностью.

    С 2017 года на кафедре возродилось проведение Олимпиад по начертательной геометрии,
    инженерной и компьютерной графике.

    Кафедра «Профессиональная педагогика» – единственная в Удмуртской Республике кафедра,
    выпускающая преподавателей технических дисциплин по профилю «Электроника, радиотехника
    и связь». Кафедра готовит педагогов, уверенно сочетающих в себе владение современными
    педагогическими технологиями с фундаментальной инженерной подготовкой, традиционной
    для выпускников ФГБОУ ВО «Ижевского государственного технического университета
    имени М.Т. Калашникова».

    В настоящее время кафедра ведет подготовку бакалавров по направлению 44.03.04
    – Профессиональное обучение (по отраслям). Профиль бакалавриата «Электроника,
    радиотехника и связь». Преподаватели кафедры также являются руководителями аспирантов
    по педагогическим научным специальностям.

    Кафедра по праву гордится своей научной работой, основа для которой была заложена
    заслуженным работником высшей школы РФ, почетным профессором ИжГТУ имени М.Т.
    Калашникова, доктором педагогических наук, профессором Вячеславом Сергеевичем
    Черепановым. Научная школа «Квалиметрия образования имени профессора В.С. Черепанова»
    широко известна своими трудами в области квалиметрии образования.

    История развития кафедры «Инженерная графика»

    1 сентября 1952 года была образована кафедра «Начертательная геометрия и черчение».
    На основании  приказа Ижевского механического института МВО СССР № 59-к от 1августа
    1952 года заведующим кафедрой назначен доктор технических наук, профессор

    Воробьев Николай Васильевич

    Николай Васильевич подал первый в истории Ижевского механического института звонок,
    обходя все этажи здания на ул. М.Горького 79, где размещался институт. Учебный
    год кафедра начала организованно, благодаря тому, что подготовку к нему Н.В. Воробьев
    начал еще в Москве, в стенах МВТУ им. Баумана, где он работал заведующим кафедрой
    «Подъемно-транспортных машин». Были скомплектованы практически все задания для
    студентов по начертательной геометрии и черчению.

    В 1954 году профессор Воробьев Н.В. перешел на открывшуюся кафедру «Детали машин».
    Заведовать кафедрой «Начертательная геометрия и черчение» было поручено

    Филимонову Борису Николаевичу

    , к тому времени в совершенстве освоившему содержание и методику преподаваемых
    курсов, прирожденному педагогу и воспитателю.

    В шестидесятые годы кафедра пополнилась опытными инженерами с заводов Ижевска.
    Огромное внимание уделялось воспитательной идеологической работе. Требовалось,
    чтобы все курсы, включая черчение, несли идеологическую составляющую. Работа проводилась
    комсомольской организацией и партбюро. По уровню воспитательной работы, кафедра
    постоянно отмечалась как передовая и на факультете, и в институте.

    В 1967 году заведующим кафедрой был назначен

    Князев Лев Дмитриевич

    . С ростом института потребность в преподавательских кадрах увеличивалась. Были
    приняты на работу преподаватели – инженеры Ижевских заводов и учебных заведений.
    С 1967 года на специальностях были введены новые курсы: «Основы художественного
    конструирования», «Начертательная геометрия», «Инженерная графика», «Техническое
    рисование», «Перспектива», «Построение теней» и др.

    В 1969 году силами преподавателей кафедры были впервые разработаны рабочие тетради
    по начертательной геометрии, инженерной графике.

    В 1972 году издано методическое руководство по преподаванию черчения, внедрены
    карты программированного контроля, в разработке которых приняли участие преподаватели
    кафедры.

    В 1983 году заведующим кафедрой назначен кандидат технических наук, доцент, Заслуженный
    работник народного образования Удмуртской Республики

    Хохряков Леонид Артемьевич

    , ранее работавший деканом робототехнического факультета. Одним из перспективных
    направлений совершенствования и интенсификации инженерного труда стало применение
    ЭВМ в работе инженеров. Одной из первых успешных попыток была постановка курса
    «Основы машинной графики».

    На кафедре была разработана и применена концепция «Пользователь пакета прикладных
    программ» для работы студентов с профессиональными пакетами прикладных программ.
    Был создан дисплейный класс. Долгое время кафедра была региональным представителем
    АО «АСКОН» г. Санкт-Петербург в Удмуртии. Разработана рейтинговая система оценки
    знаний, которая была внедрена в учебный процесс.

    В 2002 году заведующим кафедрой назначен кандидат технических наук, доцент, Почетный
    работник высшего профессионального образования Российской Федерации

    Дулотин Владимир Александрович

    . В 2003 году в связи с открытием новой специальности  «Реклама» кафедра стала
    выпускающей (профилирующей) по специализации «Рекламный менеджмент» и переименована:
    «Инженерная графика и технология рекламы» (ИГиТР).

    Преподаватели кафедры провели большую методическую работу по внедрению в учебный
    процесс новых образовательных стандартов. Разработаны лекционные курсы по начертательной
    геометрии и инженерной графике в электронном виде. Прием экзаменов и зачетов начал
    осуществляться в форме компьютерного тестирования. Кафедра оснащена современной
    компьютерной и оргтехникой с возможностью выхода в Интернет. Для обеспечения учебного
    процесса кафедра сформировала уникальную библиотеку аудио-, видеоматериалов, библиотеку
    книг по «Рекламе и связям с общественностью».

    В 2012 году заведующим кафедрой назначен кандидат технических наук, доцент, Почетный
    работник высшего профессионального образования Российской Федерации; Изобретатель
    СССР, Заслуженный работник народного образования Удмуртской республики

    Чукавин Сергей Иванович

    . Кафедра ведет подготовку бакалавров по направлению 42.03.01 «Реклама и связи
    с общественностью». Огромное внимание уделяется участию студентов в Российских
    и Международных конкурсах и фестивалях по рекламе и связям с общественностью.
    Студенты неоднократно завоевывали призовые места на Московском студенческом фестивале
    рекламы, Всероссийском конкурсе социальной рекламы в городе Екатеринбург, в городе
    Ижевск. Кафедра стала лучшей в области рекламы и связей с общественностью.

    Ведется работа по разработке новых рабочих программ, учебных планов, обновляется
    методическое обеспечение кафедры. Разработана и внедрена инновационная технология
    образовательного процесса – сквозная система наработки навыков профессионала в
    области рекламы и связей с общественностью.

    В 2017 году заведующим кафедрой назначена кандидат педагогических наук, доцент

    Жуйкова Ольга Викторовна

    . На кафедре большое внимание уделяется созданию электронного обеспечения учебного
    процесса: создаются презентационные материалы, электронные учебные пособия, базы
    контрольно-измерительных материалов, разрабатываются дистанционные курсы по начертательной
    геометрии и инженерной графике.

    В рамках инклюзивного образования на кафедре впервые разработаны и внедрены программы
    по начертательной геометрии и инженерной графике для обучения студентов с нарушением
    слуха. Разработаны новые методы активного обучения, используются интерактивные
    формы обучения. На кафедре большое внимание уделяется повышению качества работы
    со студентами. Разработана и внедрена в учебный процесс технология организации
    самостоятельной работы студентов по индивидуальным образовательным траекториям.

    29 сентября 2017 года

    состоялось торжественное заседание кафедры

    «Инженерная графика и технология рекламы»

    , посвященное

    65-летию со дня ее образования

    , были приглашены ветераны кафедры и руководство вуза в лице ректора В.П. Грахова
    и первого проректора А.В. Губерта.

    1 ряд

    : Горинова С.В., Пузанова К.А., Хохряков Л.А., Голева Т.Л.,  Бабина Л.И., Никитина
    Л.Г., Хомякова Л.Б.

