    Научно-исследовательская работа

    На кафедре действует

    Научная школа «Информационные технологии проектирования, исследования и управления»

    Руководитель научной школы

    : Кучуганов Валерий Никонорович, д.т.н., профессор кафедры «Автоматизированные
    системы обработки информации и управления», Почетный работник высшего профессионального
    образования Российской Федерации, Заслуженный деятель науки Удмуртской республики,
    член экспертных советов по специальностям 05.01.01 и 05.13.12, член Российской
    ассоциации искусственного интеллекта.

    Основные члены научной школы

    :

    Кучуганов Александр Валерьевич, к.т.н., доцент, доцент кафедры АСОИУ

    Мокроусов Максим Николаевич, к.т.н., доцент, зав. кафедрой АСОИУ

    Касимов Денис Рашидович, к.т.н., доцент кафедры АСОИУ

    Научные направления

    :

    Естественно-языковые интерфейсы к Semantic Web и базам данных;

    Интеллектуальные планировщики и экспертные системы;

    Автоматическое распознавание рукописных документов, рисунков, чертежей;

    Семантическое сжатие и поиск в базах данных аэрокосмических снимков и видео данных.

    Преподавателями, инженерами, аспирантами и студентами кафедры опубликовано более
    200 статей в научных журналах, трудах международных, Всесоюзных и Всероссийских
    конференций. Под руководством и при личном участии В.Н.Кучуганова разработано
    более двух десятков различных программных систем для учебного процесса, для предприятий
    малого и среднего бизнеса.

    Сегодняшняя проблематика в области АСОИУ и САПР охватывает такие задачи, как:

    базы знаний и экспертные системы;

    гипертекстовые информационные системы;

    извлечение знаний из текстов и изображений;

    создание интеллектуальных систем поддержки принятия управленческих решений;

    автоматизация этапов концептуального/эскизного проектирования, требующего от человека
    наибольших творческих способностей, а от компьютерных технологий - "интеллекта";

    сквозная логистическая поддержка жизненного цикла продукта/услуги;

    расширение сферы интенсивного применения информационных технологий (системы виртуальной
    реальности, геоинформационные системы, мультимедийные системы в образовании и
    т.п.).

