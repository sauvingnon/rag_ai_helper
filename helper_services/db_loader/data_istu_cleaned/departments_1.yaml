    Кафедра «Теплоэнергетика»      является выпускающей по следующим программам:

    СРЕДНЕЕ ПРОФЕССИОНАЛЬНОЕ ОБРАЗОВАНИЕ

    направление 08.02.08 – «Монтаж и эксплуатация оборудования системы газоснабжения»
    среднего специального образования.

    БАКАЛАВРИАТ

    направление 13.03.01 – «Теплоэнергетика и теплотехника», профиль «Промышленная
    теплоэнергетика»;

    направление 08.03.01 – «Строительство», профиль «Теплогазоснабжение и вентиляция».

    МАГИСТРАТУРА

    направление 13.04.01 – «Теплоэнергетика и теплотехника» профиль «Промышленная
    теплоэнергетика»;

    направление магистратуры 08.04.01 – «Строительство» профиль «Теплогазоснабжение
    населенных мест и предприятий.

    В процессе обучения наши студенты получают знания и практические навыки в области
    теплоэнергетики и теплотехники для промышленных предприятий и жилищно-коммунального
    хозяйства. Изучают системы газоснабжения, вентиляции, кондиционирования, холодоснабжения,
    отопления, теплоснабжения, котельной техники, оборудования тепловых электрических
    станций и систем водо-, воздухоснабжения промышленных предприятий.

    Наши выпускники успешно работают в научных, проектных, конструкторских, технологических
    организациях, коммерческих структурах и на промышленных предприятиях.

    Материально-техническое обеспечение

    Для проведения лекционных, практических и лабораторных занятий за кафедрой закреплены:

    8 учебных аудиторий (2-417; 3-513; 3-513б; 3-1а; 8-1-1; 8-3-2; 8-3-4; 8-3-5);

    помещения для самостоятельной работы обучающихся;

    2 компьютерных класса (8-3-5 и 3-513б);

    помещения для хранения и профилактического учебного оборудования;

    Лаборатория теплотехники (3-1а):

    Лаборатория специальных дисциплин (8-1-1):

