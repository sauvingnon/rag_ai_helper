    Кафедра «Высшая математика» является ровесницей Ижевского государственного технического
    университета. Кафедра «Высшая математика» одна из тех, с которой начинался Ижевский
    механический институт в 1952 году. Сегодня кафедра обучает математике более 60%
    студентов вуза. Выполнена систематизация рабочих программ обучения по 20 специальностям.
    Готовятся электронные учебные комплексы по различным разделам математики. На кафедре
    много внимания уделяется методической работе. За минувшие годы преподавателями
    кафедры подготовлено и издано 46 наименований методических материалов общим объемом
    в 50 п. л. с общим тиражом 5200 экземпляров. Ряд работ имеют гриф Министерства
    образования и науки России.

    Кафедра «Высшая математика» является ровесницей Ижевского государственного технического
    университета имени М.Т. Калашникова и является одной из тех, с которой начинался
    Ижевский механический институт в 1952 году.

    Ее заведующим со дня основания был известный в Удмуртской Республике педагог,
    доцент

    Л.В.Тонков

    В 1954 году из Москвы после защиты кандидатской диссертации на кафедру пришел
    талантливый математик

    Н.В. Азбелев

    . С его именем связана постановка математического образования в ИМИ и организация
    постоянно действующего математического семинара. Возглавив кафедру, он нашел и
    привлек к работе молодых, способных учеников, многие из которых сейчас составляют
    золотой фонд математического сообщества Удмуртской Республики и за ее пределами.

    Среди них профессора и доценты: А.Л. Тептин, Г.В. Гусельникова, И.Н. Иноземцева,
    Н.Н. Юберев. Педагоги: Е.Л. Тонков, А.И. Логунов, В.А. Чуриков и другие успешно
    работают в других вузах Удмуртии и России. Многие годы трудились на кафедре, безвременно
    ушедшие С.А. Пак и Ю.В. Комленко. Среди ветеранов нельзя не упомянуть преподавателя
    кафедры с 1953 года И.П. Осипова – постоянного консультанта инженеров и аспирантов
    по многим вопросам прикладной математики, чьи традиции на кафедре достойно продолжает
    его дочь доцент Т.И. Осипова. Профессор Н.В. Азбелев заложил основы всемирно известной
    ныне Ижевско-Пермской школы по дифференциальным и интегральным неравенствам. Он
    был инициатором создания в г. Ижевске математических классов, на базе которых
    в 1965-1974 гг. в институте готовили инженеров-математиков.

    После отъезда в 1966 году профессора Н.В. Азбелева в г. Пермь кафедру возглавил
    доцент

    С.А. Пак

    , а аспирантуру кафедры – доцент А.Л. Тептин, под руководством которого подготовили
    и защитили кандидатские диссертации: Г.В. Гусельникова, В.Я. Дерр и А.А. Айзикович.

    Кафедра "Высшая математика" явилась базовой при образовании других кафедр математического
    профиля: «Прикладная математика и информатика» (1976 г.), «Математическое моделирование
    физических процессов и технологий» (1993 г.).

    За время руководства кафедрой (1976-1982 гг.) кандидатом физико-математических
    наук

    В.С. Черепановым

    (позднее доктором педагогических наук, профессором) на кафедре были созданы лаборатории
    вычислительной техники, классы программированного контроля, классы учебного телевидения,
    защищены ряд кандидатских диссертаций.

    Значительный вклад в развитие кафедры, ее материальной базы, организации учебно-методической
    работы внес

    А.А. Айзикович

    , руководивший кафедрой после В.С. Черепанова с 1982 года до начала 90-х.

    В это время докторскую диссертацию подготовил Р.В.Голев, стал доцентом кафедры
    С.Г. Селетков, будущие руководители кафедры ВМ.

    Р.В. Голев

    возглавил кафедру с 1991 года.

    Профессором Р.В. Голевым была создана научная школа по проблемам математических
    методов в инженерной практике. Под его руководством успешно защищены пять кандидатских
    диссертаций.

    В 1993 году заведующим кафедрой стал доктор технических наук, профессор

    И.Н. Ефимов

    , при котором в 1996 году на кафедре открыто новое перспективное направление 553000
    "Системный анализ и управление", ведущее подготовку бакалавров. Выпускники-бакалавры
    в нашем вузе имеют возможность продолжить образование по специальности 071900
    "Информационные системы в технологиях".

    По инициативе доктора физико-математических наук, профессора

    В.А. Тененева

    , руководившего кафедрой с 1998-2001гг., создан попечительский совет направления,
    с помощью которого оборудован современный компьютерный класс.

    Получила дальнейшее развитие и научная деятельность, в частности, ученик профессора
    В.А.Тененева, аспирант Н.Б.Паклин в 24 года стал кандидатом физико-математических
    наук. Профессор В.А.Тененев и сегодня успешно трудится на кафедре, возглавляя
    ряд направлений научных исследований кафедры и университета.

    С 2001 года кафедрой руководит профессор, доктор технических наук

    С.Г. Селетков

    Сегодня кафедра «Высшая математика» обучает своему предмету более 60% студентов
    вуза. На кафедре значительно внимание уделяется методической работе. Выполнена
    систематизация рабочих программ обучения по 20 направлениям подготовки студентов.
    Готовятся электронные учебные комплексы по различным разделам математики.

