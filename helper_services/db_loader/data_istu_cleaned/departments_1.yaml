  text: 'Отдел информатизации образовательных процессов

    Михайлова Наталья Юрьевна

    начальник отдела

    8 (3412) 77-60-55 доб. 1387

    корпус 1

    , каб. 406а

    iok_pk@istu.ru

    Контакты подразделения

    8(3412)77-60-55 доб. 1387

    Телефон

    iok_pk@istu.ru

    Почта

    О подразделении

    Сотрудники

    Основная цель отдела информатизации образовательных процессов:

    осуществление информационной, аналитической и организационно-методической деятельности,
    направленной на развитие информационной образовательной среды Университета.

    Основные задачи отдела информатизации образовательных процессов:

    организация и развитие информационных систем и баз данных Университета с целью
    развития единого информационного пространства и информационной образовательной
    среды;

    разработка, внедрение и сопровождение информационных систем для подразделений
    Университета, связанных с организацией и управлением учебным процессом;

    осуществление консультационно-методического сопровождения деятельности пользователей
    информационных систем;

    обеспечение функционирования и развития информационной инфраструктуры;

    повышение качества образовательных услуг и рост конкурентоспособности через использование
    информационно-коммуникационных технологий.

    Функции отдела информатизации образовательных процессов:

    исследование систем управления и деятельности вуза с целью определения возможности
    их формализации и перевода соответствующих процессов на автоматизированный режим;

    подготовка планов проектирования и внедрения новых информационных технологий;

    разработка инструкций, методических и нормативных материалов, связанных с информационным
    обеспечением информационных систем;

    разработка регламентирующей документации по эксплуатации программного обеспечения;

    консультация пользователей в области эксплуатации прикладного программного обеспечения.

    Евтушенко Алена Михайловна

    ведущий инженер-программист

