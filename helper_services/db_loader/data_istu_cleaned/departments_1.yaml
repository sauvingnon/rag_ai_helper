    автоматизированные, автоматизированная, автоматизированных
  text: 'Кафедра «Автоматизированные системы обработки информации и управления»

    Мокроусов Максим Николаевич

    кандидат технических наук, доцент

    доцент, заведующий кафедрой

    8 (3412) 77-60-55 доб. 3157

    корпус 3

    , каб. 607

    m.n.mokrousov@istu.ru

    Контакты подразделения

    8 (3412) 77-60-55 доб. 32-57

    Телефон

    asoiu@istu.ru

    Кафедра «Автоматизированные системы обработки информации и управления» ведёт свою
    историю с 1969 года. Именно в этом году на инженерно-экономическом факультете
    была создана кафедра «Машинная обработка экономической информации». В 1985 году,
    с открытием специальности «Системы автоматизированного проектирования», кафедра
    была переименована в кафедру САПР и передана на факультет «Техническая кибернетика
    и информатика», в дальнейшем факультет ИВТ

    В 1999 году был осуществлен первый набор на специальность 220200 «Автоматизированные
    системы обработки информации и управления», в 2001 году кафедра была переименована
    в кафедру АСОИУ.

    В настоящее время кафедра ведет подготовку

    :

    бакалавров по направлению 09.03.01 «Информатика и вычислительная техника», профили
    подготовки

    :

    «Автоматизированные системы обработки информации и управления»;

    «Дизайн пользовательских интерфейсов»;

    магистров по направлению 09.04.01 «Информатика и вычислительная техника», программы:

    «Разработка и совершенствование программных моделей искусственного интеллекта».

    Учебную, научную и вспомогательную работу на кафедре ведут 15 человек, среди которых:
    2 доктора наук, профессора, 5 кандидатов наук, 5 старших преподавателей.

    1959 г.

    Был Ижевский механический институт и была кафедра вычислительной техники, которая
    называлась в те времена "Проектирование счётно-решающих устройств" и заведовал
    ею к.т.н., доцент Георгий Александрович Тихонов, в последующем профессор, заслуженный
    деятель науки и техники УР.

    Молодая кафедра росла и крепла, выпускала первых компьютерщиков для промышленности
    Удмуртии и Урала, воспитывала молодых учёных. Наконец, одному из них, только что
    испечённому, но энергичному кандидату наук стало тесно в родных пенатах и тогда
    от кафедры, она уже называлась «Проектирование математических приборов и устройств»,
    отпочковалась и проросла в инженерно-экономический факультет кафедра «Машинная
    обработка экономической информации», которую он же, а это был к.т.н., доцент Станислав
    Валентинович Почерняев, и возглавил. Шел 1969 год, и это стало началом нашей истории.

    1969 г.

    Каюров Юрий Александрович, выпускник кафедры ПМПУ, стал первым зав. лабораторией.

    Первое время молодая кафедра питалась соками родной почвы

    :

    Голев Р.В., к.т.н., доцент, потом доктор, профессор, но уже другой кафедры и вуза
    (УдГУ);

    Кучуганов Валерий Никонорович, только что закончивший аспирантуру при кафедре
    ПМПУ, стал ст. преподавателем, потом доцентом кафедры МОЭИ;

    Тихонов Владимир Георгиевич, Елхов Валерий Павлович, Баранова Валентина Яковлевна,
    выпускники ПМПУ, стали ассистентами, потом ст. преподавателями;

    Захаров В.Н., выпускник математической группы ПМПУ – начальник вычислительной
    машины;

    Кучина Татьяна Леонидовна, также выпускница математической группы – ст. преподаватель;

    Жарин Александр Витальевич – инженер, в дальнейшем, к.т.н., доцент.

    Прародительница переименовалась в «Вычислительную технику», но наша кафедра уже
    окрепла настолько, что стала развиваться собственными воспитанниками. Специальность
    "Машинная обработка экономической информации" оказалась настолько универсальной,
    а качество подготовки высоким, что наши выпускники работали и успешно работают
    сейчас бухгалтерами и экономистами, преподавателями экономического факультета
    УдГУ, факультетов Менеджмента и маркетинга, Информатики и вычислительной техники
    ИжГТУ, банкирами и директорами собственных фирм. И, конечно же, программистами
    различных рангов, практически на всех крупных предприятиях Удмуртии.

    Выпускники кафедры, которые первые...

    Лопаткин Анатолий Евгеньевич – первый преподаватель, выпускник МОЭИ 1971 года;

    Немцов Михаил Петрович – первый кандидат технических наук;

    Хлебников Олег Никитьевич, поэт – первый из выпускников, ставший одновременно
    кандидатом технических наук и членом Союза Писателей СССР;

    Суспицина (Головина) Ольга Дмитриевна – первая выпускница, ставшая кандидатом
    экономических наук, заведующей кафедрой, директором Института экономики и управления
    Удмуртского государственного университета;

    Дедов Леонид Анатольевич – первый доктор экономических наук;

    Лефенкова (Хотинец) Вера Юрьевна – первый доктор психологических наук;

    Ложкин Александр Гермогентович – первый кандидат наук, закончивший аспирантуру
    родной кафедры;

    Почерняев Станислав Валентинович, зав. кафедрой – первая правительственная награда:
    медаль "За трудовое отличие" (Указ Президиума Верховного Совета СССР от 15 марта
    1976 года).

    Выпускники кафедры, которые ученые:

    Дедов Леонид Анатольевич, Хотинец Вера Юрьевна – доктора наук;

    Немцов Михаил Петрович, Хлебников Олег Никитьевич, Головина Ольга Дмитриевна,
    Ложкин Александр Гермогентович, Кадацкая Мария Станиславовна, Лобанова Галина
    Анатольевна, Вознюк Роман Владимирович – кандидаты наук.

    1983 – 1984 г.г.

    В 1983 году С.В. Почерняев стал деканом вечернего инженерно-экономического факультета,
    а его место занял к.т.н., доцент Юрий Александрович Каюров. Но уже в 1984 году
    был создан факультет «Технической кибернетики и информатики» и Ю.А.Каюров стал
    его первым деканом, а кафедру возглавил к.т.н., доцент Валерий Никонорович Кучуганов.
    И это явилось началом современной истории кафедры.

    1985 г.

    В период с 1985 по 2015 год кафедрой руководил доктор технических наук, профессор
    Кучуганов Валерий Никонорович.

    Кафедра МОЭИ была преобразована в кафедру «Системы автоматизированного проектирования»
    в 1985 году. В том же году был осуществлен первый набор 50 человек на специальность
    «Системы автоматизированного проектирования».

    В составе кафедры тогда были

    :

    кандидаты технических наук, доценты Каюров Юрий Александрович, Почерняев Станислав
    Валентинович, Сенилов Михаил Андреевич, к.ф-м.н., доцент Иноземцева Инесса Николаевна;

    ст. преподаватели Антонова Татьяна Ивановна, Баранова Валентина Яковлевна, Барков
    Игорь Александрович, Соболева Валентина Павловна;

    ассистенты Кучина Татьяна Леонидовна, Лопаткин Анатолий Евгеньевич, Соболева Наталья
    Владимировна, Тихонов Владимир Георгиевич;

    зав. лабораторией Сумкин Павел Федорович;

    начальник ЭВМ Фокин Иван Федорович;

    инженеры Бабушкин Андрей Владимирович, Жарин Александр Витальевич, Захаров Вениамин
    Николаевич, Мокерова Наталья Андреевна, Никитин Анатолий Григорьевич, Перевощиков
    Владимир Вениаминович, Редкозубова Любовь Александровна, Чигвинцева Алевтина Рюриковна;

    лаборанты Соловьева Татьяна, Харисова Ирина.

    Это был период высокого творческого подъема

    :

    гос/бюджетные и хоз/договорные научно-исследовательские работы с крупными предприятиями
    Ижевска, Воткинска, Иванова, Ленинграда, с Софийским высшим машинно-электротехническим
    институтом (Болгария);

    Всесоюзные и международные научные конференции – Москва, Ленинград, Нижний Новгород,
    Суздаль, Одесса, Таллин, Махачкала, Туапсе, Севастополь, Созопол (Болгария);

    открытие аспирантуры на кафедре под руководством к.т.н., доцента В.Н.Кучуганова
    и первый аспирант – Александр Ложкин;

    первый кандидат наук (А.Г.Ложкин, 1993 г.) и первый доктор наук (В.Н.Кучуганов,
    1994 г.);

    первый студент (4 курс), создавший собственную фирму по разработке прикладного
    программного обеспечения – Корепанов Александр, 1994 г.;

    первые стажировки студентов в центральных вузах (Шадрин Андрей, Ленинград, 1994
    г. и Шарапов Вадим, Ленинград, 1995 г.);

    первые выступления студентов на международных научных конференциях (Шадрин А.Ю.,
    5 курс – Graphicon''94, Н. Новгород и Канторович С.А., Вознюк Р.В., 3 курс – Graphicon''95,
    С. Петербург);

    первый докторант – Барков И.А. (1998 г.);

    первый выпускник, который защитил диссертацию через год после окончания вуза –
    Вознюк Р.В.;

    первые иностранные аспиранты – гражданин Иордании Саид Салех Ибрагим Салум (1999
    г.) и гражданин Сирии Айман Акад (2001 г.).

    1993 г.

    В 1993 году от кафедры САПР отделилась новая кафедра – «Программное обеспечение
    вычислительной техники и автоматизированных систем» во главе с к.т.н., доцентом
    Михаилом Андреевичем Сениловым.

    В связи с новыми социально-экономическими условиями развития общества с целью
    учета конъюнктуры рынка специалистов, кафедрой предпринимаются попытки изменения
    учебных программ и введения новых специализаций.

    Так, с 1989/90 учебного года Удмуртским государственным университетом и Ижевским
    механическим институтом организовано совместное обучение по индивидуальному учебному
    плану инженеров-математиков-системотехников на базе двух специальностей: 01.01
    «Математика» (13 человек из числа студентов первого курса УдГУ) и 22.03 «Системы
    автоматизированного проектирования» (13 человек из числа студентов первого курса
    ИМИ) со сроком обучения 6 лет.

    В качестве профилирующих кафедр для данной специализации были определены кафедры:
    «Вычислительной математики» Математического факультета УдГУ и «Системы автоматизированного
    проектирования» факультета «Технической кибернетики и информатики ИМИ», а в качестве
    базовых подразделений – предприятия-учредители: отдел прикладной логики и системотехники
    ИММ УрО АН СССР и лаборатория автоматизации физико-технологических измерений ФТИ
    УрО АН СССР.

    Выпускники этой специализации получали диплом инженера-математика-системотехника,
    специальность 2203 + 01.02, специализация «Автоматизированные системы научных
    исследований». Выпуск осуществлялся в 1995 – 1998 годах. Это были одаренные, "элитные"
    специалисты, великолепно владевшие как математическими, так и компьютерными науками.
    Например, Роман Вознюк, закончив институт в 1998 году и защитив кандидатскую диссертацию
    в 1999, теперь работает по контракту программистом в США.

    1999 – 2001 г.г.

    Специализация «Информационные технологии проектирования, исследования и управления»
    переросла в специальность 2202.00. «Автоматизированные системы обработки информации
    и управления», по которой первый набор осуществлен в 1999 году, а уже

    27 февраля 2001 года по Приказу номер 154 ректора ИжГТУ кафедра САПР преобразована
    в кафедру «Автоматизированные системы обработки информации и управления»

    Так началась новейшая история кафедры.

    2005 г.

    До 2005 года на кафедре готовили инженеров программистов по двум специальностям
    22.02 АСОИУ и 22.03 САПР. В 2005 году Болонская система образования внедрилась
    в ИжГТУ, и кафедра АСОИУ стала одной из первых, выпустивших в этом же 2005 году
    бакалавров по профилям АСОИУ и САПР.

    С 2007 года на кафедре стала действовать магистратура по программам «Информационно-управляющие
    системы» и «Компьютерная графика, эргономика и web-дизайн».

    2015 г.

    В 2015 г. кафедру временно возглавила д.т.н., профессор Малина Ольга Васильевна.
    В период с 2015 по 2017 на кафедре происходит пересмотр учебных планов в соответствии
    с потребностями рынка труда в сфере информационных технологий. Появляются новые
    актуальные дисциплины, востребованные как в Удмуртской республике так и по всей
    России: Тестирование программного обеспечения, Программирование мобильных приложений,
    Программирование 1С, Программная инженерий и многие другие.

    2018 г.

    В 2018 году кафедру возглавил молодой кандидат наук, доцент, выпускник кафедры,
    Мокроусов Максим Николаевич.

    Образовательные программы

    09.03.01 «Информатика и вычислительная техника» «Автоматизированные системы обработки
    информации и управления»

