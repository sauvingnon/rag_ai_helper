  name: Базовая кафедра «Инженерные системы ЖКХ» при МУП «Ижводоканал»
  keywords: urbanwaterandheatengineering, автоматизированного, электрогазосварщик,
    исследовательского, микробиологических, исследовательские, исследовательских
  text: 'Базовая кафедра «Инженерные системы ЖКХ» при МУП «Ижводоканал»

    Паршикова Марианна Викторовна

    кандидат технических наук, доцент

    заведующий кафедрой

    8 (3412) 77-60-55 доб. 3265

    корпус 3

    , каб. 202

    marianna.svalova@yandex.ru

    Контакты подразделения

    8(3412) 77-60-55, доб. 3272

    Телефон

    marianna.svalova@yandex.ru

    Почта

    Кафедра создана в сентябре 2014 года по инициативе МУП г. Ижевска  «Ижводоканал».
    Основной целью базовой кафедры является совершенствования качества образования
    путем использования результатов научно-исследовательских работ в образовательном
    процессе, новых знаний и достижений науки и техники, расширения исследовательского
    принципа обучения и научной составляющей образовательного процесса, кадровое обеспечение
    научных исследований и разработок, проводимых в интересах МУП г. Ижевска  «Ижводоканал»
    и других предприятий жилищно-коммунального хозяйства региона.

    Цель создания Кафедры

    – интеграция производства, науки и высшего образования в следующих направлениях:

    Повышение квалификации специалистов по направлению «Строительство», профили «Водоснабжение
    и водоотведение», «Водо- и теплоснабжение населенных мест»;

    Проведение совместных научных исследований   и опытно-конструкторских работ по
    различным направлениям      в   интересах МУП г.Ижевска «ИжВодоканал»;

    Внедрение   инновационных   технологий   и оборудования  при   разработках и 
    проектировании  в  производство МУП г. Ижевска «ИжВодоканал»,   в том числе и
    энергосберегающих технологий;

    Основные задачи Кафедры

    :

    Проведение всех видов практик, закрепленным за Кафедрой, с учетом и использованием
    технологических возможностей МУП г.Ижевска «ИжВодоканал».

    Целевая подготовка специалистов по рабочим профессиям, отвечающим потребностям
    рынка труда водоканала и промышленных предприятий.

    Проведение  совместных научно-исследовательских и  опытно-конструкторских работ
    по заказу  МУП г. Ижевска «ИжВодоканал». Создание творческих коллективов для реализации
    совместных научно-исследовательских проектов.

    Базовая кафедра «Инженерные системы ЖКХ» при МУП «Ижводоканал» в составе Теплотехнического
    факультета открыта приказом ректора ИжГТУ №1188 от 07.07.2014.

    Ее основой послужило сотрудничество кафедры «Водоснабжение и водоподготовка» с
    МУП г. Ижевска «Ижводоканал». Открытие базовой кафедры было произведено на основании
    договора о сотрудничестве с МУП г. Ижевска “Ижводоканал”.

    В становлении и развитии базовой кафедры активное участие в 2014 году приняли
    руководители и специалисты отрасли, имеющие значительный практический опыт работы
    по специальности (например, бывший генеральный директор МУП г. Ижевска “Ижводоканал”
    Гуров О.В., главный инженер МУП г. Ижевска “Ижводоканал” Катаев В.В. (ныне директор
    МУП г.Ижевска “Ижводоканал”), инженер-технолог МСА МУП “Ижводоканал” Лагутина
    Е.Л., начальник очистных сооружений канализации МУП г. Ижевска “Ижводоканал” Катаев
    Д.В., а также ряд ведущих преподавателей ИжГТУ - д.т.н., профессор В.Г.Исаков,
    ст. преподаватель А.М. Непогодин, ст. преподаватель Е.А.Гринько. Заведующей базовой
    кафедрой с 2014 г. является к.т.н., доцент М.В. Свалова.

    Базовая кафедра готовит кадры в области водоснабжения и водоотведения (ВиВ), жилищно-коммунального
    хозяйства – инженеров, бакалавров, магистров, а также организует   и   проводит  
    все  виды   практик   студентов   на   базе   МУП г. Ижевска «Ижводоканал». С
    2014 г. ведется подготовка и руководство научно-исследовательской работой студентов.
    С 2015 г. ведется руководство курсовыми и дипломными работами студентов. С 2016
    г. ведется целевая подготовка специалистов по рабочим профессиям, отвечающим потребностям
    рынка труда водоканала и промышленных предприятий. В 2018г. заведующая базовой
    кафедрой к.т.н., доцент М.В. Свалова и лучшие из студентов профиля «Водо- и теплоснабжение
    населенных мест» проходили стажировку в Высшей школой прикладных наук Остфалия
    (г.Зюдербург Германия) по бинациональной образовательной программе – бакалавриату
    «Водо- и теплоснабжение населенных мест» («UrbanWaterandHeatEngineering» - UWHE).

    В 2018г. базовая кафедра успешно проходит конкурс тематических образовательных
    программ в МДЦ «Артек» на 2019г. В 2018г.  дети со всей России приняли участие
    в конкурсе по тематической образовательной программе «ЭКОТЕХ» в МДЦ «Артек», направленной
    на повышение популярности технической направленности и инженерного образования.
    Победители Конкурса получили 10 бесплатных сертификатов (10 детей получили 10
    сертификатов), подтверждающих успешность прохождения конкурсных процедур по участию
    в образовательной программе «ЭКОТЕХ» в МДЦ «Артек». С 7 по 27 апреля 2019г. в
    МДЦ «Артек» преподаватели базовой кафедры и студенты волонтеры ИжГТУ провели образовательную
    программу «ЭКОТЕХ», направленную на раннюю профориентацию детей и создание системы
    начальной инженерной подготовки обучающихся в области водоснабжения, водоотведения,
    экологии и энергетики на основе образовательной робототехники с применением сред
    программирования.

    С 2014-2019 гг. главными направлениями хоздоговорных и инициативных НИР коллектива
    базовой кафедры являются прикладные исследования – оптимизация и обезвреживание
    сточных вод, образующихся на всех стадиях технологического процесса, исследования
    и моделирование химико-биологических процессов очистки природной и сточной воды,
    в т.ч. с получением биогаза для вторичного использования, надежность городских
    систем водоснабжения и водоотведения, интенсификация процессов водоочистки, комплексные
    методы получения чистой воды, разработка научно-технических основ моделирования
    технологического процесса очистки сточных вод для ОСК МУП г. Ижевска «Ижводоканал».
    Создание современной лаборатории биотехнологий для исследования осадка сточных
    вод и путей использования ее теплоты и биомассы как резерва энергосбережения на
    ОСК МУП «Ижводоканал» г. Ижевска. Создание современной лаборатории контроля качества
    воды для исследования состава природных вод. Разработка рекомендаций по модернизации
    технологии биологической очистки сточных вод. Для достижения поставленной цели
    в 2014г. на ОСК МУП г. Ижевска «Ижводоканал» создана современная лаборатория «Биотехнологий»
    для исследования осадка сточных вод и путей использования ее теплоты и биомассы
    как резерва энергосбережения на ОСК МУП «ИжВодоканал» г. Ижевска. Лабораторные,
    практические занятия, научно-исследовательская работа, учебно-научная работа по
    дисциплинам базовой кафедры проводятся в лаборатории гидравлики и насосов, на
    оборудовании определения показателей качества воды ЦКП Института энергетики и
    ЖКХ. С 2014 года профилированные практические, лабораторные, научно-исследовательские
    работы проводятся в лаборатории «Биотехнологий» на ОСК МУП г. Ижевска «Ижводоканал».

    Информацию о графиках учебных процессов, характеристиках об образовательных программах,
    рабочих программах дисциплин, программах практик и итоговой аттестации можно найти

    здесь

    Узнать свои оценки, связаться с преподавателем можно в

    личном кабинете студента

    Для профессиональной подготовки студентов по рабочим профессиям 18650 «Слесарь-сантехник»
    и 19756 «Электрогазосварщик» на базовой кафедре разработаны программы обучения,
    которые сочетают практические и теоретические основы деятельности. Учебно-методическая
    документация подготовки разработана с учетом  требований, предъявляемых работодателями
    к специалистам этой области. В 2016 г. программа профессиональной подготовки успешно
    прошла апробацию.

    Область применения  профессии «Электрогазосварщик».

    Область профессиональной деятельности выпускников: электросварочные и газосварочные
    работы при эксплуатации, обслуживании и ремонте жилищно-коммунального хозяйства.

    Объектами профессиональной деятельности выпускников являются:

    технологические процессы электрогазовой сварки сооружений, конструкций, оборудования
    систем водоснабжения и водоотведения, систем отопления и осветительных сетей жилищно-коммунального
    хозяйства;

    конструкции, детали из различных видов материалов жилищно-коммунального хозяйства;

    измерительные средства;

    нормативная и справочная техническая литература;

    эксплуатационная и ремонтная техническая документация;

    инструкции по технике безопасности.

    Цель изучения курса по рабочей профессии «Электрогазосварщик».

    Привитие практических навыков в части:

    выполнение электросварочных и газосварочных работ при эксплуатации зданий, сооружений,
    конструкций, оборудования систем водоснабжения, водоотведения, отопления;

    выполнение электросварочных и газосварочных работ при ремонте зданий, сооружений,
    конструкций, оборудования систем водоснабжения, водоотведения, отопления.

    Задачи.

    Овладения указанными видами профессиональной деятельности и соответствующими профессиональными
    компетенциями. Освоение соответствующих профессиональных компетенций и присвоение
    разряда (2-6).

    Сочетание фундаментальных исследований с профилирующими дисциплинами базовой кафедры
    определяет широту и разноплановость научных тематик, проводимых учеными базовой
    кафедры как в инициативном порядке, так и по заказам муниципальных организаций
    (МУП г. Ижевска «Ижводоканал», МУП «Водоканал» (г. Воткинск). Ежегодно около 5
    человек из числа обучающихся на базовой кафедре студентов принимают участие в
    НИРС. Студенты участвуют с докладами в конференциях, выставках-сессиях инновационных
    проектов, имеют публикации по результатам НИРС. Руководство НИРС осуществляют
    остепененные преподаватели базовой кафедры.

    Основная научная тематика

    :

    Интенсификация процессов биологической очистки сточных вод, получение и практическое
    использование биогаза, разработка и создание биогазовых установок.

    Экологические вопросы водоснабжения и водоотведения, разработка технических средств
    обеззараживания воды.

    Создание современной лаборатории контроля качества воды для исследования состава
    природных вод на водоканалах Удмуртской Республики.

    Модернизация технологии биологической очистки сточных вод.

    Разработка алгоритмов для рациональной реконструкции блока биологической очистки.

    Математическое моделирование процессов биологической очистки сточных вод на водоканалах
    Удмуртской Республики.

    Создание современных лабораторий биотехнологий для исследования осадка сточных
    вод на водоканалах Удмуртской Республики.

    Исследования и разработка технологий получения биотоплива.

    Исследования осадка сточных вод и путей использования ее теплоты и биомассы как
    резерва энергосбережения на очистных сооружения канализации на водоканалах Удмуртской
    Республики.

    Разработка концепции создания водного кластера Удмуртской Республики.

    Повышение эффективности дезодорации воды на городских очистных сооружениях.

    Разработка алгоритмов для автоматизированного расчета систем водоснабжения и водоотведения.

    Исследования и применение возобновляемых источников энергии.

    Математическое моделирование процессов очистки сточных вод, обработки осадка,
    тепловых и микробиологических процессов в биогазовой установке.

    Перечисленные выше темы научных исследований нашли отражение в тематике кандидатских
    диссертаций преподавателей базовой кафедры, темах диссертационных работ аспирантов,
    дипломных проектах выпускников, научных публикациях, в том числе с участием студентов.

    Для выполнения научных работ, интеграции науки и производства, и практического
    обучения студентов работе на современной технике базовой кафедрой в 2014 г. открыта
    и функционирует совместная лаборатория «Биотехнологий» на территории ОСК МУП «Ижводоканал».

    Ученые базовой кафедры участвовали в выполнении республиканской программы «Чистая
    вода – населению Удмуртской Республики» (1998-2002 гг.) и в разработке программы
    «Чистая вода в г. Ижевске».

    С 2014-2019 гг. главными направлениями хоздоговорных и инициативных НИР коллектива
    базовой кафедры являются прикладные исследования – оптимизация и обезвреживание
    сточных вод, образующихся на всех стадиях технологического процесса, исследования
    и моделирование химико-биологических процессов очистки природной и сточной воды,
    в т.ч. с получением биогаза для вторичного использования, надежность городских
    систем водоснабжения и водоотведения, интенсификация процессов водоочистки, комплексные
    методы получения чистой воды, разработка научно-технических основ моделирования
    технологического процесса очистки сточных вод для ОСК МУП г. Ижевска «Ижводоканал».
    Создание современной лаборатории биотехнологий для исследования осадка сточных
    вод и путей использования ее теплоты и биомассы как резерва энергосбережения на
    ОСК МУП «Ижводоканал» г. Ижевска. Создание современной лаборатории контроля качества
    воды для исследования состава природных вод. Разработка рекомендаций по модернизации
    технологии биологической очистки сточных вод. Для достижения поставленной цели
    в 2014г. на ОСК МУП г. Ижевска «Ижводоканал» создана современная лаборатория «Биотехнологий»
    для исследования осадка сточных вод и путей использования ее теплоты и биомассы
    как резерва энергосбережения на ОСК МУП «ИжВодоканал» г. Ижевска. Научно-исследовательская
    работа, учебно-научная работа по дисциплинам базовой кафедры проводятся в лаборатории
    гидравлики и насосов, на оборудовании определения показателей качества воды ЦКП
    Института энергетики и ЖКХ. С 2014 года научно-исследовательские работы проводятся
    ведущими учеными базовой кафедры и студентами в лаборатории «Биотехнологий» на
    ОСК МУП г. Ижевска «Ижводоканал».
