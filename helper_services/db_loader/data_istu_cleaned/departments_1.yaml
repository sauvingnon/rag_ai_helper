    Целью деятельности управления информатизации (УИ) является:

    развитие единой информационной среды университета для обеспечения эффективной
    управленческой, научной и образовательной деятельности, обеспечение надежности,
    производительности информационных систем Университета.

    Основными задачами УИ являются:

    обеспечение технологической платформы для функционирования единой информационной
    системы;

    формирование перечня ресурсов, необходимых для развития единой информационной
    среды Университета;

    обслуживание и поддержка информационных и системных ресурсов Университета, необходимых
    для функционирования единой информационной среды;

    приведение информационных систем (ИС) Университета в соответствие с требованиями
    законодательства и отраслевых стандартов РФ;

    поддержание оборудования магистральной компьютерной сети (МКС) Университета в
    работоспособном состоянии и устранение возникающих неполадок при функционировании
    программного обеспечения;

    обеспечение функционирования, развития и модернизации программно-технических средств
    (серверов, маршрутизаторов, интеллектуальных коммутаторов) магистральной компьютерной
    сети и телекоммуникационной системы Университета для поддержки образовательной,
    научно-исследовательской и административно-хозяйственной деятельности Университета;

    развитие информационных и инновационных технологий, компетенций, процессов аутсорсинга,
    инжиниринга и трансферта технологий в учебный, научный, воспитательный и производственный
    процессы для повышения квалификации профессорско-преподавательского состава Университета
    и качества подготовки специалистов Университета;

    развитие научного и творческого потенциала Университета и содействие в обеспечении
    его аккредитационных показателей.

