    Кафедра «Радиотехника» была организована в 1961 году. На кафедре сформирована
    научная школа, обучение в которой ведется по специальной программе, направленной
    на подготовку научных кадров для предприятий и организаций Удмуртской Республики
    и Приволжского региона.

    На кафедре организовано обучение в рамках укрупненной группы направления подготовки
    – 11.00.00 «Электроника, радиотехника и системы связи» по направлениям бакалавриата
    и магистратуры, специальности и аспирантуры:

    11.05.01 «Радиоэлектронные системы и комплексы» (Инженер);

    11.03.01 «Радиотехника» (Академический бакалавр);

    11.04.01 «Радиотехника» (Магистр);

    11.03.02 «Инфокоммуникационные технологии и системы связи» (Академический бакалавр);

    11.04.02 «Инфокоммуникационные технологии и системы связи» (Магистр);

    11.06.01 «Электроника, радиотехника и системы связи» (Преподаватель-исследователь).

    Кафедра «Радиотехнические устройства» была организована в 1961 году. Первым заведующим
    был Пашкин В.В.

    В 1964 году заведующим кафедрой становится Жаравин А. И. На время его заведования
    приходится окончательное становление кафедры. Кафедра переехала в новый корпус,
    где заняла площадь 600 кв. метров. На этих площадях были развернуты лаборатории
    теоретических основ радиотехники, приемных и передающих устройств, импульсной
    техники, СВЧ и антенно-фидерных устройств. В это же время на кафедре начинаются
    научно-исследовательские работы по темам: «Повышение устойчивости электронного
    коммутатора», «Централизованный генератор стандартных сигналов», «Отбраковка трансформаторов»,
    Проверка коммутационного поля» и другие. К этому времени кафедра получила название
    «Проектирование радиоаппаратуры» (ПРА).

    В 1971 году после успешной защиты кандидатской диссертации кафедру возглавил Климов
    И.З. Диссертации защитили также Кузнецов П.Г. и Козлова М.В. С приходом к руководству
    кафедрой Климова И.З. началось планомерное формирование научной школы. Была сформирована
    группа студентов, обучение которых велось по специальной программе направленной
    на подготовку научных кадров. Установлены тесные творческие контакты с промышленными
    предприятиями и прежде всего с Конструкторским бюро завода имени Орджоникидзе
    (КБ-ЗИО) г. Сарапул. Результатом тесного сотрудничества явилось открытие в 1982
    году совместной тематической научно-исследовательской лаборатории (ТНИЛ). В этой
    лаборатории в течение пятнадцати лет проводились работы по внедрению результатов
    проводимых кафедрой научно-исследовательских работ в серийное производство. В
    этот период на кафедре оборудуется вычислительный центр на базе вычислительного
    комплекса «Экран-4». Создаются первые в институте кафедральные дисплейный класс
    и вычислительная сеть.

    В 1977 году под руководством Климова И.З. на кафедре открывается аспирантура.
    Первую диссертацию, подготовленную полностью на кафедре, защитил Цыркин В.Н. в
    1981 году. Затем диссертации защитили Хворенков В.В. (1983г.) и Юминов О.Б. (1994г).
    А в 1996 году состоялась первая на кафедре защита докторской диссертации Климовым
    И.З.

    В 1984 году кафедру снова переименовывают. Она стала называться кафедра «Проектирования
    радиоаппаратуры и микропроцессорного оборудования» (ПРАМО). Это было связано с
    тем, что началась подготовка специалистов по специализации «Микропроцессорное
    оборудование радиоэлектронных средств». К этому времени, благодаря проведенным
    научно-исследовательским разработкам, на кафедре были подготовлены специалисты
    в этой области. Это Марков М.М., Решетников В.Г., Суслов С.П., Баранов В.П., Кузнецов
    А.А., Зотов А.А.., Бояршинов М.А.

    Под руководством Климова И.З. были развернуты работы по разработке микропроцессорных
    устройств обнаружения радиолокационных сигналов. Большой вклад в успешное выполнение
    этой работы внесли Цыркин В.Н., Фомин А.А., Тимакин В.А.., Суслов С.П. Разработанное
    устройство было принято на вооружение Федеральной пограничной службой России в
    1996 году.

    В 1990 году на кафедре началась подготовка специалистов по специальности «Радиотехника».
    Открытие новой специальности потребовало решения новых задач по организации учебного
    процесса, по созданию лабораторий радиоприемных и радиопередающих устройств, основ
    телевидения и ряда других. Кафедра сумела обеспечить учебный процесс и в 1995
    году аттестовала новую специальность «Радиотехника». Большой вклад в становление
    специальности «Радиотехника» внесли Климов И.З., Заболотцких В.Г., Наймушин Ю.Н.,
    Демаков Ю.П., Власова Г.Л., Юминов О.Б., Марков М.М. и Кузнецов П.Г., который
    возглавлял кафедру в период с 1993 по 1998 годы.

    В начале девяностых годов кафедра организовала в школах 52, 11, 40 подготовку
    лицеистов по системе школа – ВУЗ. Проводимая в течение девяти лет такая подготовка
    позволила существенно поднять качество подготовки специалистов, выпускаемых кафедрой.
    Руководил этой подготовкой Хворенков В.В.

    В 1994 году при кафедре был организован научно-исследовательский отдел интеллектуальных
    радиосистем (НИОИР), который возглавил Хворенков В.В. Отдел обладал частичными
    правомочиями юридического лица, что позволяло иметь относительную хозяйственную
    самостоятельность и эффективно выполнять НИОКР. За пять лет работы в отделе сформировалось
    новое научное направление «Интеллектуализация радиотехнических систем и устройств».
    Работы проводились по двум направлениям. Во-первых, это разработка адаптивной
    цифровой корреспондентской радиостанции КВ диапазона, а, во-вторых, создание комплекса
    программно-аппаратных средств для систем связи с подвижными объектами. Благодаря
    деятельности отдела, была решена не только задача экономической поддержки преподавателей,
    но и созданы условия для дальнейшего совершенствования учебного процесса. В 1995
    году на базе отдела создается центр по изучению микропроцессоров и микроконтроллеров
    ведущих мировых производителей – фирм "Motorola" и "Analog devices". От этих фирм
    были получены отладочные средства и методические пособия. За счет средств отдела
    был оборудован класс на основе современных компьютеров. Накопленный опыт и наличие
    некоторого оборудования позволили открыть в 1997 году прием студентов на специальность
    "Средства связи с подвижными объектами". На кафедре значительное внимание уделяется
    подготовке методических материалов. В 1999-2000 годах были изданы первый и второй
    тома учебника Демакова Ю.П. "Радиоматериалы и радиокомпоненты", в 1999 году издано
    учебное пособие Власовой Г.Л. "Сборник задач по электронике".

    В 2000 году на кафедре было защищено четыре кандидатских диссертации. Это Жидков
    С.В., Абилов А.В., Чувашов А.М., Дзюин С.В. 2002 год ознаменовался защитой докторской
    диссертации Хворенкова В. В., кандидатской диссертации Рогознева С. В. и Маркова
    М. М., а в период с 2005 по 2007 годы представили и защитили кандидатские диссертации
    Бояршинов М,А., Копысов А. Н., Богданов А.А. и Казанцев А.А.

    1 июня 2001 года при кафедре начинает работать филиал ОАО «Сарапульский радиозавод»
    КБ «Радиосвязь» во главе с Хворенковым В.В. Цель создания КБ – решение наукоемких
    задач при разработке новых радиостанций. При этом найденные решения не остаются
    в виде научных рекомендаций, оторванных от реального производства, а реализуются
    в виде конкретных разработок радиостанций поставленных на серийное производство.
    На сегодняшний день это серия радиостанций и комплексов специальной связи декаметрового
    и дециметрового диапазонов принятые на вооружение в Министерство обороны РФ.

    Учитывая значительные результаты деятельности КБ и кафедры, в 2008 году приказом
    ректора был организован научно-образовательный комплекс (НОК) «Радиотехника».
    В состав комплекса вошли: кафедра «Радиотехника», КБ «Радиосвязь» – филиал ОАО
    «Сарапульский радиозавод». Целью создания комплекса является повышение качества
    подготовки специалистов на основе интеграции образовательной, научной и производственной
    деятельности.

    В рамках комплекса проводятся работы по гражданской тематике. В 2003-2006 г.г.
    под руководством Юминова О.Б. были выполнены ряд ОКР по разработке новых средств
    измерения медицинского назначения «ИЖТ-А», «ИЖТ-Э». Разработанные изделия прошли
    технические и клинические испытания и были рекомендованы к серийному производству.

    В относительно небольшой научной школе работают три доктора технических наук:
    Хворенков В.В., Климов И.З. и Шелковников Ю.К. Кандидатами технических наук являются
    Копысов А.Н., Бояршинов М.А., Марков М.М., Богданов А.А., Шишаков К.В., Осипов
    Н.И. Именно эти люди определяют техническую политику. За старшими товарищами тянется
    и талантливая молодёжь.

    С момента формирования научной школы был взят курс на доверие молодёжи. Решая
    сложные задачи, ребята, как специалисты, растут на глазах. Относительно недавно
    пришли Черенков Ю.Н., Симушин А.А., Загидуллин Ю.Т., Полин Д.Ю., Караваев П.В.,
    Жидяев А.В. и Никитин М.Л. Сейчас они решают такие задачи, над которыми в других
    организациях работают целые коллективы, часто с меньшим успехом. Недаром проведение
    трассовых испытаний разработанного недавно комплекса связи без их участия было
    просто невозможно.

    В 2015 году на базе научно-образовательного комплекса и кафедры «Радиотехника»
    были созданы научно-исследовательские, учебные центры компании АО «ПКК Миландр»
    и компании National Instruments. Так в канун 120-летия со дня создания Радио,
    7 мая 2015 года, был открыт учебный центр компании «Миландр». Создание учебного
    центра позволяет не только решать задачи обучения слушателей на современном Российском
    оборудовании, но и решать задачи импортозамещения в области использования Российской
    элементной базы в системах и средствах связи.

    В середине 2015 года получил дальнейшее развитие научно-образовательный центр
    технологий National Instruments, созданный на базе лабораторий кафедры «Радиотехника».
    В рамках центра организованна подготовка слушателей, сдача сертификационных экзаменов,
    а так же решаются научно-технические задачи по автоматизации процессов регулировки
    и измерения параметров средств связи с использованием инструментальных средств
    компании National Instruments.

    Летом 2017 года на кафедре «Радиотехника» был создан учебный центр и открылась
    учебно-исследовательская лаборатория компании «Rohde & Schwarz». В рамках подписанного
    двухстороннего договора между ИжГТУ имени М.Т. Калашникова и российским представительством
    «Rohde & Schwarz» организована вся необходимая техническая помощь для эффективной
    работы лаборатории при подготовке студентов и аспирантов технического вуза.

    На сегодняшний день в научную школу входят три доктора наук и девять кандидатов
    наук, из них четыре имеют звание профессор, а семь звание доцент. Общий состав
    коллектива научной школы включает около тридцати человек.

