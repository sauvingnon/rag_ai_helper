    "Теоретическая и компьютерная лингвистика" https://vk.com/club177985839

    Группа ВК

    корпус 7

    , 412

    Кафедра «Лингвистика» образована 1 сентября 2005 года как учебно-научное подразделение
    факультета «Экономика, право и гуманитарные науки». Заведующим кафедрой назначен,
    а затем избран доктор филологических наук Баранов Виктор Аркадьевич. Целью создания
    кафедры явилась необходимость повышения уровня языковой подготовки студентов ИжГТУ.

    Кафедра осуществляет набор и подготовку бакалавров по направлению 45.03.03 Фундаментальная
    и прикладная лингвистика, профиль Теоретическая и компьютерная лингвистика.

    Кроме того, преподаватели кафедры ведут занятия по русскому языку, культуре речи,
    риторике, стилистике и древним языкам, а с 2018 года – немецкому и французскому
    языкам, а также по некоторым другим лингвистическим дисциплинам.

    Особой сферой деятельности сотрудников кафедры является развитие научных направлений
    на стыке лингвистики, с одной стороны, и математики, информатики, программирования
    – с другой.

    Образовательные программы

    45.03.03 «Фундаментальная и прикладная лингвистика» «Теоретическая и компьютерная
    лингвистика»

    (Бакалавриат)

    Научная деятельность

    Результаты исследовательской работы сотрудников кафедры «Лингвистика» были представлены
    более чем в 150 научных статьях в российских и зарубежных журналах, а также на
    всероссийских и международных конференциях.

    С 2005 года более 25 проектов (как коллективных, так и индивидуальных) были поддержаны
    грантообразующими государственными фондами и Министерством образования и науки
    РФ.

    В 2006-2018 гг. кафедра «Лингвистика» совместно с коллективами других российских
    и зарубежных вузов подготовила и провела 8 международных конференций и школ «Письменное
    наследие и информационные технологии (El’Manuscript)» в городах Ижевск, Казань,
    Уфа, Петрозаводск, Новосибирск, Варна (Болгария), Вильнюс (Литва), Вена и Кремс
    (Австрия).

    Научные направления кафедры

    :

    Исторические, корпусные и лингвотекстологические исследования древних славянских
    рукописей и текстов

    Исследования в области диалектного словообразования

    Исследования и прикладные разработки в области современной и исторической лексикологии,
    семасиологии, лексикографии

    Преподаватели кафедры осуществляют прикладные работы в области компьютерной лингвистики.
    На кафедре созданы и развиваются:

    корпус средневековых славянских рукописей XI-XV вв. (http://manuscripts.ru),

    корпус языка М. В. Ломоносова (http://lomonosov.pro),

    лингвогеографическая информационная система «Диалект» (http://dialect.manuscripts.ru).

    Научные связи кафедры «Лингвистика»

    Казанский (Приволжский) федеральный университет (совместные прикладные разработки
    в области хранения, обработки и издания средневековых славянских рукописей).

    Новосибирский государственный университет (организация научных мероприятий).

    Петрозаводский государственный университет (организация научных мероприятий).

    Кирилло-Мефодиевский научный центр Болгарской Академии наук (совместные прикладные
    работы в области исследования и публикации средневековых славянских рукописных
    памятников).

    Институт славистики Венского университета (Австрия) (совместные прикладные разработки
    в области хранения, обработки и издания средневековых славянских рукописей).

    École Normale supérieure Lettres et Sciences humanes (Высшая гуманитарная школа),
    Lyon, France, группа Base de Franҫais Médiéval (координация работ в области разработки
    лингвистических и текстологических стандартов).

