    На кафедре «Прикладная математика и информационные технологии» в 1996 году была
    создана научная школа «

    Математическое моделирование технических и социально-экономических систем

    », которая является Ведущей научной школой ИжГТУ имени М.Т. Калашникова. Основателем
    научной школы и ее научным руководителем является академик РАН и РАРАН, доктор
    технических наук, профессор

    Липанов Алексей Матвеевич

    , руководителями научной школы являются академик РАРАН, доктор технических наук,
    профессор

    Русяк Иван Григорьевич

    и доктор физико-математических наук, профессор

    Тененев Валентин Алексеевич

    Тематика исследований в рамках научной школы:

    динамика, баллистика, управление движением летательных аппаратов;

    моделирование полигонных испытаний, визуальные технологии виртуальной реальности;

    цифровые модели объектов, систем и процессов (цифровые двойники);

    численное решение пространственных нестационарных сопряженных задач гидродинамики
    и тепломассообмена;

    математическое компьютерное моделирование работы газодинамических устройств;

    машинное обучение и интеллектуальные методы обработки данных;

    математическое компьютерное моделирование социально-экономических систем.

    В рамках научной школы преподавателями и сотрудниками кафедры получен целый ряд
    фундаментальных и прикладных результатов, которые отражены в многочисленных публикациях
    и в отчетах по Грантам и хоздоговорным научно-исследовательским работам.

    Выдающиеся ученые, труды которых внесли существенный вклад в становление и развитие
    кафедры «Прикладная математика и информационные технологии», ее образовательного
    и научного потенциала представлены в

    Галерее Ученых

    За время существования кафедры в рамках научной школы были защищены

    6 докторских диссертаций и 55 кандидатских диссертаций

    . Выпускники кафедры, защитившие докторские диссертации представлены в

    Галерее Докторов наук кафедры

    . Выпускники кафедры, защитившие кандидатские диссертации представлены в

