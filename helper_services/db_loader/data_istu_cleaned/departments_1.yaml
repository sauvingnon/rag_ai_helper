    Основное направление научных исследований кафедры:

    Разработка системы управления подготовкой спортивного резерва.

    Основные задачи:

    Разработка моделей отбора перспективных спортсменов, определение оптимума их углубленной
    специализации.

    Создание алгоритмов управления работоспособностью спортсменов и направленностью
    тренировок.

    Основные методы исследования:

    Определение особенностей энергообеспечения организма спортсмена и его резервных
    возможностей.

    Определение уровня стрессоустойчивости и характеристик внимания.

    Определение качества функции равновесия и запаса устойчивости.

    Определение состава тела.

    Определение функции внешнего дыхания.

