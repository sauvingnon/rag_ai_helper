  text: 'Кафедра «Строительные материалы, механизация и геотехника»

    Яковлев Григорий Иванович

    доктор технических наук, профессор

    профессор, заведующий кафедрой

    8 (3412) 77-60-55 доб. 2367

    корпус 2

    , каб. 103

    gyakov@istu.ru

    Контакты подразделения

    8 (3412) 77-60-55 доб. 2368

    Телефон

    gism@istu.ru

    На кафедре осуществляется трехуровневая система подготовки обучающихся: бакалавриат
    – магистратура – аспирантура. Реализуется 4 образовательных программ, из них:

    Программа бакалавриата – направление 08.03.01 «Строительство», профиль подготовки
    «Строительство, эксплуатация и реконструкция зданий». Форма обучения: очная (4
    года), очно-заочная (в том числе программы на базе СПО) (полный срок обучения
    -4,5 года и на базе СПО – 3,5 года);

    Две программы магистратуры направление 08.04.01 «Строительство»:

    «Материаловедение и контроль качества в строительстве» руководитель программы
    д.т.н., профессор Яковлев Григорий Иванович. Форма обучения: очная;

    «Техническая эксплуатация и реконструкция зданий и сооружений» руководитель программы
    д.т.н., профессор Первушин Григорий Николаевич. Форма обучения: очная; заочная

    Реализуется и активно развивается программа аспирантуры по специальности «Строительные
    материалы и изделия» - научный руководитель аспирантов д.т.н., профессор Яковлев
    Григорий Иванович. Форма обучения: очная.

    Область профессиональной деятельности выпускников по направлению подготовки «Строительство»
    включает: инженерные изыскания, проектирование, возведение, эксплуатация, оценка
    и реконструкция зданий и сооружений; инженерное обеспечение и оборудование строительных
    объектов и городских территорий; применение машин, оборудования и технологий для
    строительства и производства строительных материалов, изделий и конструкций.

    Объектами профессиональной деятельности выпускников по направлению подготовки
    «Строительство» являются: промышленные, гражданские здания; строительные материалы,
    изделия и конструкции; машины, оборудование, технологические комплексы и системы
    автоматизации, используемые при строительстве и производстве строительных материалов,
    изделий и конструкций; объекты недвижимости, земельные участки, городские территории.

    Выпускники работают в области организации строительства гражданских объектов,
    исследования и проектирования зданий и сооружений, испытания строительных материалов
    и изделий, технической эксплуатации объектов городского строительства и жилищно-коммунального
    комплекса.

    В трудовой коллектив кафедры входят 2 доктора технических наук, 11 кандидатов
    технических наук,3 старших преподавателя и 2 ассистента.

    В настоящее время на кафедре «Строительные материалы, механизация и геотехника»
    ведутся занятия более чем по 65 дисциплинам, включая: «Строительные материалы»,
    «Механика грунтов», «Основания и фундаменты», «Технологические процессы в строительстве»,
    «Инженерная геология», «Инженерная геодезия», «Основы метрологии, стандартизации,
    сертификации и контроля качества» и др. для обучающихся направлений «Строительство»
    и «Архитектура» (очной и заочной форм обучения).

    Аудиторные занятия, проводимые на кафедре, наряду с лекционными курсами, включают
    лабораторные и практические работы, которые направлены на изучение обучающимися
    современных разработок в строительной отрасли, включая исследования проводимые
    научно-педагогическими сотрудниками кафедры. Кафедра оснащена современным комплексом
    оборудования для проведения физико-химических исследований, который активно используется
    бакалаврами, магистрантами и аспирантами при проведении научных исследований и
    подготовке выпускных квалификационных работ.

    Международное сотрудничество кафедры по инновационным программам осуществляется
    с учебными заведениями Литвы, Германии, Венгрии, Белоруссии, Чехии, Египта. В
    рамках обмена опытом и проведения совместных научно-исследовательских работ студенты
    и преподаватели кафедры проходят стажировки в Университете г. Брно (Чехия), Университете
    г. Печ, (Венгрия), Вильнюсском техническом университете имени Гедиминаса (Литва),
    Веймарском строительном университет (Германия)

    Кафедра «Строительные материалы, механизация и геотехника» начинает свою историю
    с 1976 года. Тогда была открыта кафедра «Промышленное и сельскохозяйственное строительство»
    (ПСХС), которую возглавлял

    декан строительного факультета, доцент Валентин Афанасьевич Шумилов

    В 1981 году при разделении кафедры ПСХС была образована новая кафедра «Инженерная
    геодезия, основания и фундаменты», которую возглавил

    к.т.н., доцент Николай Иванович Невзоров

    Высокие темпы развития строительной индустрии в Удмуртской Республике требовали
    специалистов-технологов для работы на домостроительных комбинатах, заводах сборного
    железобетона. С учетом сложившейся ситуации в 1987 году на кафедре начинается
    подготовка инженеров по специальности «Производство сборных изделий и конструкций»
    (ПСиК), на этом этапе кафедру возглавляет опытный ученый-исследователь

    к.т.н., доцент Павел Петрович Гедеонов

    . В это же время активизируется научная деятельность в области охраны окружающей
    среды, создания ресурсосберегающих технологий.

    С 1991 года кафедру возглавляет

    к.т.н., доцент Вячеслав Вениаминович Чирков

    , под руководством которого создается и действует лаборатория, направленная на
    решения проблем строительства ПОСАД.

    С 1998 года заведующей кафедрой становится

    Людмила Викторовна Юдина, к.т.н., доцент

    . В 1999 году открывается новая специальность «Городское строительство и хозяйство»,
    кафедра получает новое название «Геотехника и строительные материалы». С 2005
    года и по настоящее время кафедру возглавляет

    д.т.н., профессор Яковлев Григорий Иванович

    . В 2018 году было принято решение об объединении двух кафедр «Геотехника и строительные
    материалы» и «Строительные и дорожные машины».

    Кафедра «Строительные и дорожные машины» была открыта в 1994 году. На кафедре
    были организованы и оснащены учебные лаборатории по изучению подъёмно-транспортных
    машин, машин для земляных работ, оборудования для бетонных и отделочных работ.
    Большую помощь в создании лабораторной базы оказали начальник Управления механизации
    УССТ-8 (УМР-18) Киселёв Владимир Алексеевич; главный инженер Алексеев Владимир
    Германович; начальник учебного центра УССТ-8 Качанов Николай Васильевич; ведущий
    преподаватель Ижевского монтажного техникума Шлейн Владимир Андреевич; главный
    механик СУ-2 УССТ-8 Михальченко Г.А. и другие ведущие специалисты строительной
    отрасли Удмуртской Республики. Первым заведующим кафедрой стал доктор технических
    наук, профессор Баранчик Виталий Павлович.

    В настоящее время объединенная кафедра называется «Строительные материалы, механизация
    и геотехника».

    Образовательные программы

    08.03.01 «Строительство» «Строительство, эксплуатация и реконструкция зданий»

    (Бакалавриат)

    08.04.01 «Строительство» «Материаловедение и контроль качества в строительстве»

    (Магистратура)

    08.04.01 «Строительство» «Техническая эксплуатация и реконструкция зданий и сооружений»

    (Магистратура)

    В настоящее время на кафедре «Строительные материалы, механизация и геотехника»
    ведутся занятия более чем по 65 дисциплинам, включая: «Строительные материалы»,
    «Механика грунтов», «Основания и фундаменты», «Технологические процессы в строительстве»,
    «Инженерная геология», «Инженерная геодезия», «Основы метрологии, стандартизации,
    сертификации и контроля качества» и др. для обучающихся направлений «Строительство»
    и «Архитектура» (очной и заочной форм обучения).

    Высокое качество подготовки обучающихся по основным образовательным программам
    обеспечивается трудовым коллективом кафедры, включающим: 2 профессора, 10 доцентов,
    3 старших преподавателя и 2 ассистента.

    Международное сотрудничество кафедры по инновационным программам установлено с
    учебными заведениями Белоруссии, Литвы, Германии, Австрии, Китая, Венгрии, Чехии,
    Египта. В рамках обмена опытом и  проведения совместных научно-исследовательских
    работ студенты и преподаватели кафедры прошли стажировки в Университете г. Брно
    (Чехия), Университете г. Печ (Венгрия), Вильнюсском техническом университете имени
    Гедиминаса (Литва), Веймарском строительном университет (Германия), Харбинском
    научно-исследовательском университет (Китай).

    Ежегодно, начиная с 2009 года, проводятся международные конференции «Нанотехнологии
    в строительстве», организуемые кафедрой совместно с Египетско-Российским университетом.

    Преподаватели принимают активное участие в научно-исследовательской деятельности,
    за 10 лет было выполнено более 25 НИР, включая проекты по государственному заданию,
    программу стратегического развития и хозяйственные договоры с предприятиями Удмуртии,
    России и Египта. За последние 5 лет сотрудниками и студентами кафедры опубликовано
    5 монографий, 2 учебных пособия, более 30 методических работ и более 200 статей,
    в том числе свыше 70 статей, входящих в перечень ВАК, порядка 25 статей, входящие
    в базы данных WebofScience и  Scopus. Результаты проведенных научных исследований
    были представлены на международных, всероссийских и региональных конференциях.

    На кафедре имеется научно-учебная лаборатория физико-химических исследований свойств
    строительных материалов, которая оснащена современным оборудованием для проведения
    комплексных научных изысканий, результаты которых используются бакалаврами, магистрантами
    и аспирантами в процессе обучения.

    Кафедра оснащена современным комплексом оборудования для проведения механических
    и физико-химических исследований строительных материалов, который активно используется
    бакалаврами, магистрантами и аспирантами при проведении научных исследований и
    подготовке выпускных квалификационных работ.

    Международное сотрудничество кафедры по инновационным программам осуществляется
    с учебными заведениями Литвы, Германии, Венгрии, Белоруссии, Чехии, Египта. В
    рамках обмена опытом и проведения совместных научно-исследовательских работ студенты
    и преподаватели кафедры проходят стажировки в Университете г. Брно (Чехия), Университете
    г. Печ, (Венгрия), Вильнюсском техническом университете имени Гедиминаса (Литва),
    Веймарском строительном университет (Германия).

    Ежегодно, начиная с 2009 года, проводятся международные конференции «Нанотехнологии
    в строительстве», организуемые кафедрой совместно с Египетско-Российским университетом.

    За последние 12 лет на базе кафедры защищено 10 аспирантов, опубликовано свыше
    100 научных работ в центральных рецензируемых изданиях, рекомендованных ВАК, более
    30 статей в журналах, индексируемых в базах данных Scopus и более 15 работ – в
    WebofScience, опубликованы 5 монографий и получено свыше 20 патентов.Кафедрой
    «Строительные материалы, механизация и геотехника» за последние 10 лет выполнены
    более 25 НИР совместно с предприятиями Удмуртской Республики и России.

    В 2020 году сотрудники кафедры совместно с ученымиТехнического университета Брно
    (Чехия) выиграла грант РФФИ, посвященный исследованиям по повышению электропроводностисиликатных
    композиционных материалов

    В целом, кафедра «Строительные материалы, механизация и геотехника» сегодня решает
    актуальные научные и технические задачи, сотрудники кафедры участвует с докладами
    в международных конференциях по различной тематике, налаживают контакты с коллегами,
    активно публикуются в рецензируемых журналах, способствуя развитию научного и
    кадрового потенциала университета.

