    Кафедра была организована в сентябре 1952 г. На кафедре обучаются студенты более
    30 специальностей вуза. Основными общетехническими дисциплинами, изучаемыми студентами
    являются: теоретическая механика, теория механизмов и машин, механика, устойчивость
    технических систем, прикладная механика.

    Кафедра «Механика» была создана  в сентябре 2018 года в результате слияния двух
    кафедр «Сопротивление материалов»  и «Теоретическая  механика и теория машин и
    механизмов»  заведующим кафедрой назначен доктор технических наук, профессор Кугультинов
    Сергей Данилович.

    История кафедры «Сопротивление материалов»

    Кафедра «Сопротивление материалов», образованная в 1953 году, одна из старейших
    ИжГТУ имени М.Т. Калашникова. Со дня образования кафедры и  на протяжении многих
    лет  на ней работали преподаватели: Лебедев Н.З., Угланов Г.П., Ефимов А.С., Савинова
    К.П., Гарибян И.К., Рыбин Н.С., Котельников В.Г., Бендерский Б.Я.. Жичкин Е.А.,
    Вахрушев А.Л., Вахрушева Л.Л., Фёдорова Л.И., Кургузкин М.Г.

    Первым заведующим кафедрой был назначен выпускник МВТУ им. Н.Э. Баумана кандидат
    технических наук, доцент Журавлёв Виталий Никонорович.  В дальнейшем кафедрой
    руководили кандидат технических наук, доцент Григорьев Константин Михайлович (1954
    – 1956 г.г.; 1958 – 1977 г.г.), кандидат технических наук, доцент Зверяев Михаил
    Митрофанович (1956 – 1958 г.г.), доктор технических наук, профессор Калинников
    Анатолий Ефимович (1977 – 1987 г.г.), доктор технических наук, профессор Добровольский
    Владимир Иванович (1987 – 2006 г.г.), доктор технических наук, профессор Добровольский
    Сергей Владимирович (2006 – 2009 г.г.), доктор технических наук, профессор Кугультинов
    Сергей Данилович  2009 – 2018 г.г.)

    Кафедра представляет собой сплоченный коллектив высококвалифицированных преподавателей
    и специалистов, включающий трех докторов технических наук, профессоров и трех
    кандидатов технических наук, доцентов.

    В настоящее время обучение на кафедре проходят около 1000 студентов дневного и
    заочного отделений университета, 5-ти факультетов, 13 специальностей по курсам
    «Сопротивление материалов», «Основы теории упругости и пластичности», «Прикладной
    механике», «Технической механике», «Механике», «Механике материалов и конструкций».
    В целях улучшения качества преподавания и подготовки квалифицированных специалистов,
    повышения у студентов интереса к учебной деятельности и будущей профессии, привлечения
    талантливой молодежи к исследовательской работе кафедра с 2007 г. ежегодно проводит
    два тура республиканской студенческой олимпиады по курсу «Сопротивление материалов».

    С 2010 г. на кафедре работает «Расчётно-аналитический центр». Специалисты центра
    выполняют заказы предприятий и организаций г. Ижевска и Удмуртской республики,
    применяя численные и аналитические методы расчета конструктивных элементов и узлов
    машин и конструкций различного назначения. Области применения рассчитываемых машин
    и конструкций весьма разнообразны: нефтяное оборудование, газовые ёмкости, детали
    машин, театральные декорации и др.

    Виды выполняемых расчетов включают:

    исследование  напряженно-деформированного состояния деталей и узлов;

    оценку прочности, жёсткости и устойчивости конструктивных элементов;

    расчёт собственных частот и форм  колебаний изделий с распределёнными  параметрами;

    отклик на гармоническое воздействие.

    Кроме того, преподаватели кафедры проводят экспертизу научно-исследовательских
    и диссертационных работ, нормативной, рабочей и конструкторской документации,
    а также обучение и консультации по вышеуказанным направлениям для строительных
    и промышленных организаций, специалистов, занимающихся научной работой.

    В 2013 г. по договору о сотрудничестве и совместной деятельности между Университетом
    и ЗАО «КАДФЕМ Си-Ай-Эс» на базе кафедры организован учебный, научно-инновационный
    «Центр компетенций по моделированию в области машиностроения».

    Центр занимается подготовкой инженеров нового поколения – специалистов в области
    машиностроения, владеющих современными наукоемкими компьютерными технологиями;
    проведением учебных курсов, семинаров. В Центре компетенций прошли обучение по
    программе «Применение программного комплекса ANSYS для конструкционного анализа»
    повышения квалификации свыше 70 преподавателей университета и других ведущих вузов
    России, а также сотрудников и аспирантов.

    История кафедры ТМ и ТММ

    В сентябре 1952 г. в Ижевском механическом институте была создана объединенная
    кафедра «Теоретическая механика, теория механизмов и машин, станки». Первым заведующим
    кафедрой и единственным ее преподавателем в то время был к.т.н. доцент Юркин А.А.

    В 1954 году кафедра получила название «Теоретическая механика и теория механизмов
    и машин» в связи с образованием в вузе кафедры «Металлорежущие станки и инструменты».

    На кафедре обучаются студенты 30 специальностей. Основными дисциплинами, изучаемыми
    студентами, являются: «Теоретическая механика», «Прикладная механика», «Теория
    механизмов и машин», «Механика».

    В 1956 году кафедрой руководил к.т.н., профессор Федоров Б.Ф. В период с 1957
    года по 1974 год кафедру возглавлял д.т.н., профессор Ястребов В.М., с 1975 года
    по 1983 год - к.ф-м.н., доцент Беляев В.В., с 1983 года по 1987 год – к.т.н.,
    профессор Михайлов Л.Е., с 1988 года по 2000 год – д.т.н., профессор Полищук Д.Ф.
    С 2001 года по 2018 год кафедру возглавлял д.т.н. профессор Кузнецов Н.П.

    Преподавательский состав кафедры в период ее становления формировался, главным
    образом, из выпускников вузов городов Казани, Ленинграда и Ижевска. Влились в
    этот состав и многие из аспирантов, успешно защитившие кандидатские диссертации
    под научным руководством д.т.н., профессора Ястребова В.М. В лучшие времена на
    кафедре работали 26 человек из них: 5 профессоров, 9 доцентов, 3 старших преподавателя,
    2 ассистента и 6 УВП.

    Большой вклад в дело становления кафедры, подготовки и воспитания инженерных кадров
    внесли много лет проработавшие на ней преподаватели: Нагорных С.А., Дадаев А.Н.,
    Ястребов В.М., Дмитриев Б.Н., Русанова В.И., Березина С.Г., Корепанова Г.Н., Янченко
    Т.А., Газизова З.С., Голдобина Л.М., Беляев В.В., Мочалов В.Л., Аллилуева Л.А.,
    Сипайлова Н.Ф., Горбунов В.Н., Езерская СВ., Михайлов Л.Е., Полищук Д.Ф., Семин
    Ю.Н., Кунивер А.С.

    История кафедры «Механика»

    еще только начинается.

