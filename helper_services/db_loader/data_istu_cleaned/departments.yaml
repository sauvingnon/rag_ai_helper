    подготовки;

    формирование штатов преподавательского состава, планирование и распределение нагрузки
    совместно с группой финансово-экономического сопровождения и выпускающими кафедрами;

    координацию работы с выпускающими кафедрами по учебным вопросам;

    организацию учета успеваемости, посещаемости студентов и анализ его результатов;

    подготовку отчетной документации при мониторинге, аккредитации.

