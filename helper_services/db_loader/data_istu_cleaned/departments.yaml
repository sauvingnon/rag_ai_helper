    Положение о подразделении

    О подразделении

    Сотрудники

    Целями деятельности Отдела являются:

    организация профориентационной работы для развития интереса и повышения уровня
    подготовки в области физико-математических и естественно-научным дисциплинам,
    привлечение абитуриентов, имеющих высокий бал ЕГЭ по физико-математическим и естественно-научным
    дисциплинам, победителей и призеров предметных олимпиад школьников;

    организация проведения общественно-значимых мероприятий в сфере образования и
    науки

    Для достижения поставленных целей Отдел решает следующие задачи:

    проведение информационной и консультативной работы по вопросам поступления в Университет;

    организация и проведение профориентационной работы по привлечению абитуриентов
    для поступления в Университет по направлениям бакалавриата, магистратуры, специалитета,
    по специальностям среднего профессионального образования;

    проведение мониторинга рынка образовательных услуг в области профессионального
    образования по приоритетным направлениям развития образовательной системы Российской
    Федерации, а также взаимодействие с региональным рынком труда по набору абитуриентов
    и подготовке квалифицированных кадров;

    организация взаимодействия университета с предприятиями и организациями по вопросам
    целевого приема, трудоустройства студентов и выпускников, а также мониторинга
    их профессионального роста;

    формирование лояльности и укрепление имиджа Университета.

