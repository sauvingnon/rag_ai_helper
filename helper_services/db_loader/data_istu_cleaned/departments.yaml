    Основные образовательные программы кафедры уровней бакалавриата и магистратуры,
    направление 15.03.06 и 15.04.06 «Мехатроника и робототехника», профили «Мехатронные
    системы в машино и приборостроении», «Автоматизация и цифровые двойники производства»,
    27.03.03 «Системный анализ и управление» профиль «Искусственный интеллект и управление
    беспилотными системами» прошли в этом году рассмотрение и утверждение у ведущих
    предприятий г. Ижевска : АО "Концерн Калашников", АО "ИЭМЗ "КУПОЛ", ОАО НИТИ "Прогресс",
    АО "Ижевский мотозавод "Аксион холдинг», «Финко», «ИжБС» и др.

    Большая часть выпускных квалификационных работ студентов связаны с развитием систем
    управления беспилотных мобильных транспортных систем, беспилотных водных и подводных
    систем, беспилотных авиационных систем. Много работ направлено на совершенствование
    квадрокоптеров и других летающих аппаратов.

