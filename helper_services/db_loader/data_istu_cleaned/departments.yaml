    Бассейн Ижевского государственного технического университета имени М. Т. Калашникова
    построен в 2013 году в рамках программы «500 бассейнов». Проект «500 бассейнов»
    по строительству бассейнов в государственных высших учебных заведениях существует
    с 2009 года, и за это время его участниками стали вузы Санкт-Петербурга, Республики
    Тыва, Воронежской и Рязанской областей, Хабаровского края, Республики Мордовия
    и других регионов и городов.

    Физкультурно-оздоровительный комплекс с бассейном располагается в районе административно-бытового
    корпуса стадиона «Буревестник» и профилактория ИжГТУ. Общая площадь здания составляет
    1828 кв. метров. Бассейн представляет собой двухэтажное здание, на первом этаже
    которого размещаются раздевалки, комнаты для дежурного тренера и медсестры, а
    на втором – административное помещение, кабинет врача, тренерская и т.д. Чаша
    бассейна – с четырьмя дорожками, цельнометаллическая, с габаритными размерами
    16 на 25 метров. Глубина – 1,2 м и 1,8 м в месте, где предусмотрены вышки для
    прыжков в воду. Используется современная технология водоподготовки и водоочистки
    –

    система озонирования

    Рассчитан бассейн ИжГТУ в первую очередь на студентов и сотрудников вуза, но стать
    его посетителями смогут все желающие жители города Ижевска.

