    Титульный лист к диплому для профиля «Водоснабжение и водоотведение»

    Титульный лист к магистерской ВКР по программе " Водоснабжение городов и промышленных
    предприятий "

    Реферат к ВКР

    Бланк рецензии к магистерской ВКР

    Отзыв руководителя к ВКР по профилю  "Водоснабжение городов и промышленных предприятий"

    Если в качестве руководителя ВКР по приказу назначены и руководитель, и консультант,
    то в бланках указываем всех. Если только руководитель, то из бланков удаляем консультантов.

    Сочетание фундаментальных дисциплин цикла «Общая гидравлика» с профилирующими
    дисциплинами профиля «Водоснабжение и водоотведение» определяет широту и разноплановость
    тематики научных исследований, проводимых учеными кафедры как в инициативном порядке,
    так и по заказам российских и муниципальных организаций (Федеральное Управление
    по безопасному хранению и уничтожению химического оружия, РАН, МЧС России,  Рособразование,
    Роскосмос, МУП «Ижводоканал», МУП "Водоканал" (г. Воткинск) и др.).

    Основная научная тематика

    :

    Разработка алгоритмов для автоматизированного расчета систем водоснабжения и водоотведения.

    Исследование осадка сточных вод и путей использования его теплоты и биомассы как
    резерва энергосбережения на ОСК МУП «Ижводоканал» г. Ижевска.

    Интенсификация процессов биологической очистки сточных вод, получение и практическое
    использование биогаза, разработка и создание биогазовых установок.

    Моделирования течений жидкостей и газов при разрушении гидротехнического сооружения.

    Переработка производственных сточных вод объектов уничтожения химического оружия.

    Создание системы обращения с жидкими отходами производства по уничтожению химического
    оружия для повышения качества принимаемых решений в области экологической безопасности
    процесса.

    Анализ технического состояния и прогнозирование надежности инженерных сетей.

    Системный анализ машин и агрегатов; обработка информации.

    Экологические вопросы водоснабжения и водоотведения, разработка технических средств
    обеззараживания воды.

    Технико-экологические вопросы гидро- и газоочистки, в том числе при утилизации
    изделий ракетно-космической техники.

    Разработка многокомпонентных контрольно-измерительных устройств для диагностирования
    изделий космического назначения.

    Управление городским водопроводным и автодорожным хозяйством.

    Повышение эффективности дезодорации воды на городских очистных сооружениях.

    Математическое моделирование процессов очистки питьевых и сточных вод, обработки
    осадка, тепловых и химических процессов в биореакторе.

    Перечисленные выше темы научных исследований нашли отражение в тематике докторских
    и кандидатских диссертаций преподавателей кафедры, темах диссертационных работ
    аспирантов, дипломных проектах выпускников, научных публикациях, в том числе с
    участием студентов.

    Для выполнения научных работ, интеграции науки и производства, и практического
    обучения студентов работе на современной технике кафедрой в 2014 г. открыта и
    функционирует совместная лаборатория биотехнологий на территории ОСК МУП «Ижводоканал»
    и создана базовая кафедра «Инженерные системы ЖКХ» при МУП «Ижводоканал».

    При выпускающей кафедре «ВиВ» с 2003 г. работает аспирантура, в которой в настоящее
    время обучаются четыре человека (научные руководители д.т.н., проф. В.Г. Исаков,
    д.х.н., проф. М.Ю. Плетнев). За период с 1999 по 2017 гг. защищена 1 докторская
    диссертация (Исаков В.Г.), 2 кандидатских диссертации (Дягелев М.Ю., Абрамова
    А.А.).

    Ученые кафедры участвовали в выполнении республиканской программы «Чистая вода
    – населению Удмуртской Республики» (1998-2002 гг.) и в разработке программы «Чистая
    вода в г. Ижевске», в разработке специализированной подпрограммы Правительства
    Удмуртской Республики «Ресурсосбережение и экология» и программы Комитета по науке,
    высшему и среднему профессиональному образованию при Правительстве УР «Инженерные
    проблемы энерго- и ресурсосбережения», проведении экспертиз по заказу Управления
    Природнадзора по УР по профилю своей деятельности.

    Ученые кафедры «ВиВ» (В.Г. Исаков, А.А. Абрамова) представлены в специальном Совете
    по присуждению ученых степеней д.т.н. (ДС 212.002.03 при ИжГТУ имени М.Т. Калашникова
    по специальностям 20.02.26, 20.02.16, 20.02.12).

