    Положение о педагогическом совете института непрерывного профессионального образования
    имени М.Т.Калашникова

    Группа Вконтакте

    7 апреля 1998 года приказом ректора ИжГТУ И. В. Абрамовым был создан Институт
    непрерывного профессионального образования (ИНПО) как структурное подразделение
    вуза с целью предоставления населению дополнительной возможности повысить уровень
    образования, наиболее эффективного решения задач экономического и социального
    развития университета. Директором института был назначен проректор по начальному
    и среднему профессиональному образованию О. К. Шибанов. ИНПО стал логическим продолжением
    сформированного в 1990 году Центра непрерывной подготовки инженерных кадров (ЦНПИК),
    возглавляемого Л. В. Белорусовой.

