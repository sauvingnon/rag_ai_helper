  name: Кафедра «Программное обеспечение»
  keywords: предпринимательство, автоматизированных, профессионального, программирования,
    программирование, инструментальных, подготовительных
  text: 'Кафедра «Программное обеспечение»

    Леонов Михаил Витальевич

    доктор экономических наук, доцент

    профессор, заведующий кафедрой

    8 (3412) 77-60-55 доб. 3252

    корпус 3

    , каб. 711

    leonov@istu.ru

    Контакты подразделения

    8 (3412) 77-60-55 доб. 3252, 8-919-915-64-57

    Телефон

    po@istu.ru

    Кафедра «Программное обеспечение» была образована в 1969 году.

    Кафедра «Программное обеспечение» (ПО) является выпускающей кафедрой высшего образования
    и выпускает:

    Бакалавров по направлению 090304 «Программная инженерия».

    Магистров по направлению 090404 «Программная инженерия».

    Кроме этого кафедра ПО занимается подготовкой техников программистов по специальности
    среднего специального образования 090203 «Программирование в компьютерных системах».

    В процессе обучения наши студенты получают глубокие знания в области информатики
    и компьютерной математики, системного и прикладного программирования, организации
    ЭВМ, вычислительных систем и сетей, операционных систем и систем программирования,
    баз данных и инструментальных средств разработки программного обеспечения, системного
    анализа и машинного моделирования, принятия решений и управления, систем обработки
    данных и искусственного интеллекта.

    Наши выпускники успешно работают в научных, проектных, конструкторских, технологических
    организациях, коммерческих структурах, в банках и на промышленных предприятиях.
    Они имеют возможность заниматься индивидуальной трудовой деятельностью – создавать
    и продавать программный продукт.

    Техническое оснащение кафедры «Программное обеспечение»

    Кафедра «Программное обеспечение» обладает современным оборудованием для проведения,
    как учебного процесса, так и научной работы:

    2 компьютерных класса.

    Лаборатория «Системы мультимедиа и компьютерная графика».

    Центр подготовки программистов олимпийского резерва.

    Аудитории для проведения практических занятий, оснащенные мультимедийным оборудованием.

    45 персональных компьютеров класса Intel Core 2 Duo, Core i3/i5.

    4 сервера.

    В 1969 году в Ижевском механическом институте была создана кафедра "Механизированная
    обработка экономической информации" (МОЭИ). Заведующим кафедрой с 1969 года по
    1982 год был Почерняев С.В. На кафедре велась подготовка специалистов по специальности
    1738 - "Механизированная обработка экономической информации". Основной костяк
    кафедры МОЭИ составляли такие преподователи как Каюров Ю.А., Кочуганов В.Н., Соболева
    Н.В., Левиатов А.Ю. Позднее пришли на кафедру кандидаты наук Сенилов М.А., Килин
    И.В., Барков И.В.

    С 1982 по 1985 год кафедру воглавлял Ю.А. Каюров. В этот период кафедра МОЭИ была
    переименована в кафедру САПР в связи с закрытием специальности 1738 и открытием
    новой специальности САПР. С 1985 года кафедру САПР возглавлял Кучуганов В.П. (ныне
    д.т.н., профессор).

    В 1987 году на кафедре САПР была открыта новая специальность 22.04 - "Программное
    обеспечение вычислительной техники и автоматизированных систем". Кафедра стала
    готовить инженеров-программистов. В 1990 году была создана кафедра "Программное
    обеспечение", на которую перешла часть преподователей кафедры САПР. Кафедра "Программное
    обеспечение" стала выпускающей кафедрой по специальности 22.04. Заведующим кафедрой
    ПО в 1990-1993 годах был профессор Каюров Ю.А. В 1992 году состоялся первый выпуск
    специальности 22.04. Впервые в ИМИ было выпущено 19 инженеров-программистов. В
    этот период на кафедру приходят к.т.н., доцент Тарасов В.Г. и молодой преподаватель
    - выпускник специальности 1738 доцент Кадацкая М.С., защитившая впоследствии,
    работая на кафедре, кандидатскаю диссертацию.

    С 1994 года заведующим кафедрой является к.т.н., доцент Сенилов М.А. (ныне декан
    факультета информатики и вычислительной техники). Кафедра пополняется молодыми
    преподователями: Лугачевым П.П. (выпускник специальности 1738) и Старыгиным А.В.
    (выпускник специальности 22.04). В 1994 году Сенилов М.А. организовал Учебно-научный
    центр "Высшая школа информатики и программирования", который в 1999 году был преобразован
    в Институт информатики ИжГТУ. Институт информатики ведет подготовку и переподготовку
    специалистов с высшим образованием и студентов старших курсов с целью получения
    второго высшего образования по специальности 22.04, организует обучение школьников
    на подготовительных курсах по информатике с целью подготовки к поступлению в ИжГТУ
    и к олимпиадам по информатике

    В 2003 году на кафедру пришёл д.т.н., профессор Мурынов А.И. (впоследствии заведующий
    кафедрой "Программное обеспечение"). В 2004 году заведующий кафедрой Сенилов М.А.
    становится деканом факультета ИВТ, а в 2005 году защищает докторскую диссертацию.
    С 2005 года по 2008 год кафедру возглавляет д.т.н., профессор Мурынов А.И.

    С 2008 года кафедрой руководит к.т.н, доцент Архипов И.О. (выпускник специальности
    22.01).

    Кафедра сегодня

    Кафедра “Программное обеспечение” (ПО) является выпускающей кафедрой высшего профессионального
    образования (ВПО) и готовит:

    инженеров по специальности 230105.65 - “Программное обеспечение вычислительной
    техники и автоматизированных систем” (очная 5 лет, заочное 5.5 года, второе высшее
    3 года);

    бакалавров техники и технологии по направлению 230100.62 Информатика и вычислительная
    техника (очное 4 года);

    магистров техники и технологии по направлению 230100.68–12 Информатика и вычислительная
    техника по программе "Системы мультимедиа и компьютерная графика" (очное 2 года).

    Кафедра проводит подготовку специалистов, имеющих базовое высшее образование,
    - второе высшее образование. Ввиду имеющегося на рынке труда спроса на инженеров-программистов
    производится прием на заочную форму обучения по специальности 230105.

    С 2006 года кафедра ПО проводит набор на первый курс бакалавров и магистров.

    В настоящее время учебную и научную работу ведут 23 преподавателя и аспиранта,
    среди них: 2 доктора наук, профессора; 2 кандидата наук, профессора; 9 кандидатов
    наук, доцентов; 1 доцент; 2 старших преподавателя; 7 аспирантов.

    Возрастной состав на кафедре "Программное обеспечение" в среднем составляет 49
    лет.

    Ежегодно кафедра выпускает около 100 бакалавров, инженеров и магистров.

