    Угловые штампы ВКР

    Основная научная тематика кафедры

    :

    разработка концепций маркетинг-менеджмента в региональном инвестиционно-строительном
    комплексе;

    теория и практика организационно-технологических и экономических решений;

    автоматизированные системы расчетов строительных конструкций, численные методы
    расчетов пластин и оболочек;

    экономика отрасли, стратегическое планирование и системный анализ;

    тенденции в развитии техники и технологии строительства;

    проблемы использования инновационных технологий в технической эксплуатации зданий
    и городских инженерных систем;

    инновационные, ресурсосберегающие технологии для повышения экономической эффективности
    строительства и сферы ЖКХ.

    Перечисленные выше темы научных исследований нашли отражение в тематике докторских
    и кандидатских диссертаций преподавателей кафедры, темах диссертационных работ
    аспирантов, выпускных квалификационных работ выпускников, научных публикациях,
    в том числе с участием студентов.

    Научно-исследовательская деятельность

    Для осуществления научно-исследовательской деятельности преподавателей и студентов
    кафедры, для выполнения научных работ, интеграции науки и производства, практического
    обучения студентов, открыты и действуют научные лаборатории:

    1.

    Научно-исследовательская лаборатория базового предприятия ФГУП «ГВСУ № 8»

    , на базе которой создано МИП ООО «Научно-исследовательский институт «Строительная
    лаборатория» (3-3Б).

    Направление научных исследований

    – фундаментальные и прикладные исследования в области физико-механических свойств
    материалов, экспериментальные разработки в области исследования грунтов.

    Практическое назначение

    : проведение научных исследований, НИРС, привлечение заказов по испытаниям стройматериалов,
    экспертизе, сертификации и др.

    Лаборатория оснащена современным оборудованием, необходимым для проведения разнообразных
    исследований (пресса, измерители прочности бетона, освещенности, плотномеры, гигрометры,
    толщиномеры и др.).

    Действующие и потенциальные заказчики НИР и ОКР

    – ООО «Технология», МИП НИИ «Стройлаб».

    2.

    Лаборатория информационных технологий в недвижимости

    (3-4А).

    Направление научных исследований и практическое назначение

    – информационное обеспечение проектно-строительной деятельности, расчет строительных
    конструкций, сетевых моделей, проведение научных исследований.

    Научное оборудование

    – информационные базы от ООО «Региональная информационная компания», с которой
    заключено соглашение о сотрудничестве.

    В состав лаборатории входят: 2 компьютерных класса, 25 стационарных моноблоков,
    лицензионные программные продукты: nanoCAD Plus, nanoCAD Стройплощадка, nanoCAD
    Электро, nanoCAD СКС, nanoCAD ОПС, nanoCAD ВК, nanoCAD Отопление, nanoCAD СПДС,
    nanoCAD СПДС Стройплощадка, nanoCAD СПДС Железобетон, nanoCAD Геоника, nanoCAD
    Конструкции КЖ, nanoCAD Конструкции.

    Действующие и потенциальные заказчики НИР и ОКР

    – РОР «Союз Строителей Удмуртии».

    3.

    BIM-центр (лаборатория информационного моделирования зданий)

    (3-803).

    Направление научных исследований и практическое назначение

    – информационное моделирование зданий, обеспечение проектно-строительной деятельности,
    виртуальные технологии в строительстве, выполнение заказов от проектных и строительных
    организаций Удмуртской Республики.

    Научное оборудование

    – комплект учебно-лабораторного оборудования «Колебания гибкой балки», комплект
    учебно-лабораторного оборудования «Напряжения в плоских фермах», комплект учебно-лабораторного
    оборудования «Определение перемещений при изгибе балки», комплект учебно-лабораторного
    оборудования «Определение напряжений при чистом изгибе».

    Действующие и потенциальные заказчики НИР и ОКР

    – РОР «Союз Строителей Удмуртии», ООО «Технология.

    Научно-исследовательская работа студентов

    Важная составная часть научной работы на кафедре – научно-исследовательская работа
    студентов, к которой привлекаются учащиеся всех курсов, как бакалавриата, так
    и магистратуры. Результаты исследований представляются на ежегодно проводимых
    студенческих научно-технических конференциях по итогам работы за истекший учебный
    год, публикуются в сборнике трудов научно-технических конференций. Авторы лучших
    работ участвуют во всероссийских конференциях молодых ученых, в конкурсах студенческих
    научно-исследовательских работ.

    Два раза в год на кафедре проводится Международная научно-практическая конференция
    «Фотинские чтения» (весна, осень) с изданием сборника трудов, индексируемого в
    РИНЦ (Российский индекс научного цитирования).

    Ежегодно студенты кафедры принимают участие в работе зарубежных научно-практических
    конференций:

    Форум проектов программ Союзного государства – Форум вузов инженерно-технологического
    профиля (БНТУ, г. Минск, Республика Беларусь);

    Актуальные проблемы экономики и управления: теория и практика: Республиканский
    с международным участием Конкурс научно- исследовательских работ студентов, магистрантов
    и аспирантов (г. Донецк, Донецкий национальный университет экономики и торговли
    имени Михаила Туган-Барановского);

    студенческая научно-практическая конференция «Экономика и маркетинг в промышленности»
    (БНТУ, г. Минск, Республика Беларусь);

    международный научный семинар «Мировая экономика и бизнес-администрирование малых
    и средних предприятий» в рамках международной научно-технической конференции «Наука
    – образованию, производству, экономике» (БНТУ, г. Минск, Республика Беларусь).

    В декабре 2021 года Алевтина Семенова — магистрант программы «Управление инвестиционно-строительной
    деятельностью» (руководитель программы д.э.н., профессор В.П. Грахов) приняла
    участие в Х Форуме вузов инженерно-технологического профиля Союзного государства,
    проходившего на базе Белорусского национального технического университета. Где
    заняла призовое II место в бизнес-бое со своим проектом «Виртуальное учебное пособие
    «Стройплощадка» (секция «Молодежное инновационное предпринимательство»), разработанное
    с использованием ТИМ и визуализации процессов.

    Традиционно, на кафедре «ПГС» сильно олимпиадное движение. В 2022 году четыре
    команды студентов заняли призовые места в заключительных этапах Всероссийских
    студенческих олимпиад по направлению «Строительство», которые проходили в ведущих
    строительных вузах нашей страны: ННГАСУ (Нижний Новгород), ВГТУ (Воронеж), ПГУАС
    (Пенза), СамГТУ (Самара).

    70 научных докладов было представлено нашими студентами за 2022 год на научных
    конференциях, семинарах, форумах различного значения. Опубликовано более 100 научно-исследовательских
    статей в российских и зарубежных журналах.

    Достаточно высока публикационная активность научно-педагогических работников кафедры
    ПГС. Только за 2022 год учеными кафедрами написано и опубликовано в журналах российского
    и международного значения более 90 научных статей, из них 21 статья ВАК и 5 статей,
    входящих в ядро РИНЦ. Изданы 3 монографии, одна из которых отмечена Дипломом I
    степени всероссийского конкурса «Лучшая научная книга».

    В 2020 году молодые ученые кафедры Ольга Симченко и Александр Сунцов выиграли
    ректорский грант на разработку проекта, специализированного приложения для шлема
    виртуальной реальности. Приложение формирует цифровую симуляцию реального строительного
    объекта и позволяет осуществлять действия внутри нее.

    Пособие представляет собой тренажер, который с помощью очков виртуальной реальности
    позволяет студентам «погрузиться» прямо на строительную площадку, увидеть в реальном
    времени основные производственные процессы, выполнить ряд заданий, отработать
    практические навыки и самим принимать решения.

