  text: 'Кафедра «Приборы и методы измерений, контроля, диагностики»

    Муравьева Ольга Владимировна

    доктор технических наук, профессор

    И.о. заведующего кафедрой, главный научный сотрудник, профессор

    корпус 1

    , каб. 501a

    olgak166@mail.ru

    Контакты подразделения

    8(3412) 77-60-55 доб. 1132

    Телефон

    pmkk@istu.ru

    Кафедра «Приборы и методы измерений, контроля, диагностики» была организована
    в 1981 году. На кафедре сформирована научная школа, обучение в которой ведется
    по специальной программе направленной на подготовку научных кадров для предприятий
    и организаций Удмуртской Республики и Приволжского региона.

    Обучение на кафедре ведут 5 докторов наук, профессоров, 12 кандидатов наук, доцентов,
    специалисты промышленных предприятий, ученые Физико-технического института УдмФИЦ
    УрО РАН.

    На кафедре организовано обучение в рамках группы направления подготовки – 12.00.00
    "Фотоника, приборостроение, оптические и биотехнические системы и технологии"
    по направлениям среднего профессионального образования, бакалавриата, магистратуры
    и аспирантуры:

    12.02.10 Монтаж, техническое обслуживание и ремонт биотехнических и медицинских
    аппаратов и систем (Среднее профессиональное образование)

    12.03.01 «Приборостроение» (Бакалавр)

    Приборы и методы контроля качества и диагностики (очная форма)

    Приборы и методы контроля качества и диагностики (заочная форма)

    12.04.01 «Приборостроение» (Магистр)

    Приборы и методы контроля природной среды, веществ, материалов и изделий (очная
    форма)

    Метрология, стандартизация и сертификация (очная форма)

    Приборы и методы контроля природной среды, веществ, материалов и изделий (заочная
    форма)

    12.06.01 «Фотоника, приборостроение, оптические и биотехнические системы и технологии»
    (Преподаватель исследователь)

    Приборы и методы контроля природной среды, веществ, материалов и изделий (очная
    форма)

    В июле 1980 г. Обком КПСС УАССР направил в адрес Отдела культуры и образования
    Госплана СССР ходатайство №245С, по которому в 1981 г. было принято положительное
    решение об открытии специальности «Физические методы и приборы неразрушающего
    контроля» на базе ИМИ и Ижевского отдела Института физики металлов УрО АН СССР,
    чему были следующие предпосылки:

    потребности в специалистах предприятий промышленности Удмуртской республики, где
    имелись развитые службы неразрушающего контроля (НК);

    наличие научно-технического потенциала по НК в Ижевском механическом институте
    (Ломаев Г.В., Мерзляков Ю.М., Садилов Ю.А., Перепелов С.П., Барсуков В.К., Черепанов
    В.С., Кирсанов В.С., Галимов Р.А. , Малышев В.С., Филинов В.В., Леньков С.В.,
    Штин А.А., Смолович В.Л., Машкович С.Б., Гурин С.В., Юран С.И., Толчинский А.Д.,
    Гуляева А.Н., Айзенберг Л.Я., Исупов А.Н. и др.);

    поддержка Уральского отделения АН СССР в лице акад. Вонсовского С.В. и директора
    Института физики металлов Михеева М.Н., Щербинина Е.В. (ныне чл.-кор. РАН), создание
    в г. Ижевске филиала УрО АН СССР и приглашение на работу профессионалов в области
    методов и средств НК - Горкунов Э.С. (ныне акад. РАН, Комаров В.А., Захаров В.А.,
    Буденков Г.А., Ульянов А.И., Лапидус Б.М., Ревина Н.А., Глухов Н.А. и др.

    В 1981 г. проведен первый набор на специальность 0653 «Физические методы и приборы
    НК» с квалификацией выпускников «инженер-физик», а выпускающей кафедрой определена
    кафедра «Электротехника» приборостроительного факультета. В 1984 году специальность
    переведена на кафедру «Детали приборов» приборостроительного факультета, в дальнейшем
    переименованную в «Приборы и методы контроля качества». Первым заведующим кафедрой
    стал П.А. Ушаков. В 1986 кафедра ПиМКК провела успешный выпуск 24 (из 27) инженеров-физиков.
    В 1986 г. заведующим кафедрой выбран Мерзляков Ю.М., более 15 лет бессменно руководивший
    кафедрой. Огромная благодарность всех сотрудников кафедры этому талантливому руководителю,
    организатору, чудесному человеку, за его неустанную заботу, поддержку, понимание
    любого из сотрудников. Учебную и научную работу вели более 30 преподавателей.
    Добрая память и благодарность людям, вложившим свои силы, интеллект в становление
    и развитие кафедры, кого уже нет с нами: Г.А. Буденкову, В.С. Малышеву, Е.П. Елсукову,
    Е.С. Махневу, А.И. Жаравину, Л.И. Вологжанину, В.А. Стерхову, Е.А. Жуйкову, В.А.
    Зуеву. Ушла на заслуженный отдых секретарь кафедры Сутягина Л.И. - образованная,
    тактичная, работящая, она решала многие организационные, финансовые, кадровые
    вопросы. Дай Бог ей здоровья.

    C 2010 года кафедрой руководит Заслуженный деятель науки РФ, д.т.н., профессор
    Муравьев Виталий Васильевич. В 2015 году кафедра была переименована и стала называться
    «Приборы и методы измерений, контроля, диагностики». В настоящее время на кафедре
    ведется обучение бакалавров по направлению 12.03.01 «Приборостроение», профиль
    «Приборы и методы контроля качества и диагностики»; магистрантов по программам
    «Приборы, системы и изделия биомедицинского назначения», «Приборы и методы контроля
    окружающей среды, веществ, материалов и изделий», «Метрология, стандартизация,
    сертификация»; аспирантов по специальностям 05.11.13 - Приборы и методы контроля
    природной среды, веществ, материалов и изделий, 05.11.17 - Приборы, системы и
    изделия медицинского назначения. Имеются возможности получения дополнительного
    высшего образования «Переводчик в сфере профессиональных коммуникаций», стажировок
    за рубежом (Университет VUT г. Брно, Чехия; Университет г. Печ, Венгрия); сертификации
    на уровень квалификации по НК. Обучение ведут 5 докторов наук, профессоров, 12
    кандидатов наук, доцентов; специалисты промышленных предприятий; ученые ФТИ УрО
    РАН. Сегодня на кафедре функционируют оснащенные современными приборами и оборудованием
    9 учебных и научных лабораторий и компьютерный класс.

    Кафедра является базовой для работы диссертационного Совета в Институте механики
    УрО РАН по специальности 05.11.13 — «Приборы и методы контроля природной среды,
    веществ, материалов и изделий».

    Кафедра подготовила более 900 специалистов, около 250 бакалавров, 130 магистров,
    которые успешно трудятся на промышленных предприятиях Удмуртии — ОАО «ИРЗ», ОАО
    «ИМЗ «Аксион-холдинг», ФГУП «ИМЗ», ОАО «ИЭМЗ «Купол», ОАО «Ижсталь», ОАО «Ижмаш»,
    ОАО «Буммаш», ОАО «Нефтемаш», ОАО «ЧМЗ», ФГУП «Воткинский завод»; в академических
    организациях — ФТИ УрО РАН, ИМ УрО РАН, ИФМ УрО РАН, в организациях  ООО «Газнадзор»,
    ООО «Пермтрансгаз», ООО «ЭНТЭ», ЗАО «Западноуральский центр сертификации», ЗАО
    «Альтон», ООО «Стрела». Среди наших выпускников 2 доктора и 26 кандидатов наук,
    руководители промышленных предприятий и организаций, лабораторий НК, ЦЗЛ, ОТК
    и метрологии.

    Необходимо отметить работающих на кафедре выпускников — докторов наук (проф. Муравьева
    О.В.) и кандидатов наук (доценты Стрижак В.А., Богдан О.П., Мурашов С.А., Волкова
    Л.В., Злобин Д.В., Платунов А.В.).

    Среди сотрудников кафедры - автор научного открытия (Г.А. Буденков), лауреаты
    Государственной премии УР, победители грантов РФФИ, РНФ, Министерства образования
    и науки РФ, проектов Старт и УМНИК. На кафедре активно развивается научная школа
    «Физические методы и средства измерений, контроля и диагностики технических объектов»
    под руководством проф. В.В. Муравьева, которая в течение шести последних лет удерживает
    лидирующие позиции среди научных школ ИжГТУ имени М.Т. Калашникова.

    Кафедра гордится нашими ветеранами, которые подают пример молодым преподавателям
    и сотрудникам своим активным участием в преподавании основных дисциплин и научных
    исследований – профессор Ломаев Г.В. (руководитель научной школы «Магнитные методы
    и средства неразрушающего контроля, технической диагностики, экологического мониторинга»),
    доцент Пономарева О.В., проф. Леньков С.В. В составе кафедры – зам.декана Редькина
    Т.А., зав. лабораториями Пряхин А.В., Степанов В.А., молодые сотрудники (инженеры
    Мышкин Ю.В., Ефремов А.Б., Гущина Л.В., Хасанов Р.P., Синцов М.А.).

    За последние 5 лет преподаватели и сотрудники кафедры опубликовали 5 монографий,
    75 публикаций в российских научных изданиях, входящих в перечень ведущих рецензируемых
    научных журналов и изданий ВАК, среди которых 50 - в журналах Web of Science и
    Scopus, около 30 патентов и зарегистрированных программных продуктов, выиграли
    19 грантов, заключили 390 хоздоговоров, договоров на НИОКР, НИР на общую сумму
    около 70 млн. руб.

    Кафедрой созданы и поддерживаются структурные подразделения по оказанию услуг
    в области сертификации персонала и повышению квалификации специалистов в области
    НК технических объектов (за 7 лет работы сертифицировано более 2000 специалистов);
    профессиональной подготовки по рабочей профессии «Дефектоскопист по магнитному
    и ультразвуковому контролю» (ответственные – зав. лаб. к.т.н. Платунов А.В., инж.
    Хватова О.А.)

    На кафедре ведется разработка уникальных технологий и средств акустической дефектоскопии
    и структуроскопии объектов транспорта, металлопроизводства и машиностроения, в
    том числе с использованием бесконтактных электромагнитно-акустических преобразователей.
    Среди разработок кафедры - акустические дефектоскопы насосных штанг АДНШ, насосно-компрессорных
    труб АДНКТ, прутков АДП, эхолоты ЭХО, электромагнитно-акустические структуроскопы
    СЭМА, электромагнитно-акустические дефектоскопы ДЭМА, измерители скорости акустических
    волн ИСАВ, магнитометры ИГМП-3, толщиномеры упрочненных слоев СКИФ-3, приборы
    для разбраковки по маркам стали ТЕРМ-1

