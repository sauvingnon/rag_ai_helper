    Область профессиональной деятельности выпускников включает обеспечение безопасности
    человека в современном мире, формирование комфортной для жизни и деятельности
    человека техносферы, минимизацию техногенного воздействия на природную среду,
    сохранение жизни и здоровья человека за счет использования современных технических
    средств, методов контроля и прогнозирования.

    1952 г.

    при кафедре «Экономика и организация промышленности» организована секция «Охрана
    труда»

    заведующий секцией «Охрана труда» – к.м.н., доцент Герасимова Елена Николаевна

    1979 г.

    образована кафедра «Охрана труда».

    заведующий кафедрой – к.т.н., доцент Ончуков Евгений Платонович

    1985 г.

    заведующий кафедрой с 1985 по 1991 г.г.- к.т.н., доцент Чаузов Аркадий Степанович

    1991 г.

    кафедра «Охрана труда» объединена с циклом «Гражданская оборона» и переименована
    в кафедру «Экология и ресурсосбережение»;

    заведующий кафедрой с 1991 года - к.т.н., доцент Кургузкин Михаил Георгиевич

    1996 г.

    кафедра стала профилирующей, начала подготовку инженерных кадров по специальностям:

    330200 «Инженерная защита окружающей среды»;

    330500 «Безопасность технологических процессов и производств».

    1999 г.

    кафедра начала подготовку по специальности среднего профессионального образования
    3201 «Охрана окружающей среды и рациональное использование природных ресурсов»

    2001 г.

    с 2001 года кафедра носит название «Безопасность технологических процессов и экология».

    заведующий кафедрой с 2001 г. по настоящее время заслуженный изобретатель Российской
    Федерации, д.т.н., профессор Борис Владимирович Севастьянов

    2002 г.

    с 2002 года кафедра носит название «Безопасность жизнедеятельности»

    2003 г.

    в ИжГТУ создана кафедра «Инженерная экология» на которую передана с кафедры «Безопасность
    жизнедеятельности» специальность 330200 «Инженерная защита окружающей среды»

    2004 г.

    кафедра «Безопасность жизнедеятельности» начала подготовку по специальности 280103.65
    «Защита в чрезвычайных ситуациях»

    2005 г.

    кафедра начала подготовку по специальности среднего профессионального образования
    3203 «Пожарная безопасность»

    2006 г.

    кафедра «Безопасность жизнедеятельности» продолжает вести подготовку инженеров
    направления - 280100 «Безопасность жизнедеятельности» по специальностям:

    280102.65 «Безопасность технологических процессов и производств»;

    280103.65 «Защита в чрезвычайных ситуациях»;

    выпустила первых бакалавров по направлению 280200.62 «Защита окружающей среды»;

    ведет подготовку магистров по направлению 280200 «Защита окружающей среды» по
    программе магистерской подготовки

    280200.68-01 «Промышленная экология и рациональное использование природных ресурсов»;

    ведет подготовку аспирантов по специальности 05.26.01 «Охрана труда» (по отраслям).

    2014 г.

    кафедра "Безопасность жизнедеятельности" была объединена с кафедрой "Инженерная
    экология" и переименована в кафедру «Техносферная безопасность»

    Заведующий кафедрой «Техносферная безопасность» с 2001 г. по 2022 г. – Севастьянов
    Борис Владимирович, д.т.н., профессор, заслуженный изобретатель Российской Федерации.

    С 2022 г. по настоящее время исполняет обязанности заведующего кафедрой Али Елена
    Борисовна, кандидат технических наук,  доцент кафедры «Техносферная безопасность», 
    Почетный работник высшего профессионального образования РФ.

    Все сотрудники кафедры с 2020-2023 года прошли повышение квалификации по читаемым
    дисциплинам.

    Образовательные программы

