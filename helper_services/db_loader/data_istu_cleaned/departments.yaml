    На кафедре «Техносферная безопасность» ведутся исследования по

    следующим научным направлениям

    :

    утилизация боеприпасов обычного типа, переработка получаемых компонентов во вторичную
    товарную продукцию, научная специальность 05.02.08 «Технология машиностроения»;

    улучшения условий труда в стрелковых тирах, на предприятиях машиностроительного
    комплекса, научная специальность 05.26.01 – «Охрана труда» (машиностроение);

    разработка моделей и методов сбора, обработки и анализа информации по условиям
    и охране труда и интеграции с соответствующими цифровыми платформами

    Кафедрой выполнялась НИР по следующим грантам:

    «Разработка способов повышения эффективности систем управления охраной труда отдельных
    групп персонала промышленного предприятия», шифр № 20.06.01/18СБВ.

    «Применение системного анализа в прогнозировании показателей производственного
    травматизма Удмуртской Республики», шифр № 20.04.01/18СБВ.

    «Развитие региональной системы управления охраной труда и промышленной безопасности
    на предприятиях Удмуртской Республики», шифр № ШРО/20-86-11.

    К проведению научных исследований привлекаются студенты.

    Студенты младших курсов принимают активное участие во всероссийских и международных
    конференциях в очной и заочной формах, с публикацией тезисов докладов. Выпускники
    и магистранты представляют проекты в инновационных научно-технических форумах
    («Умник», «Старт»).

    Кафедра гордится тем, что вырастила из числа своих выпускников кандидата технических
    наук в 24 года (Шадрин Р.О.), доктора технических наук в 33 года (Тюрин А.П.).

