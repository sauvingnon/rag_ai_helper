    , ауд. 427

    Кафедра «Физика и оптотехника» была создана в июле 2010 года в результате объединения
    кафедр «Лазерные системы» и «Физика». На кафедре работает 28 человек: 20  человек
    – профессорско-преподавательский состав и 8 человек – учебно-вспомогательный персонал.
    В том числе в составе кафедры 2 доктора наук и 15 кандидатов наук.

    Кафедра «Физика и оптотехника» является одной из базовых кафедр нашего ВУЗа. Она
    обеспечивает проведение лекционных, практических и лабораторных занятий по всему
    курсу общей физики, включающего разделы «Физические основы механики. Молекулярная
    физика и термодинамика. Электричество и магнетизм. Волновая оптика. Основы атомной
    физики. Элементы квантовой механики, физики твердого тела, физики ядра и элементарных
    частиц», для студентов практически всех специальностей ИжГТУ имени М.Т. Калашникова.
    Преподаватели кафедры выполняют большую учебную работу на 1-2 курсах по закладке
    того фундамента знаний, на котором в дальнейшем идет усвоение специальных дисциплин.
    Это кропотливая, ежедневная работа требует большой отдачи от коллектива, проведения
    многочисленных консультаций, частой дополнительной работы помимо учебных часов,
    ведь приходится работать со студентами младших курсов. Также преподаватели нашей
    кафедры ведут большой объем занятий на заочном отделении большинства специальностей
    ИжГТУ. Студенты, обучавшиеся на нашей кафедре, успешно проходят регулярно проводимое
    Федеральное тестирование по физике. Кафедрой проводятся олимпиады по физике, и
    многие наши студенты занимают призовые места на олимпиадах разного уровня. Сотрудники
    нашей кафедры регулярно участвуют в конкурсах на получение различных грантов.

    Кафедра «Физика и оптотехника» являясь общеобразовательной, одновременно осуществляет
    выпуск бакалавров и магистров по направлению «Лазерная техника и лазерные технологии».

    Лазерные технологии относятся к разряду новейших технологий. Это видно из фактов
    расширяющихся применений этих технологий и из их очевидных преимуществ, к которым
    относятся экологическая чистота, возможность осуществления процессов, недоступных
    большинству других технологий, возможность полной автоматизации и высокая производительность
    процессов. Лазерная техника и лазерные технологии широко применяются в различных
    сферах человеческой жизни: от бытовой техники, изобразительной голографии, систем
    контроля среды обитания человека, медицины, шоу-бизнеса и до металлургии, термоядерного
    синтеза, авиации и космонавтики. Специалисты этого направления востребованы на
    различных предприятиях по всей России. Полученное образование позволяет успешно
    работать в научно-исследовательских институтах, опытно-конструкторских бюро и
    на крупных промышленных предприятиях. Наиболее талантливые выпускники могут продолжить
    обучение в аспирантуре.

    Объектами профессиональной деятельности выпускника являются: лазерные системы
    и лазерные технологии различного назначения, приборы, системы, комплексы и элементная
    база оптической и лазерной техники; технологии производства оптических материалов,
    элементов, приборов и систем; а также программное обеспечение и компьютерные технологии
    в лазерной технике.

    Необходимость подготовки специалистов такого профиля обусловлена бурным развитием
    современных лазерных приборов и устройств различного назначения, применяемых в
    самолето- и ракетостроении, новейших системах вооружения; лидары, целеуказатели,
    лазерные измерительные системы, оптические системы связи, устройства хранения
    и передачи информации, лазерные гироскопы, силовые установки и т.д.

    Выпускник в соответствии с фундаментальной и специальной подготовкой может выполнять
    следующие виды профессиональной деятельности: проектно-конструкторскую; производственно-технологическую;
    организационно-управленческую и научно-исследовательскую.

    Цели магистерской программы «Лазерная техника и лазерные технологии»:

    подготовка специалистов способных выполнять проектно-конструкторские разработки
    лазерных систем для широкого круга задач, связанных с областями машиностроения,
    приборостроения, медицины, науки;

    подготовка специалистов для исследования, разработки, подготовки, организации
    производства и эксплуатации приборов, систем и адаптацию технологий различного
    назначения, основанных на использовании лазерного излучения.

    Выпускники нашей кафедры  востребованы на различных предприятиях по всей России:

    Российский федеральный ядерный центр – Всероссийский научно исследовательский
    институт экспериментальной физики Институт лазерно физических исследований (РФЯЦ-ВНИИЭФ
    ИЛФИ) г. Саров.

    Российский федеральный ядерный центр – Всероссийский научно исследовательский
    институт технической физики. (РФЯЦ-ВНИИТФ) г. Снежинск (Челябинской обл.).

    ФНЦП ОАО «Красногорский завод им. С.А. Зверева» – Подмосковье.

    Г. Ижевск – все заводы и др. предприятия.

    Г. Воткинск – Машиностроительный завод.

    Г. Сарапул – «Элеконд».

    Образовательные программы

    12.03.05 «Лазерная техника и лазерные технологии» «Лазерная техника и лазерные
    технологии»

    (Бакалавриат)

    12.04.05 «Лазерная техника и лазерные технологии» «Лазерная техника и лазерные
    технологии в машиностроении и приборостроении»

    (Магистратура)

    Научно-исследовательская деятельность кафедры «Физика и оптотехника» ведётся по
    следующим основным направлениям:

    Мониторинг окружающей среды с использованием лазерных технологий (профессор Алексеев
    В.А., к.т.н. Усольцев В.П.).

    Изучение влияния низкоинтенсивного лазерного излучения на биологические объекты
    (профессор Алексеев В.А, ст. преп. Перминов А.С.).

    Оптические свойства и электронная структура неметаллов (д.ф.-м.н. Соболев В.Вал.,
    профессор Соболев В.В.).

    Развитие приборной базы фотоплетизмографии с использованием лазерной техники (профессор
    Юран С.И., профессор Алексеев В.А.).

    Формирование на поверхности материалов легированных аморфных и наноструктурных
    слоев методом лазерного воздействия (доцент Бесогонов В.В., Карачев С.Е.).

    Актуализация образовательного потенциала курса физики в иноязычной подготовке
    студентов технического университета (доцент Михалкин В.С.).

    На кафедре «Физика и оптотехника» функционируют две научные школы:

    Адаптивные методики и аппаратура для исследования неоднородных сред (профессор
    Алексеев В.А., профессор Юран С.И., профессор Заболотских В.И.).

    Оптические свойства и электронная структура неметаллов (д.ф.-м.н. Соболев В.Вал.,
    профессор Соболев В.В.).

