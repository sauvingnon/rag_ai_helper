    Цель

    Организация и сопровождение учебно-научной и научно-технической деятельности университета
    в области естественных, гуманитарных, социально-экономических и инженерно-технических
    наук.

    Совершенствование механизмов планирования и реализации перспективных научно-исследовательских
    проектов университета, проводимых за счет бюджетных и внебюджетных источников
    финансирования, решение актуaльных вопросов разработки и внедрения адаптивных
    программ развития структурных подразделений университета (в соответствии с профилем
    подготовки специалистов в университете) в условиях реформирования системы высшего
    профессионального образования РФ.

    Основные функции

    сохранение и развитие научно-исследовательского потенциала Университета, создание
    рабочих мест и повышение жизненного уровня профессорско-преподавательского состава,
    аспирантов, докторантов и студентов;

    создание банков данных государственных, международных и внутренних научно-исследовательских
    программ и грантов;

    формирование имиджа Университета;

    повышение конкурентоспособности Университета в сфере научно-исследовательских
    работ;

    содействие реализации фундаментальных программ, направленных на создание наукоемких
    технологий и конкурентоспособной продукции;

    содействие выполнению стратегических программ Университета, связанных с научно-исследовательской
    деятельностью;

    содействие реализации в Университете Федерального закона от 02.08.2009г. №217-ФЗ
    «О внесении изменений в отдельные законодательные акты Российской Федерации по
    вопросам создания бюджетными научными и образовательными учреждениями хозяйственных
    обществ в целях практического применения (внедрения) результатов интеллектуальной
    деятельности»;

    формирование кадрового потенциала фундаментальной и прикладной науки и управление
    научно-техническим развитием Университета;

    содействие повышению качества образования и подготовки кадров;

    содействие организации научно-исследовательской работы студентов с целью выявления
    наиболее способных из них для привлечения к научно-исследовательской и преподавательской
    работе;

    содействие развитию международного научно-технического сотрудничества;

    участие в мониторинге научной активности профессорско-преподавательского состава
    Университета;

    ведение базы данных тематических направлений научно-исследовательской деятельности
    профессорско-преподавательского состава Университета;

    мониторинг эффективности научной работы структурных подразделений Университета
    и МИП совместно с Управлением экономики.

