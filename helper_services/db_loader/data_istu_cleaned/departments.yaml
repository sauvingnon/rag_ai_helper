    Кафедра «Общественные науки» была создана осенью 2020 года в результате объединения
    кафедр «История российской государственности» и «Философия и социология». На кафедре
    работает 23 человека: 19 человек – профессорско-преподавательский состав и 4 человека
    – учебно-вспомогательный персонал. В том числе в составе кафедры 2 доктора наук
    и 16 кандидатов наук.

    Кафедра «Общественные науки» является одной из базовых кафедр ИжГТУ имени М.Т.
    Калашникова. Она обеспечивает проведение лекционных и практических занятий по
    курсам «История (История России, Всеобщая история)», «Философия», «Социальное
    взаимодействие» для студентов всех направлений и специальностей ИжГТУ имени М.Т.
    Калашникова. Преподаватели кафедры выполняют большую учебную работу на 1-2 курсах
    по закладке фундамента знаний, позволяющих будущему инженеру анализировать и размышлять.
    Преподаватели кафедры ведут большой объем занятий на заочном отделении.

    Кафедра «Общественные науки», являясь общеобразовательной, одновременно осуществляет
    выпуск бакалавров по направлению 38.03.04 «Государственное и муниципальное управление».

