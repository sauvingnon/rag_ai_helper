    Кафедра «Английский язык» обеспечивает преподавание базового и профессионального
    английского языка студентам 1 и 2 курсов, магистрантам и аспирантам всех направлений
    и форм обучения в ИжГТУ имени М.Т. Калашникова.

    Кафедра выполняет образовательные, организационно-методические, научно-исследовательские,
    информационно-аналитические и экспертно-консультационные задачи в области языковой
    подготовки и эффективного использования английского языка в целях профессионального
    межкультурного взаимодействия.

    Миссия кафедры – развитие культуры и образованности будущих специалистов, формирование
    их академической и профессиональной мобильности, повышение уровня профессиональной
    компетентности на основе обучения иностранному языку в сфере профессиональной
    коммуникации, а также способствование дальнейшему продвижению и утверждению профилирующих
    кафедр в международных профессиональных сообществах.

    Одно из важных направлений работы кафедры «Английский язык» – реализация курсов
    дополнительного образования и дополнительного профессионального образования языковой
    и педагогической направленности в

    Научно-образовательном центре «Инновационные технологии в языковом профессиональном
    образовании»

    О кафедре "Английский язык": 65-летию кафедры посвящается

    Архив кафедры

    Кафедра «Английский язык» создана в год основания Механического института (1952
    г.) как кафедра иностранных языков. Согласно приказу №59-к заведующим кафедрой
    была назначена Арнольдова Ирина Константиновна. Коллектив состоял из четырех преподавателей
    и одного лаборанта:

    Ирины Константиновны Арнольдовой

    (зав. кафедрой),

    Вероники Аркадьевны Шалавиной

    ,

    Серафимы Викторовны Абрамовой

    и

    Маргариты Лутфулловны Тамповой

    Ежегодно на кафедре проводились олимпиады на   лучшее знание иностранного языка,
    тематические конференции, где студенты выступали с докладами на иностранном языке,
    тематические вечера. Студенты, изучающие немецкий, французский и английский языки,
    многократно занимали призовые места на городских и республиканских олимпиадах
    по иностранному языку.

    Преподаватели кафедры проходили повышение квалификации в вузах Москвы, Ленинграда,
    Калинина, Воронежа, Свердловска, в ГДР, Англии.

    С 1970 г. кафедру возглавляла

    Стерхова Г.В.

    В 1974 г., поскольку штат кафедры вырос до 35 человек, руководством ВУЗа было
    принято решение о разделение кафедры на две: кафедру английского языка и кафедру
    немецкого и французского языков. Заведовать кафедрой английского языка было поручено

    Бабушкину В.П.

    , а затем

    Кедровой М.П.

    С 1987 по 2005 гг. кафедрой заведовала

    Федорова Надежда Трофимовна

    . В период ее руководства велась активная работа со студентами. Так, в 1987 г.
    во время «Недели науки» прошла конференция, посвященная вопросам страноведения.
    В 1990 г. кафедра «Английский язык» победила в конкурсе на лучшую конференцию
    «Электроника и исследование космоса».

    В 80-е на кафедре было создано отделение референтов-переводчиков. На завершающем
    этапе обучения студенты защищали дипломы на английском языке, сдавали экзамен
    и получали удостоверение нашего института, что давало им определенные преимущества
    при устройстве на работу.

    1990-е. Первая группа инженеров-переводчиков

    В начале 1990-х гг. ведущие преподаватели кафедры под руководством

    Федоровой Н.Т.

    (доцент

    Пирожкова Л.Н.,

    старшие преподаватели

    Иванова В.Г

    .,

    Сарузская В.К

    .,

    Степанова Е.В

    .,

    Филатова  Р.М

    .,

    Кочурова М.М

    .) стали новаторами образовательного процесса, направленного на подготовку инженеров-переводчиков.
    В 1990-х гг. ИжГТУ стал одним из первых российских неязыковых вузов, включивший
    в образовательный процесс преподавание полного цикла дисциплин  на английском
    языке наряду с курсом углубленного изучения английского языка. У истоков этой
    инициативы стояли декан Робототехнического факультета, профессор

    Пичугин И.К

    ., зав. кафедрой «Английский язык», доцент Федорова Н.Т. и доцент кафедры  Пирожкова
    Л.Н., которые организовали инновационное обучение при подразделении Робототехнического
    факультета «Лингва-плюс», собрав коллектив преподавателей-единомышленников с профилирующих
    кафедр и специалистов с предприятий для чтения лекций на английском языке. На
    обучение по новаторской программе принимали лучших абитуриентов на основании результатов
    олимпиад по английскому языку, физике и математике. Совместно с Надеждой Трофимовной
    преподаватели кафедры ездили в школы Удмуртской республики, проводили подготовительные
    курсы и олимпиады по английскому языку.

    С 1998 г. преподаватели кафедры участвуют в языковой подготовке студентов, желающих
    получить дополнительную квалификацию переводчика в сфере профессиональной коммуникации,
    в Институте переводчиков ИжГТУ, где под руководством его директора Еленского А.В.
     было продолжено новаторское обучение.

    С 2005 по 2007 гг. кафедрой заведовал к.т.н.,

    доцент Крылов Эдуард Геннадьевич

    В 2006 г. сделан ещё один шаг в направлении развития языковой подготовки – на
    кафедре открыта специальность «Перевод и переводоведение».

    С 7 марта 2008 г. по настоящее время кафедрой заведует канд. пед. наук, доцент

    Архипова Елена Игоревна

    В 2004 – 2015 гг. кафедра входила в состав факультета «Экономика, право и гуманитарные
    науки».

    В 2016-2017 гг. – в состав

    факультета «Право и гуманитарные науки»

    С сентября 2018 г. кафедра «Английский язык» является структурным подразделением
    Института  международных образовательных программ.

