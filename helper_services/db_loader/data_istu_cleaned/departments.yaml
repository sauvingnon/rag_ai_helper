    В 2004 году Приказом ректора от 28.04.2004 года в Ижевском государственном техническом
    университете в составе факультета «Информатика и вычислительная техника» была
    создана кафедра «Системы и технологии информационной безопасности» (СТИБ) для
    подготовки специалистов в области защиты информации.

    В 2016 году кафедра СТИБ была переименована в кафедру «Защита информации в компьютеризированных
    системах» (ЗИКС), а в 2024 году Приказом ректора №149 от 02.02.2024 г. кафедра
    ЗИКС переименована в кафедру "Информационная безопасность" (ИБ).

    Первым заведующим кафедрой назначается Сметанин Анатолий Михайлович – почетный
    работник образования РФ, доктор технических наук, профессор, член-корр. военной
    академии.

    За кафедрой «Системы и технологии информационной безопасности» закрепляется специальность
    075500 «Комплексное обеспечение информационной безопасности автоматизированных
    систем».

    К 2008 году кафедра подготовила первых выпускников специальности, которые успешно
    трудоустроились в различных отраслях республики и в других регионах России. Наши
    выпускники успешно работают в научных, проектных, конструкторских, технологических
    организациях, коммерческих структурах, в банках и на промышленных предприятиях.

    За годы развития кафедрой руководили Иванников Валерий Павлович, д.т.н., профессор
    (2011-2013), Куликов Виктор Александрович д.т.н., профессор (2013-2015), Лялин
    Вадим Евгеньевич, д.т.н., д.э.н., д.г-м.н., профессор (2015-2017), Стукалина Елена
    Федоровна, к.т.н., доцент (2017-2018), Емельянов Владимир Никитич, к.т.н. (2018-2019),
    Архипов Игорь Олегович, к.т.н., доцент (2019-2021).

    С 2021 г. и по настоящее время заведующим кафедрой является Вологдин Сергей Валентинович,
    д.т.н., доцент, лауреат Государственной премии Удмуртской Республики в области
    науки и техники.

