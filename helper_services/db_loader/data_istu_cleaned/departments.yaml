    На кафедре развиваются следующие направления научной деятельности:

    1. Современные педагогические технологии для формирования иноязычной коммуникативной
    и межкультурной компетенций будущего специалиста.

    2. Предметно-языковое интегрированное обучение (CLIL) (руководитель - зав. кафедрой,
    канд. пед. наук, доцент Архипова Е.И.).

    3. Русская и зарубежная литература эпохи модерна: литературный процесс и литературные
    контакты (руководитель - доктор филол. наук, профессор Ерохин А.В.).

    4. Межкультурная профессиональная и научная коммуникация в современном образовательном
    пространстве: лингвистические и лингводидактические аспекты.

    https://sites.google.com/view/academicconference/

    5. Функционирование языка в интернет-пространстве, особенности коммуникационного
    пространства интернет-дискурса.

