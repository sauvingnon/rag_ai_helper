    Основные цели:

    Поддержка субъектов малого инновационного предпринимательства организованных в
    соответствии с Федеральным законом РФ от 02.08.2009 г. №217-ФЗ, находящихся на
    ранней стадии развития их деятельности, путем предоставления в аренду нежилых
    помещений, оказания консультационных, бухгалтерских, юридических и прочих услуг.

    Создание благоприятных условий для развития инновационного бизнеса, оказание помощи
    и поддержки студентам, магистрантам, аспирантам, молодым ученым и научным работникам
    в создании бизнеса, коммерциализации проектов.

    Развитие научно-исследовательской и инновационной деятельности Университета.

    Содействие в трудоустройстве студентов.

    Задачи и функции:

    Маркетинг научно-технической продукции Университета.

    Поиск идей, реализация которых имеет практическое применение на производстве и
    в сфере услуг, их систематизация и подготовка предложений по проведению научных
    разработок учеными Университета.

    Поиск заказов, заключение и сопровождение договоров на разработку и внедрение
    научно-технической продукции Университета.

    Участие в организации и проведении ярмарок, аукционов, выставок, выставок-продаж,
    симпозиумов, конференций, конкурсов, форумов, лекториев, семинаров, презентаций
    и иных аналогичных мероприятий, в том числе выставок-сессий инновационных проектов
    студентов, магистрантов, аспирантов, молодых ученых и научных работников с целью
    их коммерциализации/внедрения на предприятиях и в организациях.

    Проведение для студентов-дипломников консультаций по составлению договорной документации
    с предприятиями и организациями, на которых выполняются реальные дипломные проекты.

    Оказание организационной и консультационной помощи в подготовке научно-технических
    и инновационных проектов, в том числе в подготовке проектов к участию в различных
    государственных и коммерческих программах финансирования.

    Предоставление образовательных услуг студентам и выпускникам вузов республики
    в формах семинаров, курсов, тренингов, мастер-классов и др. в сфере бизнеса и
    развития личностных компетенций и навыков.

