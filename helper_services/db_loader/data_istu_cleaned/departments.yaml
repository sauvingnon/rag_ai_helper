    Кафедра «Электротехника» – одна из старейших кафедр ИжГТУ, была организована в
    1954 году в Ижевском механическом институте.

    Осуществляется выпуск научных и инженерных кадров по направлению бакалавриата,
    магистратуры и аспирантуры. Область профессиональной деятельности: базовая отрасль
    промышленности, осуществляющая производство, передачу и распределение электроэнергии.

    Направления подготовки

    13.03.02 «Электроэнергетика и электротехника» по профилям:

    «Электрооборудование и электрохозяйство предприятий организаций и учреждений»
    (Академический бакалавр);

    «Релейная защита и автоматизация энергетических систем» (Академический бакалавр)

    13.04.02 «Электроэнергетика и электротехника» по программе:

    «Силовые электронные и микропроцессорные аппараты» (Магистр)

    В 1954 году в Ижевском механическом институте была организована кафедра «Электротехника
    и теплотехника». В 1956 году она бы­ла переименована в кафедру «Электротехника
    и приборы». Педагогический состав кафедры включал заведующего кафедрой старшего
    преподавателя к.т.н. Фурсова С.П., ассистента Виноградову С.А. и ассистента-совместителя
    Ольшанского Э.И.

    Первый заведующий кафедрой, к.т.н.Фурсов С.П.

    Была создана лабораторная база со следующей тематикой работ:

    проверка законов Кирхгофа для постоянного тока;

    проверка амперметра, вольтметра, счетчика электрической энергии, электродинами­ческого
    ваттметра;

    нагрев проводников током;

    измерение сопротивления изоляции установки;

    последовательное соединение индуктивной катушки и конденсатора, резонанс напряжений;

    параллельное соединение индуктивной катушки и конденсатора, резонанс токов;

    измерение мощности в цепи однофазного переменного тока;

    исследование трехфазной системы при соединении потребителей электрической энергии
    звездой и треугольником;

    испытание трансформатора;

    испытание асинхронного двигателя;

    испытание синхронной машины в режиме генератора и двигателя;

    испытание двигателя и генератора постоянного тока.

    В 1956 году коллектив кафедры состоял из 9 человек. Были подготовлены курсы лекций
    по предметам: "Основы радиотехники и телемехани­ки", "Детали приборов", "Автоматика
    и телемеханика», "Электропривод и электрооборудование кузнечно-прессовых машин
    и станков».

    Поставлены лабораторные работы: электромагнитные реле, тахогенераторы, дистанционная
    передача угла на сельсинах, магнитный усилитель, электромашинный усилитель, исполнительные
    двигатели.

    В конце 50-х годов состав кафедры значительно увеличился. Появились дисциплины
    специализации по электротехнике и электронике, по приборам, счетно-решающим устройствам,
    электрорадиоматериалам, теории приборов, деталям приборов, электронным и ионным
    приборам.

    Преподаватели Виноградова С.А., Шамаро В.В., Мурзыков Г.А., Жаравин А.И., Козлова
    М.В., Зайденберг E.Д., Третьяков В.М., Рычков И.М., Хабенский М.Д., Лебедев Ю.А.,
    Винокгойз Д.А.,Никитин С.Н., Меженин В.М., преподаватели-совместители Родионов,
    Пекшуров, Аргаманов, Ерухимович, Аксельрод, Шонин осуществляли подготовку студентов
    на всех факультетах: ТМ, ОД, М, E, А.

    В 1958/59 учебном году из кафедры электротехники выделилась кафедра "Приборы",
    которая была позже разделилась на кафедры: "Счетно-решающие приборы и устройства»,
    "Радиотехнические устройства", "Детали приборов». На базе кафедр был создан приборо­строительный
    факультет. Кафедра «Электротехника» в составе приборостроительного факультета
    в 1960-1969 гг. проводила занятия по следующим дисциплинам:

    общая электротехника;

    электрооборудование станков;

    электрооборудование кузнечно-прессовых машин;

    теоретические основы электротехники;

    электрические машины;

    микромашины;

    электропривод;

    основы промышленной электроники.

    Заведующими кафедрой электротехники были: Дмитриев Э.В.(1963г.), Суслов Г.И. (1963-1968
    гг.), Потапов А.С. (1968-1971 гг.).

    Преподаватели кафедры Бельцевич Г.Н., Дмитриев Э.В., Артемьева Е.М. в 1962-1969
    годах обучались в аспирантуре Московского энергетического института (при кафедре
    ТОЭ).

    С 1971 года заведующим кафедрой стал кандидат технических наук Ломаев Г.В.. Перечень
    преподаваемых дисциплин пополнился курсом "Радиоизмерения" для специальности 0608.

    Кафедра пополнилась молодыми преподавателями и инженерами. На кафедре сформировалось
    научное направление, связанное с разработкой преобразователей и приборов, основанных
    на магнитных явлениях и эффектах. Стал выполняться большой объем хоздоговорных
    работ. В рамках научного направления кафедры подготовили и защитили кандидатские
    диссертации Мерзляков Ю.М., Барсуков B.К., Филинов В.В., Юран С.И., Штин А.А.,
    Малышев В.С., Леньков С.В., Исупов А.Н.. Закончили аспирантуру: Перепелов С.П.,
    Гуляева А.Н., Машкович С.Б. Другая научная тематика, развивавшаяся на кафедре,
    была связана с электроэнергетическим направлением. Выполнялись темы по разработке
    приборов для определения мест повреждения в линиях электропередач и передачи информации
    с контролируемых объектов энергетических систем на диспетчерский пульт. По этой
    тематике работали Потапов А.С., Шиляев Б.А., Кочетков Н.П., Гурин С.И., доцент
    к.т.н. Гончар Н.А. В рамках второго направления защитили кандидатские диссертации
    Гурин С.И. и Кочетков Н.П.

    Кафедра получила научное признание за пределами республики.

    В 1982 году на кафедре была открыта специальность 0653 "Физические методы и приборы
    контроля качества" для подготовки инженеров-физиков. Была проделана большая работа
    по разработке учебно-методической документации по новой специальности. Коллектив
    кафедры пополнился за счет преподавателей-совместителей: Трапезникова В.А., Горкунова
    Э.С., Захарова В.А., Комарова В.А. из вновь открытого в г. Ижевске Физико-технического
    института. Между ФТИ и ИМИ установилось долгосрочное сотрудничество. С целью развития
    специальности 0653, она, в 1984 году, приказом ректора была передана на кафедру
    "Детали приборов».

    В 1984 году кафедру электротехники возглавил доцент, к.т.н. Барсуков В.К.. С этого
    времени проводилось планомерное переоснащение лабораторной базы для учебного процесса
    и проведения научно-исследовательской работы. Организовано производство научных
    раз­работок кафедры. Были переоборудованы и переоснащены:

    лаборатория электрических цепей (ауд.1-318, 14 стендов, 7 лабораторных работ);

    лаборатория основ промышленной электроники и микропроцессорной техники (ауд. 1-314,
    10 стендов, 5 лабораторных работ);

    лаборатория электрических машин и электропривода (ауд. 1-309, 8 стендов, 3 лабораторных
    работы);

    лаборатория теоретических основ электротехники и измерительной техники (ауд.1-312,
    20 стендов, 13 лабораторных работ);

    класс персональных ЭВМ "Агат" (ауд. 1-324, 12 ЭВМ);

    научная лаборатория (ауд. 1-316).

    Лаборатории электрических цепей, ТОЭ и измерительной техники были оборудованы
    классами контролирующих машин. По всем лабораторным работам были разработаны материалы
    программированного контроля. Лаборатории были рассчитаны на проведение занятий
    с целой группой, оснащены современными измерительными приборами, стендами, тематическими
    планшетами с плакатами по электротехнике, электрическим машинам, электронике.
    Предусмотрено применение диа - и слайдопроецирущей аппаратуры. Лабораторные стенды
    были изготовлены силами кафедры, а материалы и оборудование приобретено за счет
    средств НИР. В создании и совершенствовании лабораторной базы актив­ное участие
    принимали студенты.

    С 1984 года кафедра осуществляла подготовку студентов всех факультетов института
    различных форм обучения специальностей: 0608, 0705, 0303, 1753, 1738, 0542, 0501,
    0538, 0503, 0504, 1202, 1205, 0539, 0653, 0656"М", 0301, 0302, 0542ц, 0542"А"
    и "В", 13.06, I7.11, 13.04, 21.06, 23.01 по дисциплинам: электротехника; электрические
    машины; промышленная электроника; основы теории электрических цепей; теоретические
    основы электротехники; основы метрологии и измерительная техника; электротехника
    с основами электроники; электротехника и электропривод; электротехника, электроника
    и импульсная техника; электротехника, электропривода станков и основы электроники;
    электротехника, электроснабжение в строительстве; электротехника и основы электроники;
    электротехника и основы промышленной электроники; электрические измерения; автоматика
    и автоматизация в строительстве; электротехника и промышленная электроника; электротехника
    и электрические оборудование; основы метрологии и радиоизмерения; основы стандартизации,
    метрологии и измерительная техника; электроприводы промышленных роботов; инженерные
    сети и оборудование зданий и сооружений.

    В 1993-1994 годах кафедра обеспечивает изучение следующих дисциплин:

    электротехника, электроника и микропроцессорная техника (спец. 12.02, 12.04, 12.01);

    теоретические основы электротехники и электроники (спец. 22.03; 22.03 + 01.02;
    21.06); электротехника и промышленная электроника (спец.12.05);

    электротехника и основы электроники (спец. 13.04; 13.06; 17.11);

    основы метрологии, радиоизмерения (спец. 23.01);

    основы метрологии и АСНИ (спец. 23.03);

    инженерные сети и оборудование зданий и сооружений (спец. 29.03 без ТГВ);

    электротехника и электрооборудование (спец. 29.03 ТГВ);

    электротехника (спец.22.01).

    Штат кафедры: 12 преподавателей, 5 человек учебно-вспомогательного персонала,
    в том числе: 4 доцента кандидата технических наук (Артемьева Е.М., Барсуков В.К.,
    Штин А.А., Долинина О.Ф.) , 4 старших преподавателя (Потапов А.С., Гуляева А.Н.,
    Тихонова Л.Я., Ситников Б.А.), 4 ассистента (Беликова А.Н., Пиманова О.В., Мезрин
    В.В., Мишинев О.М. на 0,5 ставки). Все преподаватели прошли повышение квалификации,
    в том числе курсы по ВТ. Основные базы повышения квалификации - МЭИ (кафедры ТОЭ,
    Электротехники и интроскопии), ФТИ УНЦ Российской Федерации, п/о "Ижмаш", НИТИ
    "Прогресс".

    Преподаватели кафедры руководили научно-исследовательской работой студентов. Ежегодно
    на кафедре выполнялись дипломные проекты по оригинальной тематике.

    В 1988 году кафедрой была проведена Всероссийская студенческая конференция "Датчики
    в информационно-измерительных системах". Студентами кафедры сделано 6 докладов,
    Кафедра ежегодно готовила команду на зональную олимпиаду по электротехнике и Всероссийскую
    олимпиаду по ТОЭ. В 1990 и 1991 гг. кафедра проводила зональные туры Всесоюзной
    олимпиады по электротехнике. Команда ИМИ занимала второе и первое места.

    Студенты кафедры участвовали с докладами на Всероссийских студенческих научных
    конференциях.

    Первые научные работы на кафедре «Электротехника» включали работы по содружеству
    с заводами г. Ижевска. Содружество было направлено на выявление возможности разработки
    и изготовления универсального двигателя повышенной частоты для электропилы.

    Проводилась работа совместно с кафедрой металлорежущих станков, резания металлов
    и технических изме-рений по выявлению методов контроля наименьшей толщины стенок
    стволов ружья ИЖ-54.

    В 60-е годы тематика научных работ значительно расширилась:

    выявление возможности замены генератора и реле регулятора мотоцикла ИЖ термоэлектрогенератором;

    улучшение технических и эксплуатационных характеристик электропил;

    преобразователь частоты и числа фаз для электропилы;

    выпрямители для зарядки мотоциклетных аккумуляторов;

    сравнительная оценка анодных окисных пленок как выпрямите­лей переменного тока;

    магнитная обработка воды для котлов;

    влияние электролитического полирования на эксплуатационные характеристики шестерен.

    Результаты исследований были опубликованы, получены авторские свидетельства (более
    60). Руководитель работ к.т.н. Фурсов С.П. впоследствии был удостоен звания Лауреата
    государственной премии Молдавской ССР.

    Коллектив кафедры в 70-х годах

    В 90-е годы на кафедре сложились следующие научные направления:

    Разработка методов и средств неразрушающего контроля (руководитель к.т.н. Барсуков
    В.К).

    Анализ и разработка систем преобразователь - электрическая машина (руководитель
    к.т.н. Долинина О.Ф.).

    Разработка математических моделей и методов планирования эксперимента (руководитель
    к.т.н. Артемьева Е.М.)

    В рамках первого научного направления выполнен ряд госбюджетных и хоздоговорных
    НИР, в том числе несколько ОКР. Разработаны методы и средства контроля поверхностных
    слоев ферромагнитных материалов методом эффекта Баркгаузена. Разработаны и освоены
    в производстве магнитные структуроскопы МС-20Б, МС-24Б, термоэлектрический структуроскоп
    ТЭС-2. Приборы выпускались опытными партиями на производственном участке при кафедре.
    По данному направлению получено более 40 авторских свидетельств. Разработки экспонировались
    на международных выставках («Новые вещества и материалы»,-Финляндия, Хельсинки,

    1987 г

    ., «Автоматизация – 89» - Москва,

    1989 г

    .), на ВДНХ СССР («От фундаментальных исследований до практического внедрения»
    - Москва,

    1991 г

    .). Разработки удостоены 2 бронзовыми и одной серебряной медалями ВДНХ СССР. Тематика
    работ была включена в комплексную программу МинВУЗа СССР «Неразрушающий контроль
    и диагностика» (Головная организация МВТУ им. Баумана).

    В рамках второго направления разработана технология использования отработанных
    двигателей наружных насосов типа ПЭД-32ВД при производстве электрических машин
    для бытовых целей. Разработан асинхронный конденсаторный двигатель мощностью 2
    кВт. На основе двигателя разработан и освоен в производстве универсальный дере­вообрабатывающий
    станок.

    В середине 90 годов на кафедре обострилась кадровая проблема. Процент преподавателей
    со степенями и званиями снизился до 36%. В последующие года после выделения специальности
    0653 с кафедры ушли доценты: Вологжанин Л.И., Мерзляков Ю.М., Тюриков Л.А. Выпускающие
    кафедры «Радиотехника» и «Приборы и методы контроля качества» стали вести дисциплины
    «Теория электрических цепей» и «ТОЭ». Сложилось так, что кафедру «Электротехника»
    не проходили студенты приборостроительного факультета, что исключило возможность
    подготовки кадров под научное направление кафедры через студенческую научную работу
    и аспирантуру. На кафедре вынужденно пришлось свернуть научные работы, связанные
    с магнитными методами контроля.

    В 1995 году в перечне специальностей ВПО появилась новая специальность 181300
    «Внутризаводское электрооборудование», открытая по инициативе заведующего кафедрой
    ЭПП МЭИ д.т.н. профессора Кудрина Б.И. Открытие этой специальности в ИжГТУ ввиду
    ее широкой направленности закрывало многие проблемы предприятий Удмуртии и региона
    в специалистах по электроснабжению, электрооборудованию, электроприводу. При поддержке
    предприятий республики, в первую очередь ОАО «Ижсталь», правительства республики,
    в 1996 году специальность была открыта в ИжГТУ на кафедре «Электротехника». С
    2000 года специальность имеет новый шифр и название - 140610 «Электрооборудование
    и электрохозяйство предприятий, организаций и учреждений».

    Открытие новой специальности потребовало освоения дисциплин:

    материаловедение. Технология конструкционных материалов;

    физические основы электроники;

    метрология, стандартизация и сертификация;

    электрические машины;

    электрические и электронные аппараты;

    электрический привод;

    схемотехника цифровых и аналоговых устройств;

    микропроцессорные устройства и их применение;

    основы автоматического управления;

    электрооборудование в промышленности;

    внутризаводское электроснабжение и режимы;

    проектирование электротехнических устройств;

    автоматизация управления системами электроснабжения;

    потребители электрической энергии;

    экономика электропотребления в промышленности;

    монтаж, наладка, эксплуатация и ремонт систем электроснабжения;

    электрические сети и системы;

    силовые преобразовательные установки;

    автоматическое управление электроприводами;

    электропривод и автоматизация металлорежущих станков.

    Кафедра пополнилась новыми преподавателями. На кафедре стали работать доценты
    Стародубцева В.А., Штенников И.В., Жигалов В.А., совместители из ИжСХА доценты
    Савков Л.П., Юран С.И.. Перешли на постоянную работу старшие преподаватели из
    «ИПЭК» Морозов В.А., из «Прикампроект» Тикунова Т.В.. Морозов В.А. закончил аспирантуру
    при ИжГТУ, защитил кандидатскую диссертацию и работал в должности доцента. В становлении
    специальности принимали участие Амиров К.Р., Сафиуллин И.Э.. Работают совместители
    с ОАО «Ижсталь» старшие преподаватели Меркушкина Л.В., Кныжов С.А..

    Открытие подготовки инженеров-электриков в ИжГТУ позволило выстроить систему многоуровневой
    подготовки по специальности. Первым договором о подготовке специалистов по системе
    колледж-вуз на основе интегрированных учебных планов был договор с Ижевским промышленно-экономическим
    колледжем (ИПЭК). Заказчиком на специалистов выступило ОАО «Ижсталь». Была положена
    основа подготовки специалистов на коммерческой основе. Были разработаны и реализованы
    учебные планы профессиональной переподготовки специалистов, планы подготовки специалистов
    с сокращенными сроками обучения для всех форм обучения.

    На данный момент кафедра обучила и выпустила более 1500 специалистов.

