    2. Направления научной деятельности

    Системы комплексного управления ресурсами предприятия в архитектуре «клиент-сервер».

    Создание высокоэффективного многопроцессорного вычислительного кластера на базе
    локальной вычислительной сети.

    Информационная ERP – система управления риэлтерской деятельностью мегаполиса.

    Информационная ERP – система управления Высшим учебным заведением.

    Информационно-аналитическая система экологического мониторинга промышленных территорий.

    Программно-инструментальные средства численного моделирования пространственных
    турбулентных течений на территориях с промышленной и гражданской застройкой.

    Инструментальные методы и математические модели решения задач оперативного планирования
    производства.

    Энергоаудит и тепло- энергосбережение.

    Разработка программ и проектов, направленных на повышение эффективности использования
    энергии.

    Научно-техническое и организационно-методическое сопровождение энергосберегающих
    проектов.

    Подготовка инвестиционных обоснований и финансовый анализ проектов по энергоэффективности.

    Проведение предпроектных энергетических обследований.

    Разработка автоматизированного банка данных для высших учебных заведений Удмуртской
    Республики по основным показателям эффективности использования энергоресурсов.

    Разработка пакета стандартных экспресс методик для проведения энергоаудита объектов
    теплоснабжения.

    Разработка проектов по модернизации и реконструкции действующих муниципальных
    систем теплоснабжения.

    Оценки эффективности проведения утеплительных мероприятий зданий, проведения комплексного
    энергоаудита системы теплоснабжения.

    Организация информационного обслуживания потребителей энергоресурсов, включая
    создание банков данных в области рационального энергопользования и энергосбережения.

    Экономика и логистика городского хозяйства.

    Экономическое обоснование проведения утеплительных мероприятий.

    Информационная ERP – система комплексного управления городским хозяйством.

    Математическое моделирование пространственных химически-реагирующих турбулентных
    течений.

    Разработка эффективных вычислительных алгоритмов решения задач гидромеханики и
    тепло- масообмена.

    Математическое моделирование обтекания и горения твердых топлив в турбулентных
    потоках.

    Развитие подходов к моделированию турбулентности.

    Исследование сходимости и «качества аппроксимации» вычислительных алгоритмов различного
    порядка точности.

    Визуализация пространственных течений с наличием примеси и химических реакций.

    Разработка информационно-аналитических систем для решения прикладных задач, в
    том числе внешней и внутренней баллистики РДТТ.

    Экологический мониторинг промышленных территорий

    Математическое моделирование распространения примесей в приземном слое атмосферы
    с учетом рельефа и типа подстилающей поверхности.

    Разработка методик для численного решения задач распространения примесей в приземном
    слое атмосферы, основанных на расчете параметров турбулентных течений в пограничном
    слое атмосферы.

    Исследование влияния геометрии поверхности, параметров источника загрязнения и
    набегающего потока на распространение примесей в приземном слое атмосферы.

