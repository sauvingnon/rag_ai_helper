    автоматизированного, удмуртгражданпроект, теплогазоснабжение, специализированной
  text: 'Кафедра «Водоснабжение и водоподготовка»

    Исаков Виталий Германович

    доктор технических наук, профессор

    И.о. заведующего кафедрой, профессор

    8 (3412) 77-60-55 доб. 3270

    корпус 3

    , каб. 6а

