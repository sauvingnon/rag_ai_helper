    Кафедра «Системный анализ и управление качеством»

    обеспечивает подготовку бакалавров и магистрантов по направлению укрупненной группы
    «Управление в технических системах» по следующим направлениям подготовки:

    Бакалавриат:

    27.03.03 «Системный анализ и управление», профиль «Менеджмент организационно-технических
    систем»;

    27.03.02 «Управление качеством», профиль «Управление качеством в производственно-технологических
    системах».

    Магистратура

    :

    27.04.03 «Системный анализ и управление»;

    27.04.02 «Управление качеством».

    Кафедра «САУК» активно взаимодействует с ведущими предприятиями республики. Такое
    сотрудничество выгодно всем участвующим сторонам:

    кафедра «САУК» работает с учетом реальных современных требований рынка;

    предприятия получают новых квалифицированных специалистов;

    студенты проходят практику на предприятиях самого различного профиля, пишут на
    их базе  квалификационные работы, имеют возможность проявить свои профессиональные
    навыки.

    На основании Постановления Совета Министров СССР № 1034 от 22 февраля 1952 года
    был образован Ижевский механический институт, позднее Ижевский государственный
    технический университет. На начальном этапе в организации вуза был широко использован
    потенциал МВТУ им. Баумана, который имел опыт подготовки инженеров в Ижевске (эвакуация
    в наш город в период Великой Отечественной войны).

    1954 г

    . – год организации базовой кафедры «Детали машин и подъемно-транспортные машины»
    на Машиностроительном факультете;

    1956 г

    . – открыта аспирантура при кафедре;

    1989 г

    . – год реорганизации кафедры в профилирующую «Основы машиноведения и робототехника»;

    2000 г

    . – реорганизация кафедры ОМиР в связи с открытием новых специальностей. На базе
    кафедры ОМиР организованы две кафедры и в том числе кафедра «Управление качеством»,
    в составе вновь созданного факультета «Управление качеством».

    Кафедра обеспечивала:

    – подготовку специалистов по управлению качеством;

    – учебный процесс  преподавания дисциплин «Детали машин» и «Детали машин и основы
    конструирования».

    2006 г

    . – на кафедре открыты бакалавриат по направлению «Системный анализ и управление»
    и магистратура по направлению «Системный анализ конструторско-технологических
    решений»;

    2017 г

    . – кафедра переименована в «Системный анализ и управление качеством».

    2017 г

    . – для прохождения практик открыта базовая кафедра «Качество тепловой техники»
    с кафедральной научно-практической  лаборатории.

    2018 г

    . – в связи с реорганизацией  структуры университета кафедра «САУК» вошла в состав
    Машиностроительного факультета.

    На базе кафедры основана «Академия проблем качества». Доктор технических наук
    профессор кафедры «САУК» В.С.Клековкин является действующим экспертом премии Правительства
    Российской Федерации в области качества.

    Образовательные программы

