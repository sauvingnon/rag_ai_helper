  name: Кафедра «Автомобили и металлообрабатывающее оборудование»
  keywords: металлообрабатывающим, металлообрабатывающее, металлообрабатывающие, труднообрабатываемых,
    высокотехнологичного, конкурентоспособного, электрогенераторном, круглошлифовальный
  text: 'Кафедра «Автомобили и металлообрабатывающее оборудование»

    Мкртчян Артем Фурманович

    кандидат технических наук

    И.о. заведующего кафедрой, доцент

    8-963-540-18-64

    корпус 4

    , каб. 506а

    maf.81@mail.ru

    Контакты подразделения

    8(3412)77-60-55 доб. 4331

    Телефон

    amo@istu.ru

    За 62 года деятельности кафедры «Металлорежущие станки и инструменты» (в 2004г.
    кафедра переименована – «Автомобили и металлообрабатывающее оборудование») подготовлено
    более 4000 специалистов. Выпускники кафедры успешно работают практически на каждом
    машиностроительном заводе Удмуртской республики, на других предприятиях и в учреждениях,
    на административных и общественных должностях. Среди выпускников кафедры доктора
    и кандидаты наук, заслуженные деятели науки и техники Удмуртской республики, Российской
    Федерации. Многие из них стали видными государственными деятелями, крупными учёными,
    выдающимися конструкторами и технологами, главными инженерами, руководителями
    предприятий.

    История кафедры

    1956 г

    Приказом Ректора ИМИ Остроумова В.П. в соответствии с решением ученого совета
    ИМИ была образована кафедра «Металлорежущие станки и инструменты».

    Начата подготовка инженеров – механиков в области проектирования, эксплуатации
    станков и инструментов по специальности 0501 «Технология машиностроения. Металлорежущие
    станки и инструменты».

    Заведующим кафедрой «Металлорежущие станки и инструменты» назначен А.И. Плужников.

    1957 г

    Из «Мосстанкина» по распределению приезжает на кафедру к.т.н. В.В. Пузанов.

    1959 г

    Заведующим кафедрой избран к.т.н., доцент Н.В. Талантов.

    Состоялся первый выпуск инженеров – механиков по специальности 0501.

    Начаты научно-исследовательские работы по алмазному точению и алмазной абразивной
    обработке, восстановлению алмазных лезвийных инструментов. Руководители Н.В. Талантов,
    В.Л. Безбородый.

    1960 г

    По распределению на кафедре оставлены в качестве ассистентов Р.Х. Галимов, Т.В. Шитова,
    Ф.Ю. Свитковский, Ю.П. Потапов.

    Из Тульского политехнического института по распределению направлен А.К. Георгиев.

    1961 г

    Начата научно-исследовательская работа по контактным и тепловым процессам при
    механической обработке материалов. Научный руководитель Н.В. Талантов.

    1963 г

    Открыта аспирантура на кафедре. Руководители: Н.В. Талантов, В.В. Пузанов и А.А.
    Модзелевский.

    1964 г

    Первый кандидат технических наук на кафедре «МСИ» из выпускников – инженеров и
    аспирантов кафедры – Ю.Г. Глухов. Руководитель к. т. н., доцент Н.В. Талантов.

    1965 г

    Заключен долгосрочный договор с заводом «Ижтяжбуммаш» в области исследования процессов
    шлифования деталей бумагоделательных машин, в т.ч. процессов алмазной и эльборовой
    обработки.

    1966 г

    Защищена кандидатская диссертация старшим преподавателем кафедры Т.В. Шитовой.
    Руководитель к.т.н. доцент Н.В. Талантов

    1969 г

    Защищена в КАИ первая в истории кафедры докторская диссертация Н. В. Талантовым.

    1970 г

    Переезд кафедры «МСИ» из старого корпуса (ул. М. Горького, 79) в 4-ый корпус ИМИ
    (ул. 30 лет Победы, 49).

    Продолжены работы с Киевским институтом сверхтвердых материалов по широкому применению
    алмазного инструмента на предприятиях Удмуртской АССР.

    1971 г

    Заключен хоздоговор с заводом «Ижтяжбуммаш» по обработке каландровых валов бумагоделательных
    машин из сверхпрочного чугуна. Руководитель Ф.Ю. Свитковский.

    1972 г

    Защищены кандидатские диссертации на ученом совете ППИ г. Перми А.И. Тананиным,
    руководитель д.т.н. Н.В. Талантов и Ф.Ю. Свитковским, руководитель к.т.н. В.В.
    Пузанов.

    Заведующим кафедрой «МСИ» избран к.т.н., доцент В.В.Пузанов.

    1974 г

    Защищены кандидатские диссертации в ППИ г. Перми О.А. Трифоновым, руководитель
    к.т.н. В.В. Пузанов и Л.А. Хохряковым, руководитель д.т.н. Н.В. Талантов.

    1975 г

    На хоздоговорных условиях с «Ижтяжбуммашем» проведены исследования в области механической
    обработки обрезиненных валов бумагоделательных машин, руководитель Ф.Ю. Свитковский.

    1977 г

    Заключен хоздоговор с заводом «Ижсталь» на разработку и изготовление специального
    заточного станка по заточке топоров в условиях массового производства, руководитель
    Ф.Ю. Свитковский.

    1978 г

    За научные разработки кафедры в области лезвийной обработки и глубинного шлифования
    и создания гаммы специальных станков были награждены бронзовыми медалями и дипломами
    ВДНХ СССР В.В. Пузанов, Ф.Ю. Свитковский, А.И. Тананин.

    Награждены премией НТО «Машпрома» Удмуртии Ф.Ю. Свитковский (руководитель), В.В.
    Пузанов, А.И. Тананин, А.И. Хватов, М.Л. Каракулова, Г.Н. Коновалов, Р.С. Музафаров,
    Л.С. Туров.

    1979 г

    Учеными кафедры разработана конструкция и изготовлена серия станков - полуавтоматов
    для Нытвинского металлургического завода по заточке ножей (руководитель Ф.Ю. Свитковский).

    Разработан и изготовлен станок – автомат для получения специальных рыболовных
    крючков (руководитель В.Ф. Иванов).

    1980 г

    За разработку прогрессивных методов шлифования труднообрабатываемых материалов
    Ф.Ю. Свитковский, В.В. Пузанов и А.И. Тананин повторно удостоены премии НТО «Машпром»
    Удмуртии.

    1982 г

    Защита кандидатской диссертации А.И. Хватовым, руководитель к.т.н., доцент А.И. Тананин.

    1983 г

    А.И. Тананин избран секретарем Парткома ИМИ и зав. кафедрой «МСИ».

    1984 г

    Защищена кандидатская диссертация А.Г. Глушковым. Руководитель к.т.н. В.В. Пузанов.

    Присвоено звание Заслуженный деятель науки и техники Удмуртской АССР доценту А.А.
    Модзелевскому.

    1985 г

    Присвоено звание «Заслуженный деятель науки и техники Удмуртской АССР» В.В. Пузанову.

    1986 г

    Кафедрой совместно с ЭГЗ г. Сарапула начата работа по созданию клеесборного мелкоразмерного
    режущего инструмента.

    Разработана технология обработки твердосплавных оправок для редуцирования стволов
    стрелкового оружия, руководитель Ф.Ю. Свитковский.

    Защищена кандидатская диссертация М.Л. Каракуловой, руководитель к.т.н., доцент
    В.В. Пузанов.

    1988 г.

    Совместно с СКБ «Восход» спроектировано и начато серийное изготовление пусковых
    ракетных установок для метеорологических ракет.

    1991 г

