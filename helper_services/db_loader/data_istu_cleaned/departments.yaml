    Нанотехнология

    – междисциплинарная область науки, в которой изучаются закономерности физико-химических
    процессов в пространственных областях нанометровых размеров с целью управления
    отдельными атомами, молекулами, молекулярными системами при создании новых молекул,
    наноструктур, наноустройств и материалов со специальными физическими, химическими
    и биологическими свойствами.

    Наносистемная техника – созданные полностью или частично на основе наноматериалов
    и нанотехнологий фун

    кционально законченные системы и устройства, характеристики которых кардинальным
    образом отличаются от показателей систем и устройств аналогичного назначения,
    созданных по традиционным технологиям.

    Основные области применения

    :

    элементы наноэлектроники и нанофотоники (полупроводниковые транзисторы и лазеры;

    фотодетекторы; солнечные элементы; различные сенсоры);

    устройства сверхплотной записи информации;

    телекоммуникационные, информационные и вычислительные технологии; суперкомпьютеры;

    видеотехника — плоские экраны, мониторы, видеопроекторы;

    молекулярные электронные устройства, в том числе переключатели и электронные схемы
    на молекулярном уровне;

    нанолитография и наноимпринтинг;

    топливные элементы и устройства хранения энергии;

    устройства микро‑ и наномеханики, в том числе молекулярные моторы и наномоторы,
    нанороботы;

    нанохимия и катализ, в том числе управление горением, нанесение покрытий, электрохимия
    и фармацевтика;

    авиационные, космические и оборонные приложения;

    устройства контроля состояния окружающей среды;

    целевая доставка лекарств и протеинов, биополимеры и заживление биологических
    тканей, клиническая и медицинская диагностика, создание искусственных мускулов,
    костей, имплантация живых органов;

    биомеханика; геномика; биоинформатика; биоинструментарий;

    регистрация и идентификация канцерогенных тканей, патогенов и биологически вредных
    агентов;

    безопасность в сельском хозяйстве и при производстве пищевых продуктов.

    Предприятия, где могут работать наши выпускники

    :

