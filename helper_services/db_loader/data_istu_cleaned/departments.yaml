    Факультет информатики и вычислительной техники образован в 1993 году.

    Факультет ведёт подготовку специалистов в области информатики и вычислительной
    техники, компьютерной математики, системного и прикладного программирования, организации
    ЭВМ, вычислительных систем и сетей, операционных систем и систем программирования,
    баз данных и инструментальных средств разработки программного обеспечения, системного
    анализа и машинного моделирования, принятия решений и управления, систем обработки
    данных и искусственного интеллекта.

    Руководители института «Информатика и вычислительная техника»

    Каюров Юрий Александрович, к.т.н., профессор,

    декан факультета «Техническая кибернетика и информатика» 1989-1992 гг.,

    декан факультета «Информатика и вычислительная техника», 1992-2004 гг.

    Сенилов Михаил Андреевич, д.т.н., профессор, декан факультета «Информатика и вычислительная
    техника», 2004-2013 гг.

    Лялин Вадим Евгеньевич, д.т.н., д.э.н., д.г.-м.н, профессор, декан факультета
    «Информатика и вычислительная техника», 2013-2017 гг.

    Архипов Игорь Олегович, к.т.н., доцент,

    декан факультета «Информатика и вычислительная техника», 2017-2018 гг.,

    директор института «Информатика и вычислительная техника с 2018 г.

    История института «Информатика и вычислительная техника»

    1989 г.

    После реорганизации экономического факультета под руководством к.т.н., профессора
    Каюрова Юрия Александровича создан факультет «Техническая кибернетика и информатика»
    (ТКИ) в составе кафедр:

    «Программное обеспечение»;

    «Системы автоматизированного проектирования».

    1992 г.

    Факультет ТКИ реорганизован в факультет «Информатика и вычислительная техника»
    в составе кафедр:

    «Вычислительная техника»;

    «Программное обеспечение»;

    «Системы автоматизированного проектирования».

    1996 г.

    Программисты ИжГТУ впервые участвовали в командном чемпионате мира по программированию
    (ICPC, International Collegiate Programming Contest) под эгидой американской Ассоциации
    по вычислительной технике (ACM).

    2002 г.

    На факультете ИВТ создана кафедра «Интеллектуальные информационные технологии
    в экономике»

    2004 г.

    На факультете ИВТ создана кафедра «Системы и технологии информационной безопасности»

    2004 г.

    Команда программистов ИжГТУ завоевала серебряные медали чемпионата мира по программированию
    ICPC ACM в г. Прага.

    2005 г.

    Студенты ИжГТУ завоевали бронзовые медали чемпионата мира по программированию
