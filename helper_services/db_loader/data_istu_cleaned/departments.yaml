    Основные функции:

    Анализ текущей обстановки в сфере поддержки инновационной и научно-исследовательской
    деятельности в Удмуртской Республике и Российской Федерации.

    Формирование единой базы данных по мероприятиям инновационной направленности.

    Формирование плана участия студентов и аспирантов в конкурсах научных работ, в
    конференциях и форумах, прочих научных мероприятиях.

    Формирование заявок Университета на конкурсы программ реализации молодежных проектов
    в образовательных организациях, проводимых в рамках молодежной политики Федеральным
    агентством по делам молодежи и Минобрнауки России.

    Содействие в организации информационно-образовательных, тренинговых, конкурсных
    и иных мероприятий для учащихся Университета в области поддержки инновационной
    и научно-исследовательской деятельности.

    Содействие в реализации и продвижении перспективных научно-технических разработок
    и проектов путем привлечения финансовой поддержки государственных организаций,
    созданных для поддержки инновационной деятельности в России.

    Подготовка отчетов об инновационной и научной деятельности Университета в Министерство
    образования и науки Удмуртской Республики и РФ, другие организации.

    Экспертно-аналитическая оценка текущей деятельности, проводимой Центрами коллективного
    пользования (далее – ЦКП) Университета.

    Мониторинг выполнения Программы стратегического развития Университета и соответствия
    заявленных и полученных результатов, контроль полноты и правильности, содействие
    в оформлении отчетных документов.

    Бочкарева Анна Сергеевна

    ведущий специалист'
