    Научное направление кафедры

    : «Разработка и исследование информационных технологий, конструкторско-технологического
    управления показателями качества машин, их узлов, соединений и деталей; исследование
    процессов освоения компетенций инженерами на основе инновационного метода их оценки;
    поддержки принятия решений, для управления подготовкой инженерных кадров, сертификация
    продукции и услуг».

    Задачи, решаемые в рамках НИР

    :

    Проведение комплекса НИР и ОКР по проблемам конструирования машин (изделий), их
    узлов и деталей.

    Проведение комплекса НИР по проблемам освоения компетенций инженерами на основе
    инновационного метода их оценки.

    Проведение комплекса НИР по поддержке принятия решений, для управления подготовкой
    инженерных кадров.

    Проведение комплекса НИР и ОКР и создание независимого центра по сертификации
    деталей, узлов, и машин (изделий) в целом и услуг.

    Проведение работ по аттестации и сертификации рабочих мест и системы качества
    предприятий и организаций.

    Исследование и разработка мероприятий по повышению эффективности бизнес - продуктов
    и бизнес процессов  предприятий

    Управление систем ЖКХ

    Подготовка ежегодного семинара для предприятий УР, «круглый стол» – «КОНКУРЕНТОСПОСОБНОСТЬ
    ЧЕРЕЗ КАЧЕСТВО» .

