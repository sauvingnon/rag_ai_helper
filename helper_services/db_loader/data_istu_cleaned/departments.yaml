    Образовательные программы кафедры «Информационные системы»:

    «Информационные системы и технологии»

    «Прикладная информатика»

    Основные направления деятельности кафедры «Информационные системы»:

    ERP – Enterprise Resource Planning, планирование ресурсов предприятия.

    CRM-система – Customer Relationship Management, система управления взаимоотношениями
    с клиентами.

    ECM – Enterprise Content Management, управление корпоративным контентом.

    Базы и банки данных.

    Высокоуровневые языки программирования.

    1. История кафедры «Информационные системы»

    Кафедра открыта на основании приказа № 634 от 20.11.2000 г. и вошла в структуру
    факультета «Прикладная математика и механика». Первоначальное название кафедры –
    «Механика и прикладная информатика».

    Приказом № 558 от 07.04.2005 г. кафедра «Механика и прикладная информатика» переименована
    в «Информационные системы».

    Приказом № 622 от 04.04.2007 г. выведена из структуры ф-та «Прикладная математика»
    и переведена на факультет «Менеджмент и маркетинг».

    В

    2018 г

    . кафедра вошла в состав института «Информатика и вычислительная техника».

    Заведующие кафедрой:

    2000-2003 гг. – к.ф.-м.н., доцент Камалетдинов Анвар Шагизович;

    с 01.01.2004 г. по наст. время д.ф.-м.н., профессор Горохов Максим Михайлович.

    Местоположение кафедры: ауд. 3-5, 6-401, 6-402, 6-403, 6-408, 6-409.

    Общая нагрузка кафедры – 10154,1  ак.часов:

    2. Структура подготовки специалистов и организация учебного процесса

    2.1. Направления подготовки бакалавров:

    Направления подготовки бакалавров на каф. «ИС»:

    09.03.02 – «Информационные системы и технологии» профиль

    «Информационные системы и технологии экономики и управления»

    ;

    09.03.03– «Прикладная информатика по областям», профиль

    «Прикладная информатика в экономике»

    2.2. Направления подготовки магистров:

    09.04.02– «Информационные системы и технологии», программа

    «Информационные системы планирования ресурсов и управления предприятием»

    , рук. профессор М.М. Горохов.

    Основной целью образовательных программ является подготовка специалистов для промышленного
    сектора, малого и среднего бизнеса Удмуртской Республики владеющих проектно-конструкторской,
    проектно-технологической, организационно-управленческой и инновационной видами
    деятельности, способных отслеживать развитие информационных технологии и определять
    политику в области внедрения информационных систем планирования ресурсов и управления
    на предприятиях.

    Программы ориентированны на подготовку специалистов обладающих знаниями способов
    и методов проектирования, разработки, отладки, производства, внедрения и эксплуатации
    информационных систем планирования ресурсов и управления современным предприятием.

    Образовательные программы

    09.04.02 «Информационные системы и технологии» «Информационные системы в экономике
    и управлении»

    (Магистратура)

    09.03.03 «Прикладная информатика» «Прикладная информатика в экономике»

    (Бакалавриат)

    09.03.02 «Информационные системы и технологии» «Информационные системы и технологии»

    (Бакалавриат)

