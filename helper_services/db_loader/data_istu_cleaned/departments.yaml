    История стройотряда «Куб»

    В период летних каникул многие студенты ИС факультета трудились в стройотряде
    «Куб». Стройотряд был создан в 1978 году. Командиром 1-го отряда был Шахов Иван
    Владимирович. В д. Нюрдор Котья (1979г.) строили спортивный зал в школе и отделение
    связи (почту). Трудные подростки помогали в строительстве. В 1980 году строили
    деревянные арочные склады для колхоза в д. Армязь. В 1981г. работали  в д. Непряха
    и 2 недели работали на Кирпичном заводе в г. Сарапуле, спали в концертном зале.
    В 1982 году строили выгульные дворы для ферм в с. Кигбаево в Сарапульском районе.

