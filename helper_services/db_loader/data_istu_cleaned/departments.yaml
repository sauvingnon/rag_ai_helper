    Кафедра ведет подготовку по программам высшего образования:

    Направление 08.03.01 «Строительство», профили «Водоснабжение и водоотведение»
    и «Водо- и теплоснабжение населенных мест» (бинациональная программа совместно
    с вузами Германии) очная образования (4 года), «Теплогазоснабжение, вентиляция,
    водоснабжение и водоотведение зданий, сооружений, населенных пунктов» (заочная
    форма, 3,5/4,5 года)  на базе полного среднего с получением квалификации бакалавра
    техники и технологии.

    Направление 08.04.01 «Строительство» программа 08.04.01-4 «Водоснабжение городов
    и промышленных предприятий» очная форма обучения, на базе бакалавриата (2 года)
    с получением квалификации магистр-инженер.

    Кафедра «Водоснабжение и водоподготовка» в составе Теплотехнического факультета
    открыта приказом ректора ИжГТУ №1019 от 30.06.2003.

    Ее основой, как и всего Теплотехнического факультета, послужила кафедра «Гидравлика
    и теплотехника» ИМИ-ИжГТУ, на базе которой с 1994 по 2003 г. проводилась подготовка
    по специальности «Водоснабжение и водоотведение», сначала как специализации 290308
    “Водоснабжение, канализация, рациональное использование и охрана водных ресурсов”
    от специальности "Промышленное и гражданское строительство" (1994-1997 гг.), затем
    как самостоятельной специальности 290800 «Водоснабжение и водоотведение» (1997-2003
    гг.). Открытие специальности и факультета было произведено на основании ходатайств
    Совета министров и Госстроя Удмуртской республики, договора с МУП “Ижгорводоканал”
    и заявок предприятий Удмуртской Республики.

    В становлении и развитии кафедры активное участие приняли специалисты отрасли,
    имеющие значительный практический опыт работы по специальности (например, бывший
    начальник МУП “Ижводоканал” Крапивин Г.И., руководитель группы АО “Удмуртгражданпроект”
    Курсова И.Б., начальник очистных сооружений водоподготовки «Камские ОС» МУП “Ижводоканал”
    Катаев В.В. (ныне директор МУП “Ижводоканал”), инженер-технолог МСА МУП “Ижводоканал”
    Лагутина Е.Л.), а также ряд ведущих преподавателей ИжГТУ - к.т.н., доцент А.Е.Татура,
    к.т.н., доцент Р.Х.Муллахметов, доцент Н.Н.Рыбников, ст. преподаватель Е.А.Гринько,
    ст. преподаватель Т.В.Яковлева, к.т.н., доцент Р.В. Антонов. Несколько позже на
    кафедру пришли молодые преподаватели – аспирант (ныне ст. преподаватель) А.М.
    Непогодин, к.т.н. Е.В. Макарова, к.ф.-м.н., доцент Л.В.Шишкина, к.т.н., доцент
    М.В. Свалова, к.т.н. М.Ю. Дягелев, к.т.н. А.А. Абрамова, д.х.н., профессор М.А.
    Плетнев. Заведующим кафедрой с 2003 г. является д.т.н., профессор В.Г. Исаков.

    Кафедра готовит кадры в области водоснабжения и водоотведения (ВиВ) – инженеров,
    бакалавров, магистров, а также обеспечивают подготовку специалистов в области
    гидравлики, водоподготовки и строительной физики для других специальностей ТТ,
    ИС, СТиА факультетов. С 2008 г. ведется также подготовка по бинациональной образовательной
    программе – бакалавриату «Водо- и теплоснабжение населенных мест» («UrbanWaterandHeatEngineering»
    - UWHE) с выдачей двух дипломов, разработанной совместно Теплотехническим факультетом
    и Высшей школой прикладных наук Остфалия (Германия). С 2012 года лучшие из студентов
    профиля «Водо- и теплоснабжение населенных мест» отправляются на учебу 7 и 8 семестры
    Высшую школу прикладных наук Остфалия (г.Зюдербург, Германия), по итогам защиты
    выпускной квалификационной работы получают диплом бакалавра инжиниринга Высшей
    школы Остфалии и бакалавра техники и технологии ИжГТУ имени М.Т. Калашникова.
    В 2013 году впервые студенты бакалавриата ИжГТУ имени М.Т. Калашникова получили
    два диплома (высшей школы Остфалия и ИжГТУ имени М.Т. Калашникова), всего в 2013
    – 2018 гг. такие дипломы получили 14 студентов.  С 2017 г. на Теплотехнический
    факультет приезжают группы немецких студентов с преподавателями для участия в
    Русско-немецкой летней школе и в совместном научном семинаре. По результатам участия
    немецкие студенты также получаю сертификаты, которые им  засчитываются при обучении
    в ВШ Остфалия.

    Качество подготовки подтверждается результатами проведенной в 2009 г. международной
    аккредитации бакалавриата направления 270100 «Строительство», профили подготовки
    «Водоснабжение и водоподготовка» и «Теплогазоснабжение и вентиляция» в агентстве
    ZeVA (Германия), в соответствии с которой ИжГТУ получил право выдавать дипломы
    международного образца, отзывами работодателей, результатами участия студентов
    ВиВ в региональных и российских турах Международной студенческой олимпиады и конкурсах
    дипломных проектов.

    Лабораторные, практические занятия, курсовое проектирование, учебно-научная работа
    по дисциплинам кафедры проводятся в лаборатории гидравлики и насосов, на оборудовании
    определения показателей качества воды ЦКП Теплотехнического факультета, в дисплейном
    классе кафедры. В настоящее время часть профилированных практических работ проводится
    в лаборатории биотехнологий на МУП «Ижводоканал».

    Кафедра укомплектована высококвалифицированными кадрами. Ее штатный состав 12
    преподавателей, из которых: 2 – доктора наук, профессора; 4 – кандидата наук,
    доцента; 5 старших преподавателей. Аспирантура при кафедре - 4 чел., учебно-вспомогательный
    персонал – 3 сотрудника. Из штатных преподавателей опыт работы на производстве
    имеют 4 чел.

    В 2004-2018 гг. главными направлениями хоздоговорных и инициативных НИР коллектива
    кафедры являются как общие вопросы гидравлики и газовой динамики, так и прикладные
    исследования – оптимизация и обезвреживание сточных вод, образующихся на всех
    стадиях технологического процесса уничтожения химического оружия, химико-биологические
    процессы очистки природной и сточной воды, в т.ч. с получением биогаза для вторичного
    использования, надежность городских систем водоснабжения и водоотведения, интенсификация
    процессов водоочистки, комплексные методы получения чистой воды, разработка научно-технических
    основ моделирования течений жидкостей и газов при разрушении гидротехнического
    сооружения, хоздоговорная тематика в рамках дипломного проектирования.

    Общий объем научно-исследовательских работ и хоздоговорных работ, выполненных
    на кафедре ВиВ за период с 2006 по 2017 г., составил 12163 тыс. руб., по результатам
    исследований опубликовано 4 монографии и более 240 научных статей, в т.ч. 61 –
    с участием студентов и магистрантов кафедры, получено более 10 патентов.

    Признанием заслуг кафедры является награждение 4 преподавателей кафедры (В.Г.Исаков,
    А.Е. Татура, И.Б. Курсова, Е.А. Гринько) нагрудным знаком «Почетный работник высшего
    профессионального образования РФ». За активное участие в выполнении НИР в рамках
    Федеральной программы уничтожения химического оружия зав. кафедрой д.т.н., проф.
    В.Г. Исаков в 2006 г. награжден Почетной грамотой Министерства образования и науки
    Удмуртской Республики, а в 2007 г. избран действительным членом Академии военных
    наук.

    Образовательные программы

    08.03.01 «Строительство» «Теплогазоснабжение, вентиляция, водоснабжение и водоотведение
    зданий, сооружений, населенных пунктов»

    (Бакалавриат)

    08.04.01 «Строительство» «Водоснабжение городов и промышленных предприятий»

    (Магистратура)

    08.03.01 «Строительство» «Строительство и проектирование систем водоснабжения
    и водоотведения»

    (Бакалавриат)

    Направления подготовки:

    Бакалавриат

    :

    08.03.01 – «Строительство» профили «Водоснабжение и водоотведение». Прием ведется
    на очную форму обучения (срок обучения 4 года).

    И 08.03.01 – «Строительство» профили «Теплогазоснабжение, вентиляция, водоснабжение
    и водоотведение зданий, сооружений, населенных пунктов». Прием ведется на заочную
    форму обучения (срок обучения 3,5 года и 4,5 лет).

    Студенты, обучающиеся по профилю «ВиВ», имеют возможность на 4-ом курсе продолжить
    обучение в Германии, в Высшей школе Остфалия (Зюдербург). При успешном окончании
    обучения, защите выпускной квалификационной работы, студенты получают диплом государственного
    образца ИжГТУ и Высшей школы Остфалия (Германия). Это дает широкие возможности
    дальнейшего карьерного роста.

    Для желающих есть возможность пройти курсы немецкого языка.

    Область профессиональной деятельности выпускников данного направления включает
    в себя исследование, проектирование, эксплуатацию, ремонт и строительство систем
    водоотведения и водоотведения. Управление процессами строительства. Научно-исследовательская
    работа.

    Выпускники имеют широкий перечень объектов профессиональной деятельности, например:

    на строительстве систем ВиВ (мастер, прораб, начальник участка, начальник строительного
    управления, управляющий трестом и т.д.);

    на эксплуатации – в водоканалах городов УР, в коммунальных службах администраций
    районов, в цехах водоснабжения и водоотведения предприятий, в ГЖУ и ЖРП, службах
    заказчика;

    заниматься проектированием систем ВиВ («Прикамстройпроект», «Удмуртгражданпроект»,
    «Промпроект», «Машпроект», «Удмуртгипроводхоз», малые предприятия и др.)

    Специалисты по водо- и теплоснабжению, водоотведению стабильно пользуются спросом
    в обществе, невзирая на экономические и политические потрясения.

    Магистратура

    :

    08.04.01 «Строительство», программа «Водоснабжение городов и промышленных предприятий».
    Прием ведется на очную форму обучения (срок обучения 2 года).

    Квалификация выпускника – магистр техники и технологии (магистр-инженер)

    В процессе обучения студенты получают знания о передовых инженерных системах,
    инновационных технологиях, современном оборудовании и режимах его работы.

    Целью программы является подготовка высококвалифицированных специалистов, способных
    решать сложные инженерные и управленческие задачи в строительном секторе.

    Для успешного выполнения магистерской выпускной квалификационной работы предусмотрены
    научно-исследовательская работа магистра в семестрах, научно-исследовательская,
    педагогическая, научно-производственная практики.

