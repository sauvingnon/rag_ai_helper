    Кафедра «Менеджмент» – одна из старейших кафедр Ижевского государственного технического
    университета (в прошлом Ижевского механического института) и первая экономическая
    кафедра в Удмуртии.

    1954 г. – образование кафедры «Экономика и организация производства» (зав.кафедрой
    – Фишер А.Я., гл.инженер ПО «Ижмаш»);

    1992 г. – формирование кафедры «Менеджмент» (вследствие объединения кафедр «Экономика
    и организация производства» и «Управление и организация труда»).

    С

    1992 г

