    Специальность «Юриспруденция» была открыта в 2004  году с целью изучения и реализации
    правовых норм и обеспечения правопорядка в различных сферах жизни общества.

    Кафедра «Юриспруденция» является выпускающей кафедрой высшего образования и выпускает:

    Бакалавров по направлению 40.03.01 «Юриспруденция», 38.03.04 «Государственное
    и муниципальное управление»

    Магистров по направлению 38.04.04 «Государственное и муниципальное управление»

    Среднее профессиональное образование по специальности 40.02.01 «Право и организация
    социального обеспечения»

    Объектами профессиональной деятельности специалиста являются – события и действия,
    имеющие юридическое значение; правовые отношения, возникающие в сфере функционирования
    государственных институтов; правовые отношения между государственными органами,
    физическими и юридическими лицами.

    Решаемые кафедрой задачи и их актуальность:

    Подготовка высококвалифицированных  юристов для предприятий, учреждений, организации
    и правоохранительных органов;

    Проведение научных исследований;

    Учебно-методическое обеспечение образовательного процесса;

    Актуальность реализуемых кафедрой задач определяется потребностями реального сектора
    отечественной экономики, современной науки и образования в подготовке юридических
    кадров, способных своевременно и качественно решать стоящие перед государством
    и обществом задачи.

    Кафедра «Юриспруденция», имея достаточно высокий научно-педагогический потенциал,
    обеспечивает современные требования подготовки высококвалифицированных специалистов.

    История создания специальности 030501 Юриспруденция и кафедры

    «Гражданское право и правовое регулирование экономических отношений в промышленности»

    Организационно-правовое обеспечение образовательной деятельности по специализации
    030501 «Юриспруденция»

    Кафедра «Гражданское право и правовое регулирование экономических отношений в
    промышленности» осуществляют свою деятельность в соответствии с Конституцией Российской
    Федерации, Законом Российской Федерации «Об образовании» от 29.12.2012 г. № 273-Ф3,
    Федеральным законом «О высшем и послевузовском профессиональном образовании» от
    22.08.1996 г. № 125-ФЗ, Типовым положением об образовательном учреждении высшего
    профессионального образования (высшем учебном заведении) Российской Федерации,
    утвержденным постановлением Правительства Российской Федерации от 14.02.2008г.
    № 71, Типовым положением о кафедрах, утвержденных ректором ИжГТУ, и другими нормативными
    правовыми актами ИжГТУ.

    Специальность

    030501

    «Юриспруденция» открыта в «ИжГТУ» на основании лицензии – А № 156312, выданной
    Министерством образования и науки РФ 13.04.2004г., и аккредитована Федеральной
    службой по надзору в сфере образования и науки 15 апреля 2009г., регистрационный
    номер 1860.

    Специальность «Юриспруденция» открыта с целью изучения и реализации правовых норм
    и обеспечения правопорядка в различных сферах жизни общества. стандарт

    Объектами профессиональной деятельности специалиста являются - события и действия,
    имеющие юридическое значение; правовые отношения, возникающие в сфере функционирования
    государственных институтов; правовые отношения между государственными органами,
    физическими и юридическими лицами.

    Кафедра первоначально именовалась «Юриспруденция» и первым заведующим кафедры
    был назначен доктор юридических наук, профессор, ныне покойный В.В. Посконин.

    С 2006 – 2009г.г. кафедрой «Юриспруденция» заведовал доктор юридических наук,
    профессор – С.Н. Иванов.

    Процесс совершенствования правового образования в России определил ряд закономерных
    тенденции подготовки юридических кадров, среди которых важное место приобретает
    узкая специализация практических юристов с экономическим уклоном, наиболее востребованных
    на промышленных предприятиях различных форм собственности. в связи с этим для
    решения стоящих перед кафедрой задач по реализации учебного плана кафедра была
    переименована на кафедру «Правовое регулирование экономических отношений в промышленности»

    С 2009 – 2011г.г. кафедрой «Правовое регулирование экономических отношений в промышленности»
    продолжал заведование доктор юридических наук, профессор – С.Н. Иванов.

    В 2011 – 2012 г.г. заведовал кафедрой «Правовое регулирование экономических отношений
    в промышленности» - доктор юридических наук, доцент – А.М. Каминский.

    С 2013 – 2018 г.г. кафедру возглавил доктор юридических наук, профессор – З.З.
    Зинатуллин.

    В 2018 году кафедре было возращено первоначальное  название «Юриспруденция» и 
    в ходе конкурсного отбора заведующей стала к.ю.н. Подкаура Гузяль Ахсановна

