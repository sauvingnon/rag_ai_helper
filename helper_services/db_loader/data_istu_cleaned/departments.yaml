    Основной целью деятельности Института образовательных технологий является формирование
    научно-образовательного пространства ИжГТУ имени М.Т. Калашникова на основе современных
    средств телекоммуникаций и информационных технологий, а также обеспечение реализации
    образовательных программ с использованием различных образовательных технологий,
    в том числе, электронного обучения и дистанционных образовательных технологий.

    В развитии ИжГТУ на ближайшую перспективу немалая роль отводится электронному
    обучению, как мощному фактору качественного преобразования университетской деятельности,
    повышению авторитета университета в мировом образовательном пространстве, реализации
    образовательных программ с использованием различных технологий, в том числе, электронного
    обучения. Это обучение высочайшего уровня при низких затратах и четкий контроль
    за всеми участниками процесса на всех  этапах.

    Развитие системы электронного обучения в Ижевском государственном техническом
    университете происходит благодаря совместной слаженной работе всего коллектива:
    профессорско-преподавательского состава, Института образовательных технологий,
    Управления информатизации и связи и других подразделений. Такое обучение открывает
    новые возможности взаимодействия внутри университета и во внешней среде: общение
    студентов с преподавателями и друг с другом, а также возможность параллельного
    обучения в вузах  России и за рубежом.

    Основные направления деятельности

    :

    Корпоративные:

    Повышения квалификации сотрудников вуза;

    Методическая поддержка разработки электронных курсов;

    Контроль наполнения и мониторинг содержимого портала электронных курсов;

    Внешние:

    Услуги разработки коммерческих электронных курсов;

    Услуги обучения в электронной форме;

    Услуги разработки мультимедийных образовательных проектов.

