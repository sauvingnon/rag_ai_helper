    В 1995 г. в Ижевском государственном техническом университете на факультете «Менеджмент
    и маркетинг» была создана кафедра «Финансы и кредит». Открытие кафедры было обусловлено
    необходимостью подготовки специалистов высшей квалификации в сфере управления
    финансами в новых условиях рыночной экономики.

    За годы развития кафедрой руководили к. э. н., профессор М.Н. Горинов (1995-2007 гг.),
    д.э.н., профессор Д.М. Гаджикурбанов (2007-2016 гг.), к.э.н., доцент М.В. Леонов
    (2016-2017  гг.), с 2018 г. и по настоящее время заведующим кафедрой является
    к.э.н., доцент С.Н. Фирсова.

    В сентябре 2018 г. в результате реструктуризации университета к кафедре была присоединена
    кафедра «Экономическая теория» (основана в 1963 г.). Так сформировалась   кафедра
    «Экономика и финансы».

    Успех кафедры «Экономика и финансы» обеспечивается высоким уровнем профессиональной
    подготовки и педагогического мастерства коллектива. Коллектив кафедры состоит
    из 20 преподавателей (в том числе 2 доктора экономических наук, 14 кандидатов
    экономических наук, 1 кандидат технических наук).

    Студенческие научные работы, подготовленные под руководством преподавателей кафедры,
    занимают призовые места во всероссийских олимпиадах и конкурсах.

    Наши выпускники являются руководителями профильных министерств и ведомств Удмуртии,
    финансовыми директорами российских компаний, занимают ведущие посты на предприятиях,
    в банках, страховых и аудиторских компаниях, органах власти различного уровня,
    успешно ведут свой бизнес. Выпускники кафедры составляют достойную конкуренцию
    не только другим российским вузам, но и зарубежным университетам, они работают
    в г. Москве, г. Санкт-Петербурге, г. Перми, Германии, Франции, Америке, Чехии.

    Об экономике и финансах

    Немного истории

    Шла cередина 90-х годов… В процессе приватизации массово образовывались предприятия
    рыночного типа хозяйствования, а также формировались новые государственные финансовые
    органы. В связи с этим в огромном количестве были востребованы специалисты с новым
    финансовым рыночным мышлением. В Удмуртии на тот момент их не готовило ни одно
    учреждение высшего образования. Кандидат экономических наук, доцент Михаил Николаевич
    Горинов выступил с инициативой открытия профильной финансовой кафедры на базе
    ИжГТУ.

    И первый набор по специальности «Финансы и кредит» состоялся в 1993 году.  Для
    поступления на «Финансы» нужно было иметь на тот момент максимальный балл – 15!
    Большая  часть абитуриентов была медалистами.

    И в феврале 1995 года при поддержке

    А. Л. Кузнецова

    на свет появилась новая кафедра «Финансы и кредит», заведующим которой стал

    М. Н. Горинов

    . Для формирования кафедры на начальном этапе были привлечены специалисты-практики
    финансового сектора, имеющие опыт преподавательской деятельности. Это были специалисты,
    в большей степени, в области страхования, банковского дела и финансов предприятий:

    М. Н. Горинов

    ,

    В.В. Елисеев

    ,

    В. Н. Майоров

    ,

    С. П. Сырыгин

    ,

    Н. Ф. Ревенко

    ,

    К. Д. Гайворонская

    ,

    Л.М. Глухова

    Первый выпуск кафедры был ускоренный, и первые защиты состоялись в конце 1997
    года.  Практически все выпускники были сразу трудоустроены кафедрой.

    Важный показатель – остепененность ППС

    На момент создания кафедры остепененность ее сотрудников не стояла в качестве
    основной задачи. Важно было привлечь практический опыт и навыки в обучение студентов.
    Но скоро этот вопрос стал первоочередным. И для его решения было привлечено несколько
    кандидатов наук с других кафедр и началась подготовка своих. Так на кафедру пришли
    К. Д. Гайворонская, Л. Н. Глухова, Г. Е. Ончукова. Первая кандидатская защита
    Т. Г. Волковой состоялась в декабре 1998 года под руководством М. Н. Горинова.
    А через два года начали активно защищаться и первые выпускники кафедры, среди
    которых и действующие преподаватели – Н.В. Земцова и Н. В. Гайдай.

    Востребованность выпускников высокая!

    В конце 90-х годов на кафедре были открыты первые специализации в рамках специалитета
    – «Финансовый и налоговый менеджмент» и «Банковский менеджмент», к которым затем
    добавились еще две: «Государственные финансы» и «Рынок ценных бумаг». Востребованность
    выпускников была настолько высокая, что студентов работодатели «бронировали» еще
    на 3–4-х курсах, причем в рамках каждой из специализаций. У кафедры было сотрудничество
    со всеми государственными финансовыми структурами Ижевска и практически всеми
    банками и финансовыми компаниями, а также крупными промышленными предприятиями.
    Наиболее популярными были «Финансовый и налоговый менеджмент», «Банковский менеджмент»
    и «Рынок ценных бумаг». Таким образом, уже на выпускном, 5-м курсе обеспечивалось
    практически полное трудоустройство выпускников кафедры, львиная доля которых была
    с красными дипломами.

    С 2008 года кафедра обучает бакалавров и магистрантов

    В 2008 году был выпущен последний поток специалистов в связи с переходом на болонскую
    систему высшего образования. Кафедра начала обучение бакалавров и магистров. Статус
    лучшего учебного заведения в Удмуртии, выпускающего финансистов, уже устойчиво
    закрепился, и возникающие проблемы с набором могли возникнуть только в связи с
    возникшим отсутствием бюджетных мест. Сегодня кафедра по-прежнему обеспечивает
    специалистами ведущие финансовые организации и предприятия региона, а также государственные
    финансовые органы. Выпускники стабильно востребованы на «Калашников», «Купол»,
    Минфин УР, отделение ЦБР по УР. С этими предприятиями также заключены договоры
    на проведение производственной практики студентов и магистрантов.

    Магистратура кафедры «Финансовая экономика» под руководством канд. экон. наук,
    доц.

    Т. Г. Волковой

    успешно работает и по сей день, обеспечивая подготовку финансистов высокого уровня.

    В 2017 году произошло соединение кафедр «Финансы и кредит» и «Экономическая теория».
    Так появилась действующая ныне кафедра «Экономика и финансы».

    Впервые за много лет

    На профиль «Финансовый инжиниринг» выделены бюджетные места, и кафедра готовится
    к переходу на новые образовательные стандарты в рамках действующей реформы высшего
    образования. В связи с этим проводится активная профориентационная работа со школьниками,
    с 2024 года заключен договор о сотрудничестве с НИУ «Высшая школа экономики»,
    на основе которого кафедра проводит региональный этап ведущей олимпиады школьников
    «Высшая проба».

    Преподаватели кафедры также ведут активную пропаганду финансовой грамотности,
    являются лекторами Российского общества «Знание». Также кафедра является базовой
    национального банка ЦБР, на ее базе проводятся круглые столы и семинары, члены
    кафедры участвуют в ежегодном Финансовом конгрессе ЦБР.

    Несмотря на снижение интереса руководства страны к подготовке специалистов экономических
    направлений,  кафедра «Экономика и финансы» достойно отмечает свой 30-й юбилей
    и продолжает держать марку.

    Т.Г. Волкова, к.э.н.,

    доцент кафедры «Экономика и финансы»

