  keywords: высококвалифицированных, наноструктурированных, энергомашиностроение,
    энергомашиностроения, предпринимательских, междисциплинарности, студенческогобилета,
    естественнонаучного
  text: 'Факультет «Математика и естественные науки»

    Соболев Валентин Валентинович

    доктор физико-математических наук, доцент

    декан факультета

    8 (3412) 77-60-55 доб. 1126

    корпус 1

    , каб. 403

    Контакты подразделения

    8(3412) 77-60-55, доб.: 1126 (декан); 1300 (заместитель декана по УР); 1297 (деканат)

    Телефон

    mien@istu.ru (заместитель декана по УР), mien_mea@mail.ru (деканат)

    Почта

    корпус 1

    , ауд. 404а (заместитель декана по УР); ауд. 404 (деканат)

    Факультет «Математика и естественные науки» создан 12 февраля 2011 г. на базе
    факультета «Прикладная математика» и кафедр «Физики и оптотехники», «Химии и химической
    технологии» (архив раздела факультета «Прикладная математика» можно посмотреть
    здесь). В августе 2018 г. присоединены кафедры:  «Инженерная графика и технология
    рекламы», «История российской государственности», «Профессиональная педагогика»,
    «Физическая культура и спортивные технологии», «Философия и социология».

    Факультет первоначально был создан для решения следующих задач:

    объединение в составе факультета ученых, способных выполнять современные комплексные
    фундаментальные проекты в области математики и естественных наук;

    обеспечение качественной фундаментальной подготовки бакалавров, магистров и инженеров
    совместно с институтами Уральского отделения Российской академии наук, с отраслевыми
    институтами и предприятиями Российской федерации;

    оптимизация структуры ИжГТУ за счет исключения дублирования направлений подготовки;

    обеспечение единой образовательной политики при обучении студентов дисциплинам
    математического и естественнонаучного цикла;

    Сегодня факультет «Математика и естественные науки» является фундаментальным факультетом,
    который обучает студентов всего университета основным, общим дисциплинам, а также
    готовит высококвалифицированных специалистов в области гуманитарных, математических
    и естественных наук.

    Трудовой коллектив факультета – это более 150 преподавателей и сотрудников, многие
    из которых известны и за пределами Российской Федерации. По количеству докторов
    и кандидатов наук факультет «Математика и естественные науки» превосходит все
    другие факультеты университета.

    В составе преподавателей заслуженные и почетные работники высшей школы, заслуженные
    деятели науки, лауреаты государственных премий. Многие сотрудники награждены орденами
    и медалями. Преподаватели факультета – авторы многочисленных монографий, учебников
    и учебных пособий, изданных в России и за рубежом.

    Русяк И.Г.

    Русяк И.Г.  Академик РАРАН, д.т.н., профессор

    Почетный работник высшей школы РФ, Заслуженный деятель науки УР, Лауреат Государственной
    премии УР

    История факультета «Математика и естественные науки» начинается с создания факультета
    «

    Прикладная математика

    » (

    ПМ

    ) в 1999 году. Факультет

    ПМ

    был создан на базе кафедры "Математическое моделирование процессов и технологий".
    Деканом и основателем ПМ факультета являлся доктор технических наук, профессор,
    заслуженный деятель науки Удмуртской Республики, академик Российской академии
    ракетных и артиллерийских наук

    Русяк Иван Григорьевич

    Алиев А.В

    Член-корреспондент РАРАН, д.ф.-м.н., профессор

    Заслуженный работник высшей школы РФ, Заслуженный деятель науки УР

    12 февраля 2011 года

    на базе факультета «Прикладная математика» и кафедр «Физика и оптотехника», «Химия
    и химическая технология» был создан факультет

    «Математика и естественные науки» (МиЕН)

    . Первым деканом факультета был избран доктор физико-математических наук, профессор,
    член-корреспондент Российской академии ракетных и артиллерийских наук, Заслуженный
    работник высшей школы Российской федерации, Заслуженный деятель науки Удмуртской
    Республики

    Алиев Али Вейсович

    Липанов А.М.

    Академик РАН, академик РАРАН, д.т.н., профессор

    Заслуженный деятель науки СССР, Лауреат Государственной премии СССР, Заслуженный
    деятель науки УР и Премии Правительства РФ

    Кроме того, в состав факультета вошла также магистерская кафедра  «Механика и
    моделирование» (зав. кафедрой д.т.н., профессор академик РАН

    Липанов Алексей Матвеевич

    , занимавший пост ректора нашего ВУЗа, воспитавший большую плеяду известных ученых,
    в том числе профессоров Алиева А.В. и Русяка И.Г.).

    В настоящее время во главе факультета стоит доктор физико-математических наук,
    доцент, профессор кафедры «Физика и оптотехника»

    Соболев Валентин Валентинович

    , являющийся руководителем научного направления «Оптические свойства и электронная
    структура твердых тел», автор и соавтор одной монографии, более 300 научных работ
    в рецензируемых журналах, включённых в Перечень ВАК, относящихся к системам Scopus
    и Web of Science, и большого количества учебно-методических пособий.

    В августе 2018 г. к факультету присоединены кафедры:  «Инженерная графика и технология
    рекламы», «История российской государственности», «Профессиональная педагогика»,
    «Физическая культура и спортивные технологии», «Философия и социология». На сегодняшний
    день в составе факультета «Математика и естественные науки» входят 11 кафедр.
    Обучение студентов ведется с использованием лабораторного оборудования «ИжГТУ
    имени М.Т. Калашникова» и институтов Удмуртского федерального исследовательского
    центра УрО РАН. Факультет ведет подготовку бакалавров и магистров по направлениям
    «Прикладная математика», «Лазерная техника и лазерные технологии», «Реклама и
    связи с общественностью», «Профессиональная педагогика», «Реклама и связи с общественностью»,
    «Физическая культура», «Механика и математическое моделирование».

    Трудовой коллектив факультета – это более 150 преподавателей и сотрудников, многие
    из которых известны и за пределами Российской Федерации. По количеству докторов
    и кандидатов наук факультет «Математика и естественные науки» превосходит все
    другие факультеты университета.

    В составе преподавателей заслуженные и почетные работники высшей школы, заслуженные
    деятели науки, лауреаты государственных премий. Многие сотрудники награждены орденами
