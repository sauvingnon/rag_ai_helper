    Основная цель УСО состоит в укреплении имиджевой привлекательности Университета
    как образовательного и научного государственного бюджетного учреждения.

    Управление по связям с общественностью решает следующие задачи:

    Формирование и продвижение единой стратегии Университета на информационном и рекламном
    поле, укрепление положительного имиджа Университета.

