    Научные направления

    информационно-аналитические системы в области теплофизики, энергетики и энергосбережения;

    математическое моделирование объектов механики, машиностроения и приборостроения;

    математическое моделирование объектов экономики;

    химическая физика процессов формирования и превращений наноструктур и наносистем;

    адаптивные системы измерений мониторинга окружающей среды;

    физические процессы в материалах при лазерном воздействии;

    прогнозирование в медицине, разработка медицинского мониторинга.

    оптические свойства и электронная структура твердых тел;

    основы педагогических коммуникаций в инклюзивном обучении (ОВЗ по слуху);

    исследование возможностей использования дистанционных образовательных технологий
    в учебном процессе,

    исследования в области инклюзивного образования, проектного обучения и междисциплинарности;

    разработка интегративных технологий обучения студентов, взаимно сочетающих традиционные,
    инновационные и компьютерные технологии;

    система подготовки спортивного резерва;

    проблемы государственного и муниципального управления в Российской Федерации;

    культура, общество и личность.

    Ведущая научная школа

    Математическое компьютерное моделирование технических и социально-экономических
    систем

    Научный руководитель:

    Русяк Иван Григорьевич, Тененев Валентин Алексеевич

    Основные научные результаты:

    •   Разработана новая методология исследования внутрикамерных процессов, основанная
    на решении сопряженных задач механики гетерогенных сред, теории воспламенения
    и горения порохов и напряженно-деформированного состояния горящих элементов в
    условиях выстрела;

    •    Разработан программно-вычислительный комплекс, предназначенный для проведения
    широкомасштабного математического моделирования и оптимизации тепловых режимов
    магистральных и внутриквартальных тепловых сетей;

    •    Решены задачи оптимального оперативного планирования производства при выпуске
    многокомплектной и многосерийной продукции с учетом взаимозаменяемости используемых
    материалов и технологий;

    •    Решены нестандартные задачи распознавания и классификации в области мониторинга
    уровня здоровья населения;

    •    Разработано программное обеспечение, позволяющее осуществлять моделирование
    работы приборного поля в реальном масштабе времени и выполнять расчет итоговых
    показателей, необходимых для качественной оценки достоверности измерительной информации.

    •    Разработана математическая модель напряженно-деформированного состояния длинномерного
    изделия с учетом механического и теплового нагружения при воздействии импульсов.

    Научные школы

    Адаптивные методики и аппаратура для исследования неоднородных сред

    Научный руководитель

    Алексеев Владимир Александрович

    Основные научные результаты:

    выполнены работы в рамках Федеральной целевой программы по уничтожению химического
    оружия;

    внедрены семь систем автоматизации испытаний объектов военной техники в организациях
    Минобороны России;

    разработана и внедрена система предупреждения чрезвычайных ситуаций на предприятиях;

    разработан уникальный комплекс исследования грунтов «ИДНАКАР», который использовался
    в археологических экспедициях в Удмуртии;

    разработаны средства медицинской диагностики, отдельные методики опробованы при
    исследованиях в ветеринарии.

    Оптические свойства и электронная структура неметаллов

    Научный руководитель

    Соболев Валентин Валентинович

    Основные научные результаты:

    впервые разработана методика разложения интегральных спектров диэлектрической
    проницаемости и характеристических потерь электронов на элементарные компоненты
    с определением основных параметров каждой компоненты с использованием методики
    объединенных диаграмм Арганда. Методика успешно применена при решении фундаментальных
    задач  оптической спектроскопии;

    исследованы оптические свойства и электронная структура ряда материалов в кристаллическом
    и аморфном состояниях на примере кварца, диоксида германия, диселенида германия.
    Впервые экспериментально – расчетно установлена фундаментальная роль экситонов
    малого радиуса в формировании электронной структуры этих материалов;

    исследованы оптические свойства и электронная структура фуллеренов, фуллеритов,
    фуллеридов в широкой области энергии. Установлены их основные особенности и закономерности,
    в том числе влияние дальнего порядка, состава соединений и влияние примесей;

    впервые для однооболочечных и многооболочечных углеродных нанотрубок, для наночастиц
    кремния в матрице кварца определены спектры оптических  фундаментальных функций
    в широкой области энергии.

    Внутренняя баллистика и моделирование процессов в тепловых двигателях и установках

    Научный руководитель

    Алиев Али Вейсович

    Основные научные результаты:

    разработаны математические модели и вычислительные  алгоритмы расчета процессов
    в тепловых двигателях в условиях значительного изменения геометрии внутреннего
    объема и в условиях лучистого теплопереноса по газовой фазе;

    установлены закономерности зажигания и нестационарного горения твердого топлива
    в характерных областях тепловых двигателей;

    разработаны математические модели решения задач проектирования тепловых двигателей
    с учетом дисперсий значимых факторов;

    созданы математические инструментальные средства анализа спектра частот акустических
    колебаний в тепловых двигателях;

    разработаны методы решения задач проектирования тепловых двигателей с использованием
    методов математического программирования.

    Химическая физика полимерных материало

    в

    Научный руководитель Кодолов Владимир Иванович

    создана методика формирования архитектуры кластерных веществ за счет дробного
    растворения ультрадисперсных порошков металлов в активных средах;

    впервые экспериментально установлено существенное влияние металлсодержащих тубуленов
    на карбонизацию вспучивающихся огнезащитных покрытий и образование прочных пенококсов
    высокой теплоемкости;

    разработаны методики образования кластерных систем в электрическом поле и регулирования
    с использованием их морфологии кристаллогидратов в отвержденных гипсоподобных
    вязких смесях;

    впервые разработ  ана методика низкотемпературного синтеза углеродных металлсодержащих
    наноструктур, включая фуллерены и тубулены, из ароматических углеводородов и карбоцепных
    полимеров и олигомеров с функциональными группами в боковых ответвлениях;

    разработаны основы количественной теории горения твердых топлив с внутренним окислителем,
    в которой учтены химические процессы в граничных слоях при прогреве до 1000К и
    в образующемся жидко-вязком слое;

    на основе моделирования процессов при катастрофических пожарах на складах с нервно-паралитическими
    ОВ определены вероятные риски и предложены идеи безопасных технологий утилизации
    ОВ.

    Квалиметрия образования» имени профессора В.С. Черепанова

    Научный руководитель: Шихов Юрий Александрович, Семин Юрий Николаевич

    Основные научные результаты:

    разработка и апробация программы опережающей профессиональной переподготовки 
