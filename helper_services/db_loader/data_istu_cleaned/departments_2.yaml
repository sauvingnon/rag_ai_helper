    Цель

    обеспечить выполнение задач, стоящих перед ВУЗом, обозначенных Уставом университета,
    путем проведения комплекса мероприятий по обслуживанию учебных корпусов, поддержании
    их и прилегающих к ним территорий в надлежащем состоянии, эксплуатации опасного
    производственного объекта (лифты), основанной на рациональном планировании хозяйственной
    деятельности.

    Задачи

    обеспечение технического и санитарно-гигиенического состояния учебных корпусов;

    обеспечение чистоты и порядка на закрепленных за учебными корпусами территориях;

    хозяйственного обеспечение учебного процесса;

    укрепление материально-технической базы подразделений ЭТУ;

    обеспечение пожарной безопасности в учебных корпусах университета;

    осуществление мероприятий по охране окружающей среды и рациональному использованию
    природных ресурсов;

    привлечение студентов, на добровольной основе, к оказанию помощи хозяйственным
    службам учебных корпусов по решению выше перечисленных задач.

