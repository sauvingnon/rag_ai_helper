    О подразделении

    Сотрудники

    Группа планирования учебного процесса в соответствии с возложенными задачами на
    Отдел осуществляет следующие функции:

    Экспертиза учебных планов на соответствие требованиям федеральных государственных
    образовательных стандартов и законодательных актов в сфере образования.

    Организация работ по разработке и унификации базовых учебных планов и актуализации
    действующих рабочих учебных планов.

    Формирование графика учебного процесса по направлениям и специальностям подготовки.

    Планирование учебной нагрузки кафедр: закрепление учебных дисциплин за кафедрами
    Университета, составление учебной нагрузки профессорско-преподавательского состава
    (ППС) кафедр.

    Расчет учебной нагрузки для определения штатов профессорско-преподавательского
    состава.

    Планирование почасового фонда для организации работы преподавателей, работающих
    по договорам.

    Анализ эффективности организации учебного процесса (формирование групп, подгрупп,
    потоков) и подготовка предложений по совершенствованию учебного процесса.

    Управление процессами взаимодействия с учебными подразделениями по вопросам организации
    практик.

    Формирование данных для участия в конкурсе по выделению Минобрнауки России контрольных
    цифр приема.

    Участие в проверке филиалов, институтов, факультетов, кафедр и других структурных
    подразделений при подготовке к государственной аккредитации.

    Осуществление контроля хранения и порядка заполнения учебной документации кафедр
    и факультетов, учета педагогической нагрузки преподавателя, экзаменационных и
    зачётных ведомостей и др.

    Подготовка проектов приказов и распоряжений ректората по планированию и организации
    учебного процесса, закреплению учебных площадей за подразделениями Университета.

