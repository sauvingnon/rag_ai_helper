    О подразделении

    Новости

    Центр исследований и сертификации проводит квалификационные экзамены и сертификацию
    (ресертификацию) по неразрушающему контролю на I и II квалификационные уровни
    в соответствии с ГОСТ Р ИСО 9712-2023 в производственном секторе «Железнодорожный
    транспорт» в следующих секторах продукции по ГОСТ 34513-2018: - детали и составные
    части подвижного состава при изготовлении (магнитный, вихретоковый, акустический
    (ультразвуковой) виды; проникающими веществами (капиллярный), визуальный и измерительный
