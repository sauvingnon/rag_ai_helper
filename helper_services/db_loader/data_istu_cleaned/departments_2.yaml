    Контакты

    О подразделении

    Структура

    Основными задачами УУиО являются

    :

    Организация бухгалтерского и налогового учета финансово-хозяйственной деятельности
    Университета;

    Формирование полной и достоверной учетной информации о фактах финансово-хозяйственной
    деятельности Университета и его имущественном положении;

    Обеспечение информацией руководства Университета с целью принятия управленческих
    финансовых решений, управления рисками отражения фактов хозяйственной жизни Университета;

    Обеспечение учета наличия и движения имущества/активов и обязательств, использования
    финансовых ресурсов в соответствии с утвержденным планом ФХД, сметными назначениями,
    нормативами и нормами (при наличии);

    Осуществление внутреннего финансового контроля с целью оценки рисков, выявления
    и устранения ошибок в учете и отчетности.

    Функции УУиО

    :

    Организация бухгалтерского, бюджетного и налогового учета имущества (нефинансовых
    и финансовых активов), обязательств и фактов хозяйственной жизни (хозяйственных
    операций, сделок, событий).

    Организация учета денежных средств, правильности ведения кассовых операций, обеспечение
    использования контрольно-кассовой техники.

    Обеспечение своевременных расчетов по заработной плате и стипендии.

    Своевременное и правильное начисление налогов и сборов в бюджеты разных уровней
    и государственные внебюджетные фонды и контроль за их перечислением.

    Организация учета финансовых результатов (прибыли) по собственным средствам Университета.

    Составление и предоставление бюджетной и бухгалтерской (финансовой) отчетности
    с использованием программного обеспечения в контролирующие органы, учредителю,
    а также в различные информационные системы.

    Формирование Учетной политики Университета.

    Обеспечение порядка проведения инвентаризаций.

    Участие в оформлении материалов по недостачам и хищениям денежных средств и товарно-материальных
    ценностей.

    Осуществление внутреннего финансового контроля УУиО и филиалов.

    Взаимодействие с банками по вопросам перечисления заработной платы сотрудников
    и стипендии студентов.

    Обеспечение хранения бухгалтерской документации в установленном порядке, в том
    числе в электронном виде и оформление централизованной передачи в архив.

    Предоставление руководству и подразделениям необходимой информации для осуществления
    анализа деятельности учреждения с соблюдением требований защиты персональных данных,
    коммерческой (служебной) и налоговой тайны Университета в соответствии с законодательством
    РФ.

    Права УУиО

    :

    Требовать от всех подразделений Университета соблюдения порядка оформления операций
    и представления необходимых документов и сведений.

    Требовать от руководителей структурных подразделений Университета и отдельных
    специалистов принятия мер, направленных на повышение эффективности использования
    средств Университета, обеспечение сохранности имущества, обеспечение правильной
    организации бухгалтерского учета и контроля.

    Не принимать к исполнению документы, не прошедшие внутренний контроль, оформленные
    с нарушением установленного порядка, не содержащие всех необходимых реквизитов.

    Вести переписку по вопросам бухгалтерского учета и отчетности, а также другим
    вопросам, входящим в компетенцию управления и не требующим согласования с ректором
    (проректором).

    Рассматривать и визировать приказы, распоряжения, положения, планы, сметы, договоры, 
    связанные с основной деятельностью Университета, в соответствии с бухгалтерским
    (бюджетным) законодательством, требованиями Минфина России и предоставленными
    полномочиями.

    Осуществлять внутренний контроль деятельности филиалов Университета, направлять
    им соответствующие Уведомления и/или рекомендации (Акты проверок), направленные
    на устранение ошибок.

    Представлять руководству Университета предложения по совершенствованию управления
    бухгалтерским учетом Университета, о систематическом повышении  уровня квалификации
    работников, о поощрении и наказании работников управления, в том числе связанных
    с учетом использования материальных ценностей, по результатам проведения годовой
    инвентаризации, исполнения договоров, о выявленных ошибках и недостатках по результатам
    внутреннего контроля в пределах компетенции управления.

