    и студенчеством.

    Проведение единой политики по разработке и использованию различных форм информирования
    в учебном и воспитательном процессе.

    Организация PR- взаимодействия со всем структурными подразделениями Университета,
    организациями и предприятиями с целью более полного и объективного информационного
    обеспечения обучающихся, преподавателей и работников Университета.

    Информирование преподавателей, работников и обучающихся Университета о процессах
    и событиях, происходящих в студенческой среде, в Университете и в системе высшего
