<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Голосовой ассистент</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 24px;
      padding: 48px 24px 32px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      color: #9aa0a6;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #1e88e5;
      color: white;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(30, 136, 229, 0.4);
      user-select: none;
      -webkit-user-select: none;
    }

    #btn:hover { background: #1565c0; }

    #btn.recording {
      background: #e53935;
      transform: scale(1.08);
      box-shadow: 0 0 0 14px rgba(229, 57, 53, 0.25);
      animation: pulse 1.2s infinite;
    }

    #btn.processing {
      background: #616161;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(229, 57, 53, 0.35); }
      70%  { box-shadow: 0 0 0 18px rgba(229, 57, 53, 0);    }
      100% { box-shadow: 0 0 0 0   rgba(229, 57, 53, 0);     }
    }

    #status {
      font-size: 0.9rem;
      color: #9aa0a6;
      height: 20px;
    }

    #chat {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 90%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .bubble.user {
      background: #1e3a5f;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      background: #1e2535;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.55;
    }

    #error {
      color: #ef5350;
      font-size: 0.85rem;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      width: 100%; max-width: 640px; color: #5f6368; font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #2a2d36;
    }

    .text-input-row {
      display: flex; width: 100%; max-width: 640px; gap: 8px;
    }
    #textInput {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1px solid #2a2d36; background: #1e2535; color: #e8eaed;
      font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    #textInput:focus { border-color: #1e88e5; }
    #textInput::placeholder { color: #5f6368; }
    #sendBtn {
      padding: 12px 18px; border-radius: 12px; border: none;
      background: #1e88e5; color: white; font-size: 1.1rem;
      cursor: pointer; transition: background 0.15s; line-height: 1;
    }
    #sendBtn:hover:not(:disabled) { background: #1565c0; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Голосовой ассистент</h1>

  <button id="btn">Держать<br>и говорить</button>

  <div id="status">Подключение...</div>
  <div id="error"></div>

  <div class="divider">или напечатайте</div>

  <div class="text-input-row">
    <input id="textInput" type="text" placeholder="Напишите вопрос…" />
    <button id="sendBtn" title="Отправить">→</button>
  </div>

  <div id="chat"></div>

  <script>
    const btn = document.getElementById('btn');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const chat = document.getElementById('chat');

    let ws, mediaRecorder, chunks = [];
    let pendingMeta = null;
    let chatHistory = [];  // единая история для голоса и текста
    const MAX_HISTORY = 40;

    function setStatus(text) { statusEl.textContent = text; }
    function setError(text)  { errorEl.textContent = text; }

    function addBubble(role, label, text) {
      const wrap = document.createElement('div');
      wrap.className = `bubble ${role}`;
      wrap.innerHTML = `<div class="label">${label}</div><div>${text}</div>`;
      chat.prepend(wrap);
      wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function connectWS() {
      ws = new WebSocket(`ws://${location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen  = () => setStatus('Готов — держи кнопку и говори');
      ws.onclose = () => { setStatus('Соединение потеряно, переподключение...'); setTimeout(connectWS, 2000); };
      ws.onerror = () => setError('Ошибка WebSocket');

      ws.onmessage = (event) => {
        if (typeof event.data === 'string') {
          const data = JSON.parse(event.data);
          if (data.error) { setError('Ошибка: ' + data.error); setStatus('Готов'); return; }
          pendingMeta = data;
          if (data.user_msg) addBubble('user',      'Вы',        data.user_msg);
          if (data.response) addBubble('assistant', 'Ассистент', data.response);
          if (data.user_msg && data.response) {
            chatHistory.push({ role: 'user',      content: data.user_msg });
            chatHistory.push({ role: 'assistant', content: data.response });
            if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);
          }
          setStatus('Воспроизвожу...');
        } else {
          // Binary = WAV audio
          const blob = new Blob([event.data], { type: 'audio/wav' });
          const url  = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.onended = () => { URL.revokeObjectURL(url); setStatus('Готов — держи кнопку и говори'); };
          audio.play().catch(e => { setError('Не удалось воспроизвести: ' + e); setStatus('Готов'); });
          pendingMeta = null;
          setError('');
        }
      };
    }

    async function initMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          chunks = [];
          if (blob.size < 1000) { setStatus('Слишком коротко, попробуй ещё'); return; }
          const buf = await blob.arrayBuffer();
          ws.send(JSON.stringify({ history: chatHistory }));
          ws.send(buf);
          setStatus('Обрабатываю...');
        };
      } catch (e) {
        setError('Нет доступа к микрофону: ' + e.message);
      }
    }

    // Push-to-talk: mouse + touch
    function startRecord() {
      if (!mediaRecorder || mediaRecorder.state === 'recording') return;
      if (!ws || ws.readyState !== WebSocket.OPEN) { setError('Нет соединения'); return; }
      chunks = [];
      mediaRecorder.start();
      btn.classList.add('recording');
      btn.textContent = 'Говори...';
      setError('');
    }

    function stopRecord() {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
      mediaRecorder.stop();
      btn.classList.remove('recording');
      btn.classList.add('processing');
      btn.innerHTML = 'Держать<br>и говорить';
      setTimeout(() => btn.classList.remove('processing'), 500);
    }

    btn.addEventListener('mousedown',  startRecord);
    btn.addEventListener('mouseup',    stopRecord);
    btn.addEventListener('mouseleave', stopRecord);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startRecord(); });
    btn.addEventListener('touchend',   e => { e.preventDefault(); stopRecord();  });

    connectWS();
    initMic();

    // ── Text chat ──────────────────────────────────────────────────────────────
    const textInput = document.getElementById('textInput');
    const sendBtn   = document.getElementById('sendBtn');

    async function typeInto(el, text, delay = 12) {
      for (const ch of text) {
        el.textContent += ch;
        await new Promise(r => setTimeout(r, delay));
      }
    }

    async function sendText() {
      const msg = textInput.value.trim();
      if (!msg || sendBtn.disabled) return;
      textInput.value = '';
      textInput.disabled = true;
      sendBtn.disabled   = true;
      setError('');

      addBubble('user', 'Вы', msg);

      // Создаём пузырь ассистента сразу — текст будет печататься в него
      const wrap = document.createElement('div');
      wrap.className = 'bubble assistant';
      wrap.innerHTML = '<div class="label">Ассистент</div><div class="msg-text"></div>';
      chat.prepend(wrap);
      const textEl = wrap.querySelector('.msg-text');

      let fullText = '';

      try {
        const r = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history: chatHistory }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);

        const reader  = r.body.getReader();
        const decoder = new TextDecoder();
        let   buf     = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();  // неполная строка — ждём продолжения

          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const { token } = JSON.parse(line);
              if (!token) continue;
              const toType = fullText.length ? ' ' + token : token;
              fullText += (fullText.length ? ' ' : '') + token;
              await typeInto(textEl, toType);
            } catch {}
          }
        }

        if (fullText) {
          chatHistory.push({ role: 'user',      content: msg      });
          chatHistory.push({ role: 'assistant', content: fullText });
          if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);
        }
      } catch (e) {
        setError('Ошибка: ' + e.message);
        if (!fullText) wrap.remove();
      } finally {
        textInput.disabled = false;
        sendBtn.disabled   = false;
        textInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendText);
    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    });
  </script>
</body>
</html>
