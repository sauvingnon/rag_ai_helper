[incoming]
; 1000 — аккаунт Zoiper, звонит на 2000 — голосовой ассистент
exten => 2000,1,NoOp(Voice assistant call)
exten => 2000,n,Answer()
exten => 2000,n,Wait(0.3)
; AudioSocket: Asterisk подключается к telephony_service:9093
; 127.0.0.1 — потому что Asterisk в network_mode: host, а telephony_service
; публикует порт 9093 на хосте
exten => 2000,n,AudioSocket(00000000-0000-0000-0000-000000000001,telephony_service:9093)
exten => 2000,n,Hangup()

[default]
exten => _X.,1,Goto(incoming,${EXTEN},1)
