[incoming]
; 1000 — аккаунт Zoiper, звонит на 2000 — голосовой ассистент
exten => 2000,1,NoOp(Voice assistant call from ${CALLERID(num)})
exten => 2000,n,Answer()
exten => 2000,n,Wait(0.3)
; Строим детерминированный UUID из MD5 номера телефона.
; Один и тот же номер → один и тот же UUID → один и тот же контекст диалога.
exten => 2000,n,Set(H=${MD5(${CALLERID(num)})})
exten => 2000,n,Set(CALL_UUID=${H:0:8}-${H:8:4}-${H:12:4}-${H:16:4}-${H:20:12})
exten => 2000,n,AudioSocket(${CALL_UUID},telephony_service:9093)
exten => 2000,n,Hangup()

[default]
exten => _X.,1,Goto(incoming,${EXTEN},1)
