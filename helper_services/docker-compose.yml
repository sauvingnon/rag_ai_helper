services:
  asterisk:
    image: mlan/asterisk:latest
    container_name: asterisk
    volumes:
      - ./config:/etc/asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060"
      - "10000-10100:10000-10100/udp"
    networks:
      - internal
    depends_on:
      - telephony_service

  telephony_service:
    build: ./telephony_service
    container_name: telephony_service
    restart: unless-stopped
    ports:
      - "9093:9093"                  # AudioSocket — Asterisk (хост) → сюда
    volumes:
      - telephony_torch_cache:/app/.torch_cache
    environment:
      - AI_SERVICE_URL=http://ai_service:8005
      - AUDIOSOCKET_PORT=9093
    networks:
      - internal
    depends_on:
      ai_service:
        condition: service_healthy

  # Контейнер с rag-моделью НЕ ГОТОВ! УХОДИМ ОТ GROQ и вообще идем на локальный инференс
  ai_service:
    build: ./ai_service
    container_name: ai_service
    restart: unless-stopped
    volumes:
      - ./ai_service/chroma_db:/app/services/embeddings_service/chroma_db
      - ./ai_service/models:/app/services/embeddings_service/models
      - ai_whisper_cache:/app/.whisper_cache
    env_file:
      - ./ai_service/.env
    environment:
      - HF_HUB_OFFLINE=1
    networks:
      - internal
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    # mem_limit: 160m
    # cpus: "0.2"

  # voice_service:
  #   build: ./voice_service
  #   container_name: voice_service
  #   restart: unless-stopped
  #   ports:
  #     - "8010:8010"
  #   volumes:
  #     - voice_torch_cache:/app/.torch_cache
  #   environment:
  #     - AI_SERVICE_URL=http://ai_service:8005
  #   networks:
  #     - internal
  #   depends_on:
  #     - ai_service

networks:
  internal:
    name: internal
    driver: bridge

volumes:
  voice_torch_cache:
  telephony_torch_cache:
  ai_whisper_cache:

